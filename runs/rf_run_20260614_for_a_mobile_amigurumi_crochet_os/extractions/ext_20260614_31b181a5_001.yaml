extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE animates pattern creation by revealing stitches one-by-one ('a') and hiding them
    one-by-one (ctrl+a), a direct precedent for row-by-row playback and ghost-next-row overlay.
  locator: Shortcuts in 3D view
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The renderer encodes working order via blue connections with arrowheads and shows all remaining
    stitch relationships as red connections, visualizing how stitches attach rather than why counts change.
  locator: The 3D visualization canvas
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The tool can highlight a specific row or individual stitch (ctrl+f), highlight stitches by label
    (ctrl+d), and hide everything after a chosen row/stitch (ctrl+h) -- primitives for checkpoint surfacing
    and piece isolation.
  locator: Shortcuts in 3D view
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The 's' key flags over/under-stretched stitches (blue = too loose, red = too tight by more than
    ~15%), an existing tension/gauge confidence signal surfaced before crocheting.
  locator: Shortcuts in 3D view
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Hovering a stitch reveals its row and stitch number plus the stitch type in brackets, and shift+left-click
    pins a persistent info box -- an inline per-stitch rationale affordance.
  locator: The 3D visualization canvas
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The manual documents no feature that explains why a stitch or decrease count changed, nor any
    post-hoc analysis of increase/decrease distribution rationale across rounds -- defining the explainability
    whitespace for KnitWit.
  locator: The 3D visualization canvas / Shortcuts in 3D view (absence)
  confidence: medium
  quote_available: false
  notes: ''
