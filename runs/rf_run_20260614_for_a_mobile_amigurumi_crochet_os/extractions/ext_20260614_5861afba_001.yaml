extracted_facts:
- evidence_id: ev_001
  text: 'The study operationalized three confidence conditions against a fixed 70% AI accuracy: underconfident
    (60% stated confidence), well-calibrated (70%), and overconfident (80%).'
  locator: Sec 3.1.5 Experimental Conditions and AI Model
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Overconfident AI raised the user switch-to-AI rate to ~69.6% versus ~57% for well-calibrated AI,
    while underconfident AI lowered it to ~40.5%.
  locator: Sec 3.2.3 Effects of AI Confidence Miscalibration on Participants' Reliance on AI
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Overconfident AI increased over-reliance to ~41.3% versus ~28.2% for well-calibrated AI.
  locator: Sec 3.2.3 Effects of AI Confidence Miscalibration on Participants' Reliance on AI
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Underconfident AI increased under-reliance to ~17.7% versus ~11.2% for well-calibrated AI.
  locator: Sec 3.2.3 Effects of AI Confidence Miscalibration on Participants' Reliance on AI
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Decision-accuracy improvement fell to ~6.5% (underconfident) and ~7.2% (overconfident) versus
    ~11.9% for well-calibrated confidence.
  locator: Sec 3.2.4 Effects of AI Confidence Miscalibration on AI-assisted Decision Making Efficacy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Users could not detect miscalibration on their own: 66.7% wrongly judged an underconfident AI
    well-calibrated and 64.3% made the same error for an overconfident AI.'
  locator: Sec 3.2.1 Participants' Detection of AI Confidence Miscalibration
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Explicitly communicating the calibration level improved detection (76.2% correctly identified
    underconfidence) but decreased trust in uncalibrated AI and did not improve overall decision efficacy.
  locator: Sec 4.2.1 Effect of Communicating AI Confidence Calibration Level on Participants' Detection
    / Abstract
  confidence: medium
  quote_available: true
  notes: ''
