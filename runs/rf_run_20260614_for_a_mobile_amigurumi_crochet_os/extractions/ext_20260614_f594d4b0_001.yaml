extracted_facts:
- evidence_id: ev_001
  text: The study is a survey-based between-subjects experiment with 300 participants (150 per task) classifying
    familiar and unfamiliar stimuli with a simulated AI of varying accuracy across geometric-shape and
    animal-identification tasks.
  locator: Abstract / Section 4 Results (p.1, p.7)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Once trust was eroded, Model Update restored trust above its initial level, followed by Apology,
    Promise, and the no-repair baseline, with Denial being least effective.
  locator: Abstract (p.1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Most participants used the AI's accuracy on familiar (high-human-expertise) stimuli as a heuristic
    to calibrate their trust in its output for unfamiliar (low-human-expertise) stimuli they could not
    independently verify.
  locator: Section 4.2.1 Influence of Complementary Expertise on Trust (p.7)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: When indicators of an AI's performance are not provided, individuals tend to over-rely on the
    AI regardless of its actual accuracy, even when explanations are provided.
  locator: Section 2 Related Work (p.2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Early system errors disproportionately shape trust for the whole interaction, causing negative
    trust outcomes even if accuracy later improves, so first impressions are weighted more heavily.
  locator: Section 2 Related Work / Section 3 Method (p.2, p.5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors adopt Lee and See's definition of trust as an attitude that an agent will achieve
    a goal under uncertainty and vulnerability.
  locator: Section 2 Related Work (p.1-2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Denial was the least effective repair strategy across both tasks, backfiring and prompting users
    to distrust the AI despite improved accuracy, with trust similar to the lowest-accuracy phase.
  locator: Section 5.2.2 Denying Responsibility for Mistakes (p.8)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Model Update outperformed Promise despite identical AI accuracy, restoring trust above its Phase
    1 starting level, while Promise was merely as effective as the no-repair baseline.
  locator: Section 5.2.3 Promised Technical Improvements Outperform Behavioural (p.8)
  confidence: medium
  quote_available: true
  notes: ''
