contradictions_or_cautions:
- text: Simulated AI (not a real model); survey-based crowd study; geometric-shape and animal-identification
    tasks may not generalize to all domains.
  locator: card/trust
- text: Simulated AI rather than a real deployed model; survey-based crowd study with two specific classification
    domains (shapes, animals), so generalization to richer real-world Human-AI collaboration is unverified.
    AI made its sole Phase 1/3 mistake on a fixed trial (number 7), a controlled design choice rather
    than naturalistic error timing.
  locator: card/limitations
