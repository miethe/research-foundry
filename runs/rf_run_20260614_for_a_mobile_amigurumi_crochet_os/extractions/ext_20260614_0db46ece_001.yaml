extracted_facts:
- evidence_id: ev_001
  text: Reliance on a model is not driven by uncertainty alone; it depends jointly on task difficulty
    and the level of machine uncertainty.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The study tested two uncertainty visualization techniques in a college-admissions forecasting
    task across two task-difficulty levels on Amazon Mechanical Turk.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Failure to calibrate trust causes over-reliance or under-reliance on model outputs, both of which
    diminish the benefits of a joint human-automation system.
  locator: Section 1 Introduction, p.1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Without appropriate interventions, people are heavily biased to adopt imperfect human judgments
    over imperfect models, making trust-calibration interventions decisive.
  locator: Section 1 Introduction (related work), p.2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Five visual representations were compared, grouped into three categories: Table and Histogram
    (no model prediction), Model-prediction (prediction only), and Violin Plot and Question-mark (which
    include uncertainty).'
  locator: Figure 1 caption / Section 4 (Experimental Design)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A simple ordinal uncertainty representation (Question-mark) is generally sufficient and more cognitively
    accessible to general audiences than continuous probability distributions, even though richer detail
    (Violin Plot) is perceived as more trustworthy.
  locator: Section 6 Discussion / Conclusion
  confidence: medium
  quote_available: true
  notes: ''
