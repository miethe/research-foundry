- evidence_id: ev_003
  text: AmiGo builds a Crochet Graph (geometry plus connectivity) as an explicit intermediate representation
    that is then translated into the written round-by-round pattern.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The Crochet Graph encodes stitches as graph elements: vertices are stitch tops/bases, column
