extracted_facts:
- evidence_id: ev_001
  text: The paper frames appropriate reliance on AI as a human-centered problem and intervenes via 'human
    self-confidence calibration,' structured as three studies.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Calibrating human self-confidence improved human-AI team performance and led to more rational
    reliance on AI versus an uncalibrated baseline.
  locator: Abstract (results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The paper treats trust and reliance as separable constructs: trust is a subjective self-reported
    attitude toward the AI, while reliance is the objective behavior of acting on its recommendation.'
  locator: Section 2.1, Appropriate Reliance in AI-Assisted Decision-Making
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Inappropriate reliance is split into over-reliance (agreeing with AI when it is wrong) and under-reliance
    (rejecting AI when it is right), giving measurable behavioral targets.
  locator: Section 2.1 (Outcome-Based Measurement)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: In study 3, self-confidence calibration produced more rational reliance and reduced under-reliance
    and improved task performance, but did not reduce over-reliance.
  locator: Section 1 (Study 3 findings)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Self-reported trust does not reliably track reliance behavior, so the authors study reliance behavior
    as the more dependable indicator of appropriateness.
  locator: Section 2.1 (trust vs reliance inconsistency)
  confidence: medium
  quote_available: true
  notes: ''
