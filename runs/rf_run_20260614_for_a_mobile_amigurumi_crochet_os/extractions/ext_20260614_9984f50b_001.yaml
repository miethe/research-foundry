contradictions_or_cautions:
- text: Single task domain (income prediction on the Adult Income dataset); non-expert crowd participants;
    lab-style user study, generalization beyond this setting not established.
  locator: card/trust
- text: Findings come from a single task domain (income prediction on the Adult Income dataset) with non-expert
    crowd participants in a lab-style user study; generalization to other domains and to a crochet/amigurumi
    assistant context is not established. Over-reliance was not reduced by the intervention.
  locator: card/limitations
