extracted_facts:
- evidence_id: ev_001
  text: StitchFlow is a peer-reviewed full paper by Zofia Marciniak, Punn Lertjaturaphat, and Andrea Bianchi,
    published Open Access (CC BY 4.0) in the Proceedings of the 38th Annual ACM Symposium on User Interface
    Software and Technology (UIST '25).
  locator: Authors / Header / UIST '25 Proceedings (Article No. 7, pp. 1-15)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper identifies documenting patterns, tracking progress, and backtracking from mistakes or
    mid-process changes as the specific tasks that disrupt a crocheter's creative flow.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: StitchFlow uses a motion sensor to track real-time hand gestures and reconstruct the stitch pattern,
    letting crocheters work in situ without distraction or needing to remember previous steps.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The system automatically constructs process documentation that can be composed and exported as
    traditional written patterns and crochet charts, or as shareable in-system flows other users can follow.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A user study with 8 crocheters found StitchFlow preserved makers' creative flow, enabled spontaneous
    exploration, and facilitated pattern sharing.
  locator: Abstract (final sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper frames pattern documentation as requiring makers to pause, count stitches, take notes,
    and mentally interpret notations, and argues these interruptions break the immersive flow essential
    to creative exploration.
  locator: Section 1 Introduction (para 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Crochet patterns are conventionally shared in two flat representations -- written notation and
    symbol-based charts -- and proficiency in one format does not necessarily transfer to fluency in the
    other.
  locator: Section 1 Introduction (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The paper notes crochet has uniquely resisted mechanization because no machines can fully replicate
    the hand movements required to manipulate stitches, keeping it an inherently human, improvisational
    skill.
  locator: Section 1 Introduction (para 1)
  confidence: medium
  quote_available: true
  notes: ''
