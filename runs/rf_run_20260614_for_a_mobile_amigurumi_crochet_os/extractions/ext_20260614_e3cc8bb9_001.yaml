- evidence_id: ev_001
  text: Explanations promoted for transparency can instead foster confirmation bias, with users assuming
    the reasoning is correct whenever the output looks acceptable.
  locator: Abstract (opening framing)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The study probes the double-edged role of Chain-of-Thought explanations in multimodal moral scenarios
    by perturbing reasoning chains and manipulating delivery tones in vision language models.
  locator: Abstract (method)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Users tend to equate trust with agreeing on the outcome, so they keep relying on the system even
    when the underlying reasoning is flawed.
  locator: Abstract (finding 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A confident delivery tone suppresses users' detection of errors while preserving reliance, showing
    presentation style can override correctness.
  locator: Abstract (finding 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: CoT explanations can simultaneously clarify and mislead, so NLP systems should present explanations
    that encourage scrutiny and critical thinking rather than blind trust.
  locator: Abstract (conclusion)
  confidence: medium
  quote_available: true
  notes: ''
