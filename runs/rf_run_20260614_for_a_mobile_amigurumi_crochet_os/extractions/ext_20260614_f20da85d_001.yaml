extracted_facts:
- evidence_id: ev_001
  text: Visualizing AI uncertainty significantly enhanced trust for 58% of participants who held negative
    attitudes toward AI.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Across the full sample of 147 participants, displaying uncertainty increased trust in AI for 48%
    (n=70).
  locator: Results section 4.2 (Trust)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Size-based uncertainty encoding had a significantly greater impact on trust than transparency
    (p < 0.05).
  locator: Results section 4.2 (Trust)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Color saturation was rated highest for intuition and preference, ahead of transparency and size.
  locator: Discussion section 5.3 (Visual Perceptions)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Displaying AI uncertainty raised decision confidence for 44% of participants but lowered it for
    56%.
  locator: Results section 4.3 (Confidence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: One-third of participants (33%, n=48) changed their responses after seeing the AI prediction's
    uncertainty.
  locator: Results section 4.1 (Decision Change)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The authors decline to endorse any single uncertainty visualization technique or to push users
    toward trusting AI, cautioning against over-trust.
  locator: Discussion section 5.5 (Implications)
  confidence: medium
  quote_available: true
  notes: ''
