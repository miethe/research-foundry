extracted_facts:
- evidence_id: ev_001
  text: Overconfident AI raised over-reliance to ~41.3% versus ~28.2% for well-calibrated output, a statistically
    significant increase.
  locator: Sec 3.2.3 (Reliance results) + baseline EXP1-W
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Underconfident AI raised under-reliance to ~17.7% versus ~11.2% for well-calibrated output, a
    statistically significant increase.
  locator: Sec 3.2.3 (Reliance results) + baseline EXP1-W
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Miscalibration shrank accuracy gains: underconfident AI yielded +6.5% and overconfident +7.2%
    versus +11.9% for well-calibrated AI, both significant reductions.'
  locator: Sec 3.2 (Decision accuracy results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'AI confidence directly moved switching behavior: switch-to-AI rate fell to ~40.5% under underconfidence
    versus ~57.0% well-calibrated and rose to ~69.6% under overconfidence.'
  locator: Sec 3.2 (Switch behavior)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Disclosing calibration level sharply improved detection: 73.8% correctly flagged the AI as overconfident,
    up from 26.2% without disclosure.'
  locator: Sec 4.2.1 (Detecting miscalibration after disclosure)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Despite better detection, disclosure yielded no decision-efficacy gain because it increased under-reliance
    on overconfident AI.
  locator: Sec 4.2.3 / 4.2.4 (Effect of communicating calibration)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The authors recommend telling users WHY and under what conditions confidence may be unreliable,
    not just surfacing a bare confidence number.
  locator: Discussion / Design implications
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Experiment 1 used 126 unique participants split across conditions (42 per condition).
  locator: Sec 3 (Experiment 1 design / participants)
  confidence: medium
  quote_available: true
  notes: ''
