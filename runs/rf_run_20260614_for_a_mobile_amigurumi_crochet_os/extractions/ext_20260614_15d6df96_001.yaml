extracted_facts:
- evidence_id: ev_001
  text: Prior evaluations of transit uncertainty displays measured probability extraction, not decision
    quality, which this study set out to assess directly.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: In a controlled incentivized experiment, subjects decided when to leave to catch a bus using textual
    uncertainty, uncertainty visualizations, or a no-uncertainty control.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Frequency-based quantile dotplots, previously shown to aid probability extraction, yielded better
    decisions than the alternatives.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Quantile dotplots with 50 outcomes produced decisions averaging 97% of optimal expected payoff,
    5 percentage points above the control.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: CDF plots performed nearly as well as quantile dotplots, and both beat textual uncertainty, whose
    effectiveness depended on the probability interval communicated.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Quantile dotplots reframe a probability density as countable discrete outcomes, letting non-experts
    reason about probabilities as counts rather than areas, well suited to space-constrained mobile displays.
  locator: Introduction (paras 4-5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Decision quality with dotplots and CDFs was high from the start and improved with practice, reaching
    about 95% of optimal by the final trial while becoming more consistent.
  locator: Figure 4 caption (Results)
  confidence: medium
  quote_available: true
  notes: ''
