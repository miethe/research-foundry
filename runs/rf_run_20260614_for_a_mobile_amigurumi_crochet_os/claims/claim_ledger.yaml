- claim_id: clm_inf01
  text: KnitWit's confidence meter should adopt a coarse ordinal scale (e.g., a 3-level high/medium/low
    or question-mark-style marker) rather than a continuous percentage or probability distribution, because
    ordinal uncertainty representations both calibrate usage behavior better and are more cognitively
    accessible to non-expert makers.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_006
    - clm_011
    - clm_012
    reasoning_summary: Zhao et al. (TVCG 2023) found ordinal forms (Question-mark) calibrate model-usage
      behavior and are more accessible than continuous distributions (clm_006), while Fernandes et al.
      (CHI 2018) show even rich encodings work best when reframed as countable discrete outcomes rather
      than areas (clm_011, clm_012); together they argue against a bare continuous percentage on a space-constrained
      mobile crocheter UI.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: For per-round approximate-3D fit confidence, a frequency-framed quantile dotplot (e.g., '47 of
    50 simulated tensions fit this round') is the strongest mobile-suitable encoding, because dotplots
    reached ~97% of optimal decision payoff (5 points above control) and CDFs nearly matched them, both
    beating textual probability.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_009
    - clm_010
    - clm_011
    - clm_012
    - clm_013
    reasoning_summary: Fernandes et al. found quantile dotplots (50 outcomes) yielded the best decisions
      at 97% of optimal (clm_009, clm_010), CDFs nearly as good and both beating textual uncertainty (clm_011),
      with the count-not-area reframing explicitly suited to space-constrained mobile displays (clm_012);
      decision quality also improved with practice (clm_013), matching a repeated-use crochet app.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: A bare confidence number on an approximate preview is insufficient and potentially harmful for
    KnitWit; the meter must pair every confidence signal with a 'why this is approximate / under what
    conditions it may be wrong' explanation, because disclosing only a calibration number improved detection
    but did not improve decision efficacy and could erode trust.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_058
    - clm_059
    - clm_060
    reasoning_summary: Li et al. show disclosing the calibration level raised detection (to 73.8-76.2%)
      but yielded no decision-efficacy gain because it traded over- for under-reliance (clm_026, clm_058,
      clm_059), and the authors explicitly recommend telling users WHY and under what conditions confidence
      may be unreliable rather than surfacing a bare number (clm_060).
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: KnitWit's previews must be deliberately calibrated and never made to look more authoritative than
    the evidence supports, because overconfident outputs drove over-reliance to ~41% (vs ~28% well-calibrated)
    and underconfident outputs drove under-reliance to ~18% (vs ~11%), with both miscalibration directions
    roughly halving the accuracy benefit (to ~6.5-7.2% vs ~11.9%).
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_021
    - clm_022
    - clm_023
    - clm_024
    - clm_054
    - clm_055
    - clm_056
    reasoning_summary: Li et al.'s two-direction miscalibration results (clm_021-024, clm_054-056) establish
      that both overconfidence and underconfidence are costly and that well-calibration is the optimal
      operating point, directly implying KnitWit must tune preview/pattern confidence framing to its true
      approximation accuracy rather than to user-pleasing optimism.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'The single highest-leverage trust risk for KnitWit is the first visible approximate-preview error:
    because early system errors disproportionately shape whole-interaction trust and denial backfires,
    the app should front-load its lowest-uncertainty shapes (spheres/heads) in onboarding and, after any
    visible mismatch, repair via a concrete ''model update / recalculated'' fix rather than apology or
    denial.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_078
    - clm_075
    - clm_080
    - clm_081
    reasoning_summary: Pareek et al. show early errors dominate whole-interaction trust (clm_078), Model
      Update repair restored trust above its initial level while Denial was least effective and backfired
      (clm_075, clm_080, clm_081); applied to KnitWit this argues for sequencing reliable shapes first
      and using technical-fix framing for repair.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: Because makers cannot independently verify an approximate 3D preview of a shape they have not
    yet crocheted, they will transfer trust from cases they CAN verify (simple verified spheres/heads)
    to ones they cannot, so KnitWit's perceived accuracy on its easiest previews becomes the de facto
    trust anchor for its hardest ones.
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_076
    - clm_077
    - clm_001
    reasoning_summary: Pareek et al. found users use AI accuracy on familiar high-expertise stimuli to
      calibrate trust on unverifiable unfamiliar stimuli (clm_076) and over-rely absent performance indicators
      (clm_077); since preview reliance also depends on task difficulty (clm_001), KnitWit's hard-shape
      trust is anchored by its easy-shape accuracy.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: Crochet's two incumbent flat representations (written notation and symbol charts) plus documented
    under-specification of human patterns are the root cause of the 'ambiguous/under-specified pattern
    text' failure-mode cluster, and a machine-checkable Crochet IR with explicit per-round expected_stitch_count
    is the direct mitigation because it forces the implicit conventions to be made explicit.
