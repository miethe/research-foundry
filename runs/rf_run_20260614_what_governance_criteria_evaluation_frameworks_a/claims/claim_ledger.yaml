- claim_id: clm_inf01
  text: Across SageMaker, MLflow, Databricks, Langfuse, LangSmith, and Vertex AI, every surveyed registry
    separates an immutable versioned artifact from a mutable promotion pointer (approval status, stage,
    environment label, or alias), so the RF SkillBOM lifecycle should likewise treat the candidate file
    as immutable and model candidate->evaluated->human-reviewed->promoted as movable pointer state rather
    than as edits to the artifact.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_003
    - clm_017
    - clm_021
    - clm_022
    - clm_023
    - clm_029
    - clm_041
    - clm_048
    - clm_052
    reasoning_summary: SageMaker registers each model as a new immutable version with a separate ModelApprovalStatus;
      MLflow replaced stages with aliases/tags that point at fixed versions; Databricks stages, Langfuse
      labels, LangSmith environment tags, and Vertex aliases are all mutable references to fixed versions.
      The shared pattern is artifact-immutable plus pointer-mutable.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'The RF SkillBOM stages map cleanly onto prior-art pointer states: candidate equals SageMaker
    PendingManualApproval / MLflow validation_status:pending / Databricks Staging; evaluated equals validation_status:passed
    after automated checks; human-reviewed equals a Databricks-style pending transition request acted
    on by a reviewer; promoted equals SageMaker Approved / MLflow Production alias / Langfuse protected
    production label / LangSmith Production environment.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_017
    - clm_012
    - clm_022
    - clm_023
    - clm_024
    - clm_025
    - clm_018
    - clm_030
    - clm_034
    - clm_048
    reasoning_summary: 'Each named prior-art state has a direct functional analogue to one RF lifecycle
      stage: pending/default start equals candidate, automated tag flip equals evaluated, request-plus-approve
      equals human-reviewed, approved/production-label/environment equals promoted.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Necessary versus sufficient signals diverge by gate: passing claim_verifier and governance_guard
    is NECESSARY but not SUFFICIENT to leave candidate, because every prior-art system that gates production
    (SageMaker, Databricks) requires an explicit human Approve action in addition to automated condition-step
    evaluation, whereas RF''s current single ''validation: report_reviewed'' flag conflates the automated
    and human checks into one unattributed boolean.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_016
    - clm_012
    - clm_025
    - clm_024
    reasoning_summary: SageMaker allows an automated condition step to set status but production deployment
      still flows through Approved; Databricks requires a reviewer to click Approve on a pending request.
      RF's single report_reviewed flag does not distinguish automated pass (necessary) from human sign-off
      (sufficient).
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'RF''s skillbom_candidate frontmatter has four governance gaps relative to the surveyed prior
    art: no explicit approval-status enum distinct from the lifecycle status field (cf. SageMaker ModelApprovalStatus);
    no reviewer-identity/accountability field (cf. Databricks recording the actor on Approve/Reject);
    no append-only transition/activity log for auditability (cf. Databricks Activities and SageMaker lineage);
    and no demotion or deprecation transition (cf. SageMaker Approved->Rejected rollback and the Databricks
    Archived stage).'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_012
    - clm_025
    - clm_026
    - clm_006
    - clm_014
    - clm_023
    reasoning_summary: Comparing the observed RF frontmatter (status, validation, known_failure_modes,
      performance_evidence) against SageMaker approval status, Databricks reviewer-actioned requests plus
      Activities log plus lineage, and SageMaker rollback transitions reveals these four missing capabilities.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'The single most transferable anti-friction pattern is Langfuse/MLflow/LangSmith pointer-based
    promotion: because promotion is a label/alias reassignment and not a re-deploy, RF can let many candidates
    accumulate cheaply while a protected promoted pointer designates exactly one blessed SkillBOM version
    per proposed_skillbom_id, mirroring Vertex''s rule that exactly one version carries the default alias
    at all times.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_030
    - clm_021
    - clm_048
    - clm_044
    - clm_046
    - clm_034
    reasoning_summary: Langfuse deploys via a label assignment, MLflow/Vertex via an alias move, LangSmith
      via an environment tag; Vertex requires exactly one default alias. Combining low-friction pointer
      promotion with a single-blessed-version constraint yields a cheap-accumulation, controlled-promotion
      design.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Premature reuse is prevented less by adding friction than by RBAC-protecting the promotion pointer:
    Langfuse protected prompt labels (released 2025-04-02) let only admin/owner roles move production
    while viewer/member roles can still create and label candidates, so RF should protect the promoted
    transition while leaving candidate->evaluated transitions open to any contributor, gating reuse rather
    than authorship.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_034
    - clm_037
    - clm_038
    - clm_040
    - clm_024
    reasoning_summary: Langfuse protected labels block viewer/member from touching production yet admins/owners
      retain control; Databricks lets unprivileged users request but not apply transitions. The pattern
      protects the promotion edge specifically, not the whole graph, minimizing friction.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_rec07
  text: 'Recommended go/no-go promotion rule: advance candidate->evaluated only when claim_verifier_passed
    AND governance_guard_passed are true and rework_count equals 0 for the originating run; advance evaluated->human-reviewed
    only when quality_score is at least 0.8 on a 0-1 scale across at least 2 independent runs; advance
    human-reviewed->promoted only on an attributed human Approve with zero open known_failure_modes classified
    severity high or above; and default to no-go (stay candidate) whenever quality_score is still pending.'
  materiality: material
  claim_type: recommendation
  status: speculation
  confidence: medium
  sources: []
  inference_basis:
    from_claims: []
    reasoning_summary: Synthesizes RF's own validation flags (claim_verifier_passed, governance_guard_passed)
      and performance_evidence fields (quality_score, rework_count, known_failure_modes) into a staged
      threshold. The specific numeric cutoffs (0.8, 2 runs, severity tiers) are a forward-looking design
      proposal not asserted by any source card; the at-least-2-run requirement extrapolates from SageMaker/Langfuse
      multi-version comparison practice.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_rec08
  text: 'Because RF candidates currently carry quality_score: pending and rework_count: 0 with no human
    sign-off, none of the existing skill_research_swarm_v0 candidates meet a defensible promotion bar;
    the immediate fix is to add an approval_status enum (pending->evaluated->approved/rejected), a reviewer
    field, and an append-only transitions log to the frontmatter before any candidate is reused.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_017
    - clm_012
    - clm_025
    - clm_026
    reasoning_summary: SageMaker's PendingManualApproval default plus Databricks reviewer-actioned Activities
      log are the minimal additions needed to make a promotion decision auditable; observed RF candidates
      lack a populated quality_score and any reviewer attribution. Follows directly from the gap analysis
      in clm_inf04.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_rec09
  text: Provenance and auditability should be recorded as an append-only transitions list embedded in
    the SkillBOM frontmatter, each entry carrying timestamp, from_state, to_state, actor, automated-versus-manual,
    and evidence_ref, directly porting the Databricks Activities lineage and SageMaker model-lineage patterns
    so any promotion decision can be reconstructed after the fact without an external system.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_006
    - clm_016
    - clm_025
    reasoning_summary: Databricks Activities records requested/approved/pending/applied transitions as
      auditable lineage; SageMaker surfaces model lineage for traceability and distinguishes manual versus
      automated (condition-step) status changes. An embedded append-only log captures both in RF's file-first
      model.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_spec10
  text: 'Re-evaluation and demotion should be event-and-cadence driven: a promoted SkillBOM should auto-demote
    toward evaluated (losing the protected promotion pointer) when its tools_used or prompts drift or
    when a new run records rework_count greater than 0, and should be re-reviewed on a fixed cadence such
    as quarterly, mirroring SageMaker''s Approved->Rejected rollback that automatically redeploys the
    last still-Approved version.'
  materiality: material
  claim_type: prediction
  status: speculation
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_014
    - clm_022
    reasoning_summary: SageMaker's Approved->Rejected transition auto-rolls back to the last Approved
      version, and MLflow tags move pending->passed to track validation drift. Extending this to RF SkillBOMs
      (drift in tools/prompts or new rework triggers demotion) plus a quarterly cadence is forward-looking;
      the cadence value and drift triggers are not asserted by any source.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_rec11
  text: 'Two documented premature-reuse anti-patterns for SkillBOMs: reuse-of-latest, where consumers
    pull the newest candidate by default instead of the blessed version (the failure Langfuse explicitly
    prevents by serving the production-labeled version, not latest, when no label is given); and unguarded-pointer-flip,
    where an unprivileged actor moves the promotion pointer (the failure Langfuse protected labels and
    the Databricks request/approve gate were built to stop).'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    - clm_032
    - clm_034
    - clm_024
    - clm_025
    reasoning_summary: Langfuse serves the production-labeled (not latest) version by default so reserved
      latest is never accidentally promoted, evidencing anti-pattern A; protected labels and Databricks
      request/approve gating exist to block unprivileged pointer changes, evidencing anti-pattern B as
      a real failure the vendors mitigated.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_spec12
  text: The minimal viable RF promotion-gate matrix is three gates over four states using only fields
    RF already has plus three additions (approval_status, reviewer, transitions list); this is lighter-weight
    than SageMaker's CI/CD-template-coupled approval graph yet strictly more auditable than MLflow's deprecated
    direct stage transition, positioning RF between the two and likely sufficient for a file-first control
    plane without a hosted registry service.
  materiality: material
  claim_type: prediction
  status: speculation
  confidence: low
  sources: []
  inference_basis:
    from_claims:
    - clm_018
    - clm_020
    - clm_013
    reasoning_summary: MLflow deprecated its bare stage-transition mechanism at 2.9.0 as too unstructured;
      SageMaker's approval graph is tightly coupled to CI/CD project templates. A three-gate/four-state
      RF matrix sits between them. The conclusion that it is sufficient for file-first without a hosted
      registry is a forward-looking judgment, not source-asserted.
  report_locations: []
  reviewer_notes: ''
