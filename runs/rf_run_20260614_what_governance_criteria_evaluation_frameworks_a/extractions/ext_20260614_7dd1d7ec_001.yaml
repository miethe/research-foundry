extracted_facts:
- evidence_id: ev_001
  text: The Workspace Model Registry defines four model-version stages (None, Staging, Production, Archived),
    with Staging meant for testing/validation, Production for reviewed-and-deployed live-scoring versions,
    and Archived for inactive versions.
  locator: Model Lifecycle Stages section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A user who lacks stage-transition permission can still request a transition, which surfaces in
    the Pending Requests section of the model version page.
  locator: Requesting Stage Transitions section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Reviewers act on a pending stage-transition request by clicking Approve, Reject, or Cancel, and
    the request's creator can also cancel it.
  locator: Approving, Rejecting, or Canceling Requests section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The Activities section records all requested, approved, pending, and applied transitions for a
    model version, providing a lifecycle lineage for auditing or inspection.
  locator: Activities section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Databricks marks this Workspace Model Registry as legacy and steers users with Unity Catalog enabled
    away from it toward Models in Unity Catalog.
  locator: Introductory 'important' notice at top of page
  confidence: medium
  quote_available: true
  notes: ''
