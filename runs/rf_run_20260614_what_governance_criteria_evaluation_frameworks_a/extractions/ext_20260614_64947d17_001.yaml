extracted_facts:
- evidence_id: ev_001
  text: A model version's approval status is evaluated after creation and updated to Approved if it meets
    requirements or Rejected if it does not, with Approved able to initiate CI/CD deployment.
  locator: Intro paragraph (model-registry-approve)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Under SageMaker provided project templates, PendingManualApproval->Approved and Rejected->Approved
    each initiate CI/CD deployment for the approved version, while PendingManualApproval->Rejected produces
    no action.
  locator: 'Section: valid transitions list (model-registry-approve)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: An Approved->Rejected transition triggers CI/CD to deploy the latest model version that still
    has an Approved status (rolling back to the last approved version).
  locator: 'Section: valid transitions list (model-registry-approve)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Approval status is changed by calling the update_model_package API with a dict containing ModelPackageArn
    and ModelApprovalStatus (e.g., set to Approved).
  locator: 'Section: Update the Approval Status of a Model (Boto3)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Approval status can be updated manually after registration (via Boto3 or SageMaker Studio) or
    automatically via a condition step in a SageMaker pipeline that evaluates model performance.
  locator: Intro paragraph + Boto3 section (model-registry-approve)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: At model-version registration the ModelApprovalStatus is set to PendingManualApproval, which serves
    as the default starting state before manual or automated approval.
  locator: 'Section: Update the Approval Status of a Model (Boto3)'
  confidence: medium
  quote_available: true
  notes: ''
