extracted_facts:
- evidence_id: ev_001
  text: In Langfuse, every prompt version is automatically assigned a version ID, and users can additionally
    attach labels to follow their own versioning scheme.
  locator: 'Section: Versions & Labels'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Labels serve as deployment pointers that map prompt versions to environments (staging, production),
    tenants, or experiments.
  locator: 'Section: Versions & Labels'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Deploying a prompt version in Langfuse is accomplished by assigning the production label (or another
    environment label) to that version.
  locator: 'Section: Fetching by Label or Version'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: When a prompt is fetched without specifying a label, Langfuse serves the version carrying the
    production label by default.
  locator: 'Section: Fetching by Label or Version'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The reserved 'latest' label always points to the most recently created prompt version.
  locator: 'Section: Fetching by Label or Version'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Rollback is performed by reassigning the production label to a previous version in the Langfuse
    UI, after which the production-labeled version is served by default in the SDKs.
  locator: 'Section: Rollbacks'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Protected prompt labels let admins/owners prevent labels like production from being modified or
    deleted by viewer/member roles, governing prompt deployment via RBAC.
  locator: 'Section: Protected prompt labels'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'Labels are assignable programmatically: on creation via the SDK ''labels'' parameter, and on
    existing versions via update_prompt''s ''new_labels'' (Python) or update''s ''newLabels'' (JS/TS).'
  locator: 'Section: Versions & Labels (Python SDK / JS-TS SDK tabs)'
  confidence: medium
  quote_available: true
  notes: ''
