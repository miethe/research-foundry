- evidence_id: ev_001
  text: 'MLflow Model Registry historically governed lifecycle via discrete stages a model version can
    be transitioned to: Staging, Production, or Archived (plus None).'
  locator: 'Section: Deprecated: Using Model Stages'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Stage transitions are performed via the client method transition_model_version_stage, whose accepted
    stage values are Staging, Archived, Production, and None.
  locator: 'Section: Deprecated: Using Model Stages (transition API)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: As of MLflow 2.9.0, the Model Stages mechanism is deprecated and slated for removal in a future
    major release.
  locator: 'Section: Migrating from Stages (deprecation warning)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The replacement deployment mechanism, model version aliases, are named references to specific
    model versions and, unlike stages, allow multiple aliases per version to support A/B testing and rollout.
  locator: 'Section: New model deployment tools (Model Version Aliases)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Model version tags are the second replacement mechanism, used to annotate a version's status (e.g.,
    a validation_status tag moving from pending to passed).
  locator: 'Section: New model deployment tools (Model Version Tags)'
  confidence: medium
  quote_available: true
  notes: ''
