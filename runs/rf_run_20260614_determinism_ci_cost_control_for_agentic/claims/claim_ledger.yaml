- claim_id: clm_inf01
  text: For agentic CI evals where tool-call patterns matter but exact text does not, output-text equality
    assertions (Match/Includes/JsonMatch) are the wrong gating primitive against live Claude or OpenAI
    models, because both vendors disclaim bit-for-bit reproducibility (Anthropic warns temperature 0.0
    is still not fully deterministic and exposes no seed; OpenAI seed is only '(mostly) deterministic').
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_022
    - clm_025
    - clm_034
    - clm_039
    - clm_044
    - clm_045
