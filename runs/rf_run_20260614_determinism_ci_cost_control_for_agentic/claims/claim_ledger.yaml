  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The measured cost of true bit-identical determinism is a 34%-62% inference slowdown (SGLang 34.35%
    average; Thinking Machines 61.5%; deterministic vLLM 1.6x-2.1x on Qwen-8B), which makes batch-invariant
