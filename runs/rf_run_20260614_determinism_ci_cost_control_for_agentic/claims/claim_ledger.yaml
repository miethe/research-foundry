      'none' (no network); both are fully deterministic, unlike best-effort seed/temperature, so stubbing
      is the more reliable gate.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: The recommended trajectory-assertion pattern is to wrap the agent in OpenAI evals' Completion
    Function Protocol (which standardizes tool-using-agent I/O) and assert on the recorded tool-call sequence
    and arguments captured by a VCR-style cassette, treating the cassette's ordered request log as the
    canonical trajectory rather than asserting on final answer text.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_002
    - clm_027
    - clm_033
    - clm_075
    reasoning_summary: The Completion Function Protocol generalizes tool-using-agent I/O, and VCR cassettes
      persist each HTTP request/response in ordered YAML; asserting on that ordered request log captures
      the tool trajectory without depending on output prose.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'A two-leg split is the minimum viable RF determinism configuration: a deterministic leg (stubbed/cassette-backed
    tool calls + tool-sequence assertions) that gates every PR with zero API spend, and a stochastic leg
    (live model, rubric/model-graded judge) that runs nightly or on-demand and never blocks a PR on a
    single live failure.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_005
    - clm_044
