- claim_id: clm_inf05
  text: For RF's swarm harness, the most reliable CI-gating determinism strategy is to stub the model
    leg entirely (FakeListLLM scripted responses or recorded VCR/pytest-recording cassettes) rather than
    to chase API-level reproducibility, because stubs and cassettes are byte-deterministic and network-free
    by construction whereas seed/temperature only reduce, not remove, live variance.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_028
    - clm_044
    - clm_047
    - clm_048
    - clm_075
