      instead.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Among API-level determinism strategies, OpenAI seed+identical-params is strictly stronger than
    the Anthropic Messages API for reproducibility (OpenAI offers a seed knob and a system_fingerprint
    drift signal, whereas Anthropic offers neither), but neither reaches the bit-identical output that
    self-hosted batch-invariant kernels deliver.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_035
    - clm_037
    - clm_038
    - clm_044
    - clm_070
    reasoning_summary: OpenAI exposes seed and system_fingerprint; Anthropic exposes neither; only batch-invariant
      kernels produced fully identical outputs, ranking the three tiers.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Batch-invariant deterministic inference is the only strategy in the evidence base that empirically
    eliminates output variance (1000/1000 identical completions; 1 unique output per SGLang subtest),
    but it is unavailable to teams that consume Claude or OpenAI as hosted APIs because it requires self-hosting
