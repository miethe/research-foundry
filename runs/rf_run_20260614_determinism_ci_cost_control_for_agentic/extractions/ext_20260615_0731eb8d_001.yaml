extracted_facts:
- evidence_id: ev_001
  text: The Pytest and Vitest/Jest eval integrations shipped in beta with v0.3.0 of the LangSmith Python
    and TypeScript SDKs (published Jan 22, 2025).
  locator: Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: In Python, a test is tracked in LangSmith by adding the @pytest.mark.langsmith decorator.
  locator: Getting started with Pytest
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In TypeScript, test cases are tracked in LangSmith by wrapping them in an ls.describe() block.
  locator: Getting started with Vitest
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Testing frameworks naturally support defining pass/fail criteria and raising assertion errors
    in CI, enabling early regression detection when evals run in a CI pipeline.
  locator: Testing frameworks vs. evaluate()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: LangSmith lets teams log feedback and compare results over time to prevent regressions and keep
    deploying the best version of an application.
  locator: Why use testing frameworks
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A dedicated GitHub Action to make configuring eval runs in CI easy was announced as forthcoming
    at publish time.
  locator: Testing frameworks vs. evaluate()
  confidence: medium
  quote_available: true
  notes: ''
