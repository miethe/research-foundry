extracted_facts:
- evidence_id: ev_001
  text: The Messages API temperature parameter defaults to 1.0 and ranges from 0.0 to 1.0, with guidance
    to use values closer to 0.0 for analytical / multiple-choice tasks and closer to 1.0 for creative
    tasks.
  locator: Request body -> temperature field description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The documentation explicitly warns that even at a temperature of 0.0 the results will not be fully
    deterministic, establishing that low temperature alone does not guarantee reproducible Messages API
    outputs.
  locator: Request body -> temperature field description (note)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: top_p enables nucleus sampling by cutting off the cumulative token probability distribution at
    a specified threshold, and the docs mark it as recommended for advanced use cases only.
  locator: Request body -> top_p field description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: top_k samples only from the top K options for each subsequent token to remove long-tail low-probability
    responses, and like top_p is marked as recommended for advanced use cases only.
  locator: Request body -> top_k field description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The Messages API request body exposes only temperature, top_p, and top_k as sampling controls
    and documents no seed or deterministic-seeding parameter, so reproducibility cannot be requested at
    the API level.
  locator: 'Request body (sampling parameters: temperature, top_p, top_k)'
  confidence: medium
  quote_available: false
  notes: ''
