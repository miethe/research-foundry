- evidence_id: ev_001
  text: OpenAI Chat Completions are non-deterministic by default, meaning identical requests can yield
    different model outputs.
  locator: Reproducible outputs (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Setting an integer seed and reusing the same value across requests yields (mostly) deterministic
    outputs.
  locator: Reproducible outputs (bullet 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Determinism also requires that all other request parameters (such as prompt and temperature) be
    identical across requests.
  locator: Reproducible outputs (bullet 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Determinism can be broken by OpenAI's own backend model-configuration changes, which it surfaces
    via the system_fingerprint field.
  locator: Reproducible outputs (system_fingerprint paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A change in the system_fingerprint value signals that outputs may differ even when seed and other
    parameters are held constant.
  locator: Reproducible outputs (system_fingerprint paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: OpenAI characterizes seed-based reproducibility as only (mostly) deterministic, not guaranteed
