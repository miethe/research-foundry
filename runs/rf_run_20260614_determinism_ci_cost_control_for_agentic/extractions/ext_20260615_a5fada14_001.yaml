- evidence_id: ev_002
  text: The responses attribute is a list[str] whose entries are returned in order, giving deterministic,
    scripted outputs.
  locator: Attributes > responses
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: FakeListLLM extends the LLM base class, so it conforms to the standard LangChain language-model
    interface and can be substituted for a real LLM.
  locator: Bases section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Through its BaseLLM inheritance FakeListLLM exposes the full Runnable surface including sync and
    async variants (invoke/ainvoke, batch/abatch, stream/astream, generate/agenerate).
  locator: Inherited from BaseLLM > Methods
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: An internal index counter i is incremented after every model invocation, which advances through
    the predefined responses and is exposed primarily for testing.
  locator: Attributes > i
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A sleep attribute (float | None) sets a per-response delay in seconds; it is ignored by FakeListLLM
    itself but used by subclasses to simulate latency.
  locator: Attributes > sleep
  confidence: medium
  quote_available: true
  notes: ''
