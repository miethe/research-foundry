extracted_facts:
- evidence_id: ev_001
  text: pytest-recording is a pytest plugin built on VCR.py that records and replays HTTP traffic for
    tests.
  locator: README — top description / tagline
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The plugin exposes a pytest.mark.vcr marker that maps onto VCR.py's use_cassettes API for per-test
    cassette control.
  locator: README — Usage / pytest.mark.vcr
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: By default the plugin runs in VCR's 'none' record mode specifically to prevent unintentional live
    network requests during tests.
  locator: README — recording modes / defaults
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Recording is enabled by passing the --record-mode CLI option (e.g. once) when invoking pytest.
  locator: README — recording / --record-mode option
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The plugin adds a 'rewrite' record mode that regenerates a cassette from scratch rather than extending
    it as VCR.py's 'all' mode does.
  locator: README — rewrite record mode
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A pytest.mark.block_network mark blocks network access (socket-based transports and pycurl) to
    give confidence tests do not go over the wire.
  locator: README — network blocking / block_network
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Specific hosts can be whitelisted during network blocking via allowed_hosts (regex), e.g. on the
    mark or via --allowed-hosts on the CLI.
  locator: README — network blocking / allowed_hosts
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Cassettes are stored as per-test YAML files on disk (capturing the recorded HTTP request/response),
    e.g. under cassettes/{module}/test_name.yaml.
  locator: README — cassette storage path example
  confidence: medium
  quote_available: true
  notes: ''
