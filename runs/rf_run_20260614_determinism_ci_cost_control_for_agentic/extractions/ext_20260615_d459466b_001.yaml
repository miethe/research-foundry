extracted_facts:
- evidence_id: ev_001
  text: Setting LANGSMITH_TEST_CACHE caches all HTTP requests to disk so LLM evals do not re-hit the model
    on every CI commit, addressing cost control for agentic CI.
  locator: Caching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Cached requests are written to a cassettes directory and replayed on subsequent runs, and checking
    the cache into the repo lets CI reuse it for deterministic, near-free reruns.
  locator: Caching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In langsmith>=0.4.10 caching can be scoped to specific URLs or hostnames via the cached_hosts
    argument to the langsmith pytest marker.
  locator: Caching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The pytest plugin requires Python SDK langsmith>=0.3.4, with the langsmith[pytest] extra needed
    for rich terminal output and test caching.
  locator: Installation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The langsmith pytest marker is compatible with pytest-xdist, so evaluation tests can be parallelized
    using the standard -n auto invocation.
  locator: Parallelize with pytest-xdist
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Each decorated test automatically logs a pass/fail boolean under the 'pass' feedback key, and
    an assert in the test fails the run like a normal unit test so eval failures fail the CI job.
  locator: Define and run tests
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Beyond the default pass key, custom feedback (e.g. an LLM-as-judge score) can be recorded with
    log_feedback and traced separately via the trace_feedback context manager.
  locator: Log feedback
  confidence: medium
  quote_available: true
  notes: ''
