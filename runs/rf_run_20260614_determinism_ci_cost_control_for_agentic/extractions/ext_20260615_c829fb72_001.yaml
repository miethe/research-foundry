  text: Phoenix defines an experiment as a structured comparison between versions of an application using
    identical inputs and evaluation criteria.
  locator: Intro, 'Optimize Your App with Experiments'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Running experiments in code against a stored dataset lets teams test changes and verify whether
    they actually improve quality rather than assuming improvement.
  locator: Intro paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Experiments rerun the same inputs through different application versions for side-by-side comparison
    so improvements are measured, not assumed.
  locator: 'Step 2: Define an Experiment'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: An experiment task is a function that takes each dataset example and produces an output by running
    the application logic or model on the input.
