extracted_facts:
- evidence_id: ev_001
  text: SGLang's deterministic inference integrates batch-invariant kernels (mean, log-softmax, matrix
    multiplication) from Thinking Machines Lab.
  locator: 'Section: Key enhancements / Introduction'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: In deterministic mode every subtest produced 1 unique output across trials, versus 2-18 unique
    outputs in normal mode (e.g., the prefix test reported 5/8/18/2 in normal FlashInfer).
  locator: 'Section: Verifying Deterministic Behavior'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: SGLang reports an average deterministic-mode slowdown of 34.35% on FlashInfer and FlashAttention
    3 backends, versus the 61.5% slowdown reported in Thinking Machines Lab's blog.
  locator: 'Section: Measuring Offline Inference Performance / Results'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Enabling CUDA Graphs yields at least a 2.79x speedup across all attention kernels in deterministic
    mode.
  locator: 'Section: CUDA Graph Acceleration'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Only TP1 and TP2 are deterministic (consistent floating-point addition order); larger tensor-parallel
    setups require modifications to reduce kernels to achieve determinism.
  locator: 'Section: Future Work'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Deterministic inference currently supports only dense models such as Qwen3-8B or LLaMa-3.1-8B;
    MoE models are not yet supported, though planned.
  locator: 'Section: Future Work'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Deterministic multinomial sampling perturbs logits with Gumbel noise from a seeded hash function,
    so the same (inputs, seed) pair yields the same sample even when temperature > 0.
  locator: 'Section: Reproducible Non-Greedy Sampling'
  confidence: medium
  quote_available: true
  notes: ''
