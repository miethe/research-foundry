extracted_facts:
- evidence_id: ev_001
  text: The primary root cause of LLM inference nondeterminism is that server load (and thus batch size)
    varies nondeterministically, changing reduction order rather than GPU concurrency or floating point
    alone.
  locator: 'Section: "Batch invariance and \"determinism\""'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The common hypothesis that concurrency plus floating-point arithmetic explains nondeterminism
    is incomplete; atomic adds are usually absent from an LLM forward pass.
  locator: 'Section: "Why don''t kernels always add numbers in the same order?"'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Running Qwen3-235B at temperature 0 across 1000 runs produced 80 unique completions, with the
    first divergence occurring at the 103rd token.
  locator: 'Section: "How nondeterministic are completions?"'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Enabling batch-invariant kernels made all 1000 completions identical.
  locator: 'Section: "How nondeterministic are completions?"'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Batch invariance need only be enforced on the three reduction operations: RMSNorm, matrix multiplication,
    and attention.'
  locator: 'Section: "How do we make kernels batch-invariant?"'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Floating-point non-associativity is the underlying mathematical residual: adding the same numbers
    in a different order can yield a different result.'
  locator: 'Section: "The original sin: floating-point non-associativity"'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Deterministic vLLM on Qwen-8B was slower than the default: 26s baseline vs 55s unoptimized deterministic
    and 42s with improved attention (roughly 1.6x-2.1x slowdown).'
  locator: 'Section: "Performance" (Qwen-8B, 1000 sequences)'
  confidence: medium
  quote_available: true
  notes: ''
