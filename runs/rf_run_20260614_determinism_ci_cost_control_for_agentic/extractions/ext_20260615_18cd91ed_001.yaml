extracted_facts:
- evidence_id: ev_001
  text: A concurrency group ensures only a single job or workflow using the same group runs at a time,
    and the group key can be any string or expression.
  locator: Using concurrency in different scenarios (intro paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: When another run in the same group is in progress, a newly queued run becomes pending, and by
    default an existing pending run is canceled and replaced by the new one.
  locator: 'Using concurrency in different scenarios (paragraph: ''This means that there can be at most
    one...'')'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Setting cancel-in-progress: true cancels any currently running job or workflow in the same concurrency
    group, and it can also be given as an expression for conditional cancellation.'
  locator: 'Using concurrency in different scenarios (paragraph: ''To also cancel any currently running...'')'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'queue: single (the default) allows at most one pending run per group and cancels/replaces any
    existing pending run, while queue: max allows up to 100 pending runs and cancels additional runs once
    the queue is full.'
  locator: Using concurrency in different scenarios (queue property value list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Combining queue: max with cancel-in-progress: true is disallowed and produces a workflow validation
    error.'
  locator: Using concurrency in different scenarios (sentence after queue value list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Runs in the same concurrency group are processed in FIFO order by the time each started waiting
    on the group, but because actual start times vary, ordering is not guaranteed.
  locator: Using concurrency in different scenarios (Note callout, FIFO bullet)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The recommended workflow-level group key combines github.workflow and github.ref so concurrency
    is isolated per branch, and group expressions accept the github, inputs, vars, needs, strategy, and
    matrix contexts.
  locator: 'Example: Using concurrency and the default behavior (YAML snippet) / Allowed expression contexts'
  confidence: medium
  quote_available: true
  notes: ''
