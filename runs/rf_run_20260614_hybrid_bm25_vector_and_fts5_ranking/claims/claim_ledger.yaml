- claim_id: clm_inf01
  text: For a personal Markdown artifact KB, BM25/FTS5 alone is a defensible single-tier retriever through
    the ~1K-10K document range, because sparse BM25 beat dense text-embedding-3-large on Recall@5 (0.644
    vs 0.587) over a 7,318-document corpus, so the lexical-only break point sits at the upper edge of
    the 10K tier rather than at 1K.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    reasoning_summary: T2-RAGBench's 7,318-doc corpus is squarely between the 1K and 10K tiers, and BM25
      won outright there, so lexical-only retrieval is adequate through ~10K; degradation is query-type-driven
      (tables), not raw-count-driven, within this range.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'The BM25-only failure mode is query-type-specific rather than corpus-size-specific: hybrid fusion
    added its largest gain (+8.1pp Recall@5) on the table-heavy TAT-DQA subset, so a Markdown KB whose
    value lives in prose/headings will degrade later than one dense with tables and numeric content.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_002
    - clm_007
    reasoning_summary: BM25 led overall but the hybrid uplift concentrated on table-heavy questions, indicating
      lexical insufficiency is triggered by content type (tables/numbers) more than by sheer document
      count.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Recommended per-tier architecture: 1K = BM25-only (FTS5) with frontmatter/heading column weighting;
    10K = BM25 + cross-encoder reranking of the top ~100-200 lexical candidates (skip the vector index);
    50K = full BM25 + dense vector hybrid fused by RRF then reranked.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_002
    - clm_003
    - clm_004
    - clm_007
    - clm_024
    reasoning_summary: BM25 alone suffices at small scale; reranking is the largest single lift and needs
      no vector index, making it the cheapest first upgrade at 10K; the full hybrid+rerank stack (Recall@5
      0.816) is reserved for the largest tier where recall headroom justifies the vector-index cost.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: Adding a cross-encoder reranker is the highest-ROI single upgrade for the KB at every tier where
    it is affordable, contributing a +17.4% Recall@5 lift over unreranked hybrid (0.695->0.816) and a
    +39.7% relative MRR@3 lift (0.433->0.605), and independently driving the largest portion of the 67%
    failure-rate reduction in Anthropic's Contextual Retrieval stack.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_003
    - clm_004
    - clm_022
    - clm_023
    - clm_024
    reasoning_summary: Two independent benchmarks (T2-RAGBench and Anthropic Contextual Retrieval) both
      isolate reranking as the largest marginal quality contributor; the failure rate falls 2.9%->1.9%
      (a further 1pp / ~34% relative) purely from adding reranking on top of an already-hybrid pipeline.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: The reranking stage pays off starting at the ~10K tier and earlier for table/numeric-heavy KBs,
    because its quality lift is the largest in the pipeline while its only cost is scoring the top ~100-200
    candidates a stage the KB already retrieves; below ~1K, BM25 precision@k is high enough that the latency/cost
    is unlikely to repay itself.
  materiality: material
  claim_type: prediction
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_024
    - clm_040
    reasoning_summary: Reranking's lift is corpus-independent per-query work over a fixed candidate set
      (OpenSearch finds 100-200 candidates optimal up to 10M docs), so its marginal value rises with corpus
      size as BM25 precision@k erodes, while at tiny corpora the lexical top-k is already mostly relevant.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: RRF with k=60 is the recommended default fusion method for BM25+vector scores in a personal KB,
    over weighted-linear normalization, because RRF is unsupervised, training-free, and score-scale-agnostic
    (no min_max/z_score calibration), and beat Condorcet/CombMNZ and every individual system by 4-5% MAP;
    weighted normalization should be adopted only if measured query routing shows one signal is systematically
    stronger.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_008
    - clm_009
    - clm_012
    - clm_013
    - clm_039
    - clm_055
    reasoning_summary: RRF needs no per-deployment tuning and ignores incommensurate score scales (BM25
      vs cosine), which weighted-linear fusion must reconcile via normalization; RRF's documented 4-5%
      MAP edge and zero-tuning property make it the safer default for a low-maintenance personal KB.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'A learned fusion model is not justified for a personal KB at any tier from 1K to 50K: RRF already
    produces the best-known LETOR-3 meta-learner result and the k=60 choice is near-optimal-but-not-critical,
    so the training data, labeling, and maintenance burden of a learned fuser would buy negligible precision
