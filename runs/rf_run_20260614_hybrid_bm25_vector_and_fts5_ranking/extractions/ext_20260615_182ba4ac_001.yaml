  locator: card/trust
- text: Single dense embedding model (text-embedding-3-large) and single reranker (Cohere) evaluated as
    primary configs
  locator: card/trust
- text: Domain-specific to financial text-and-table QA; generalization to other domains is not established
    by this benchmark.
  locator: card/limitations
- text: Primary configurations use a single dense embedding model (text-embedding-3-large) and a single
    reranker (Cohere); results may shift with other models.
  locator: card/limitations
