extracted_facts:
- evidence_id: ev_001
  text: The evaluation metric is 1 minus recall@20, defined as the percentage of relevant documents that
    fail to be retrieved within the top 20 chunks.
  locator: Performance improvements
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Contextual Embeddings alone cut the top-20-chunk retrieval failure rate from a 5.7% baseline to
    3.7%, a 35% reduction.
  locator: Performance improvements
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Combining Contextual Embeddings with Contextual BM25 cut the failure rate from 5.7% to 2.9%, a
    49% reduction.
  locator: Performance improvements
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Adding a reranking step on top of Contextual Embeddings and Contextual BM25 cut the failure rate
    from 5.7% to 1.9%, a 67% total reduction.
  locator: Performance improvements (reranking)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Contextual Retrieval prepends a short LLM-generated context to each chunk before indexing, e.g.
    identifying the source filing and prior-quarter revenue.
  locator: Introducing Contextual Retrieval (contextualized chunk example)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The method was evaluated across multiple knowledge domains including codebases, fiction, ArXiv
    papers, and science papers.
  locator: Methodology
  confidence: medium
  quote_available: true
  notes: ''
