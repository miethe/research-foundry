extracted_facts:
- evidence_id: ev_001
  text: enable_fts() takes a list of named columns and indexes each as a separately searchable FTS field,
    which is the basis for indexing frontmatter fields and headings as distinct columns.
  locator: Enabling full-text search for a table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Passing tokenize='porter' to enable_fts enables Porter stemming so that English words like 'running'
    match stemmed alternatives such as 'run'.
  locator: Enabling full-text search for a table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: enable_fts() defaults to FTS5, with an explicit fts_version='FTS4' opt-out for using the older
    FTS4 engine.
  locator: Enabling full-text search for a table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: table.search(q) returns rows ordered by relevance (most relevant first) automatically, without
    requiring an explicit sort.
  locator: Searching with table.search()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Setting include_rank=True adds a 'rank' column carrying the BM25 ranking score, available for
    FTS5 tables only.
  locator: Searching with table.search() — parameters
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: search() exposes ordering only via an order_by column argument that defaults to the relevance
    score; it offers no per-column bm25() weight parameter, so custom field weighting must be applied
    through raw FTS5 rank config / ORDER BY bm25(...).
  locator: Searching with table.search() — parameters
  confidence: medium
  quote_available: false
  notes: ''
