extracted_facts:
- evidence_id: ev_001
  text: RRF is a method for combining multiple result sets that carry different relevance indicators into
    a single ranked result set.
  locator: Intro definition (opening paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: RRF requires no tuning, and the individual relevance indicators being combined do not need to
    be related to (or on the same scale as) one another to produce high-quality results.
  locator: Intro paragraph (sentence after the definition)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: RRF scores a document d by summing 1.0 / (k + rank(result(q), d)) across each query q in which
    d appears, where rank starts from 1.
  locator: RRF scoring formula block
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: In the RRF formula, k is the ranking constant and rank(result(q), d) is document d's rank within
    result(q), starting from 1.
  locator: Formula variable definitions (legend below formula)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Elasticsearch's rank_constant (k) controls how much influence per-query result sets have on the
    final ranking; a higher value gives lower-ranked documents more influence, the value must be >= 1,
    and it defaults to 60.
  locator: rank_constant parameter description
  confidence: medium
  quote_available: true
  notes: ''
