extracted_facts:
- evidence_id: ev_001
  text: Under a 25ms/query latency limit on TREC DL 2019, TinyBERT-gBCE reaches NDCG@10 of 0.652 versus
    MonoBERT-Large's 0.431, a +51% gain.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Shallow (few-layer) transformer cross-encoders outperform full-scale models under low-latency
    constraints because they can score the relevance of more documents within the same time budget.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Shallow cross-encoders remain effective on CPU: NDCG@10 drops only 3% versus GPU inference at
    a 50ms latency budget, making them practical without specialized hardware.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Shallow cross-encoders benefit from the generalized Binary Cross-Entropy (gBCE) training scheme
    previously shown successful for recommendation tasks.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Large-model cross-encoders (e.g., BERT or T5) are computationally expensive and can only score
    a small number of documents within a reasonably small latency window.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
