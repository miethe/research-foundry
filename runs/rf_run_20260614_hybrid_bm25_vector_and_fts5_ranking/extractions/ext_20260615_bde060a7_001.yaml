extracted_facts:
- evidence_id: ev_001
  text: The bm25() auxiliary function returns a real value where a numerically smaller value indicates
    a better match, so results are ordered best-first via ORDER BY bm25(ft).
  locator: 5.1.1. The bm25() function
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Per-column weights are passed as trailing arguments to bm25() in left-to-right column order, and
    any column without a supplied weight defaults to 1.0.
  locator: 5.1.1. The bm25() function
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Every FTS5 table exposes a hidden 'rank' column that by default returns the same value as bm25()
    called with no trailing arguments.
  locator: 5.2. Sorting by Auxiliary Function Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: ORDER BY rank is logically equivalent to ORDER BY bm25(ft) but can be faster, particularly when
    the query abandons early or uses a LIMIT clause.
  locator: 5.2. Sorting by Auxiliary Function Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The default ranking for the rank column can be persisted by setting the 'rank' configuration option
    to a bm25 expression with column weights.
  locator: 6.11. The 'rank' configuration option
  confidence: medium
  quote_available: true
  notes: ''
