extracted_facts:
- evidence_id: ev_001
  text: The normalization-processor is a search-phase-results processor that runs between the query and
    fetch phases, intercepting query-phase results to normalize and combine document scores from different
    query clauses before fetch.
  locator: 'Section: Normalization processor (intro)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Supported score-normalization techniques are min_max, l2, and z_score, with min_max as the default.
  locator: 'Section: Request body fields (table, normalization.technique)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Supported score-combination techniques are arithmetic_mean, geometric_mean, and harmonic_mean
    (default arithmetic_mean); z_score supports only arithmetic_mean.
  locator: 'Section: Request body fields (table, combination.technique)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Per-subquery weights are configurable in the [0.0, 1.0] range, must equal the number of queries
    and sum to 1.0; if omitted, all queries are weighted equally.
  locator: 'Section: Request body fields (table, combination.parameters.weights)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: BM25 and k-NN/neural searches use different relevance-score scales, so scores are normalized onto
    a common scale before combination, a benefit supported by experimental data.
  locator: 'Section: Score normalization and combination'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The processor only transforms results returned per subquery (it does no extra sampling); using
    nDCG@10, a returned size of 100-200 worked best for datasets up to 10M documents, and larger sizes
    raised latency without improving relevance.
  locator: 'Section: Search tuning recommendations'
  confidence: medium
  quote_available: true
  notes: ''
