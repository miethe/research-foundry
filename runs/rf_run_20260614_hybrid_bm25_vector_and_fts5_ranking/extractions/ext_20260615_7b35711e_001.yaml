extracted_facts:
- evidence_id: ev_001
  text: The study concludes that the computational costs of semantic chunking are not justified by consistent
    performance gains over fixed-size chunking in RAG.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On non-stitched document-retrieval datasets, fixed-size chunking led on F1@5, scoring 90.59% on
    HotpotQA and 93.58% on MSMARCO.
  locator: Section 4.2 - Document Retrieval (Table 1, F1@5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Breakpoint-based semantic chunking outperformed fixed-size only on artificially stitched high-topic-diversity
    data, reaching 81.89% F1@5 on Miracl versus 69.45% for fixed-size.
  locator: Section 4.2 - Document Retrieval (Table 1, Miracl)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The authors caution that real-world document topics are likely less diverse than their stitched
    data, so semantic chunkers may have no edge over fixed-size chunking in practice.
  locator: Section 4.2 - Document Retrieval
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Evidence-retrieval F1@5 differences across chunkers were minimal (e.g., ExpertQA: fixed-size
    47.11% vs clustering 46.87%), with no clear advantage for any strategy.'
  locator: Section 4.3 - Evidence Retrieval (Table 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: In retrieval-based answer generation, BERTScore differences between chunking methods were negligible
    and inconclusive.
  locator: Section 4.4 - Answer Generation (Table 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The paper recommends fixed-size chunking as a more efficient and reliable default for practical
    RAG applications.
  locator: Section 5 - Conclusion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The study compares three chunkers (fixed-size, breakpoint-based semantic, clustering-based semantic)
    across document retrieval, evidence retrieval, and answer generation using BEIR and RAGBench datasets.
  locator: Methodology / Sections 3-4
  confidence: medium
  quote_available: false
  notes: ''
