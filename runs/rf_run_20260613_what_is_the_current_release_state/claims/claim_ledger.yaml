    - clm_057
    - clm_058
    - clm_060
    reasoning_summary: clm_056 states the SDK has no programmatic registration API for skills; clm_057/058/060
      show skills are filesystem SKILL.md artifacts discovered via setting_sources; clm_010/051 show the
