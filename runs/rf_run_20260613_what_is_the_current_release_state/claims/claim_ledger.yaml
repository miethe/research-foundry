- claim_id: clm_inf02
  text: 'The skills success criterion (''exposes a stable native skills/resources API'') is NOT met: skills
    are filesystem-only with no registration API, and even the surrounding skills option is recent (v0.1.62)
    and sits in a pre-1.0 Alpha line, so the answer is no on both ''native API'' and ''stable''.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_056
    - clm_051
    - clm_047
    - clm_044
    reasoning_summary: clm_056 negates 'native programmatic API'; clm_051 dates the skills option to v0.1.62
      (recent); clm_047 (Alpha) and clm_044 (near-daily cadence) negate 'stable'. The conjunction fails
      the success criterion.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'By contrast the parent-child subagent API IS native and documented: subagents are defined programmatically
    via the agents parameter, invoked through the Agent tool, run in isolated parallel contexts, and return
    only their final message verbatim to the parent, satisfying the ''documented parent-child subagent
    API'' half of the research question.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_025
    - clm_026
    - clm_052
    reasoning_summary: clm_024 (programmatic agents param + Agent tool), clm_025 (documented parent-to-child
      context boundary), clm_026 (isolated/parallel, final-message-only return), clm_052 (AgentDefinition
      fields) jointly establish a native, documented subagent API.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'The subagent API is well-suited to RF''s bounded single-stage parallel document decomposition:
    fresh isolated contexts with a prompt-string-only parent channel and final-message-only return give
    clean fan-out/fan-in, and nested spawning (v2.1.172) is unnecessary for a single stage, so RF can
    fan out N decomposers and collect N final messages without nesting.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_026
    - clm_024
    - clm_027
    reasoning_summary: clm_025/026 give the isolation and final-message contract ideal for stateless map-style
      decomposition; clm_024 gives programmatic invocation; clm_027 shows nesting exists but is not required
      for a single stage. The shape matches a bounded, single-stage parallel map.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'The prompt-string-only parent-to-child channel is the main design constraint for RF: because
    subagents do not receive parent conversation, tool results, or system prompt, RF must serialize each
    document''s full decomposition context into the Agent tool prompt and cannot rely on shared in-conversation
    state.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_026
    reasoning_summary: clm_025 states the only parent-to-child channel is the Agent tool prompt string
      (no history/tool results/system prompt); clm_026 confirms intermediates stay inside the child. RF
      must therefore pack context into the prompt, a direct architectural consequence.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Stability is the dominant risk and the strongest argument against building RF''s real-mode adapter
    now: the package is PyPI ''Development Status 3 - Alpha'', pre-1.0 (latest 0.2.101), ships near-daily,
    and has already shipped a breaking rename rebrand (v0.1.0: ClaudeCodeOptions to ClaudeAgentOptions)
