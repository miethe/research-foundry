extracted_facts:
- evidence_id: ev_001
  text: The Claude Agent SDK is positioned as a library that gives developers the same tools, agent loop,
    and context management that power Claude Code, programmable in Python and TypeScript.
  locator: Page subtitle / lede
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The SDK authenticates via ANTHROPIC_API_KEY and also supports third-party providers Amazon Bedrock
    (CLAUDE_CODE_USE_BEDROCK=1), Claude Platform on AWS (CLAUDE_CODE_USE_ANTHROPIC_AWS=1), Google Vertex
    AI (CLAUDE_CODE_USE_VERTEX=1), and Microsoft Azure (CLAUDE_CODE_USE_FOUNDRY=1).
  locator: Get started → Set your API key
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Anthropic does not allow third-party developers to offer claude.ai login or rate limits for products
    built on the Agent SDK unless previously approved, and directs them to API key authentication instead.
  locator: Get started → Set your API key (Note)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Starting June 15, 2026, Agent SDK and `claude -p` usage on subscription plans draws from a new
    monthly Agent SDK credit that is separate from interactive usage limits.
  locator: Top-of-page Note banner
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: With the Client SDK the developer implements the tool execution loop; the Agent SDK runs the loop
    autonomously with built-in tool execution.
  locator: Compare the Agent SDK to other Claude tools → Agent SDK vs Client SDK
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The Agent SDK runs the agent loop inside your own process with session state as JSONL on your
    filesystem, while Managed Agents is a hosted REST API where Anthropic runs the agent and a managed
    sandbox per session; a common path is to prototype on the SDK then move to Managed Agents for production.
  locator: Compare the Agent SDK to other Claude tools → Agent SDK vs Managed Agents
  confidence: medium
  quote_available: true
  notes: ''
