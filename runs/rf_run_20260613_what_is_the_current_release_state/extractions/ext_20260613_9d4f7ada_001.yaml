extracted_facts:
- evidence_id: ev_001
  text: Subagents are defined programmatically via the agents parameter and invoked through the Agent
    tool; including Agent in allowedTools auto-approves invocations without a permission prompt.
  locator: Creating subagents > Programmatic definition (recommended)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A subagent starts a fresh context whose only parent-to-child channel is the Agent tool prompt
    string; it does not receive the parent's conversation history, tool results, or system prompt, but
    does inherit tool definitions and project CLAUDE.md (via settingSources).
  locator: What subagents inherit (intro + table)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Subagents run in isolated context and can run concurrently; intermediate tool calls and results
    stay inside the subagent and only its final message returns to the parent (verbatim as the Agent tool
    result).
  locator: Benefits of using subagents > Context isolation / Parallelization
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: As of Claude Code v2.1.172, subagents can spawn their own subagents; a background subagent five
    levels below the main agent cannot spawn further, while foreground subagents can spawn at any depth.
  locator: AgentDefinition configuration (Note, min-version 2.1.172)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The Agent tool was renamed from Task to Agent in Claude Code v2.1.63; current SDK releases emit
    Agent in tool_use blocks but still use Task in the system:init tools list and in result.permission_denials,
    so code must check both.
  locator: Detecting subagent invocation (Note)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Subagents are resumable by capturing the session_id and parsing agentId from the Agent tool result,
    then passing resume=sessionId; for runs coordinating dozens to hundreds of agents, the docs point
    to the Workflow tool (available in the TypeScript Agent SDK v0.3.149 and later).
  locator: Resuming subagents / Scale up with dynamic workflows
  confidence: medium
  quote_available: true
  notes: ''
