extracted_facts:
- evidence_id: ev_001
  text: Effective June 15, 2026, Claude Agent SDK and claude -p usage no longer counts toward a Claude
    plan's usage limits.
  locator: 'Section: What''s changing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Monthly Agent SDK credit is $20 for Pro, $100 for Max 5x, and $200 for Max 20x.
  locator: 'Section: Monthly credit by plan'
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_003
  text: Team Standard seats get a $20/month credit and Team Premium seats get a $100/month credit; Enterprise
    ranges from $20 (usage-based) to $200 (seat-based Premium seats).
  locator: 'Section: Monthly credit by plan'
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: The credit covers Agent SDK usage in the user's own Python/TypeScript projects, the claude -p
    non-interactive command, the Claude Code GitHub Actions integration, and third-party apps that authenticate
    via a Claude subscription.
  locator: 'Section: What the credit covers'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Claude Platform accounts using an API key receive no credit; pay-as-you-go billing continues unchanged.
  locator: 'Section: What''s changing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Once the monthly credit runs out, additional Agent SDK usage flows to usage credits at standard
    API rates, but only if usage credits are enabled.
  locator: 'Section: How the credit works'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: If usage credits aren't enabled, Agent SDK requests stop until the credit refreshes; unused credits
    do not roll over to the next billing cycle.
  locator: 'Section: How the credit works'
  confidence: medium
  quote_available: true
  notes: ''
