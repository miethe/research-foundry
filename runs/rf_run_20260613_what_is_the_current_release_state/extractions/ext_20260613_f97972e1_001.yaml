extracted_facts:
- evidence_id: ev_001
  text: total_cost_usd and costUSD are client-side estimates computed locally from a price table bundled
    at build time, not authoritative billing, and can drift on pricing changes or unrecognized models;
    authoritative billing is the Usage and Cost API or Claude Console Usage page.
  locator: Warning callout (page intro, above 'Understand token usage')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The Python ResultMessage exposes per-model cost via model_usage and the accumulated total via
    total_cost_usd plus a cumulative usage dict, while per-step token breakdowns live on each assistant
    message via message.usage and message.message_id.
  locator: Understand token usage (bullet list, Python)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Parallel tool calls in one turn produce multiple assistant messages whose nested BetaMessage shares
    the same id and identical usage, so you must deduplicate by ID to avoid double-counting tokens.
  locator: Track per-step usage (Warning callout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Each query() call returns its own total_cost_usd covering only that call; the SDK provides no
    session-level total, so multi-call sessions must accumulate cost yourself.
  locator: Accumulate costs across multiple calls (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The usage object includes cache_creation_input_tokens (charged at a higher rate) and cache_read_input_tokens
    (charged at a reduced rate); the Agent SDK uses prompt caching automatically without configuration.
  locator: Track cache tokens
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Setting the ENABLE_PROMPT_CACHING_1H environment variable requests a 1-hour TTL on cache writes,
    extending the default 5-minute TTL used with API-key auth or Bedrock/Vertex/Foundry.
  locator: Extend the prompt cache TTL to one hour
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Both success and error result messages include usage and total_cost_usd, so failed conversations
    still report the tokens consumed up to the point of failure.
  locator: Track costs on failed conversations
  confidence: medium
  quote_available: true
  notes: ''
