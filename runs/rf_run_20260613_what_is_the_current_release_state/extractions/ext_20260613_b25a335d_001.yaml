extracted_facts:
- evidence_id: ev_001
  text: v0.1.0 was a breaking rebrand of the Claude Code SDK to the Claude Agent SDK, renaming ClaudeCodeOptions
    to ClaudeAgentOptions.
  locator: '## 0.1.0 — Breaking Changes / Type Name Changes'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: As of v0.1.0 the Claude Code system prompt is no longer included by default and filesystem settings/slash
    commands/subagents are not auto-loaded unless setting_sources is set explicitly.
  locator: '## 0.1.0 — System Prompt Changes / Settings Isolation'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: v0.1.62 added a top-level skills option to ClaudeAgentOptions accepting 'all', a named list, or
    [] to suppress all skills.
  locator: '## 0.1.62 — New Features'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Programmatic subagents are defined inline via the agents option (introduced in the v0.1.0 reorganization);
    v0.1.51 added AgentDefinition fields disallowedTools, maxTurns, and initialPrompt.
  locator: '## 0.1.51 — New Features / ## 0.1.0 — New Features'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: v0.1.60 added subagent transcript helpers list_subagents()/get_subagent_messages() and W3C OpenTelemetry
    distributed tracing via the claude-agent-sdk[otel] extra.
  locator: '## 0.1.60 — New Features'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: v0.2.96 pinned the mcp dependency below 2.0.0 to avoid upstream breaking changes and updated the
    bundled Claude CLI to 2.1.172.
  locator: '## 0.2.96 — Bug Fixes / Internal Changes'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The most recent changelog entry is v0.2.101, which bundles Claude CLI version 2.1.177, indicating
    active sub-1.0 releases with the CLI tracking the ~2.1.17x line.
  locator: '## 0.2.101 — Internal/Other Changes (latest entry)'
  confidence: medium
  quote_available: true
  notes: ''
