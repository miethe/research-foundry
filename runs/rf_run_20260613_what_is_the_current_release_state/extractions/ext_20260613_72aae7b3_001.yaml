  text: query() creates a new session for each interaction by default and returns an async iterator of
    messages, with no memory of prior interactions unless continue_conversation or resume is passed in
    ClaudeAgentOptions.
  locator: query() function — description
  confidence: medium
  quote_available: true
  notes: ''
