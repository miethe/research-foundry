- claim_id: clm_inf01
  text: 'For consolidating semantically equivalent compiled artifacts in a file-first vault, a three-method
    stack ranks best: a zero-shot retrieve-and-rerank text matcher (EnsembleLink-style) as the primary
    scorer, Fellegi-Sunter (Splink) as an unsupervised probabilistic backstop, and an LLM-assisted re-ranker
    (GPT-4o/ComEM-style) reserved for the review band, because this combination needs no labeled training
    data while spanning the precision/recall/cost frontier.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_062
    - clm_064
    - clm_069
    - clm_027
    - clm_071
    - clm_007
    - clm_042
    - clm_060
    reasoning_summary: EnsembleLink and Splink both achieve high accuracy with zero labeled data (clm_062/clm_064/clm_071),
      which matches a personal KB that lacks a labeled duplicate corpus; LLM re-rank (clm_007/clm_042)
      is the highest-accuracy but costliest tier, so reserving it for the review band mirrors the ensemble-then-rerank
      recommendation in clm_060.
  report_locations: []
  reviewer_notes: ''
