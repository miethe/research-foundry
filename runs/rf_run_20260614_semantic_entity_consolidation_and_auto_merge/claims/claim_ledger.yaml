  text: 'On reported pair-level F1, zero-shot LLM and zero-shot retrieve-rerank methods are statistically
    comparable to each other and to supervised PLMs on bibliographic data: GPT-4 zero-shot 89.82 and EnsembleLink
    89.0 on DBLP-Scholar versus supervised Ditto ~94, so the ~4-5 F1 supervised premium does not justify
    the labeling cost for a personal vault.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
