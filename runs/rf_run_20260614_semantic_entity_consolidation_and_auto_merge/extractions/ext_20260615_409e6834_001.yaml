extracted_facts:
- evidence_id: ev_001
  text: 'The Fellegi-Sunter model has three core parameters needed to compute a match probability between
    two records: lambda (prior match probability), m, and u.'
  locator: Parameters of the Fellegi-Sunter model (section intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Lambda is the prior probability that any two records match assuming no other knowledge, and it
    depends on total record count, number of duplicates, and dataset overlap.
  locator: λ probability
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The m probability is P(observation | records match) and is largely a measure of data quality;
    e.g. for a true match on Date of Birth, exact agreement is almost 100%, say m approximately 0.98.
  locator: m probability
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The u probability is P(observation | records do not match) and measures coincidence; e.g. for
    non-matching records, surname agreeing by chance is under 1%, u approximately 0.005.
  locator: u probability
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The total match weight equals log2(lambda/(1-lambda)) plus the sum over features of log2(m_i/u_i),
    and match weights are additive because the model assumes features are conditionally independent.
  locator: Match Weights — Deriving Match Weights from m and u
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A worked waterfall example sums a prior of -6.67 with feature weights (forename 4.74, surname
    6.49, dob -1.97, city -1.12, email 8.00) to a total match weight of 9.48.
  locator: Match Weights — Interpreting Match Weights (waterfall example)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Match probability is recovered from total match weight via Pr(Match|Obs)=2^Mobs/(1+2^Mobs); a
    match weight of 9.48 yields approximately 0.999.
  locator: Match Probability — Deriving Match Probability from Match Weight
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'The non-linear weight-to-probability mapping has diminishing returns: a match weight of 0 gives
    probability 0.5, weight 4 gives 0.95, and weight 7 gives 0.99.'
  locator: Match Probability — Understanding the relationship between Match Probability and Match Weight
  confidence: medium
  quote_available: true
  notes: ''
