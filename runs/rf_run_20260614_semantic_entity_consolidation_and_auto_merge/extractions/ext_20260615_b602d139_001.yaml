- evidence_id: ev_003
  text: The rule-based Nomenklatura baseline reaches 91.33% F1, while the best open-source LLM (DeepSeek-R1-Distill-Qwen-14B)
    reaches 98.23% F1 and the best proprietary model (GPT-4o) reaches 98.95% F1.
  locator: Results / Table 2 (F1 scores)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The best-performing prompt frames matching as conflict detection, defaulting to a positive (match)
    decision unless contradictory evidence is found.
  locator: Method / prompt design (conflict-detection framing)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rule-based and LLM methods exhibit complementary error patterns, with Nomenklatura over-predicting
    matches and LLMs under-predicting on hard cases such as transliteration.
  locator: Analysis / error patterns
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors suggest ensembling rule-based high-recall filtering with LLM re-ranking to exploit
    the complementary strengths of the two approaches.
  locator: Analysis / ensembling recommendation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Pairwise matching performance is approaching a practical ceiling, motivating a shift of effort
    toward blocking, clustering, and uncertainty-aware review.
  locator: Discussion / conclusion (saturation)
