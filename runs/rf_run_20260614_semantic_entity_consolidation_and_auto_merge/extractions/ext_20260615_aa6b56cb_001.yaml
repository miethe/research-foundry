extracted_facts:
- evidence_id: ev_001
  text: The Dedupe class is purpose-built for active learning deduplication of datasets that may contain
    multiple records referring to the same entity.
  locator: Dedupe Objects > class dedupe.Dedupe
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Active learning is driven by uncertain_pairs(), which surfaces the record pairs the model is most
    uncertain about so a human can label them.
  locator: Dedupe Objects > Dedupe.uncertain_pairs()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Human labels are fed back via mark_pairs(), which adds labeled match/distinct pairs to the training
    data and updates the matching model, typically incrementally with uncertain_pairs().
  locator: Dedupe Objects > Dedupe.mark_pairs()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: After labeling, train() learns the final pairwise classifier and the fingerprinting (blocking)
    rules from the accumulated training data.
  locator: Dedupe Objects > Dedupe.train()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The probabilistic linkage step is exposed via score(), which assigns each candidate record pair
    a probability that the pair is a match.
  locator: Lower Level Classes and Methods > Dedupe and StaticDedupe > Dedupe.score()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: From pairwise similarity scores, cluster() groups records into entity clusters and emits each
    cluster's record ids alongside per-record confidence scores.
  locator: Lower Level Classes and Methods > Dedupe and StaticDedupe > Dedupe.cluster()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: partition() is the end-to-end clustering entry point; it only admits records into a cluster when
    the cluster's cophenetic similarity exceeds a tunable threshold (default 0.5), trading recall against
    precision.
  locator: Dedupe Objects > Dedupe.partition()
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The documented release is dedupe 3.0.2, authored by Forest Gregg, Derek Eder, and contributors.
  locator: Page navigation / footer (title 'Dedupe 3.0.2'; copyright 2024)
  confidence: medium
  quote_available: true
  notes: ''
