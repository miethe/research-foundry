extracted_facts:
- evidence_id: ev_001
  text: The toolkit implements the standard five-step record linkage workflow — cleaning, indexing, comparing,
    classifying, and evaluation — with classified pairs optionally feeding back to improve earlier steps.
  locator: Introduction / What is record linkage? (workflow steps)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The project is inspired by FEBRL but, unlike FEBRL, builds extensively on the pandas and numpy
    data-manipulation stack to make linkage faster and easier to embed in existing data projects.
  locator: Introduction (FEBRL inspiration / pandas + numpy)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Candidate pairs are generated with indexing methods such as blocking and sorted neighbourhood
    indexing, and records are compared with similarity measures spanning strings, numbers, and dates.
  locator: Main features list (indexing / comparison)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: String comparison in the Compare class supports configurable methods including Jaro-Winkler and
    Damerau-Levenshtein with similarity thresholds, alongside exact matching on categorical fields.
  locator: How to link records? (Compare class example)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Classification supports both a supervised LogisticRegressionClassifier (trained on golden/true
    linkage data) and an unsupervised BernoulliEMClassifier described as the ECM-algorithm.
  locator: How to link records? (classification examples)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The toolkit grounds its workflow and methods in the record linkage literature, citing Christen
    (2012), Fellegi & Sunter (1969), Dunn (1946), and Herzog, Scheuren & Winkler (2007).
  locator: See also (References)
  confidence: medium
  quote_available: true
  notes: ''
