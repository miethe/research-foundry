- evidence_id: ev_001
  text: A match-weight threshold partitions record pairs into matches (scores above) and non-matches (scores
    below).
  locator: Threshold semantics (match/non-match labelling)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Precision is maximised by raising the threshold (fewer false positives) and recall by lowering
    it (fewer false negatives).
  locator: Precision/recall maximisation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Raising the threshold reclassifies some predicted matches as non-matches, converting True Positives
    to False Negatives and False Positives to True Negatives.
  locator: Confusion-matrix transitions under threshold change
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Lowering the threshold to the extreme maximises recall at the cost of precision by generating
    many more (including false-positive) matches.
  locator: Recall/precision tradeoff at the low extreme
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
