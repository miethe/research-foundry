extracted_facts:
- evidence_id: ev_001
  text: The paper introduces ComEM, a compound entity-matching framework that composes multiple strategies
    and LLMs to improve both effectiveness and efficiency over single strategies.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The work motivates ComEM by arguing that conventional binary pairwise LLM matching ignores global
    consistency among record relationships, yielding suboptimal results.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Experiments span 8 entity-resolution datasets and 10 LLMs, and find that incorporating record
    interactions via the selecting strategy is superior.
  locator: Abstract / Experimental setup
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'ComEM is a two-stage filter-then-identify pipeline: a medium-sized LLM ranks/filters candidates
    via local matching or comparing, then a more powerful LLM does fine-grained selection on the top-k.'
  locator: Method — ComEM pipeline
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: ComEM reaches F1 of 87.62 (Abt-Buy), 69.63 (Amazon-Google), 90.85 (DBLP-ACM), 84.68 (DBLP-Scholar),
    and 86.37 (Walmart-Amazon).
  locator: Results — Table 4 (ComEM F1 scores)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_006
  text: Supervised baselines reported for comparison are Ditto at 80.69 mean F1 and HierGAT at 83.34 mean
    F1, both under the Supervised category.
  locator: Results — Table 4 (supervised baselines)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_007
  text: ComEM delivers F1 gains while reducing cost, improving precision without sacrificing the selecting
    strategy's high recall.
  locator: Results / Analysis — cost-effectiveness
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The 10 LLMs evaluated include GPT-4o-mini, GPT-3.5-Turbo, Llama-3.1-8B, Qwen2-7B, Mistral-7B,
    Mixtral-8x7B, Command-R-35B, Flan-T5-XXL, Flan-UL2, and Solar-10.7B.
  locator: Experimental setup — LLMs evaluated
  confidence: medium
  quote_available: false
  notes: ''
