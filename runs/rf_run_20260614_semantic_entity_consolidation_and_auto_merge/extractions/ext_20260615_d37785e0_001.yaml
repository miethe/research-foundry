contradictions_or_cautions:
- text: Single-author preprint, not peer-reviewed
  locator: card/trust
- text: Benchmarks re-implement baselines under the author's own standardized methodology rather than
    reusing original reported metrics
  locator: card/trust
- text: Source-brief framing (Fellegi-Sunter ensemble of string comparators with named confidence bands)
    does not match the actual method, which is dense+sparse retrieval plus cross-encoder rerank
  locator: card/trust
- text: Single-author arXiv preprint (v2, March 2026), not peer-reviewed.
  locator: card/limitations
- text: Baselines were re-implemented under the author's own standardized 40% test-split / top-1 methodology
    rather than reusing original published metrics, so cross-paper comparisons are not apples-to-apples.
  locator: card/limitations
- text: The source brief's framing (a Fellegi-Sunter ensemble of string-similarity comparators with named
    auto-match/review-queue/auto-reject confidence bands) does not match the actual paper; EnsembleLink
    is a dense+sparse retrieval plus cross-encoder rerank system, and the Fellegi-Sunter framework appears
    only as the baseline method fastLink implements.
  locator: card/limitations
- text: Assumes a reference corpus of moderate size (thousands to hundreds of thousands of records); very
    large corpora may need additional filtering and very small corpora may not benefit.
  locator: card/limitations
