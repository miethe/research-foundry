extracted_facts:
- evidence_id: ev_001
  text: 'Resolution uses three decision tiers: scores above the auto-merge threshold merge automatically,
    scores between the flag and merge thresholds create a SAME_AS link for human review, and scores below
    the flag threshold create a new entity.'
  locator: Decision tiers (three-tier resolution)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Thresholds are tuned per domain: Financial Services (High Precision) auto_merge 0.98 / flag 0.90;
    Ecommerce Retail (Balanced) auto_merge 0.95 / flag 0.85; Content/Media (High Recall) auto_merge 0.92
    / flag 0.75.'
  locator: Domain-specific thresholds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The blended confidence score weights embedding similarity at 70% and fuzzy string matching at
    30%, and only entities of the same type are matched to avoid false positives.
  locator: Combined scoring
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The SAME_AS review relationship carries metadata including a numeric confidence, a status of pending/confirmed/rejected,
    created_at and reviewed_at timestamps, a reviewed_by field, and a method label.
  locator: SAME_AS review relationship
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Health monitoring defines healthy ranges of auto-merge rejection rate below 2% (raise auto_merge_threshold
    if exceeded), flag-to-confirm rate of 60-90%, and orphan entity rate below 10%.
  locator: Health monitoring thresholds
  confidence: medium
  quote_available: true
  notes: ''
