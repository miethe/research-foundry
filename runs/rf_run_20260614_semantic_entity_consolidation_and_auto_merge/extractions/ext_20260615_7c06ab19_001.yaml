extracted_facts:
- evidence_id: ev_001
  text: RF/MeatyWiki recommended posture keeps Markdown+YAML under Git as the single source of truth and
    adds a derived, disposable SQLite/Datasette index via the git-history pattern, accepting the single-writer
    limit unless concurrent agent writes exceed the millisecond turn-taking window.
  locator: Recommendations and decision rules (clm_inf09)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Git content-addressing names every blob, tree, and commit by the SHA of its own bytes, so any
    content change changes its key and any commit edit changes every descendant SHA, making history self-verifying
    and tamper-evident rather than dependent on append-only log discipline.
  locator: Analytical derivation > Storage and integrity model (clm_inf03)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The derived index in a files-as-truth hybrid is a disposable cache that yields the strongest
    recovery guarantee of the three postures: git-history regenerates the entire SQLite database deterministically
    from committed file history, whereas a DB-first store''s lost data has no external rebuild source.'
  locator: Hybrid index pattern / Recovery guarantee (clm_inf05)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: File-first/embedded stores share a single-writer ceiling (SQLite serializes to one writer at any
    instant) and the git-history hybrid materializes every version of every record (10 versions x 30 items
    = 300 rows), so the derived store grows with history depth times item count.
  locator: Hybrid index pattern (clm_inf04) / Scale and concurrency breakpoints (clm_025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Obsidian's plain-text local-first vault is editable by any filesystem-aware tool and versionable
    with stock Git, and an LLM agent can read, grep, and rewrite a Markdown+YAML note with ordinary file
    operations, whereas a DB-first store requires SQL/stored-procedure semantics and a running engine.
  locator: Editability and agent-tool surface (clm_inf08)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Obsidian is local-first (data stored primarily on the user's local hard disk with Sync as an optional
    convenience) and connects notes through bidirectional internal links and a Graph view rather than
    a database schema.
  locator: Editability and agent-tool surface (clm_013, clm_015)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Speculation: multi-agent RF/MeatyWiki swarms will likely be the first workload to breach the
    file-first single-writer breakpoint, plausibly forcing per-agent branch+merge isolation or a PostgreSQL-backed
    write coordinator before the corpus itself grows large.'
  locator: Recommendations and decision rules (clm_spec01)
  confidence: medium
  quote_available: true
  notes: ''
