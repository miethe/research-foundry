extracted_facts:
- evidence_id: ev_001
  text: Splink implements the Fellegi-Sunter / Expectation-Maximisation model as an unsupervised learning
    algorithm that yields a match score for each pair of record comparisons.
  locator: 'Section: Problem statement'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Splink requires no labeled training data because its models can be trained using an unsupervised
    approach.
  locator: 'Section: Summary'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Partial match weights can be computed for an arbitrary number of user-defined scenarios (e.g.
    postcodes within 10 miles of each other), not just binary match or non-match.
  locator: 'Section: How it works'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A match on date of birth provides more evidence of a match than a match on gender, illustrating
    that different attributes carry different evidential weight.
  locator: 'Section: How it works'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The per-attribute partial match weights are combined into an overall match score representing
    the total weight of evidence that two records are the same.
  locator: 'Section: How it works'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The documented clustering call resolves pairwise predictions into clusters at a 0.95 match-probability
    threshold.
  locator: 'Section: Sample Code'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Splink is capable of linking very large datasets of over 100 million records using Spark or AWS
    Athena backends.
  locator: 'Section: Summary'
  confidence: medium
  quote_available: true
  notes: ''
