- claim_id: clm_inf01
  text: The recommended architecture is a three-stage pipe (per-tool export adapter -> a single intermediate
    normalized record -> an idempotent RF intake stage), because three of the four tools (OpenAI, Perplexity,
    Gemini) already emit structurally equivalent span-to-source citation objects that collapse cleanly
    onto one schema while NotebookLM needs a separate degrade path.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_055
    - clm_064
    - clm_040
    - clm_045
    - clm_047
    - clm_067
    - clm_009
    - clm_030
    - clm_033
    - clm_035
    reasoning_summary: OpenAI annotations (url/title/start_index/end_index), Gemini groundingSupports
      (byte segment -> chunk indices -> uri/title), and Perplexity search_results (title/url/date) are
      all span-or-list-to-source maps that fit one normalized record; NotebookLM has no such API (clm_009),
      so a per-tool adapter front-end feeding one schema into RF's existing source_card/claim chain (clm_030/clm_033)
      under determinism-by-default (clm_035) is the minimal viable design.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: The intermediate normalized citation record should be {span:{start,end,unit}, source:{url,title,published_at,source_type,tool,model,captured_at},
    relation, confidence}, with a unit field set to 'char' for OpenAI/Perplexity and 'byte' for Gemini,
    because the two API families measure offsets in different units and a pipeline that hard-codes one
    will mis-slice the other's spans.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_064
    - clm_047
    - clm_067
    - clm_018
    - clm_030
    reasoning_summary: OpenAI start_index/end_index are integer character offsets (clm_064) while Gemini
      segment startIndex/endIndex are byte-measured (clm_047); a normalized schema must carry an explicit
      offset unit to reconcile them, plus url/title (clm_067) and date/published_at (clm_018) to populate
      source_card source.locator and source.title (clm_030).
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Per-tool automation tiering ranks OpenAI Deep Research and Perplexity Sonar as Tier-1 (stable,
    GA, API-backed, fully scriptable), Gemini grounding as Tier-1 but its Deep Research Agent as Tier-2
