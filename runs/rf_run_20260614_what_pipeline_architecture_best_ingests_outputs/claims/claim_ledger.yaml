- claim_id: clm_inf06
  text: Provenance metadata should be modeled on the C2PA Manifest pattern (assertions + a single signed
    claim + signature), recording tool, model, and captured_at as a 'gathered' assertion distinct from
    the original publisher citation, so that RF preserves the distinction between what a tool synthesized
    and what it merely relayed.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    - clm_003
    - clm_006
    - clm_033
    reasoning_summary: C2PA models provenance as assertions bound under one signed claim (clm_001/clm_002)
      and v2 explicitly separated created_assertions from gathered_assertions (clm_003); applying that
      split to ingest lets RF tag the AI tool as the gatherer (digitalSourceType-style AI provenance,
