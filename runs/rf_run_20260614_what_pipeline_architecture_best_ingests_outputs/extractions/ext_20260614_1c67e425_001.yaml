extracted_facts:
- evidence_id: ev_001
  text: NotebookLM has no documented REST API, so both the CLI and the skill drive browser/OAuth automation
    and the integration wraps the notebooklm CLI as a subprocess rather than HTTP.
  locator: Section 6 Open Questions, item 1; also Section 3.4 Primary
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: NLM output is treated as exactly one of two things — a source that earns a source_card and a claim-eligible
    evidence trail, or a non-authoritative artifact that never enters the report body as an untagged material
    claim.
  locator: Section 1 Overview, final paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'All NLM-derived source cards carry usage.requires_network: true and a reliability note because
    the output is non-reproducible, making the offline-first exception explicit rather than silent.'
  locator: Section 5 Governance & Claim-Ledger Notes, item 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Whether `notebooklm source fulltext --json` yields quote spans good enough for extracted_points[].quote,
    versus only summaries, is an open question that gates evidence fidelity for the sourcing path.
  locator: Section 6 Open Questions, item 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Reliable NLM surfaces are notebooks, sources, chat, mind-map, report, and data-table, while audio,
    video, quiz, flashcards, infographic, and slide-deck are rate-limited 'may fail' surfaces needing
    retry and a degrade path.
  locator: Section 2 Capability Inventory, footnote after table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The integration philosophy mandates writing a deterministic on-disk artifact first, gating the
    live network call behind available(), degrading silently, and never letting NLM-authored prose enter
    a report body without a claim id.
  locator: Section 1 Overview, second paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The integration wraps the notebooklm-py CLI at version v0.3.2, which provides notebook/source/artifact
    ops, OAuth, and --json machine output.
  locator: Section 3.1 Capability Inventory / notebooklm-py version
  confidence: medium
  quote_available: true
  notes: ''
