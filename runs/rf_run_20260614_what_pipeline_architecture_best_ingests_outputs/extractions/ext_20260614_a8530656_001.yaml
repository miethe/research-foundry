extracted_facts:
- evidence_id: ev_001
  text: Perplexity has fully deprecated and removed the citations field; all applications must migrate
    to the search_results field, which carries richer per-source detail (titles, URLs, publication dates).
  locator: Enhanced API Responses with Search Results (May 2025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each entry in Perplexity's search_results field exposes a title, url, and date, giving URL+title
    pairs that map onto RF's source.locator.url and source.title fields.
  locator: Enhanced API Responses with Search Results (May 2025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The search_results field was added to the JSON response object to give applications direct, transparent
    access to the search results the models actually used.
  locator: Enhanced API Responses with Search Results (May 2025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Perplexity API responses now include detailed per-request cost information, usable for CCDash-style
    ingest-cost telemetry.
  locator: Detailed Cost Information in API Responses (July 2025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The per-request cost structure breaks cost into input_tokens_cost, output_tokens_cost, request_cost,
    and total_cost fields.
  locator: Detailed Cost Information in API Responses (July 2025)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Perplexity maintains OpenAI compatibility: the /v1/responses path continues to work as an OpenAI-compat
    alias and a GET /v1/models endpoint lists models in OpenAI-compatible format, so response normalization
    can share the OpenAI envelope.'
  locator: Agent API Endpoint (March 2026) / GET /v1/models (April 2026)
