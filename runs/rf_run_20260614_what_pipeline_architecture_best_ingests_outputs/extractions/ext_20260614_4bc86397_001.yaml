extracted_facts:
- evidence_id: ev_001
  text: Each grounding chunk's web object carries a uri (string source URL) and a title (string page title),
    used to provide a link to the source of the information.
  locator: 'Section: Web (GroundingChunk subtype), Fields table'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: GroundingSupport.groundingChunkIndices is an integer array indexing into the GroundingMetadata.groundingChunks
    field, specifying which chunks support the claim in a content segment.
  locator: 'Section: GroundingSupport, Fields > groundingChunkIndices[]'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: confidenceScores is a float array parallel to groundingChunkIndices giving per-reference confidence
    (0.0-1.0) that the chunk supports the claim; for Gemini 2.5+ it is empty and should be ignored.
  locator: 'Section: GroundingSupport, Fields > confidenceScores[]'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A GroundingSupport.segment carries byte-measured startIndex (inclusive) and endIndex (exclusive)
    marking the span of content the support applies to.
  locator: 'Section: Segment, Fields > startIndex / endIndex'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: GroundingMetadata also returns webSearchQueries (the web search queries used), a searchEntryPoint
    for displaying search results, and retrievalMetadata about the retrieval grounding source.
  locator: 'Section: GroundingMetadata, Fields (webSearchQueries / searchEntryPoint / retrievalMetadata)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The docs give a concrete example that groundingChunkIndices values [1, 3] mean groundingChunks[1]
    and groundingChunks[3] are the sources for that segment's claim, evidencing the index->chunk->URL
    citation pattern.
  locator: 'Section: GroundingSupport > groundingChunkIndices[] (example)'
  confidence: medium
  quote_available: true
  notes: ''
