extracted_facts:
- evidence_id: ev_001
  text: 'OpenAI exposes two dated Deep Research models via the responses endpoint: o3-deep-research-2025-06-26
    (in-depth synthesis, higher quality) and o4-mini-deep-research-2025-06-26 (lightweight, faster, latency-sensitive).'
  locator: Background section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each citation annotation returned in the response carries start_index/end_index (the character
    span the citation refers to), a title, and the full source url.
  locator: Parse the Response > Access Inline Citations and Metadata
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: All intermediate agent steps are stored in response.output, where the type field identifies each
    step kind (reasoning, web_search_call, code_interpreter_call), enabling debugging and tracing of how
    the answer was constructed.
  locator: Parse the Response > Inspect Intermediate Steps
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The final report is the last item in the output list, accessed as response.output[-1].content[0].text,
    while annotations live at response.output[-1].content[0].annotations.
  locator: Parse the Response > Extract the Final Report Output
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Deep Research models and the Responses API support MCP-based tools, letting the model query private
    knowledge stores or third-party services in addition to web search and code execution.
  locator: Parse the Response > Model Context Protocol (MCP)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A Deep Research request requires the web_search_preview tool and can optionally add code_interpreter
    (with a container) for data parsing and chart generation.
  locator: Getting started (tool configuration)
  confidence: medium
  quote_available: true
  notes: ''
