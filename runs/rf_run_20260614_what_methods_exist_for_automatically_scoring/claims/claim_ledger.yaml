- claim_id: clm_inf14
  text: Three concrete Goodhart attacks on quality_score and their mitigations are (a) source padding
    (add many low-value cards to inflate diversity), mitigated by counting distinct domains not raw cards
    and saturating the diversity term; (b) claim splitting (atomize claims to raise support_rate), mitigated
    by materiality-weighting and count saturation; and (c) citation stuffing (attach the same source to
    many claims), mitigated by a per-source-card claim-concentration cap so over-reused cards stop adding
    score.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
