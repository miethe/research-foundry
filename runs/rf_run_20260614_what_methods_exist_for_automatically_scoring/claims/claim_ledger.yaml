      them 87.7% (clm_073/clm_077); BrowseComp shows volume is not quality (clm_004) and RAGAS penalizes
      redundant context (clm_013), motivating distinct-domain counting, materiality weighting, and source-concentration
      caps as the three hardenings.
  report_locations: []
  reviewer_notes: ''
