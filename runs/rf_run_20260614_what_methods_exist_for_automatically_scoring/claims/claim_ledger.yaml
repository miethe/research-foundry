- claim_id: clm_inf01
  text: RF's claim ledger already implements the core mechanic shared by RAGAS Faithfulness, DeepEval
    Faithfulness, TruLens Groundedness, FActScore, and RAGChecker - decompose output into atomic claims,
    then check each against evidence - so RF can compute a claim support rate as claims_supported / claims_total
    natively without adopting any external scorer's runtime.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_028
    - clm_035
    - clm_050
    - clm_061
    - clm_067
    reasoning_summary: FActScore (atomic-fact percentage supported), RAGAS/DeepEval Faithfulness (supported
      claims / total claims), TruLens Groundedness (per-claim evidence search), and RAGChecker (claim-level
      entailment) all reduce to a supported-claims ratio; RF's ledger emits claims_supported and claims_total,
      so the same ratio is already computable.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: The single most transferable metric from the eval literature to RF is claim support rate (claims_supported
    / claims_total), the direct ledger analogue of FActScore's atomic-fact precision and RAGAS Faithfulness,
    and it should be the dominant term in quality_score.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_028
    - clm_034
    - clm_035
    - clm_044
    - clm_061
    reasoning_summary: FActScore and both Ragas/DeepEval Faithfulness define quality as the fraction of
      claims supported by evidence on a 0-1 scale; RF emits exactly claims_supported and claims_total,
      making this metric a zero-cost, literature-validated primary term.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: RF should compute quality_score as a deterministic 0-to-1 composite Q = 0.45*support_rate + 0.20*(1
    - unsupported_rate) + 0.15*source_diversity + 0.10*verification_passed + 0.10*(1 - normalized_rework),
    where support_rate = claims_supported/claims_total, unsupported_rate = unsupported_claims/claims_total,
    and every input is a metric RF already emits in ccdash_event (claims_supported, claims_total, unsupported_claims,
    verification_passed, rework_count) plus the one new diversity signal.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_035
    - clm_061
    - clm_028
    - clm_054
    - clm_057
    reasoning_summary: A Faithfulness-style support ratio anchors the composite (literature-dominant term
      per clm_035/clm_061/clm_028); DeepResearch Bench RACE shows multi-dimension weighted scoring is
      the accepted shape (clm_054/clm_057); all listed inputs map to fields already in RF's ccdash_event
      metrics block.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: RF must add one new emitted signal, distinct_source_domains (count of unique source-card publisher/domain
    values), because no metric RF currently emits captures source diversity, which FACT's effective-citation-count
    and RAGAS Context Relevance treat as first-class; source_diversity in the composite should be a saturating
    function such as min(1, distinct_source_domains / 6).
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_056
    - clm_013
    - clm_040
    reasoning_summary: FACT scores effective citation count and accuracy (clm_056) and RAGAS rewards focused,
      non-redundant context (clm_013), but RF's current metrics block only counts source_cards_created,
      not their distinctness; a new distinct_source_domains signal is the minimal addition to make source
      diversity computable.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: Raw source_cards_created and claims_total are gameable padding signals and must never be reward
    terms in quality_score - only ratios and diversity counts qualify - because BrowseComp shows enabling
    browsing for GPT-4o lifted accuracy only from 0.6% to 1.9%, the direct analogue that volume of activity
    does not track quality.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_005
    - clm_046
    reasoning_summary: BrowseComp shows raw tool access (more browsing) barely moves accuracy and can
      raise calibration error (clm_004/clm_005), so a count of activity (cards, claims) is not a quality
      signal; using ratios instead of counts prevents rewarding padding, and clm_046 confirms each scoring
      call has cost so volume is doubly penalizing.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: Claim-splitting (atomizing one claim into several trivially-supported sub-claims to inflate support_rate)
    is the highest-severity Goodhart risk for RF, directly analogous to citation stuffing; mitigation
    is to normalize support_rate by a materiality-weighted count (material claims weighted higher than
    background) and to cap the marginal score contribution of claims beyond a per-report saturation point.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_035
    - clm_073
    - clm_063
    reasoning_summary: Faithfulness as supported/total claims (clm_035) is directly inflatable by splitting;
      RHB shows agents exploit naturalistic shortcuts when the metric rewards them (clm_073); weighting
      by the ledger's existing materiality field and saturating the count resists the split-to-inflate
      exploit.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'Contradiction coverage should be rewarded, not penalized: a run that surfaces and logs contradictions
    (claims_contradicted > 0 plus a populated contradiction_log) demonstrates adversarial verification,
    so quality_score should treat a non-empty contradiction_log as a small positive coverage signal rather
    than counting contradicted claims purely as defects.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_041
    - clm_048
    - clm_069
    reasoning_summary: RAGAS Noise Sensitivity and the TruLens triad reward systems that detect bad/irrelevant
      context (clm_041/clm_048), and RAGChecker separates hallucination from self-knowledge to expose
      model behavior (clm_069); analogously, RF surfacing contradictions is evidence of verification rigor,
      so the contradiction_log should be a positive coverage signal.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: Synthesis coherence cannot be computed from RF's current deterministic metrics and is the only
    quality dimension that genuinely requires an LLM-as-judge pass; RF should emit it as an optional secondary
    coherence_score (a G-Eval/RACE-style 1-to-5 rubric on the report) kept OUT of the deterministic quality_score
    to preserve auditability.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_022
    - clm_024
    - clm_057
    reasoning_summary: G-Eval (clm_022/clm_024) and RACE Readability/Insight (clm_057) are LLM-judge rubric
      scores that capture coherence/depth; these are non-deterministic and costly, so they belong in a
      separate optional field rather than the auditable deterministic quality_score.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
