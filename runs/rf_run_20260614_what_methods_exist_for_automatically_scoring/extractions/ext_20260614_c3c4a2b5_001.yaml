contradictions_or_cautions:
- text: Self-reported correlation gains vs baselines (RAGAS); authors propose the metric they evaluate.
  locator: card/trust
- text: Metrics depend on an LLM-based claim extractor/checker (Llama3-70B via RefChecker), inheriting
    that model's error modes.
  locator: card/trust
- text: 'Self-reported gains: the authors propose the very metric they meta-evaluate, and comparisons
    against RAGAS are reported by them.'
  locator: card/limitations
- text: Metric reliability is bounded by the LLM claim extractor/checker (Llama3-70B via RefChecker);
    extraction or entailment errors propagate into every downstream score.
  locator: card/limitations
