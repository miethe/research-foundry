extracted_facts:
- evidence_id: ev_001
  text: RAGChecker is a diagnostic evaluation framework providing a suite of metrics covering both the
    retrieval and generation modules of a RAG system.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'RAGChecker scores responses via claim-level entailment: a text-to-claim extractor decomposes
    a text into claims and an entailment checker marks each claim as entailed or not against reference
    texts.'
  locator: Section 3.2 (Claim-level entailment) / Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The claim extractor and entailment checker are both implemented with Llama3-70B via the open-source
    RefChecker framework.
  locator: Section 3.2 (Implementation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Hallucination counts incorrect claims unsupported by any retrieved chunk (generated by the model
    itself), while Self-Knowledge counts correct claims unsupported by retrieval, distinguishing parametric
    from retrieved knowledge.
  locator: Appendix B.3 (Generator metric definitions)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: RAGChecker correlates more strongly with human judgments than RAGAS on overall (Pearson 61.93
    vs 48.31), correctness (49.66 vs 41.07), and completeness (60.67 vs 53.16).
  locator: Table 2 (Meta Evaluation)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_006
  text: Meta-evaluation found RAGChecker correlates significantly better with human judgments than competing
    metrics, with a 90.95% human agreement rate within tolerance.
  locator: Abstract / Section 4.2 (Meta Evaluation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The framework is applied to 8 RAG systems across 10 domains and 4,162 queries to produce in-depth
    diagnostic analysis.
  locator: Abstract / Section 4.1 (Experimental setup)
  confidence: medium
  quote_available: true
  notes: ''
