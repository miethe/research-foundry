contradictions_or_cautions:
- text: Deep Research is trained on data that specifically teaches the model to be good at BrowseComp
    tasks (footnote 1)
  locator: card/trust
- text: Benchmark deliberately measures only short-answer correctness, not long-form report quality or
    ambiguity resolution
  locator: card/trust
- text: 'Self-reported, first-party results: the headline 51.5% comes from OpenAI''s own Deep Research
    model, which per footnote 1 is trained on data specifically teaching it to be good at BrowseComp tasks.'
  locator: card/limitations
- text: 'Scope limit: by design it measures short verifiable answers only, so it cannot stand in for rubric-based
    scoring of report coherence or citation quality and must be paired with such measures.'
  locator: card/limitations
