extracted_facts:
- evidence_id: ev_001
  text: BrowseComp comprises 1,266 hard multi-hop browsing problems whose predicted answers are short
    and easily verifiable against reference answers; the dataset and grader live in openai/simple-evals.
  locator: Abstract / Sec. 1 Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Grading is exact-match-style: an AI model judges whether the predicted single short-string answer
    is semantically equivalent to the reference, reusing the Humanity''s Last Exam grading prompt.'
  locator: Sec. 2.3 Grading
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: OpenAI Deep Research scored 51.5% accuracy on BrowseComp, far above all other tested models, and
    the paper reports a second axis, Calibration Error (%), alongside accuracy for every model.
  locator: Sec. 4.1 Table 3 (Accuracy and calibration of OpenAI models)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Enabling browsing for GPT-4o raised accuracy only from 0.6% to 1.9%, showing tool access without
    strategic reasoning barely helps; OpenAI o1 (no browsing, stronger reasoning) reached 9.9%.
  locator: Sec. 4.1 Performance of OpenAI models (Table 3 + narrative)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Browsing-capable models (GPT-4o w/ browsing, Deep Research) show higher calibration error, suggesting
    web-tool access can increase a model's confidence in incorrect answers, so raw tool use is not a quality
    signal.
  locator: Sec. 4.2 Calibration Analysis (Table 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: BrowseComp accuracy scales smoothly with test-time compute, and aggregating 64 samples per question
    via majority/weighted/best-of-N voting improves accuracy by 15-25% over a single attempt.
  locator: Sec. 4.3 Test-time compute scaling (Figure 1) and Sec. 4.4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: BrowseComp deliberately measures only the core skill of finding hard short answers and explicitly
    sidesteps generating long answers or resolving ambiguity, so it must be paired with rubric-based report
    scoring.
  locator: Sec. 1 Introduction / Sec. 2.4 What BrowseComp exercises
  confidence: medium
  quote_available: true
  notes: ''
