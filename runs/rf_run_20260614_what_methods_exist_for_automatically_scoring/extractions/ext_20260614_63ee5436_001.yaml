extracted_facts:
- evidence_id: ev_001
  text: FActScore is a factuality metric that breaks a long-form generation into atomic facts and computes
    the percentage supported by a reliable knowledge source.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: An automated FActScore estimator using retrieval plus a strong language model approximates the
    human-derived score with less than a 2% error rate.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In human evaluation of people-biography generations, ChatGPT achieved a FActScore of only 58%,
    illustrating the need for a fine-grained factuality score.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The automated metric scored 6,500 generations from 13 recent LMs that would have cost about $26K
    to evaluate by humans, quantifying the eval cost savings.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Across the 13 LMs evaluated, GPT-4 and ChatGPT were more factual than public models, with Vicuna
    and Alpaca among the best open-source models.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The metric is motivated by the fact that long-form LM generations mix supported and unsupported
    information, making binary quality judgments inadequate and human evaluation costly.
  locator: Abstract (motivation)
  confidence: medium
  quote_available: true
  notes: ''
