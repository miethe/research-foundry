extracted_facts:
- evidence_id: ev_001
  text: Ragas defines Faithfulness as a measure of how factually consistent a response is with its retrieved
    context, scored on a 0-to-1 range where higher means better consistency.
  locator: 'Section: Faithfulness (intro)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The Faithfulness score is computed as the number of response claims supported by the retrieved
    context divided by the total number of claims in the response.
  locator: 'Section: Faithfulness (formula)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Computing faithfulness is a three-step process: extract all claims from the response, check each
    claim for inferability from the retrieved context, then apply the ratio formula.'
  locator: 'Section: Faithfulness (To calculate this, steps 1-3)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A worked example breaks a low-faithfulness answer into two statements, marks one inferable and
    one not, and computes faithfulness as 1/2 = 0.5, illustrating the per-claim cross-check.
  locator: 'Section: How It''s Calculated (worked example)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The FaithfulnesswithHHEM variant uses Vectara's HHEM-2.1-Open, a T5 classifier trained to detect
    hallucinations, in the claim cross-check step; it is described as free, small, open-source, and efficient
    for production.
  locator: 'Section: Faithfulness with HHEM-2.1-Open'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The HHEM variant lets users set the device for model loading and tune the inference batch size;
    by default the model loads on CPU with a batch size of 10.
  locator: 'Section: Faithfulness with HHEM-2.1-Open (configuration)'
  confidence: medium
  quote_available: true
  notes: ''
