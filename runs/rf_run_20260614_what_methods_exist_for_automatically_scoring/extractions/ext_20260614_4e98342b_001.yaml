  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'RAGAS evaluates three dimensions of RAG: retrieval of relevant/focused passages, faithful exploitation
    of those passages by the LLM, and generation quality.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The framework's purpose is to enable faster RAG evaluation cycles by removing the dependency on
    ground-truth human annotations.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Faithfulness holds when every claim made in the answer can be inferred from the retrieved context.
