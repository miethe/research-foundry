extracted_facts:
- evidence_id: ev_001
  text: Ragas provides a RAG metric set including Context Precision, Context Recall, Context Entities
    Recall, Noise Sensitivity, Response Relevancy, Faithfulness, plus Multimodal Faithfulness and Multimodal
    Relevance.
  locator: available_metrics index, 'Retrieval Augmented Generation' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Noise Sensitivity measures how often a RAG system produces incorrect responses, evaluated against
    both relevant and irrelevant retrieved documents, giving a distractor/robustness signal.
  locator: Noise Sensitivity page, opening definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Noise Sensitivity scores range 0 to 1 with lower values indicating better performance, and an
    irrelevant-context mode is selectable via the mode parameter set to 'irrelevant'.
  locator: Noise Sensitivity page, score range / mode parameter
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Beyond RAG, Ragas adds agent/tool-use metrics relevant to scoring agent runs, including Topic
    adherence, Tool call Accuracy, Tool Call F1, and Agent Goal Accuracy.
  locator: available_metrics index, 'Agents or Tool use cases' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Faithfulness is reference-free, measuring how factually consistent a response is with the retrieved
    context (response considered faithful if all its claims are supported by the retrieved context).
  locator: Faithfulness page, opening definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Context Recall always requires a reference (ground truth) to compare against, in contrast to reference-free
    metrics like Faithfulness, so reference requirements vary across the metric set.
  locator: Context Recall page, reference requirement
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: LLM-based Ragas metrics may use one or more LLM calls per score, which is the basis for cost-per-verified-claim
    accounting when scoring with these metrics.
  locator: available_metrics index, introduction
  confidence: medium
  quote_available: true
  notes: ''
