extracted_facts:
- evidence_id: ev_001
  text: TruLens defines the RAG triad as three evaluations — context relevance, groundedness, and answer
    relevance — whose satisfactory scores together give confidence the LLM app is free from hallucination.
  locator: The RAG Triad (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The RAG triad was created to evaluate hallucinations along each edge of the RAG architecture,
    motivated by the fact that retrieval can fail to fetch sufficient context or retrieve irrelevant context
    that is woven into the LLM's response.
  locator: The RAG Triad (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Context Relevance verifies retrieval quality by checking that each retrieved chunk of context
    is relevant to the input query, since irrelevant context could be woven into a hallucination.
  locator: Context Relevance section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Groundedness is measured by separating the LLM response into individual claims and independently
    searching the retrieved context for evidence supporting each claim.
  locator: Groundedness section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Answer Relevance verifies that the final response actually answers the original question by evaluating
    the relevance of the response to the user input.
  locator: Answer Relevance section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'TruLens frames the triad''s guarantee as bounded: passing all three only verifies the app is
    hallucination-free up to the limit of its knowledge base — accurate answers depend on the vector database
    containing only accurate information.'
  locator: Putting it together section
  confidence: medium
  quote_available: true
  notes: ''
