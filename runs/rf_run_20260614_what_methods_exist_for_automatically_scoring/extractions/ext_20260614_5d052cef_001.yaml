extracted_facts:
- evidence_id: ev_001
  text: G-Eval is an LLM-as-a-judge framework using chain-of-thought to evaluate LLM outputs against any
    custom criteria, originating from the paper 'NLG Evaluation using GPT-4 with Better Human Alignment'.
  locator: 'Section: What is G-Eval?'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: When only criteria are supplied, G-Eval first auto-generates a series of evaluation_steps via
    chain-of-thought before scoring.
  locator: 'Section: How Is It Calculated?'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: G-Eval asks the judge LLM to produce an integer score from 1 to 5, where 5 is better than 1.
  locator: 'Section: How Is It Calculated? (scoring step)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: G-Eval normalizes the raw score using the probabilities of the LLM's output tokens, taking their
    weighted summation as the result.
  locator: 'Section: How Is It Calculated? (probability normalization step)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: DeepEval states the probability-weighting step was introduced in the original paper because it
    minimizes bias in LLM scoring.
  locator: 'Section: How Is It Calculated? (Did You Know? callout)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: G-Eval is positioned as DeepEval's most versatile, custom, subjective metric, used alongside system-specific
    metrics such as ContextualRelevancyMetric for RAG and TaskCompletionMetric for agents.
  locator: 'Section: Usage'
  confidence: medium
  quote_available: true
  notes: ''
