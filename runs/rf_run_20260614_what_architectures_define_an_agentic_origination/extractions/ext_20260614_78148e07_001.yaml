extracted_facts:
- evidence_id: ev_001
  text: A handoff lets one agent delegate a task to another agent, useful when different agents specialize
    in distinct areas.
  locator: Intro / Handoffs (page top)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Handoffs are exposed to the LLM as tools, with a handoff to an agent named 'Refund Agent' surfacing
    as a tool named transfer_to_refund_agent.
  locator: Intro / Handoffs (tool exposure)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: An agent's handoffs param accepts either an Agent directly or a Handoff object, and the handoff()
    function exposes parameters including agent, tool_name_override, tool_description_override, on_handoff,
    input_type, input_filter, and is_enabled.
  locator: Creating a handoff / Customizing handoffs via the handoff() function
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: input_type describes the handoff tool-call arguments; the SDK exposes that schema to the model
    as the tool's parameters, validates the returned JSON locally, and passes the parsed value to on_handoff.
  locator: Customizing handoffs / input_type
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The on_handoff callback receives the agent context and can optionally receive LLM-generated input,
    with the input data controlled by the input_type parameter.
  locator: Customizing handoffs / on_handoff callback
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: An input_filter controls which conversation history the receiving agent sees, with common patterns
    (such as removing all tool calls) prebuilt in agents.extensions.handoff_filters.
  locator: Input filters
  confidence: medium
  quote_available: true
  notes: ''
