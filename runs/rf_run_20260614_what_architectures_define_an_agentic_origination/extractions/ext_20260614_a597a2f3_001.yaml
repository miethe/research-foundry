extracted_facts:
- evidence_id: ev_001
  text: In a swarm architecture agents dynamically hand off control to one another based on their specializations,
    with no central coordinator.
  locator: README — Introduction / overview
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The swarm remembers which agent was last active so that subsequent interactions resume the multi-turn
    conversation with that same agent.
  locator: README — Memory
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: By default, swarm agents use handoff tools built with the prebuilt create_handoff_tool helper.
  locator: README — Customizing Handoff Tools
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Handoff tools can be customized by changing the tool name and/or description and by adding tool-call
    arguments for the LLM to populate, such as a task description for the next agent.
  locator: README — Customizing Handoff Tools
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: create_swarm() builds the workflow from a list of agents and accepts a default_active_agent argument
    (e.g. create_swarm([alice, bob], default_active_agent="Alice")).
  locator: README — Quickstart (create_swarm usage)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Multi-turn state requires always compiling the swarm with a checkpointer (e.g. workflow.compile(checkpointer=checkpointer)).
  locator: README — Memory
  confidence: medium
  quote_available: true
  notes: ''
