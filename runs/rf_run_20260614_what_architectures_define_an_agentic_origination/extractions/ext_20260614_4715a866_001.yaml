extracted_facts:
- evidence_id: ev_001
  text: LiteLLM's default and production-recommended routing strategy is the weighted simple-shuffle pick,
    which selects a deployment based on its configured requests-per-minute (rpm) or tokens-per-minute
    (tpm) weighting.
  locator: Advanced - Routing Strategies / Weighted Pick (Default)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The usage-based-routing-v2 strategy routes to the deployment with the lowest TPM usage for the
    current minute, using Redis in production to track TPM/RPM usage across multiple deployments.
  locator: Routing Strategies / Rate-Limit Aware v2 (ASYNC)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Latency-based routing picks the deployment with the lowest response time, while least-busy routing
    picks the deployment handling the fewest ongoing calls.
  locator: Routing Strategies / Latency-Based and Least-Busy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Cost-based routing selects, among healthy deployments under their rpm/tpm limits, the one with
    the lowest cost by checking each deployment's model against LiteLLM's cost map (defaulting unknown
    deployments to a $1 cost).
  locator: Routing Strategies / Lowest Cost Routing (Async)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: LiteLLM cooldowns let you cap how many times a deployment may fail within a minute before it is
    taken out of rotation (cooled down) for a minute.
  locator: Basic Reliability / Cooldowns
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: On retries, LiteLLM applies exponential backoff specifically for RateLimitError, while retrying
    immediately for generic errors.
  locator: Basic Reliability / Retries
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Deployments can be prioritized via an order parameter (lower = higher priority); the router exhausts
    higher-priority order levels in sequence before falling through to any configured cross-group fallbacks.
  locator: Basic Reliability / Deployment Ordering (Priority)
  confidence: medium
  quote_available: true
  notes: ''
