- evidence_id: ev_001
  text: CrewAI Flows is an event-driven feature for building structured, multi-step AI workflows that
    orchestrate CrewAI capabilities.
  locator: Overview
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The @start() decorator marks entry points, and all satisfied @start() methods execute (often in
    parallel) when the Flow begins or resumes.
  locator: '@start()'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A start can be unconditional, gated on a prior method or router label, or controlled by a callable
    condition.
  locator: '@start() — forms'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The @listen() decorator marks a method as a listener that runs automatically when the specified
    upstream task emits an output.
  locator: '@listen()'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The @router() decorator defines conditional routing logic based on a method's output, dynamically
    controlling which downstream routes execute.
  locator: Router (@router())
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: In unstructured state management, all state lives in the Flow's state attribute, allowing attributes
    to be added or modified on the fly without a strict schema.
  locator: Unstructured State Management
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Structured state management uses predefined Pydantic BaseModel schemas to enforce consistency,
    type safety, validation, and auto-completion across the workflow.
  locator: Structured State Management
  confidence: medium
  quote_available: true
