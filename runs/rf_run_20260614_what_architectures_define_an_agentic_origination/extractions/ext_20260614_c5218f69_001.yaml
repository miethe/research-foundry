- evidence_id: ev_002
  text: The supervisor manages a list of agents, where each agent can be a LangGraph CompiledStateGraph,
    a functional-API workflow, or any other Pregel object.
  locator: create_supervisor — Parameters table (agents)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: create_handoff_tool() creates a tool that hands off control to a named worker agent (the tool
    is named transfer_to_<agent_name> by default).
  locator: create_handoff_tool — page header / summary line
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: create_handoff_back_messages() builds an (AIMessage, ToolMessage) pair added to the message history
    when control returns from a worker to the supervisor, implementing the return-communication leg of
    delegation.
  locator: create_handoff_back_messages — page header / summary line
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: create_forward_message_tool() lets the supervisor forward a worker message by name rather than
    rewriting it, so the central supervisor mediates communication while avoiding information loss and
    token cost.
  locator: create_forward_message_tool — page header / summary lines
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: with_agent_name() attaches formatted agent-name tags to messages passed to and from the model
    so a multi-agent history stays coherent and the supervisor can track which agent a message belongs
    to.
  locator: with_agent_name — page header / summary lines
  confidence: medium
  quote_available: true
