extracted_facts:
- evidence_id: ev_001
  text: Anthropic defines workflows as systems where LLMs and tools are orchestrated through predefined
    code paths, and agents as systems where LLMs dynamically direct their own processes and tool usage.
  locator: 'Section: What are agents?'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The foundational building block of agentic systems is an 'augmented LLM' enhanced with retrieval,
    tools, and memory, which the model can actively use by generating its own queries, selecting tools,
    and deciding what to retain.
  locator: 'Section: Building block: The augmented LLM'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The routing workflow classifies an input and directs it to a specialized followup task, with classification
    handled either by an LLM or by a more traditional classification model/algorithm.
  locator: 'Section: Workflow: Routing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Anthropic gives a routing example of sending easy/common questions to smaller cost-efficient models
    like Claude Haiku and hard/unusual questions to more capable models like Claude Sonnet to optimize
    for cost and performance.
  locator: 'Section: Workflow: Routing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: In the orchestrator-workers workflow a central LLM dynamically breaks down tasks, delegates them
    to worker LLMs, and synthesizes results, with subtasks determined at runtime by the orchestrator rather
    than pre-defined (the key difference from parallelization).
  locator: 'Section: Workflow: Orchestrator-workers'
  confidence: medium
  quote_available: true
  notes: ''
