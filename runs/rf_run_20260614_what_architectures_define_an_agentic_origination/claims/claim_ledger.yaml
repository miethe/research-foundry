- claim_id: clm_inf01
  text: Across the surveyed systems the agentic origination layer converges on a three-stage pipeline
    (intent ingestion and normalization, route/dispatch decision, and a typed execution package handed
    to the target harness), with Bedrock's per-collaborator 'Collaboration instructions', the OpenAI Agents
    SDK's input_type schema, and Microsoft Agent Framework's declarative YAML each instantiating one stage
    of that same loop.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_075
    - clm_043
    - clm_021
    - clm_038
    reasoning_summary: Bedrock collaboration instructions drive the dispatch decision (clm_075), Anthropic
      routing classifies-then-directs (clm_024), Agents SDK handoffs route then hand the active turn to
      a specialist (clm_038), input_type provides the typed package (clm_043), and Agent Framework's YAML
      encodes the whole topology declaratively (clm_021); together they describe one ingest->route->package
      loop.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Rule-based routing is the most cost-predictable and lowest-latency strategy (deterministic, zero
    added model tokens, sub-millisecond decisions) but the least maintainable as intent variety grows;
    it is the correct default for the small, well-bounded route set of research-intent dispatch where
    intents fall into a handful of stable classes.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_022
    - clm_035
    - clm_024
    - clm_033
    reasoning_summary: Code-orchestrated/predefined paths are deterministic in speed and cost (clm_022,
      clm_035); LiteLLM's order/priority rules are deterministic config-driven dispatch (clm_033); Anthropic
      notes a traditional classification model/algorithm is a valid alternative to an LLM for routing
      (clm_024) — so a rules table adds no model cost and is predictable, at the cost of hand-maintained
      rules.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: LLM intent extraction offers the highest accuracy on novel or ambiguous research phrasing and
    the lowest maintenance burden (new intents need no new rules or training data), but it is the least
    cost-predictable and highest-latency option because every routing decision incurs a model generation
    that must itself be budgeted and capped.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_023
    - clm_024
    - clm_066
    - clm_025
    reasoning_summary: The augmented LLM can generate its own queries and select tools (clm_023) and Anthropic
      explicitly allows an LLM to perform routing classification (clm_024); Semantic Router's whole premise
      is that LLM generation for routing is slow and expensive (clm_066), and Anthropic's own model-tiering
      example (clm_025) shows routing cost is variable and must be managed — implying LLM extraction trades
      predictability for flexibility.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'An embedding/ML classifier (Semantic Router style) occupies the middle of the matrix: near-rule-based
    latency and cost-predictability (one cheap embedding call, no generation) with better generalization
    than hand-written rules, at the cost of needing labeled example utterances per route and periodic
    re-tuning, making it the strongest single-strategy choice once the research-intent route set exceeds
    what rules can cleanly cover.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_066
    - clm_067
    - clm_002
    - clm_024
    reasoning_summary: Semantic Router decides in vector space without LLM generation (clm_066) using
      named routes defined by example utterances (clm_067), claims millisecond decisions avoiding LLM
      inference (clm_002), and Anthropic classes this as the 'traditional classification model/algorithm'
      branch of routing (clm_024); the example-utterance requirement is the maintenance cost that places
      it between rules and LLM extraction.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: For Research Foundry's intent->control-plane->route loop the recommended design is a hybrid cascade
    — a deterministic rule table first, an embedding classifier (Semantic Router) for the unmatched residue,
    and LLM intent extraction only as a fallback for low-confidence cases — which preserves rule-based
    cost-predictability for the common case while reserving the expensive LLM decision for the genuinely
    ambiguous minority.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_025
    - clm_066
    - clm_033
    - clm_002
    reasoning_summary: Anthropic's routing pattern (clm_024, clm_025) and LiteLLM's ordered-priority-then-fallback
      model (clm_033) directly motivate a tiered cascade; Semantic Router's cheap millisecond decisions
      (clm_002, clm_066) make it the ideal middle tier so the LLM is invoked only on residue.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: The most direct mechanism to enforce a hard per-intent cost cap is to bind a model-profile selection
    rule (e.g. Haiku-class for common intents, Sonnet-class for hard ones) at the routing boundary, exactly
    mirroring LiteLLM's lowest-cost routing which only considers deployments already under their rpm/tpm
    limits — turning the budget ceiling into a precondition of dispatch rather than a post-hoc check.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_030
    - clm_028
    reasoning_summary: Anthropic ties routing directly to model-cost tiering (clm_025); LiteLLM's cost-based
      routing filters to deployments under rpm/tpm limits and picks lowest cost (clm_030), and usage-based-v2
      tracks per-minute TPM (clm_028) — composing these means a budget cap becomes an admission filter
      at the routing boundary.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'Token-cost predictability at the routing boundary requires bounding the input the routing decision
    itself sees, and the surveyed SDKs already supply the primitives: the OpenAI Agents SDK input_filter
    (and prebuilt handoff_filters that strip tool calls) and Bedrock Payload Referencing both cut the
    tokens that travel with a dispatch, so estimable cost depends on filtering history before, not after,
    the route is chosen.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_045
    - clm_049
    - clm_063
    reasoning_summary: input_filter prunes the conversation history the receiving agent sees (clm_045),
      Payload Referencing replaces embedded data with references to lower transfer/cost (clm_049), and
      create_forward_message_tool avoids rewrite token cost (clm_063) — all reduce the token volume crossing
      the routing boundary, which is what makes per-intent cost estimable.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: An execution-packet model (a serialized, schema-validated intent payload dispatched out-of-process)
    is more deterministic, isolated, and observable than an in-process Agent SDK call but adds serialization
    and process-spawn latency; it is the right dispatch mechanism when the target harness is a separate
    tool or must be sandboxed, whereas in-process SDK calls win when low latency and shared memory dominate.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_035
    - clm_043
    - clm_021
    - clm_077
    reasoning_summary: Code-orchestrated dispatch is more deterministic and predictable (clm_035); a locally-validated
      typed input schema (clm_043) and declarative YAML packages (clm_021) are the serialized-packet analogue,
      and Bedrock deploys via a discrete InvokeAgent request (clm_077) — a request boundary that buys
      isolation/observability at the cost of marshaling latency versus an in-process call.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: The CLI subprocess exec dispatch path maximizes isolation and harness-agnosticism (any external
    tool that exposes a command line) and yields the strongest observability via captured stdout/stderr
    and exit codes, but it is the slowest and least type-safe of the three mechanisms, so it best fits
    cross-tool dispatch to harnesses that have no native SDK rather than the hot path of high-frequency
    intra-platform routing.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: low
  sources: []
  inference_basis:
    from_claims:
    - clm_035
    - clm_077
