- text: Scope is restricted to amigurumi with single-crochet-like stitches and stuffed (not flattened)
    pieces; the authors state these restrictions are "too narrow for modeling intermediate or advanced
    patterns." Compute-vs-phone-budget framing is an inference from the paper's solver-cost note, not
    a stated benchmark.
