extracted_facts:
- evidence_id: ev_001
  text: The method takes a written crochet pattern as input, translates it into a graph, and produces
    a 3D model matching the hand-crocheted object's shape and size.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each stitch is a node in the pattern graph and the physical connections between stitches (sequential
    and working) are the edges.
  locator: Section 4 (graph construction, paragraph on stitch representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The force-directed layout is a non-linear least-squares optimization that minimizes two energy
    functions (edge length and local curvature).
  locator: Section 4.2 (The graph layout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The iterative linear solver is the dominant compute cost of the application, which the authors
    flag as a concern for general-audience usability.
  locator: Section 4.2 (discussion of lambda / solver cost)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The layout builds on the Isenburg et al. graph-inflation algorithm, which inflates a planar graph
    by assigning edge lengths and minimizing curvature to maximize volume.
  locator: Section 4.2 (implementation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The implementation solves the optimization with the Ceres Solver library, using a static blend
    weight lambda = 0.65 for most pieces.
  locator: Section 4.2 (implementation, lambda)
  confidence: medium
  quote_available: true
  notes: ''
