  text: Apple's on-device system foundation model supports a context window of up to 4,096 tokens per
    session instance.
  locator: Consider context size limits per session
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A single token maps to roughly three or four characters in English/Spanish/German, and one token
    per character in Japanese/Chinese/Korean.
  locator: Consider context size limits per session
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Instructions, all prompts, and all outputs jointly count against the single 4,096-token context
    window, so prompt plus response must fit within one budget.
  locator: Consider context size limits per session
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Data too large for a single context window must be split into smaller chunks, each processed in
