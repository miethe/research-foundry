extracted_facts:
- evidence_id: ev_001
  text: RAG output quality depends on how source documents are segmented before indexing, and fixed-length
    chunks can split concepts or add noise that reduces retrieval precision.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Naive equal-sized chunking dilutes meaning and surfaces incomplete or misleading information,
    lowering retrieval precision.
  locator: 1. Introduction (chunking paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Advanced chunking methods (semantic, proposition-based, adaptive) improve retrieval by organizing
    text around meaningful units rather than token counts.
  locator: 1. Introduction (chunking paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Adaptive chunking substantially outperformed the fixed-length baseline on retrieval metrics (precision
    0.50, recall 0.88, F1 0.64 vs 0.17, 0.40, 0.24).
  locator: Abstract / Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Fixed recursive character windowing performed worst, fragmenting coupled statements and duplicating
    content across overlapping windows, yielding the lowest scores.
  locator: 4. Discussion (Interpretation and Significance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The adaptive method's added preprocessing stayed computationally practical by reusing pre-computed
    sentence embeddings and applying a single linear boundary pass.
  locator: Strengths and Limitations
  confidence: medium
  quote_available: true
  notes: ''
