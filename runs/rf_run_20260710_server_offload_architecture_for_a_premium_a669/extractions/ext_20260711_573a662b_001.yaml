extracted_facts:
- evidence_id: ev_001
  text: Ray Serve runs long-running inference asynchronously via background task processing so HTTP APIs
    stay responsive while work runs in the background.
  locator: Asynchronous Inference (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: For workloads that exceed typical HTTP timeouts (e.g. video processing, large document indexing),
    the system enqueues work in a background queue and immediately returns a quick response.
  locator: Why asynchronous inference?
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Async task execution decouples request lifetime from compute time while still leveraging Serve's
    scalability.
  locator: Why asynchronous inference?
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A background worker (@task_consumer) is a Serve deployment that consumes and executes tasks pulled
    from a queue, independent of incoming HTTP requests.
  locator: Key concepts — @task_consumer
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Backpressure is controlled by max_ongoing_requests on the consumer deployment, capping how many
    tasks each replica processes simultaneously; failed tasks retry up to max_retries then route to a
    dead-letter queue.
  locator: Best practices / concurrency
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Clients poll for results rather than blocking: the API enqueues tasks via enqueue_task_sync and
    fetches status via get_task_status_sync.'
  locator: Example — status checking
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: A built-in AsyncInferenceAutoscalingPolicy polls the message broker for queue length and scales
    replicas to match demand from pending and in-flight requests.
  locator: Autoscaling
  confidence: medium
  quote_available: true
  notes: ''
extracted_definitions: []
extracted_metrics: []
contradictions_or_cautions:
- text: 'Ray Serve currently supports only synchronous handlers (an `async def` handler raises `NotImplementedError`);
    the "async" refers to decoupled request handling, not async task bodies. Terminology note: the framework
    uses `max_ongoing_requests` for concurrency capping (not a `max_queued_requests` knob). Docs track
    the "latest" (Ray 2.56.0) build; API names may shift across versions.'
  locator: card/limitations
