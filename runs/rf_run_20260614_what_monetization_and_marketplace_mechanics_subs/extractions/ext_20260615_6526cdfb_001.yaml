extracted_facts:
- evidence_id: ev_001
  text: Hard-paywall apps achieve a 12.11% median download-to-paid conversion versus just 2.18% for freemium
    apps, showing forced-commitment models convert downloads to payers at a far higher rate.
  locator: Download to Paid > By access (Hannah Parvaz commentary callout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Trials lasting 17-32 days have the highest median trial-to-paid conversion at 45.7%, indicating
    longer trials let users experience value and strengthen purchase intent.
  locator: Conversion > Trial to Paid > By duration
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The median app converts downloads to trial starts at 6.2%, while top-decile (P90) apps reach a
    20.3% trial-start rate, more than three times the median.
  locator: Conversion > Download to trial (Phil Carter commentary callout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: High-priced apps see a median download-to-trial conversion of 9.8% versus 4.3% for low-priced
    apps, suggesting buyers of expensive apps are more intent-driven.
  locator: Conversion > Download to trial > By price point
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The report's benchmarks draw on data from roughly 75,000 subscription apps and over $10B in tracked
    revenue across iOS and Android.
  locator: Report Preview > Methodology & Data
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Apps with higher price points see better Day 35 download-to-paid conversion, with a median of
    2.7% compared to 1.5% for low-priced apps.
  locator: Conversion > Download to Paid > By price point
  confidence: medium
  quote_available: true
  notes: ''
