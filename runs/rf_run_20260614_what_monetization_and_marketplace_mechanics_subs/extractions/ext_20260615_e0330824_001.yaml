extracted_facts:
- evidence_id: ev_001
  text: The App Store Small Business Program offers a reduced 15% commission rate on paid apps and In-App
    Purchases.
  locator: 'Section: How it works'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Existing developers who earned up to 1 million USD in proceeds in the prior calendar year, plus
    developers new to the App Store, qualify for the program and reduced commission.
  locator: 'Section: The basics'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Eligibility requires no more than 1 million USD in total proceeds (sales net of Apple's commission
    and certain taxes/adjustments) during the 12 fiscal months within the previous calendar year, and
    no more than 1 million USD during the current year, including Associated Developer Accounts.
  locator: 'Section: Proceeds eligibility'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: If a participating developer exceeds the 1 million USD threshold during the current calendar year,
    the standard commission rate applies to future sales.
  locator: 'Section: The basics'
  confidence: medium
  quote_available: true
  notes: ''
