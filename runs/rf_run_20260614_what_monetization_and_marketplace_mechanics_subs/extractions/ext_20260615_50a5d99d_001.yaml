- evidence_id: ev_001
  text: Ravelry runs as a profitable four-person company, indicating a lean operation rather than a venture-scaled
    marketplace.
  locator: Opening / lede paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Pattern-sales commission scales from free up to a capped $20/month based on monthly sales volume,
    designed to undercut e-Junkie and Payloadz.
  locator: 'Section: Pattern Sales'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Since inception over 1.3 million patterns had been sold through the platform, making pattern sales
    a meaningful income source.
  locator: 'Section: Pattern Sales'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Ravelry runs a custom in-house ad-serving system to serve its own ads and avoid paying any third-party
    fees or commissions.
  locator: 'Section: Advertising'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Advertising is a major revenue stream backed by roughly 180 million monthly page views and about
    1,500 active advertisers, half of whom spend under $15/month.
  locator: 'Section: Advertising'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Amazon affiliate book commissions of roughly 7-8% are part of Ravelry's diversified income.
  locator: 'Section: Amazon commissions'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: A paid 'Ravelry Extra' for forum image uploads is priced at $5/year, partly to cap usage and recoup
    storage/bandwidth costs.
  locator: 'Section: Extras'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Ravelry supplements income with voluntary user donations (since 2007) and an online shop selling
    branded and craft-related merchandise.
  locator: 'Section: Donations / Merchandise'
  confidence: medium
  quote_available: true
  notes: ''
