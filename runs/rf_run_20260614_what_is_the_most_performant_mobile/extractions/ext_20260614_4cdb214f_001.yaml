extracted_facts:
- evidence_id: ev_001
  text: Blending disables key overdraw-removal optimizations on Arm GPUs, specifically early ZS testing
    and Forward Pixel Kill (FPK), which is especially costly for UIs and 2D games with many sprite layers.
  locator: 'Section: The negative impact of inefficient blending'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each blended layer per pixel consumes GPU cycles regardless of shader simplicity, so the number
    of blended layers per pixel should be monitored and minimized.
  locator: 'Section: How to optimize blending (bullet on layer counts)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Splitting large UI elements into separate opaque and transparent portions lets early ZS or FPK
    remove the overdraw beneath the opaque parts that blending would otherwise prevent.
  locator: 'Section: How to optimize blending (bullet on splitting UI elements)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Blending and alpha-to-coverage should always be disabled for opaque objects to preserve overdraw-removal
    optimizations.
  locator: 'Section: How to optimize blending (bullet on opaque objects)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Blending is comparatively efficient on Arm GPUs because the destination color is held on-chip
    in the tile buffer, but unorm formats are preferred over floating-point and only simple FP16/R11G11B10
    blends are hardware-accelerated on Valhall.
  locator: 'Section: Blending (intro) / Optimized float blend modes'
  confidence: medium
  quote_available: true
  notes: ''
