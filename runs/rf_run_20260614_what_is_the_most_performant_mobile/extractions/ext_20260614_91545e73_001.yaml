extracted_facts:
- evidence_id: ev_001
  text: On an Nvidia RTX 3090, the system runs yarn-level simulation in 1.05 ms/frame and fiber-level
    rendering in 23.6 ms/frame.
  locator: Abstract / Performance summary
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The rendering pipeline reaches near-ground-truth quality while being ~120,000x faster than a path-traced
    fiber-level reference.
  locator: Abstract (final sentences)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The real-time method optimizes only ~100K yarn segments instead of the dense fiber geometry of
    the reference.
  locator: Results / geometry comparison
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The path-traced reference models contain 51M, 55M, and 61M fiber segments, illustrating the fiber-count
    gap the method avoids.
  locator: Results / reference geometry detail
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Knit geometry's intricate yarn-and-fiber structure (each yarn = plies of tens-to-hundreds of twisted
    fibers) is the core obstacle to real-time high-fidelity knit rendering.
  locator: Abstract (problem statement)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'INFERENCE: The pipeline is desktop-GPU-only (all timings on an RTX 3090, no mobile/low-power
    numbers reported), indicating full yarn/fiber detail is out of mid-range-phone budget and approximate
    stitch-graph meshes are the mobile-viable path.'
  locator: Inference from reported hardware/benchmarks (no mobile data in source)
  confidence: medium
  quote_available: false
  notes: ''
