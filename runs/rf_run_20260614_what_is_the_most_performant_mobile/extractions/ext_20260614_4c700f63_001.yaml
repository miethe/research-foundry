extracted_facts:
- evidence_id: ev_001
  text: Collapsing many objects into fewer, larger draw calls generally improves performance; e.g. paint
    1000 sprites with a single drawArrays() or drawElements() call.
  locator: Batch draw calls
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Drawing from static, unchanging VAOs is faster than mutating a VAO per draw because browsers can
    cache fetch limits for unchanged VAOs but must revalidate and recalculate limits when VAOs change.
  locator: Avoid changing VAO attachments (vertexAttribPointer, disable/enableVertexAttribArray)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Almost any change to a framebuffer object's attachment bindings invalidates its framebuffer completeness,
    so hot framebuffers should be set up ahead of time.
  locator: Avoid invalidating FBO attachment bindings
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Delete GPU objects eagerly rather than waiting for the garbage collector, because at the API level
    'deleting' only releases the handle that refers to the underlying object, which is freed only once
    unused in the implementation.
  locator: Delete objects eagerly
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Texture atlasing (packing multiple images into one texture) and degenerate triangles (zero-area
    triangles that get skipped) let discontinuous geometry stay in a single drawArrays(TRIANGLE_STRIP)
    batch.
  locator: Batch draw calls
  confidence: medium
  quote_available: true
  notes: ''
