extracted_facts:
- evidence_id: ev_001
  text: BatchedMesh is a multi-draw batch-rendering mesh for many objects sharing one material but differing
    geometries or transforms, reducing draw calls to improve rendering performance.
  locator: Class overview (intro paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: setColorAt assigns a per-instance color (a Vector4 can be used to define alpha) and getColorAt
    reads it back, enabling per-instance tinting such as per-stitch or per-round highlights.
  locator: 'Methods: .setColorAt() / .getColorAt()'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: setMatrixAt sets a per-instance local transformation matrix, but negatively scaled matrices are
    not supported.
  locator: 'Methods: .setMatrixAt()'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Per-object frustum culling and object sorting both default to true, with transparent materials
    sorted back-to-front and opaque ones front-to-back to reduce overdraw artifacts.
  locator: 'Properties: .perObjectFrustumCulled / .sortObjects'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The constructor fixes capacity via maxInstanceCount (max instances) and maxVertexCount (max vertices
    across all unique geometries).
  locator: 'Constructor parameters: maxInstanceCount / maxVertexCount'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Buffers can be resized after construction via setInstanceCount and setGeometrySize, instances
    removed with deleteInstance, and optimize repacks sub-geometries to reclaim space left by deletions.
  locator: 'Methods: .setInstanceCount() / .setGeometrySize() / .optimize() / .deleteInstance()'
  confidence: medium
  quote_available: true
  notes: ''
