extracted_facts:
- evidence_id: ev_001
  text: Adreno uses FlexRender to switch mid-frame between binning/GMEM mode and direct/system-memory
    mode, so developers should optimize for both.
  locator: Tile-based Rendering (Feature Summary) / FlexRender bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The FlexRender driver heuristics are not developer-exposed, but high vertex-shader texture sampling,
    few vertices/draws, or tessellation/geometry shaders tend to trigger direct (non-tiled) mode.
  locator: FlexRender technology (Hybrid Deferred and Direct Rendering mode)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A properly structured renderpass lets the GPU run the full subpass chain per-tile, avoiding resolves
    to system memory after each pass, with gains of over 10% frametime.
  locator: Renderer Architecture > Render Pass (subpass merging)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: For images/buffers that fit tile-memory constraints and are reused across render passes (as in
    deferred rendering), VK_QCOM_tile_memory_heap allocates them on GMEM to stay resident as long as possible,
    saving bandwidth.
  locator: Tile Shading Vulkan Extensions > VK_QCOM_tile_memory_heap
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Invalidating framebuffer contents as early as possible prevents the driver from wastefully resolving
    GMEM render-target memory to system memory.
  locator: Renderer Architecture > Render Pass (framebuffer invalidation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Qualcomm advises minimizing render passes by combining consecutive passes that use the same formatted
    color buffer, which is critical to maximizing GMEM benefit from the tile shading extensions.
  locator: Renderer Architecture > Render Pass (minimize render passes)
  confidence: medium
  quote_available: true
  notes: ''
