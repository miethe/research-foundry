extracted_facts:
- evidence_id: ev_001
  text: MAESTRO is a threat modeling framework designed specifically for Agentic AI, standing for Multi-Agent
    Environment, Security, Threat, Risk, and Outcome.
  locator: Introduction / framework definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: MAESTRO is built on a seven-layer reference architecture authored by Ken Huang to address risks
    at a granular level.
  locator: Seven-Layer Reference Architecture
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Layer 6, Security and Compliance, is an explicit vertical layer that cuts across all other layers
    to integrate security controls throughout AI agent operations.
  locator: Layer 6 — Security and Compliance (Vertical Layer)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Layer 7 threats include Agent Identity Attack, compromising identity/authorization mechanisms
    of AI agents and resulting in unauthorized access and control of the agent.
  locator: Layer 7 — Agent Ecosystem (threats)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Layer 7 threats include Agent Impersonation, where malicious actors deceive users or other agents
    by impersonating legitimate AI agents.
  locator: Layer 7 — Agent Ecosystem (threats)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Layer 4 threats include Privilege Escalation, where an agent or attacker gains unauthorized privileges
    in one layer and uses it to access or manipulate others.
  locator: Layer 4 — Deployment and Infrastructure (threats)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Recommended mitigations for multi-agent systems include secure communication protocols, mutual
    authentication, and input validation.
  locator: Mitigations / Cross-Cutting Considerations
  confidence: medium
  quote_available: true
  notes: ''
