extracted_facts:
- evidence_id: ev_001
  text: OWASP defines Excessive Agency as the vulnerability that enables damaging actions in response
    to unexpected, ambiguous, or manipulated LLM outputs, regardless of the cause of the malfunction.
  locator: Description / definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'OWASP attributes Excessive Agency to three root causes: excessive functionality, excessive permissions,
    and excessive autonomy.'
  locator: Common Examples of Risk / root causes
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_003
  text: OWASP recommends limiting the permissions that LLM extensions are granted to downstream systems
    to the minimum necessary to bound the scope of undesirable actions.
  locator: Prevention and Mitigation Strategies — minimize permissions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: OWASP recommends tracking user authorization and security scope so that actions on downstream
    systems execute in that specific user's context with minimum privileges.
  locator: Prevention and Mitigation Strategies — execute in user context
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: OWASP advises avoiding open-ended extensions such as run-a-shell-command or fetch-a-URL in favor
    of more granular, purpose-specific functionality.
  locator: Prevention and Mitigation Strategies — avoid open-ended extensions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: OWASP recommends human-in-the-loop control requiring a human to approve high-impact actions before
    they are taken.
  locator: Prevention and Mitigation Strategies — human-in-the-loop
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: OWASP gives OAuth with minimum scope as the example pattern for an extension that reads a user's
    code repository.
  locator: Prevention and Mitigation Strategies — OAuth minimum scope
  confidence: medium
  quote_available: true
  notes: ''
