extracted_facts:
- evidence_id: ev_001
  text: Each dynamic database credential is bound to a lease with an explicit TTL and a structured lease
    ID; the example shows a 768h lease_duration with lease_id format database/creds/readonly/<unique-id>.
  locator: Renew leases (lease detail output)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'A dynamic credential''s validity is governed by its lease: it remains valid for the lease TTL,
    can be renewed up to a maximum TTL, or persists until revoked.'
  locator: Renew leases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Leases are renewed before expiry by passing the lease ID to `vault lease renew`, which resets
    the credential's TTL (example renewed to 1h).
  locator: Renew leases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A single lease can be revoked immediately by its lease ID without waiting for expiration, using
    `vault lease revoke <lease_id>`.
  locator: Revoke leases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Multiple leases can be revoked at once using the -prefix flag, which matches all valid leases
    sharing a path prefix (e.g., database/creds/readonly).
  locator: Revoke leases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Once a lease is revoked the underlying credential is immediately invalidated and no longer usable.
  locator: Renew leases / Revoke leases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: After revocation the lease ceases to exist as a valid lease and disappears from the lease listing,
    confirming immediate invalidation.
  locator: Revoke leases
  confidence: medium
  quote_available: true
  notes: ''
