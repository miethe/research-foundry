extracted_facts:
- evidence_id: ev_001
  text: MCP servers must validate that access tokens were issued specifically for them as the intended
    audience per RFC 8707 Section 2, and invalid or expired tokens must receive an HTTP 401 response.
  locator: 'Section: Access Token Usage > Token Handling'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: If an MCP server makes requests to upstream APIs, it must not pass through the token received
    from the MCP client; the upstream token must be a separate token issued by the upstream authorization
    server.
  locator: 'Section: Security Considerations > Access Token Privilege Restriction'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: MCP clients must implement RFC 8707 Resource Indicators via the resource parameter, including
    it in both authorization and token requests and identifying the canonical URI of the target MCP server.
  locator: 'Section: Resource Parameter Implementation'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: MCP servers must only accept tokens specifically intended for themselves and must reject tokens
    that do not include them in the audience claim.
  locator: 'Section: Security Considerations > Access Token Privilege Restriction'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Authorization servers should issue short-lived access tokens to reduce leaked-token impact, and
    for public clients they must rotate refresh tokens per OAuth 2.1 Section 4.3.1.
  locator: 'Section: Security Considerations > Token Theft'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Implementations using an STDIO transport should not follow this authorization specification and
    instead retrieve credentials from the environment.
  locator: 'Section: Introduction > Protocol Requirements'
  confidence: medium
  quote_available: true
  notes: ''
