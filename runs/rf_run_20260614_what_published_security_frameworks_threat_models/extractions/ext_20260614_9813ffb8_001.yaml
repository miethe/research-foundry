extracted_facts:
- evidence_id: ev_001
  text: OWASP defines LLM02:2025 sensitive information as spanning PII, financial details, health records,
    confidential business data, security credentials, and legal documents.
  locator: Description / intro paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: OWASP states LLMs embedded in applications risk exposing sensitive data, proprietary algorithms,
    or confidential details through their output, leading to unauthorized data access, privacy violations,
    and IP breaches.
  locator: Description / risk statement
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'PII leakage is listed as a common vulnerability: PII may be disclosed during interactions with
    the LLM.'
  locator: Common Examples of Vulnerability — PII Leakage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: OWASP cites the Proof Pudding attack (CVE-2019-20634) as an example where revealing training data
    exposes models to inversion attacks.
  locator: Common Examples of Vulnerability — Proprietary Algorithm Exposure
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: OWASP recommends limiting model access to external data sources and securely managing runtime
    data orchestration, the closest mitigation addressing multi-source data chaining risk.
  locator: Prevention and Mitigation Strategies — Access Controls
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: OWASP maps LLM02:2025 to MITRE ATLAS techniques for training-data membership inference and model
    inversion/extraction (AML.T0024.000/.001/.002).
  locator: Related Frameworks and Taxonomies — MITRE ATLAS mappings
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: OWASP's lead mitigation is data sanitization to prevent user data from entering the training model,
    plus strict input validation to filter sensitive inputs.
  locator: Prevention and Mitigation Strategies — Sanitization
  confidence: medium
  quote_available: true
  notes: ''
