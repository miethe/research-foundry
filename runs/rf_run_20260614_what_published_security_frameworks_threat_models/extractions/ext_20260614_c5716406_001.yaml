extracted_facts:
- evidence_id: ev_001
  text: 'Token passthrough is explicitly forbidden: an MCP server must not accept tokens that were not
    issued for the MCP server itself.'
  locator: Token Passthrough > Mitigation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The confused-deputy attack requires four concurrent conditions: a static client ID to the third-party
    AS, dynamic client registration, a consent cookie set by the third-party AS, and absence of per-client
    consent before forwarding.'
  locator: Confused Deputy Problem > Vulnerable Conditions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: MCP proxy servers must maintain a per-user registry of approved client_id values and check it
    before initiating the third-party authorization flow (per-client consent before forwarding).
  locator: Confused Deputy Problem > Mitigation > Required Protections > Per-Client Consent Storage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The spec prescribes a progressive least-privilege scope model starting from a minimal set (e.g.
    mcp:tools-basic) elevated incrementally via WWW-Authenticate scope challenges, and lists wildcard/omnibus
    scopes (*, all, full-access) as a common mistake to avoid.
  locator: Scope Minimization > Mitigation and Common Mistakes
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Token passthrough risks named by the spec include security-control circumvention, broken audit
    trails/accountability, and trust-boundary violations enabling lateral access if one service is compromised.
  locator: Token Passthrough > Risks
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Local MCP servers should run sandboxed with minimal default privileges and restricted file-system/network
    access; local HTTP-transport servers should require an authorization token or use unix domain sockets
    / IPC with restricted access.
  locator: Local MCP Server Compromise > Mitigation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: For locally-run MCP servers using an HTTP transport, the spec recommends requiring an authorization
    token or using unix domain sockets / other IPC mechanisms with restricted access.
  locator: Local MCP Server Compromise > Mitigation (transport hardening)
  confidence: medium
  quote_available: true
  notes: ''
