extracted_facts:
- evidence_id: ev_001
  text: A SPIFFE Verifiable Identity Document (SVID) is the document with which a workload proves its
    identity to a resource or caller, encoding a single SPIFFE ID.
  locator: 'Section: SPIFFE Verifiable Identity Document (SVID)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'An SVID encodes the SPIFFE ID in a cryptographically-verifiable document in one of two supported
    formats: an X.509 certificate (X509-SVID) or a JWT token (JWT-SVID).'
  locator: 'Section: SPIFFE Verifiable Identity Document (SVID)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because JWT tokens are susceptible to replay attacks that let an interceptor impersonate a workload,
    SPIFFE advises using X.509-SVIDs whenever possible.
  locator: 'Section: SPIFFE Verifiable Identity Document (SVID)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The Workload API issues identity to a workload without requiring the workload to know its own
    identity or present any authentication token when it calls the API.
  locator: 'Section: SPIFFE Workload API'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Because the Workload API issues identity at runtime without prior credentials, applications need
    not co-deploy any authentication secrets alongside the workload, eliminating static secrets.
  locator: 'Section: SPIFFE Workload API'
  confidence: medium
  quote_available: true
  notes: ''
