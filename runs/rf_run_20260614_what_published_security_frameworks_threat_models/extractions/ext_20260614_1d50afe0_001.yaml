extracted_facts:
- evidence_id: ev_001
  text: This document is the first guide from the OWASP Agentic Security Initiative (ASI), providing a
    threat-model-based reference of emerging agentic threats and their mitigations.
  locator: Introduction (Page 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: OWASP frames agentic AI capabilities around LLM-based reasoning/planning, memory that can be session-based
    short-term or persistent long-term, and action via tool use (including MCP-connected external tools).
  locator: AI Agents > Core Capabilities (Pages 4-6)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: OWASP defines the Confused Deputy vulnerability as an AI agent with higher privileges than the
    user being tricked into performing unauthorized actions on the user's behalf when it lacks privilege
    isolation.
  locator: Agentic AI Threat Model > Reference threat model narrative (Pages 13-14)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: OWASP threat T3 'Privilege Compromise' describes attackers exploiting weaknesses in permission
    management - often via dynamic role inheritance or misconfigurations - to perform unauthorized actions.
  locator: Agentic AI Threat Model > Detailed Threat Model table, T3 Privilege Compromise (Pages 17-18)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: OWASP recommends clear identity flows, strict RBAC, and a zero-trust model for agent access to
    enterprise environments to counter implicit privilege escalation and tool-chaining data breaches.
  locator: Agentic AI Threat Model narrative (Page 14)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Among authentication/identity mitigations, OWASP advises limiting AI credential persistence so
    that AI-generated credentials are temporary and expire after short timeframes.
  locator: 'Mitigation Strategies > Playbook 4: Strengthening Authentication, Identity & Privilege Controls
    (Page 40)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: OWASP recommends granular RBAC and ABAC and blocking cross-agent privilege delegation unless explicitly
    authorized through predefined workflows.
  locator: Mitigation Strategies > Playbook 4, Step 1 (Page 40)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: To isolate agent context, OWASP advises segmenting memory access using session isolation so the
    AI does not carry over unintended knowledge across different user sessions.
  locator: 'Mitigation Strategies > Playbook 2: Memory mitigations (Page ~37)'
  confidence: medium
  quote_available: true
  notes: ''
