- claim_id: clm_inf01
  text: 'RF''s four-profile model (personal | work_approved | client_approved | offline_only) is functionally
    a file-first analogue of Vault Enterprise namespaces: each profile should behave as an isolated credential
    environment where a personal-profile task cannot see or reuse work/client keys, mirroring the namespace
    property that signing into one namespace gives zero visibility into others.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_057
    - clm_058
    - clm_059
    - clm_060
    reasoning_summary: Vault namespaces isolate tokens/policies/secrets per tenant with no cross-namespace
      visibility (clm_057-060); RF's four profiles are the same isolation primitive realized as separate
      per-profile .env scopes, so the namespace 'no cross-visibility / per-namespace token' property is
      the design target RF must meet to count as isolated.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Because Vault namespaces are a paid Enterprise/HCP feature requiring a long-running server (clm_062)
    while RF is daemonless and file-first, RF cannot inherit Vault's runtime broker/revocation guarantees
    and must instead enforce isolation at load time through process-level env scoping plus a policy gate,
    accepting weaker live-revocation than a server-backed broker.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_009
    - clm_010
    - clm_012
    - clm_062
    reasoning_summary: Vault's TTL/lease and instant revoke-by-id semantics (clm_009/010/012) depend on
      a running server; namespaces require a paid license (clm_062). A daemonless file-first RF has no
      always-on process to revoke or expire a leaked key mid-run, so its enforcement must be at credential-load/env-construction
      time, a structurally weaker but still meaningful boundary.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Cross-profile leakage vector #1 (environment-variable bleed): a personal-profile task can acquire
    work/client keys whenever a parent process exports all profiles'' keys into a shared environment;
    the MCP authorization spec''s STDIO rule that servers retrieve credentials ''from the environment''
    (clm_036) makes this the highest-risk default path in a daemonless model, and RF must construct a
    minimal per-profile env containing only that profile''s keys rather than inheriting the operator''s
    full shell environment.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_036
    - clm_055
    - clm_026
    reasoning_summary: MCP STDIO servers read credentials straight from the process environment (clm_036);
      AML.T0055 covers finding insecurely stored credentials (clm_055); per-agent credential binding forbids
      shared accounts (clm_026). Together these imply that a shared inherited env is the dominant daemonless
      leakage path and per-profile env construction is the control.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'Cross-profile leakage vector #2 (subagent / tool-credential inheritance): when an RF orchestrator
    spawns subagents or MCP tools, a personal-profile subagent that inherits the parent''s tool credentials
    maps directly to MITRE ATLAS AML.T0098 (AI Agent Tool Credential Harvesting) and AML.T0083 (Credentials
    from AI Agent Configuration), so RF must re-derive a profile-scoped credential set at each spawn boundary
    rather than passing the parent''s credentials down.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_052
    - clm_054
    - clm_026
    - clm_008
    reasoning_summary: AML.T0083/T0098 (clm_052/054) describe harvesting credentials from agent config
      and agent tools; per-agent credential binding (clm_026) and session isolation of memory (clm_008)
      prescribe not carrying credentials/context across boundaries. The conclusion that subagent inheritance
      is a named, mitigable vector follows directly.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'Cross-profile leakage vector #3 (log / telemetry capture): because OWASP classifies security
    credentials as sensitive information that LLM applications can expose through output (clm_037, clm_038),
    RF''s profile-tagged telemetry (run_trace.jsonl) is itself a leakage surface, and RF must redact/fingerprint
    keys before they enter telemetry rather than logging raw key material or raw tool I/O.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_037
    - clm_038
    - clm_039
    reasoning_summary: OWASP LLM02 names security credentials among sensitive data classes (clm_037) that
      applications expose via output and that leak during interaction (clm_038/039). RF writes telemetry;
      therefore raw-key logging is a leakage vector and redaction/fingerprinting is the mitigation.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Cross-profile leakage vector #4 (prompt-injection exfiltration / confused deputy): an over-privileged
    RF orchestrator holding multiple profiles'' keys is the textbook OWASP Confused Deputy (clm_003) and
    Excessive Agency (clm_044) case, where a manipulated prompt in a personal task induces the agent to
    emit work/client keys; the controlling mitigation is to never load more than one profile''s keys into
    a single reasoning context, bounding the blast radius to a single profile.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_003
    - clm_044
    - clm_045
    - clm_046
    reasoning_summary: Confused Deputy (clm_003) and Excessive Agency (clm_044) with root cause excessive
      permissions (clm_045) describe exactly an over-privileged agent tricked into unauthorized action;
      minimizing permissions (clm_046) implies loading only one profile's keys per context as the bound.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'Cross-profile leakage vector #5 (scope creep / cache and key reuse over time): MCP02:2025 scope
    creep (clm_024) maps onto RF as a profile''s key set silently broadening through reuse or copied .env
    files until offline_only or personal effectively holds work/client keys; the controlling mitigation
    is periodic entitlement/drift audits (clm_029) over the per-profile key manifests with alerting on
    any key appearing under more than one profile.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_029
    - clm_026
    reasoning_summary: Scope creep (clm_024) is permission expansion via drift; drift-detection audits
      (clm_029) and per-agent binding with no shared accounts (clm_026) are the prescribed controls. Applied
      to RF profiles this yields the 'same key under two profiles' drift vector and a manifest-audit mitigation.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: 'Cross-profile leakage vector #6 (token passthrough / lateral movement across profiles): the MCP
    spec''s hard prohibition on token passthrough (clm_064) and its warning that a token accepted by multiple
    services lets a single compromise reach all of them (clm_068) translate directly to RF — a credential
    valid across multiple profiles is a passthrough token, so each profile''s keys must be audience-bound
    to that profile and rejected if presented under another.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_064
    - clm_068
    - clm_032
    - clm_034
    reasoning_summary: MCP forbids passthrough (clm_064/032), requires audience-bound tokens (clm_034),
      and warns multi-service tokens enable lateral access (clm_068). A key usable under more than one
      RF profile is precisely a passthrough/multi-audience token, so profile-binding is the analogue control.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: Across the six leakage vectors, the failure modes cluster into three families — (a) ambient inheritance
    (env bleed, subagent inheritance), (b) observability capture (log/telemetry, prompt echo), and (c)
    temporal/scope drift (scope creep, cross-profile token reuse) — and a single control, 'construct a
    minimal single-profile credential context at every process/spawn boundary and never persist it to
    a shared surface,' addresses family (a) and most of (b).
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_036
    - clm_052
    - clm_037
    - clm_024
    - clm_026
    - clm_008
    reasoning_summary: Grouping the vectors derived in clm_inf03-inf08 by mechanism (inheritance vs capture
      vs drift) and noting that per-agent binding (clm_026) plus session isolation (clm_008) plus minimal
      env construction (clm_036) collapse the inheritance/capture families into one engineering control.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: 'Mapping RF''s four profiles against three published frameworks: (1) Vault namespaces validate
    the isolation goal (per-profile token, no cross-visibility, clm_057-060) but RF lacks the server-backed
    revocation; (2) MCP authorization validates audience-binding and short-lived-token guidance (clm_031,
    clm_034, clm_035) that RF only partially meets because file-based keys are typically long-lived; (3)
    SPIFFE sets the aspirational bar of zero static secrets via runtime-issued SVIDs (clm_074, clm_075)
    that a file-first .env model structurally cannot reach without a broker.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_057
    - clm_059
    - clm_031
    - clm_034
    - clm_035
    - clm_074
    - clm_075
    reasoning_summary: 'Direct side-by-side: Vault namespace isolation (clm_057/059) = goal met conceptually;
      MCP audience-binding + short-lived tokens (clm_031/034/035) = partially met since .env keys are
      static; SPIFFE no-static-secrets (clm_074/075) = unmet by a file model. This is the required >=3-framework
      mapping with gaps labeled.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf11
  text: 'The single largest gap between RF''s file-first model and every server-backed framework is credential
    lifetime: Vault leases (clm_010), MCP short-lived access tokens (clm_035), OWASP''s ''limit AI credential
    persistence'' (clm_006), and SPIFFE runtime-issued SVIDs (clm_075) all assume ephemeral credentials,
    whereas a static per-profile .env key is long-lived by default, so RF''s compensating control must
    be rotation cadence and revocation tooling rather than TTL expiry.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_010
    - clm_035
    - clm_006
    - clm_075
    reasoning_summary: Four independent frameworks (clm_010, clm_035, clm_006, clm_075) converge on ephemeral
      credentials as the norm; a file .env key is static, so the gap is lifetime and the only file-first
      compensations are operator-driven rotation and an explicit revoke path.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf12
  text: 'Concrete tightening #1 (one-profile-per-process env construction): RF should never inherit the
    operator''s ambient shell environment; instead each run loads exactly one profile''s keys into a freshly
    constructed, minimal environment and strips all others, operationalizing OWASP per-user/least-privilege
    execution context (clm_047) and MCP scope minimization (clm_067) and directly closing the env-bleed
    and subagent-inheritance vectors.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_047
    - clm_067
    - clm_046
    - clm_026
    reasoning_summary: OWASP execute-in-user-context with minimum privileges (clm_047), MCP scope minimization
      (clm_067), minimize extension permissions (clm_046), and per-agent binding (clm_026) jointly justify
      constructing a single-profile minimal env per run as a concrete, named control.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf13
  text: 'Concrete tightening #2 (key fingerprinting + profile-tagged telemetry for after-the-fact proof):
    RF should record a non-reversible fingerprint (e.g., salted hash prefix) of each key tagged with the
    profile it was loaded under, never the raw key, so that run_trace telemetry can later prove which
    profile''s credentials a run touched and flag any run where a key fingerprint appears under a profile
    it does not belong to — combining OWASP entitlement/drift auditing (clm_029) with MCP audit-trail
    integrity (clm_068) without writing sensitive data (clm_037).'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_029
    - clm_068
    - clm_037
    - clm_059
    reasoning_summary: Entitlement/drift audit (clm_029) and audit-trail integrity (clm_068) require detection
      signals; OWASP names credentials as sensitive (clm_037) so fingerprints not raw keys; per-namespace
      token binding (clm_059) gives the 'wrong-profile key' alarm condition. The fingerprint-in-telemetry
      control follows.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf14
  text: 'Concrete tightening #3 (file-first revocation/rotation playbook substituting for Vault leases):
    since RF cannot revoke a leaked key mid-run, it should ship a documented per-profile revocation runbook
    and a key-manifest that records issue date and required rotation interval, approximating Vault''s
    revoke-by-id and lease-TTL semantics (clm_011, clm_012, clm_014) at human cadence and satisfying OWASP''s
    short-credential-persistence guidance (clm_006) for a daemonless system.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_011
    - clm_012
    - clm_014
    - clm_006
    reasoning_summary: Vault renew/revoke/invalidate (clm_011/012/014) and OWASP credential-persistence
      limits (clm_006) define the ephemeral-credential ideal; with no daemon, RF can only approximate
      it via a documented rotation interval + manual revoke runbook tracked in a manifest.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf15
  text: 'Concrete tightening #4 (human-in-the-loop gate on cross-profile elevation): any RF action that
    would load a second profile''s keys, or promote a task from offline_only/personal to work_approved/client_approved,
    should require an explicit human approval, applying OWASP human-in-the-loop for high-impact actions
    (clm_049) and MCP/OWASP separation of grant-vs-deploy authority (clm_030) to the one operation that
    breaks the isolation boundary.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_049
    - clm_030
    - clm_007
    reasoning_summary: OWASP HITL for high-impact actions (clm_049), separation of duties / approval for
      non-routine grants (clm_030), and blocking cross-agent privilege delegation unless explicitly authorized
      (clm_007) directly justify a human gate on cross-profile elevation as the highest-risk privilege
      change.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf16
  text: For the single-operator threat model (one person legitimately holding personal + work + client
    key sets at once), the dominant residual risk is not external theft but accidental same-context co-loading
    and prompt-injection-driven cross-profile echo, so RF's offline_only profile should be the default
    and the system should treat 'which profile am I in' as an explicit, single-valued, logged run parameter
    rather than an implicit ambient state.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_044
    - clm_003
    - clm_008
    - clm_036
    reasoning_summary: For a legitimate multi-key operator the confused-deputy/excessive-agency (clm_003/044)
      and ambient-env (clm_036) risks dominate over theft; session isolation (clm_008) implies making
      the active profile an explicit single-valued logged parameter and defaulting to offline_only.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf17
  text: RF's offline_only profile is the strongest isolation guarantee in the model because a profile
    that holds no live API keys is immune to all six credential-leakage vectors by construction, making
    'route to offline_only unless a network-key is provably required' a high-value default decision rule
    that no server-backed framework offers as cleanly.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_046
    - clm_045
    - clm_059
    reasoning_summary: Minimizing permissions/functionality (clm_045/046) and per-scope binding (clm_059)
      imply that a profile with zero credentials has zero leakage surface; thus defaulting to offline_only
      is a leakage-eliminating rule unique to a file-first design that can simply withhold keys.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_spec01
  text: As MITRE ATLAS continues adding AI-agent-specific credential techniques (it already added AML.T0083/T0098
    for agent-config and agent-tool harvesting, clm_052/054), file-first per-profile .env models like
    RF's will likely become an explicitly named anti-pattern within 1-2 framework revisions unless they
    add fingerprint-based audit trails, because a plaintext multi-profile key store on disk is the canonical
    AML.T0055 'unsecured credentials' target.
  materiality: material
  claim_type: prediction
  status: speculation
  confidence: low
  sources: []
  inference_basis:
    from_claims: []
    reasoning_summary: Forward-looking projection from the observed trajectory of ATLAS adding agent-specific
      credential techniques (clm_052/054/055); the timeline and 'named anti-pattern' outcome are uncertain
      and not directly evidenced.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_spec02
  text: If RF later needs the ephemeral-credential guarantees the file model cannot provide, the lowest-friction
    upgrade path is a thin local credential-broker shim that speaks the SPIFFE Workload API pattern (runtime-issued,
    no co-deployed secrets, clm_074/075) and exposes per-profile short-lived tokens, rather than adopting
    full Vault Enterprise namespaces (clm_062) whose licensing and always-on daemon contradict RF's daemonless
    design.
  materiality: material
  claim_type: prediction
  status: speculation
  confidence: low
  sources: []
  inference_basis:
    from_claims: []
    reasoning_summary: 'Speculative architectural recommendation: SPIFFE''s no-static-secret runtime issuance
      (clm_074/075) is conceptually closer to a daemonless shim than paid always-on Vault namespaces (clm_062),
      but whether such a shim is feasible/worthwhile for RF is unproven and forward-looking.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf18
  text: 'Research Foundry (RF) is a daemonless, file-first control plane whose key-governance model defines
    four credential profiles: personal, work_approved, client_approved, and offline_only — the project-context
    premise that the cross-framework isolation analysis in this report is built on.'
  materiality: material
  claim_type: factual
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_057
    - clm_059
    - clm_060
    reasoning_summary: The four-profile isolation model is reasoned as the file-first design target that
      mirrors Vault Enterprise namespace isolation (clm_057 each namespace is an isolated environment;
      clm_059 per-namespace tokens prevent cross-namespace credential reuse; clm_060 each namespace keeps
      independent policies/auth/tokens), so RF's per-profile credential scoping follows from those supported
      isolation properties. It carries no external source card because it describes the system under study
      (RF) from project context rather than a cited published framework, and is labeled inference per
      the report's claim policy as the project-context premise every downstream comparison (clm_inf01-clm_inf17,
      clm_spec01/02) presupposes.
  report_locations: []
  reviewer_notes: 'Added during adversarial publish audit: the executive-summary sentence describing RF
    was the only material prose line lacking a claim tag; this premise claim closes that gap.'
