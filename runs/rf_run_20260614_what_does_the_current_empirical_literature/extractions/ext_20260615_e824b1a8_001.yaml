extracted_facts:
- evidence_id: ev_001
  text: On the 4-way instruction-selection task, weaker VLMs sit near the 25% chance level (BLIP-2 0.2562,
    Gemma 3 0.2494) while top open-source Qwen2-VL reaches 0.4196 and GPT-4o leads at 0.5811.
  locator: Table 4 / Section 3.2 Results (Instruction Selection, 4-way multiple choice)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: At step-level DSL compilation, Claude achieves the highest valid (compilation success) rate at
    52.1%, with DeepSeek-VL and Qwen2-VL the strongest open-source models.
  locator: Section 3.4.1 / Table 6 (Step-level DSL compilation, Task D, 119 examples)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: At project-level compilation, open-source Qwen2-VL leads with a 21.0% valid rate and strong partial-executable
    rate, surpassing all closed-source systems.
  locator: Section 3.4.2 Results / Table 7 (Project-level verification, 100 examples)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The two model families fail differently: open models commit syntax errors such as undefined stitches
    and malformed brackets, while closed models emit syntactically valid but semantically inconsistent
    programs.'
  locator: Section 4 Discussion (failure-mode analysis); Table 8 project-level error distribution
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors conclude that gains on this task may come from architecture or training that captures
    long-range dependencies and stateful operations, not from raw scaling.
  locator: Section 4 Discussion (concluding paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Instruction-generation absolute scores are uniformly low, with the best model (Gemini 2.5 Flash-Lite)
    scoring BLEU 0.0482, ROUGE-L 0.2583, and ChrF 30.20.
  locator: Table 5 (Instruction Generation; BLEU / ROUGE-L / ChrF)
  confidence: medium
  quote_available: false
  notes: ''
