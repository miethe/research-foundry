extracted_facts:
- evidence_id: ev_001
  text: 'The spec decomposes the 3D ambition into a four-level capability ladder: L0 (2D + counters +
    highlighting), L1 (structural 3D preview), L2 (editable 3D with consistent stitch semantics), and
    L3 (3D object to pattern synthesis).'
  locator: Section 3 (Approach / Rationale), item 3 — capability levels
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The spec states the differentiation wedge must be interactive 3D plus guided assembly, because
    the market already has strong pattern-and-tracking apps such as Ribblr and My Row Counter.
  locator: Section 0 (TL;DR) / Section 4.A (What already exists)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The spec scopes the first 3D as structural geometry rather than yarn-physics realism, and warns
    the product must be messaged as a structural preview because users may otherwise expect perfect realism.
  locator: Section 4.B (The 3D visualizer) and Section 6 (Risks / Limits), '3D expectations'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The Crochet intermediate representation sketch specifies units/gauge/hook/yarn-weight, pieces[],
    rows[] as stitch ops with counts (e.g. sc x6, inc, dec, repeat), end-of-row stitch-count constraints
    and checkpoints, and assembly join/placement markers.
  locator: Section 5 (Supporting Details) — Crochet IR (sketch)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Pattern IP/copyright is flagged as the number-one business landmine, arguing for designer opt-in,
    licensing, or user-private imports rather than scrape-from-anywhere ingestion.
  locator: Section 6 (Risks / Limits), 'IP/copyright'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The spec recommends amigurumi-first positioning (pieces, assembly, shaping, safety eyes, stuffing,
    symmetry checks) as where 3D guidance delivers the most user value.
  locator: Section 7 (Next Actions / Alts) — 'Alt' positioning
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The spec defers the inverse 3D-object-to-pattern generator to Phase 3, noting peer-reviewed work
    generates amigurumi instructions from a closed 3D model, seed point, and stitch size, but warns 'works
    in a paper' does not mean it delights in an app.
  locator: Section 4.D (3D object to crochet pattern generator) and Section 7 Phase 3
  confidence: medium
  quote_available: true
  notes: ''
