contradictions_or_cautions:
- text: Loop-folded notation in the paper uses asterisk syntax (sc, inc, 2sc)*3, not the 'x3' form; quoted
    verbatim.
  locator: card/trust
- text: Method assumes a closed manifold triangle mesh and a single seed; geodesic distance function must
    have resolvable (non-neighboring) saddles.
  locator: card/trust
- text: The paper's loop-folded notation uses asterisk syntax (sc, inc, 2sc)*3, not the "x3" form in the
    originating note; the verbatim form is quoted here.
  locator: card/limitations
- text: The method assumes a closed manifold triangle mesh with a single seed; the geodesic distance function's
    saddles must be resolvable (the implementation tunes the heat-geodesics time parameter to avoid neighboring
    saddles/extrema), so very detailed meshes may need preprocessing.
  locator: card/limitations
- text: 'Foundational/stable algorithm (tertiary): canonical for deterministic mesh-to-amigurumi but predates
    and does not cover modern generative or learning-based pattern methods.'
  locator: card/limitations
