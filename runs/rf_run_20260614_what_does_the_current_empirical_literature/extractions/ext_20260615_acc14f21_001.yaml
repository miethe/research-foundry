extracted_facts:
- evidence_id: ev_001
  text: AmiGo takes a closed manifold triangle mesh, a single user-specified seed vertex, and a stitch
    width w, and outputs human-readable crochet instructions for the model.
  locator: Section 2.1 Background and Notations (Representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The method builds a Crochet Graph G=(S, R union C) whose vertices are stitch tops/bases, with
    column edges C as stitch stems connecting rows and row edges R ordering bases within a row.
  locator: Section 2.2 The Crochet Graph (Representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Row ordering is induced by the geodesic distance function f(v)=d(v,s) from the seed (isolines
    of f are rows), and an optimized perpendicular function g orders stitches within each row.
  locator: Section 4 (Mesh to Crochet Graph), row-ordering paragraph; geodesic seed function
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: AmiGo uses only three simple stitches - single crochet (sc), increase inc(x), and decrease dec(x)
    - and compresses instructions via loop folding into notation such as (sc, inc, 2sc)*3.
  locator: Section 2.1 Background; Observation 2.3; Section 5 (loop folding)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Branching shapes are segmented automatically by slicing along the isolines of the saddle points
    of the seed distance function, and segments are joined with the join-as-you-go method so no additional
    sewing is required.
  locator: Section 7.2 Branching (Obstructions to crochetability); Section 8 segmentation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: AmiGo was evaluated on 11 models ranging 30-60 rows, 1-8 segments, and 365-3,670 stitches, with
    running times of 0.2-6.9 minutes measured on a desktop with an Intel Core i7.
  locator: Section 9.1 Implementation Details, Table 2 (Statistics for the crocheted models)
  confidence: medium
  quote_available: true
  notes: ''
