- evidence_id: ev_001
  text: The study created the first structured, open-source collection of crochet patterns designed for
    machine-learning applications, pairing user-generated patterns with their CrochetPARADE translations.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The authors evaluated baseline, few-shot, and fine-tuning approaches with LLMs for translating
    crochet patterns into CrochetPARADE syntax.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The best result was fine-tuning DeepSeek-R1-Distill-Llama8b, which reached 74% accuracy on pattern-to-CrochetPARADE
    translation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The work frames LLM-assisted translation as a way to bridge the gap between standard crochet notation
    and CrochetPARADE's non-intuitive syntax, lowering the barrier for novice crocheters.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The paper motivates the work by noting that crochet pattern creation and modification is challenging
    for novices because of the spatial reasoning and structural stitch understanding it requires.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
