extracted_facts:
- evidence_id: ev_001
  text: CrochetBench is a benchmark of 6,085 crochet patterns spanning 55 distinct project categories,
    built from publicly available Yarnspirations patterns.
  locator: Section 2 Dataset Description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The dataset is sourced from Yarnspirations patterns originally distributed as PDFs and normalized
    via a GPT-4o-mini conversion pipeline.
  locator: Section 2 Dataset Description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The benchmark uses the CrochetPARADE DSL as an intermediate representation to enable structural
    validation and functional evaluation by execution, rather than text-similarity scoring.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Nine state-of-the-art vision-language models were evaluated, including GPT-4o, Gemini 2.5 Flash-Lite,
    Claude Sonnet 4, and open-source models spanning 3B to 72B parameters.
  locator: Section 4 Experiments
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: On stitch recognition the best model, Claude Sonnet 4, reaches an F1 of 60.94%; instruction selection
    plateaus, with large and closed-source models clustering around 55-60% accuracy.
  locator: Section 4 Experiments ('Perception and grounding improve with scale')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Performance collapses from recognition/retrieval to synthesis: models that can recognize stitches
    or retrieve plausible text still fail to synthesize coherent multi-step procedures.'
  locator: Section 4 Experiments ('Perception and grounding improve with scale')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Project-level DSL synthesis is severely limited: even the strongest models (Claude, Gemini, and
    Qwen2-VL-7B) produce only 5-8% executable programs.'
  locator: Section 4 Experiments ('Project-level DSL synthesis reveals severe')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'Linguistic plausibility is decoupled from structural validity: models generate fluent, crochet-like
    descriptions while failing to preserve the algorithmic structure needed for faithful pattern synthesis,
    revealing limits in long-range symbolic reasoning that scaling and finetuning do not close.'
  locator: Section 4 Experiments ('Surface-level fluency does not imply') / Conclusion
  confidence: medium
  quote_available: true
  notes: ''
