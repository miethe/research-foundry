extracted_facts:
- evidence_id: ev_001
  text: AmiGo takes a closed manifold triangle mesh, a seed vertex, and a stitch width as input and outputs
    human-readable crochet instructions for the model.
  locator: Section 2.1 Background and Notations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Crochet rows are defined as isolines of the geodesic distance from the seed (f(v)=d(v,s)), with
    a second function g ordering within rows; vertices are sampled on a 2D grid of width w.
  locator: Section 4.1 Geometry
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Patterns use only the standard amigurumi stitch set (single crochet, increase, decrease) and deliberately
    avoid short rows to appeal to beginner crocheters.
  locator: Sections 2.1 and 1.1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Crochetability is enforced through curvature preprocessing: Conformal Mean Curvature Flow is
    applied locally where mean curvature is not positive, and the sampling rate is modulated in negative-Gaussian-curvature
    regions via h(x)=tanh(-x/alpha)/2+1 with alpha=10.'
  locator: Sections 7.1.1 and 7.1.2 Crochetability / Curvature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Branching shapes are split into segments that are crocheted onto the previous segment's last row
    using a join-as-you-go method, so no sewing is required.
  locator: Section 7.2 Branching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Table 2 reports per-model statistics (e.g., Teddy: 60 rows, 6 segments, 3670 stitches, 2.5 min)
    with instruction generation taking a few minutes on a desktop Intel Core i7.'
  locator: Section 9.1 / Table 2 Statistics for the crocheted models
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The method only handles closed (stuffed) surfaces, reflecting its amigurumi target domain.
  locator: Section 8 Limitations
  confidence: medium
  quote_available: true
  notes: ''
