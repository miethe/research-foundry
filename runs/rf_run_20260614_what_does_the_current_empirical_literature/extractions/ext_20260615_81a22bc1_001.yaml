extracted_facts:
- evidence_id: ev_001
  text: Crochet remains largely manual and, unlike knitting or weaving, is barely supported by domain-specific
    digital tooling for authoring new pattern instructions.
  locator: Abstract, opening
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Existing crochet tools are constrained by underlying pattern languages that are either ambiguous
    or limited in expressiveness, so authoring requires substantial manual effort and can yield incomplete
    or ambiguous instructions.
  locator: Abstract, problem statement
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The paper proposes a first visual, domain-specific, graph-based language for representing crochet
    patterns.
  locator: Abstract, contribution
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The language is realized in a prototype editor that supports authoring patterns in 2D and viewing
    them in 3D, demonstrating domain-specific tool support.
  locator: Abstract, tooling
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A user study showed the proposed language lets designers express both 2D and 3D patterns and removes
    ambiguities present in current standard crochet notations.
  locator: Abstract, evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The work was published at the 2022 ACM SIGPLAN International Symposium on New Ideas, New Paradigms,
    and Reflections on Programming and Software (Onward!/SPLASH 2022), framing crochet pattern representation
    as a programming-language design problem.
  locator: ACM landing page / SPLASH 2022 program metadata
  confidence: medium
  quote_available: false
  notes: ''
