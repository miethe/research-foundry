contradictions_or_cautions:
- text: Method tested only on simple, beginner-level patterns and single-crochet-like stitches; not validated
    on intermediate/advanced patterns.
  locator: card/trust
- text: Assumes uniform edge length of 1, which the authors note is inaccurate in general.
  locator: card/trust
- text: Piece-joining and some shaping done by ad-hoc manual specification.
  locator: card/trust
- text: Tested only on simple, beginner-level patterns and single-crochet-like stitches; explicitly too
    narrow for intermediate/advanced patterns.
  locator: card/limitations
- text: Assumes a uniform edge length of 1, which the authors acknowledge is inaccurate in general (real
    stitch sizes vary with tension, hook, yarn weight, stitch type).
  locator: card/limitations
- text: Piece joining and certain shaping effects are specified ad hoc / by hand; force-directed layouts
    are slow and large patterns may not converge.
  locator: card/limitations
