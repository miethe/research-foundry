extracted_facts:
- evidence_id: ev_001
  text: The method takes a written crochet pattern as input, translates it into a graph, and obtains a
    force-directed graph layout that yields a 3D model matching the hand-crocheted result in shape and
    size.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The stated benefit is that designers can preview and adjust a pattern digitally without physically
    crocheting it; the work is oriented toward amigurumi but could be extended to clothing or similar
    crochet styles.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Each stitch is modeled as a graph node; horizontal edges encode sequential connections between
    consecutive stitches and vertical edges encode working connections (a stitch worked into a stitch
    below).
  locator: Section 4 (graph construction)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The layout adapts Isenburg et al.''s force-directed algorithm: a non-linear least-squares optimization
    minimizing two energy functions (edge length and local curvature), since stuffing a crocheted shell
    is treated as equivalent to inflating the planar graph.'
  locator: Section 4.2 The graph layout
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The implementation uses the Ceres Solver library with a static blend weight λ = 0.65 for most
    pieces (λ = 0.9 for the bunny head and body), and the linear solver is the most time-expensive part
    of the application.
  locator: Section 4.2 (implementation parameters)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Performance is limited: small patterns converge in seconds (bunny legs at 318 stitches and arms
    at 264 stitches in under 5s), but the bunny head (798 stitches) and body (708 stitches) failed to
    converge even after more than two minutes.'
  locator: Section 5.3 Performance
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The authors released their source code as an open repository, providing a usable reference implementation
    of a stitch-graph plus force-directed embedding forward engine.
  locator: Section 3 Background (footnote / repo link)
  confidence: medium
  quote_available: true
  notes: ''
