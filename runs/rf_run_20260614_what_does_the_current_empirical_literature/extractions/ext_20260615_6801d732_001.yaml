- evidence_id: ev_001
  text: CrochetBench is a benchmark for evaluating multimodal LLMs on fine-grained, low-level procedural
    reasoning in crochet, shifting emphasis from describing to doing.
  locator: About section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The benchmark requires models to recognize stitches, select appropriate instructions, generate
    pattern instructions, and produce compilable crochet procedures.
  locator: About section (describing to doing)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CrochetBench adopts the CrochetPARADE DSL as an intermediate representation and enables functional
    evaluation through program execution.
  locator: Key Features — Domain-Specific Language (DSL)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Task A (CrochetBench-A) is stitch recognition, scored by F1/Precision/Recall, with a test size
    of 6,009.
  locator: Benchmark Tasks table — Task A (CrochetBench-A)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
