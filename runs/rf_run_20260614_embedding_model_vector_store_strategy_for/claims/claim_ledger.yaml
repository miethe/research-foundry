  reviewer_notes: ''
- claim_id: clm_inf06
  text: The practical migration threshold from brute-force sqlite-vec to an ANN-indexed backend sits well
    below sqlite-vec's own >1M-vector slowdown marker, in the low tens of thousands of chunks, once linear-scan
    query latency becomes interactively noticeable for a single user.
