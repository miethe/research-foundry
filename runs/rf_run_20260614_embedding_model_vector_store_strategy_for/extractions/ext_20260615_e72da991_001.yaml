extracted_facts:
- evidence_id: ev_001
  text: pgvector 0.7.0, an open-source PostgreSQL vector similarity search extension, was announced on
    PostgreSQL.org on 2024-04-30 (CHANGELOG dated 2024-04-29).
  locator: Header — 'pgvector 0.7.0 Released!' / 'Posted on 2024-04-30 by pgvector'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: pgvector 0.7.0 adds the halfvec type (2-byte floats, indexable up to 4,000 dimensions) and the
    sparsevec type (indexable up to 1,000 nonzero dimensions).
  locator: Body, para 2 — new vector types
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: pgvector 0.7.0 adds indexing support for binary vectors using the bit type, indexable up to 64,000
    dimensions.
  locator: Body, para 2 — binary vector indexing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: pgvector 0.7.0 supports quantizing vectors via expression indexes, including 4-byte to 2-byte
    float quantization and binary quantization through the binary_quantize function.
  locator: Body, para 2 — quantization
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: pgvector 0.7.0 adds hamming_distance and jaccard_distance functions for bit vectors and adds HNSW
    indexing support for L1 distance operations.
  locator: Body, para 2 — distance functions and HNSW L1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: pgvector 0.7.0 adds SIMD support with CPU dispatching for Linux x86-64 architectures.
  locator: Body, para 2 — SIMD
  confidence: medium
  quote_available: true
  notes: ''
