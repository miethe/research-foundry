extracted_facts:
- evidence_id: ev_001
  text: On CPU, for the shortest-text dataset (stsb), ONNX with int8 quantization reaches a 3.08x speedup
    over the PyTorch fp32 baseline, versus 1.39x for plain ONNX and 1.29x for OpenVINO.
  locator: Benchmarks (CPU paragraph below the backend list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: For Intel CPUs where a 0.4% accuracy loss is acceptable, the documentation recommends the openvino-qint8
    backend; non-Intel CPUs are routed to plain onnx.
  locator: Recommendations (backend-selection flowchart)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On GPU, the flowchart recommends onnx-O4 when text is usually smaller than 500 characters and
    PyTorch float16 otherwise.
  locator: Recommendations (backend-selection flowchart)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: On GPU for the shortest-text dataset, ONNX-O4 reaches 1.83x speedup while fp16 and bf16 reach
    only 1.54x and 1.53x, leading to the recommendation of ONNX on GPU for shorter texts.
  locator: Benchmarks (GPU paragraph below the backend list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The reported speedups are averaged across 4 models, 3 datasets, and many batch sizes, so aggressive
    averaging hides finer patterns and results must be tested per model and data.
  locator: Benchmarks (intro + caveat paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: For longer texts ONNX and OpenVINO can perform slightly worse than PyTorch, and the docs caution
    that real backend choice should be measured on your specific model and data.
  locator: Benchmarks (CPU paragraph) / Recommendations Note
  confidence: medium
  quote_available: true
  notes: ''
