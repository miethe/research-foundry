extracted_facts:
- evidence_id: ev_001
  text: nomic-embed-text-v1.5 uses Matryoshka Representation Learning to let developers trade off embedding
    size for a negligible reduction in performance.
  locator: Model overview (intro paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Matryoshka training supports embedding dimensions of 768, 512, 256, 128, and 64, with MTEB averages
    of 62.28, 61.96, 61.04, 59.34, and 56.10 respectively.
  locator: Performance table (MTEB by embedding dimension)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_003
  text: Truncating from 768 to 512 dimensions costs roughly 0.32 MTEB points (62.28 to 61.96) and to 256
    dimensions roughly 1.24 points (62.28 to 61.04), confirming the negligible-degradation tradeoff.
  locator: Performance / truncation discussion
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: The model natively supports scaling the sequence length past 2048 tokens (up to 8192).
  locator: Architecture / context-length section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The model is built starting from a long-context BERT base (nomic-bert-2048), then trained with
    unsupervised contrastive stages on weakly related text pairs.
  locator: Training Details (contrastive pretraining)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Embeddings are resized to a target Matryoshka dimension by layer-normalizing and slicing to matryoshka_dim,
    enabling client-side dimension reduction without re-embedding.
  locator: Usage examples (Sentence Transformers / Transformers code snippets)
  confidence: medium
  quote_available: true
  notes: ''
