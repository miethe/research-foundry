extracted_facts:
- evidence_id: ev_001
  text: M3-Embedding (BGE-M3) is an embedding model distinguished by three axes of versatility — multi-linguality,
    multi-functionality, and multi-granularity — providing uniform semantic retrieval support for more
    than 100 working languages.
  locator: Abstract, sentence 1-2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A single M3-Embedding model can simultaneously perform all three common retrieval functionalities
    — dense retrieval, multi-vector retrieval, and sparse (lexical) retrieval.
  locator: Abstract, multi-functionality sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: M3-Embedding processes inputs of varying granularity, from short sentences up to long documents
    of 8,192 tokens, enabling long-document retrieval.
  locator: Abstract, multi-granularity sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The model is trained via a novel self-knowledge distillation approach in which relevance scores
    from the different retrieval functionalities are integrated as a teacher signal to improve training
    quality.
  locator: Abstract, methodology sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Training optimizes the batching strategy to enable a large batch size and high training throughput,
    improving the discriminativeness of the learned embeddings.
  locator: Abstract, training-efficiency sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper was first submitted 5 Feb 2024 (v1) by BAAI authors (Chen, Xiao, Zhang, Luo, Lian, Liu);
    its latest revision v5 is dated 12 Dec 2025, keeping it within an active-maintenance freshness window.
  locator: arXiv listing — submission/revision metadata
  confidence: medium
  quote_available: false
  notes: ''
