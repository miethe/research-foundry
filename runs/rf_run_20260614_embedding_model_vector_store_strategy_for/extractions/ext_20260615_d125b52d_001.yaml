extracted_facts:
- evidence_id: ev_001
  text: pgvector's HNSW index defaults are m=16 (max connections per layer) and ef_construction=64 (dynamic
    candidate list size for building the graph).
  locator: HNSW > index options / parameters
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The HNSW query-time candidate list size (ef_search) defaults to 40 in pgvector.
  locator: HNSW > Query Options
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: pgvector documents that HNSW offers better speed-recall query performance than IVFFlat but has
    slower build times and uses more memory.
  locator: HNSW (index overview)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: For IVFFlat, pgvector recommends sizing lists as rows/1000 for up to 1M rows and sqrt(rows) above
    1M rows.
  locator: IVFFlat > Index Options (lists)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: pgvector recommends starting the IVFFlat probes parameter at sqrt(lists).
  locator: IVFFlat > Query Options (probes)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: pgvector supports indexing halfvec (2-byte) vectors up to 4,000 dimensions and bit/binary vectors
    up to 64,000 dimensions.
  locator: Indexing > supported types / dimension limits
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: pgvector's current release is v0.8.2 and runs as a Postgres extension requiring a running Postgres
    server (Postgres 13+), not an embeddable single-file store.
  locator: Installation / requirements (v0.8.2)
  confidence: medium
  quote_available: false
  notes: ''
