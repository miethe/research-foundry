extracted_facts:
- evidence_id: ev_001
  text: MMTEB is a large-scale, community-driven expansion of MTEB covering over 500 quality-controlled
    evaluation tasks across 250+ languages.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'MMTEB adds novel task categories beyond standard retrieval/classification: instruction following,
    long-document retrieval, and code retrieval.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The best-performing publicly available model on MMTEB is multilingual-e5-large-instruct at only
    560M parameters, outperforming much larger billion-parameter LLMs (which lead only on certain subsets/categories).
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: To reduce compute cost, MMTEB introduces an inter-task-correlation downsampling method that preserves
    relative model rankings while selecting a diverse task subset.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Retrieval tasks are optimized by sampling hard negatives to create smaller but effective splits,
    yielding benchmarks that drastically reduce computational demands.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The new zero-shot English benchmark preserves a ranking order similar to the full-scale version
    at a fraction of the computational cost.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
