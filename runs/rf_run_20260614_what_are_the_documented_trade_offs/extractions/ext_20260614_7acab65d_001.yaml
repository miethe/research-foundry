- evidence_id: ev_001
  text: git-history is a tool whose stated purpose is analyzing a file's Git commit history by loading
    it into SQLite.
  locator: README — title/description line
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The git-history `file` command converts a versioned file's history into a SQLite database, e.g.
    building incidents.db from incidents.json.
  locator: README — usage / file command
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Using the --id option de-duplicates objects by a unique identifier and reconstructs the change
    history of each item across commits.
  locator: README — --id option section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Running with --id produces six tables, including item_version, capturing item-level change history
    rather than just raw commits.
  locator: README — --id schema description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The tool materializes every captured version of every record, so ten historic versions of a 30-incident
    file yield 300 item rows.
  locator: README — example row-count explanation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: git-history is distributed as a PyPI package and installable via uv as a tool, with Git as the
    durable history source and SQLite as the derived query index.
  locator: PyPI project page — summary and install
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Generated SQLite databases are intended to be queried and published via Datasette, demonstrated
    by deployed demo datasets (e.g. PG&E outages, California fire incidents).
  locator: README — demos / Datasette section
  confidence: medium
  quote_available: true
