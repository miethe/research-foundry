extracted_facts:
- evidence_id: ev_001
  text: Obsidian's design philosophy is built on storing knowledge as plain text, positioning the knowledge
    base as user-owned rather than locked into a proprietary host.
  locator: How we're different > You own and control your data (para 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Obsidian treats Sync as an optional convenience for multi-device work; the data is always stored
    primarily on the user's local hard disk (local-first).
  locator: How we're different > You own and control your data (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because the file system replaces the cloud, Obsidian's plain-file model is directly compatible
    with Git for versioning, plus Dropbox backup and disk encryption.
  locator: How we're different > You own and control your data (para 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Notes are connected through bidirectional Internal links and a Graph view rather than a database
    schema, with linking treated as a first-class feature for discovering relations.
  locator: How we're different > Links are first-class citizens
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Obsidian is described as both a Markdown editor and a knowledge base app, with its core power
    in managing a densely networked knowledge base.
  locator: What is Obsidian (para 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Obsidian intentionally ships a minimal foundation (view, edit, search files) plus optional building
    blocks rather than an opinionated monolithic product.
  locator: How we're different > Your own toolkit
  confidence: medium
  quote_available: true
  notes: ''
