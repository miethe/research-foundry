- evidence_id: ev_001
  text: Before optimization, Git's sparse-checkout pattern matching used a quadratic-time algorithm that
    took 40 minutes to evaluate the patterns on one large repository.
  locator: 'Section: A catalyst forces a pivot'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: After implementing cone-mode sparse-checkout, git status performance dropped to three or four
    seconds, comparable to the typical VFS for Git case.
  locator: 'Section: A catalyst forces a pivot'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Scaling Git to large repositories relies on a bundle of performance features (partial clone, sparse-checkout,
    background maintenance, and advanced config) that scalar clone configures together, implying plain
    git clone does not enable them by default.
  locator: Opening / introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: VFS for Git's macOS port was abandoned because Apple deprecated the kernel filesystem-virtualization
    features that the virtualization approach depended on.
  locator: 'Section: A catalyst forces a pivot'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: After moving off filesystem virtualization onto core Git features, the team realized Scalar had
