extracted_facts:
- evidence_id: ev_001
  text: 'Git is a content-addressable filesystem: a key-value store where inserting any content returns
    a unique key for later retrieval.'
  locator: 'Section: Git Objects (intro)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The plumbing command git hash-object stores data in the .git/objects object database and returns
    the unique key referring to that data; e.g. 'test content' hashes to d670460b4b4aece5915caf5c68d12f560a9fe3e4.
  locator: 'Section: Git Objects (git hash-object demonstration)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Git computes an object's SHA-1 by constructing a header (object type, a space, the content's byte
    size, and a null byte), concatenating it with the original content, and hashing the combined data.
  locator: 'Section: Object Storage'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Tree objects store directory structure: a single tree contains one or more entries, each being
    the SHA-1 hash of a blob or subtree along with its mode, type, and filename, with blobs holding file
    content.'
  locator: 'Section: Tree Objects'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A commit object records the top-level tree SHA for the snapshot, parent commits (if any), author/committer
    info from user.name/user.email plus a timestamp, and the commit message.
  locator: 'Section: Commit Objects'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Git stores each object zlib-compressed as a single file under .git/objects/, named by its SHA-1:
    the first two characters form the subdirectory name and the remaining 38 characters form the filename.'
  locator: 'Section: Object Storage (storage path)'
  confidence: medium
  quote_available: true
  notes: ''
