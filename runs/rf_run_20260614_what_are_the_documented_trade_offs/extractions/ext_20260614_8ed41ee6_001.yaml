extracted_facts:
- evidence_id: ev_001
  text: SQLite's core concurrency model allows unlimited simultaneous readers but only a single writer
    at any instant, which is the file-first concurrent-write breakpoint.
  locator: Section 2 'Situations Where A Client/Server RDBMS May Work Better' -> 'High Concurrency'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: When many threads/processes must write concurrently and cannot queue and take turns, the docs
    direct readers to a client/server database engine.
  locator: Section 3 'Checklist For Choosing The Right Database Engine' -> Item 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because a write transaction typically takes only milliseconds, multiple writers can take turns,
    making single-writer SQLite acceptable for low-to-medium write concurrency.
  locator: Section 3 'Checklist For Choosing The Right Database Engine' -> Item 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: SQLite is documented as suitable for websites with fewer than 100K hits/day.
  locator: Section 1 'Situations Where SQLite Works Well' -> 'Websites'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: sqlite.org itself serves roughly 400K-500K HTTP requests/day, of which about 15-20% are dynamic
    pages touching the database, illustrating real-world headroom for the single-writer model.
  locator: Section 1 'Situations Where SQLite Works Well' -> 'Websites'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: SQLite's maximum database size is 281 terabytes (2^48 bytes), and the docs recommend a centralized
    client/server database when data may reach the terabyte range.
  locator: Section 2 'Situations Where A Client/Server RDBMS May Work Better' -> 'Very large datasets'
  confidence: medium
  quote_available: true
  notes: ''
