extracted_facts:
- evidence_id: ev_001
  text: Git is at its core a content-addressable filesystem that uses the SHA-1 hash function to name
    content such as files, directories, and revisions.
  locator: Background
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Because a blob object refers to no other object, its SHA-1 content and SHA-256 content are identical.
  locator: Object format
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The 2017 SHAttered attack demonstrated a practical SHA-1 collision; although Git moved to a hardened
    SHA-1, SHA-1 is still considered weak, motivating the move to SHA-256.
  locator: Background
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: An object's SHA-256 name is the SHA-256 of the concatenation of its type, length, a nul byte,
    and the object's SHA-256 content, preserving the content-addressable naming model.
  locator: Object names (Detailed Design)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'The transition is designed to be incremental and interoperable: it can be done one local repository
    at a time and a SHA-256 repository can still push/fetch with SHA-1 Git servers.'
  locator: Goals
  confidence: medium
  quote_available: true
  notes: ''
