extracted_facts:
- evidence_id: ev_001
  text: Logical replication replicates data objects and their changes based on a replication identity
    (usually a primary key), in contrast to physical block-level replication.
  locator: Chapter 29. Logical Replication (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Logical replication uses a publish/subscribe model in which subscribers pull from publications
    and may re-publish data to enable cascading replication.
  locator: Chapter 29. Logical Replication (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On start it snapshots the publisher table and copies it to the subscriber, then continually sends
    subsequent changes.
  locator: Chapter 29. Logical Replication (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The subscriber applies changes in the same order as the publisher, guaranteeing transactional
    consistency for publications within a single subscription.
  locator: Chapter 29. Logical Replication (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Documented use cases include sending incremental changes as they occur and firing triggers for
    individual changes as they arrive on the subscriber (the basis for CDC/audit patterns).
  locator: Chapter 29. Logical Replication (intro) — 'The typical use-cases for logical replication are:'
  confidence: medium
  quote_available: true
  notes: ''
