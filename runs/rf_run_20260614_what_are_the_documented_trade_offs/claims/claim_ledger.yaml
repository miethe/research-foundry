- claim_id: clm_inf01
  text: 'On concurrent writes, file-first stores and embedded DBs share the same single-writer ceiling
    while only client/server engines like PostgreSQL scale: SQLite serializes to one writer at any instant,
    whereas PostgreSQL''s MVCC lets reading never block writing and writing never block reading.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_026
    - clm_027
    - clm_049
    - clm_050
    reasoning_summary: SQLite docs (clm_025-027) cap concurrent writes at one writer and redirect heavy
      concurrent writers to client/server engines; PostgreSQL MVCC (clm_049-050) removes read/write lock
      conflict. Git-as-store inherits the same serialized-write limitation as any single-file model, so
      the comparative verdict is that DB-first (client/server) wins concurrency while file-first and embedded
      SQLite are co-located at the lower tier.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: The documented concurrency breakpoint for a file-first / embedded-DB store is reached when writers
    can no longer queue and take turns within the millisecond-scale write window; below that (e.g. the
    <100K hits/day or the observed 400K-500K req/day with 15-20% DB-touching dynamic pages on sqlite.org)
    single-writer file-first is adequate, above it the docs prescribe migrating writes to a client/server
    engine.
  materiality: material
  claim_type: quantitative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_027
    - clm_028
    - clm_029
    - clm_026
    reasoning_summary: 'Combining the single-writer model (clm_025), the millisecond turn-taking rationale
      (clm_027), the <100K hits/day guidance (clm_028), the real-world 400K-500K req/day headroom with
      only 15-20% dynamic (clm_029), and the explicit migration trigger (clm_026) yields a concrete, evidence-grounded
      threshold band where file-first degrades: when concurrent writers cannot serialize within the millisecond
      write window.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Git content-addressing gives file-first knowledge bases a stronger structural reproducibility
    and tamper-evidence guarantee than a DB migration/audit trail: every blob, tree, and commit is named
    by the SHA of its own bytes, so any content change necessarily changes its key and any commit edit
    changes every descendant SHA, making the history self-verifying rather than dependent on append-only
    log discipline.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_006
    - clm_008
    - clm_009
    - clm_010
    - clm_011
    - clm_031
    reasoning_summary: 'The content-addressable model (clm_006, clm_031), header+content hashing (clm_008),
      tree/commit objects referencing child SHAs (clm_009, clm_010), and SHA-named on-disk storage (clm_011)
      together mean the commit DAG is a Merkle structure: mutating any object changes its name and cascades
      to ancestors. This is a structurally enforced integrity guarantee, contrasted with DB audit trails
      (clm_005 CDC / clm_039 Dolt system tables) which record history but do not cryptographically chain
      it by default.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'The git-history tool is the canonical instance of the recommended hybrid posture for RF/MeatyWiki
    — Git/Markdown as durable, diffable truth with a rebuildable SQLite index for querying — and its operational
    cost is index amplification: it materializes every version of every record (10 versions x 30 items
    = 300 rows), so the derived store grows with history depth times item count, not with current state.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_018
    - clm_019
    - clm_022
    - clm_023
    - clm_024
    reasoning_summary: git-history loads file history into SQLite (clm_018, clm_019), with Git durable
      and SQLite derived (clm_023), published via Datasette (clm_024). The 300-row example (clm_022) quantifies
      the storage cost of full version materialization, so the hybrid's main operational cost is index
      size scaling with versions x items rather than live row count.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'The derived index in a files-as-truth + rebuildable-DB hybrid is a disposable cache, which yields
    the strongest recovery guarantee of the three postures: because git-history regenerates the entire
    SQLite database deterministically from the committed file history, index loss or corruption is recoverable
    by re-running the build, whereas a DB-first store''s lost data has no external source to rebuild from.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_019
    - clm_020
    - clm_023
    - clm_018
    reasoning_summary: Because the SQLite DB is built from the versioned file (clm_018, clm_019, clm_023)
      and --id reconstructs per-item change history from commits (clm_020), the index is a pure function
      of the Git history and can always be rebuilt. In DB-first systems the database is the sole copy,
      so the hybrid uniquely treats the query store as recoverable derived state.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'File-first query/scale performance does not degrade at a fixed data-size limit but at an operational-tooling
    threshold: SQLite tolerates up to 281 TB yet the docs still steer terabyte-range workloads to client/server,
    and Git''s own scaling required a bundle (partial clone, sparse-checkout, background maintenance)
    where a naive quadratic sparse-checkout matcher cost 40 minutes before cone mode cut git status to
    3-4 seconds — so the breakpoint is when default tooling stops being viable, not when a capacity ceiling
    is hit.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
