- claim_id: clm_inf07
  text: 'For schema evolution, file-first YAML frontmatter and DB-first models trade off the same way
    as concurrent writes: editing a Markdown file''s frontmatter is a local, individually diffable, human-reviewable
    change versioned per-file by Git, whereas a relational/table-versioned migration (as in Dolt, where
    commits are stored procedures and diffs are system tables) centralizes and validates the change but
    couples all rows to one coordinated migration — favoring file-first for incremental, agent-authored
    field additions and DB-first for enforced structural integrity.'
  materiality: material
