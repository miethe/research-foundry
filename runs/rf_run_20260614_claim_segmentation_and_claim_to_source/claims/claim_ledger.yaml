- claim_id: clm_inf01
  text: Of the surveyed segmenters, Claimify is the best fit for RF's pre-verification stage because its
    staged Selection-Disambiguation-Decomposition design achieves 99% source-sentence entailment and explicitly
    abstains on irreducibly ambiguous sentences, directly satisfying RF's invariant that every extracted
    claim be entailed or labeled rather than forced.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_027
    - clm_028
    - clm_029
    - clm_030
    - clm_031
    - clm_032
    reasoning_summary: Claimify's three stages drop unverifiable sentences (clm_026), abstain when ambiguity
      is unresolved (clm_027/clm_029), preserve context (clm_028), and require entailment (clm_030), with
      99% measured entailment (clm_031) and ACL-2025 superiority over prior methods (clm_032); this is
      the only surveyed method that both abstains and is measured for decontextualization fidelity, matching
      RF's entail-or-label gate.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: RF should adopt VeriScore-style verifiable-claim filtering as the first segmentation step, using
    per-sentence verifiable-claim density (e.g., the ~0.03 vs 2.31 fiction-vs-nonfiction split) as a cheap
    routing signal to send low-density passages to an 'unverifiable/opinion' bucket rather than into the
    claim ledger.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_066
    - clm_067
    - clm_026
    reasoning_summary: VeriScore extracts only verifiable claims and was preferred over decompose-everything
      methods (clm_066); verifiable-claim density varies ~77x by genre (clm_067), giving a measurable
      cheap signal that mirrors Claimify's Selection drop (clm_026), so density can gate which segments
      even enter alignment.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Claim segmentation in RF must fix and version a single decomposition method, because identical
    text yields between 20.0 (WiCE) and 42.3 (Russellian/Neo-Davidsonian) atomic facts depending on the
    splitter, and FActScore itself shifts with atomicity, so any unversioned splitter change would silently
    break re-runnable alignment and verification audits.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    - clm_006
    reasoning_summary: Splitter choice changes yield from 20.0 to 42.3 facts on the same text (clm_006),
      the metric is sensitive to the decomposition step (clm_001), and the score moves with atomicity
      for fixed text (clm_002); therefore a fixed, versioned splitter is required for reproducible claim
      counts and verdicts.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The claim ledger must record the decomposition method id/version and a per-claim atomicity value
    alongside source_card_id and locator, since decomposition policies misalign with verifiers in atomicity
    and DecompScore is defined as supported-subclaims-per-passage for a specific method, so without these
    fields a verdict cannot be reproduced or attributed to the splitter versus the model.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_005
    - clm_052
    - clm_053
    reasoning_summary: Error can originate in decomposition (clm_001), DecompScore is method-relative
      (clm_005), atomicity is a defined information-density metric (clm_052), and policies misalign with
      verifiers on atomicity (clm_053); auditing which source of error applies requires storing method
      id/version + atomicity per claim.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: For the alignment step RF should prefer a fine-tuned sentence-level citation model over a zero-shot
    frontier prompt, since LongCite-8B reaches citation F1 72.0 (P 79.7 / R 62.0) versus GPT-4o's F1 65.6
    (P 53.5) and Claude-3-Sonnet's F1 67.2 on the same LongBench-Cite protocol, a ~5-6 point F1 and ~12-26
    point precision advantage.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_072
    - clm_073
    - clm_074
    reasoning_summary: On the identical sentence-level citation protocol (clm_072), trained LongCite-8B
      F1 72.0/P 79.7 (clm_073) exceeds GPT-4o F1 65.6/P 53.5 and Claude-3-Sonnet F1 67.2 (clm_074); the
      precision gap is most material for a hard verification gate that should minimize false 'supported'
      verdicts.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: Automated claim-to-source alignment precision currently tops out around 80% (LongCite-8B precision
    79.7 on sentence-level citation), so RF should treat ~80% precision as the practical ceiling before
    human review and not assume near-perfect attribution from any single automated aligner.
  materiality: material
  claim_type: quantitative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_073
    - clm_074
    - clm_077
    reasoning_summary: The best trained sentence-level citer reaches precision 79.7 (clm_073), above proprietary
      baselines (clm_074), and the GPT-4o judge measuring this only agrees with humans at kappa 0.593-0.655
      (clm_077); combined, this caps trustworthy automated alignment precision near 80% and implies a
      mandatory human band above that.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'Multi-hop and aggregated quantitative claims are the dominant systematic failure mode for automated
    aligners and must be flagged for human review: GPT-4 zero-shot attribution F1 falls to 0.451 on Concatenation
    and 0.514 on Intersection, far below single-source cases, mirroring VeriScore''s failure on complex
    non-entity-centric claims.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_033
    - clm_035
    - clm_070
    reasoning_summary: CAQA marks Union/Intersection/Concatenation as the multi-hop cases (clm_033) where
      GPT-4 F1 drops to 0.451/0.514 (clm_035), and VeriScore independently fails on complex claims needing
      reasoning across claim parts (clm_070); two sources converging identifies aggregation/multi-hop
