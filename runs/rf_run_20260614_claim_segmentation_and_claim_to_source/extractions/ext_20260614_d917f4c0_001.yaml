  text: The paper introduces 'atomicity' as a novel metric quantifying the information density of a decomposed
    claim.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Existing decomposition policies, typically hand-crafted demonstrations, misalign with downstream
    verifiers in atomicity, yielding suboptimal verification.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The authors frame finding the optimal decomposition policy for optimal verification as a strongly
    NP-hard bilevel optimization problem.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: '''Dynamic decomposition'' is a reinforcement learning framework that uses verifier feedback to
    learn a policy for decomposing claims to verifier-preferred atomicity.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
