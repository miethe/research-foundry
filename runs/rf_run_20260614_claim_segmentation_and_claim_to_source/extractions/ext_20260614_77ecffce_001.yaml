extracted_facts:
- evidence_id: ev_001
  text: Fact-checking LLM text commonly proceeds by claim extraction, breaking text into simple factual
    statements that can be verified independently.
  locator: Intro — what Claimify is / claim extraction in fact-checking
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Claimify's Selection stage uses an LLM to drop sentences without verifiable content, labeling
    them 'No verifiable claims' and excluding them from later stages.
  locator: Selection stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In Disambiguation, if context cannot resolve all ambiguity the sentence is labeled 'Cannot be
    disambiguated' rather than forced into a claim.
  locator: Disambiguation stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The Decomposition stage has an LLM create standalone claims that preserve critical context from
    the disambiguated sentences.
  locator: Decomposition stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Claimify is described as the first claim extraction system that detects multiple possible interpretations
    and extracts claims only when confident in the correct one.
  locator: Principles — high-confidence interpretation / abstention
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A core Claimify principle is that each extracted claim must be fully supported (entailed) by the
    source text.
  locator: Principles — entailment requirement
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Evaluation found that 99% of claims extracted by Claimify are entailed by their source sentence,
    indicating high decontextualization fidelity.
  locator: Results — decontextualization fidelity
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The work was accepted to ACL 2025 in a paper titled 'Towards Effective Extraction and Evaluation
    of Factual Claims', which also shows Claimify outperforms existing LLM-based methods.
  locator: Companion paper — ACL 2025
  confidence: medium
  quote_available: true
  notes: ''
