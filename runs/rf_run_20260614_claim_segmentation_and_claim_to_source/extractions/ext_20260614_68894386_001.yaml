extracted_facts:
- evidence_id: ev_001
  text: VeriFastScore fine-tunes Llama-3.1-8B to extract and verify all verifiable claims in a text simultaneously,
    using evidence from Google Search.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: VeriFastScore correlates strongly with the original VeriScore pipeline (r=0.80 example level,
    r=0.94 system level) while achieving a 6.6x overall speedup (9.9x excluding evidence retrieval).
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Retrieving evidence at a coarser granularity cuts API costs by 39% and reduces retrieval time
    by almost half.
  locator: Section 3.2 (Speedup)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Decompose-then-verify factuality metrics like FactScore and VeriScore can take upwards of 100
    seconds per response due to numerous LLM calls, limiting large-scale use.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The combined extract-and-verify task is hard for few-shot prompting because the model must process
    ~4K tokens of evidence and concurrently decompose, judge verifiability, and verify against noisy evidence.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Training data was a synthetic dataset built by running responses through the VeriScore pipeline
    to decompose them into verifiable claims and assign verification labels.
  locator: Section 2.4 (Data Sources / Data Collection Pipeline)
  confidence: medium
  quote_available: true
  notes: ''
