- evidence_id: ev_001
  text: CAQA defines a four-level attribution complexity taxonomy where Union, Intersection, and Concatenation
    are the multi-hop/aggregated cases requiring facts from multiple citations.
  locator: Attribution complexity taxonomy (Single/Union/Intersection/Concatenation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: CAQA defines four attribution categories beyond binary support, including an explicit Partially
    Supportive label where the evidence lacks some required facts.
  locator: Attribution categories (Sup./Par./Con./Irr.)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: GPT-4 zero-shot F1 degrades on the aggregated multi-hop cases, dropping to 0.451 on Concatenation
    and 0.514 on Intersection.
  locator: Section 6.1 / Results, GPT-4 zero-shot by complexity
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: All evaluators consistently underperform on the nuanced negative categories, with Partially Supportive
    being the hardest verdict to detect automatically.
  locator: Abstract / Section 6.1, negative categories
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Evaluators rely on keyword co-occurrence rather than semantic reasoning and systematically misclassify
    partially-supported claims as supportive.
  locator: Analysis / error patterns
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The KG-generated CAQA benchmark contains 161,174 samples, and fine-tuned detectors exceed 90%
    F1, indicating the zero-shot failure is an evaluator-capability gap rather than an unverifiable task.
  locator: Benchmark construction / fine-tuned evaluator results
