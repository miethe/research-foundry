extracted_facts:
- evidence_id: ev_001
  text: VeriScore extracts only verifiable claims, unlike FActScore and SAFE which decompose every sentence
    including unverifiable content; FActScore and SAFE assume all claims are verifiable and extract examples
    and hypotheticals, unfairly penalizing models.
  locator: Section 1 Introduction (key improvements paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Verifiable-claim density per sentence varies ~77x by genre: WritingPrompts fiction outputs average
    0.03 verifiable claims/sentence versus FreshBooks nonfiction at 2.31, so low verifiable density signals
    opinion/creative rather than factual material.'
  locator: 'Section 3.2 / Table 1 (VerRatio column: WP=0.03, FBs=2.31)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In the human verification study, only 55% of VeriScore-extracted claims were judged supported
    against retrieved evidence, leaving a large residual unsupported/inconclusive band.
  locator: Section 3.3 'Only over half of the claims are supported.' / Table 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Human raters preferred VeriScore's one-step extraction over SAFE's two-step extract-and-revise
    pipeline 93% of the time; SAFE was preferred only 26 of 360 times, 19 of those marginally, and VeriScore
    drops SAFE's expensive revision step.
  locator: Appendix D / Section 3.1 Results (human preference study, 360 items)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Open-domain claim verification fails on complex, non-entity-centric claims: verifying support
    requires extensive reasoning over the connection between claim parts rather than exact or related
    term matching against search snippets.'
  locator: Section 3.3 (support-rate discussion) / Section 4.4.2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: VeriScore cannot reliably decide whether an unsupported complex claim is a hallucination because
    that judgment exceeds what reasoning over search snippets can achieve, indicating such claims should
    route to review or an inference label.
  locator: Section 4.4.2 (concluding paragraph on unsupported claims)
  confidence: medium
  quote_available: true
  notes: ''
