extracted_facts:
- evidence_id: ev_001
  text: 'CiteME''s alignment unit is claim-to-single-source: it is the first manually curated citation-attribution
    benchmark whose text excerpts each unambiguously reference a single specific paper.'
  locator: Sec 2 / Introduction — definition of CiteME instance
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Unaided frontier LMs reach only 4.2-18.5% accuracy on CiteME versus 69.7% for human experts, and
    CiteAgent (a GPT-4o autonomous agent that can search and read papers) closes much of the gap at 35.3%.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Prior state-of-the-art retrieval systems SPECTER2 and SPECTER score 0% on CiteME, and even CiteAgent's
    best 35.3% leaves a 34.4% gap below the 69.7% human accuracy.
  locator: Sec 5 Results — Table 3 and surrounding text
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'CiteME is adversarially filtered: instances GPT-4o could answer from memory (no internet/tools,
    5 runs) were removed, dropping 124 samples to leave 130 total.'
  locator: Sec 2 — Filtering Out the Easy Instances
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Human accuracy of 69.7% was measured on 100 samples by 20 experts not involved in construction,
    each given a 2-minute cap and averaging 38.2 seconds per item, so it likely understates maximum human
    performance.
  locator: Sec 2 — Human Evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Excerpts were curated by 4 ML graduate students to reference a single paper with enough context
    to find it, and 'trivial' excerpts containing author names or title acronyms (which merely test memorization/retrieval)
    were excluded.
  locator: Sec 2 — Curation; criterion (3) Non-Trivial vs Trivial
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: A later evaluation reports GPT-o1 scoring 61.3% on CiteME, but the authors estimate it had memorized
    roughly 38.7% of the dataset, inflating its apparent attribution skill.
  locator: Later revision / external NeurIPS summary (NOT in scraped v2 text)
  confidence: medium
  quote_available: false
  notes: ''
