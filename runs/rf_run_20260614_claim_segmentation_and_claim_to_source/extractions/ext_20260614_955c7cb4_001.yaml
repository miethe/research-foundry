- evidence_id: ev_001
  text: RAGTruth defines Evident Conflict as RAG output that directly contradicts the retrieved source
    content, which is easily verifiable.
  locator: Sec. Hallucination type taxonomy (Evident Conflict)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Subtle Conflict is a divergence from the source that alters the intended contextual meaning rather
    than a blatant contradiction.
  locator: Sec. Hallucination type taxonomy (Subtle Conflict)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: RAGTruth distinguishes evident baseless information (unsubstantiated content) from subtle baseless
    information defined as inferred details, insights, or sentiments beyond the source.
  locator: Sec. Hallucination type taxonomy (Evident / Subtle Introduction of Baseless Information)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The corpus comprises roughly 18,000 naturally generated RAG responses from diverse LLMs, manually
    annotated at both case and word levels.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The 2,965 annotated instances split into 989 question answering, 1,033 data-to-text writing, and
