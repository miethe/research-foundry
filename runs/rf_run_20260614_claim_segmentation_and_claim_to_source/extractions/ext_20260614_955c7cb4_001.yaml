  locator: Sec. Dataset statistics (instance counts by task)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_006
  text: Detecting evident hallucinations is markedly more effective than detecting subtle hallucinations,
    implying subtle-conflict and subtle-baseless cases are the hardest to auto-verify.
  locator: Sec. Detection results (evident vs subtle)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Span-level hallucination detection is hard: GPT-4-turbo reaches only 18.4% precision while a
    fine-tuned Llama-2-13B reaches 52.7% F1, motivating routing low-confidence span verdicts to review.'
  locator: Sec. Span-level detection benchmark
  confidence: medium
