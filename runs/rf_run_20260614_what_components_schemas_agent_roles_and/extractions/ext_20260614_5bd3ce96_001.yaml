- evidence_id: ev_001
  text: 'The spec mandates four-way claim labeling discipline: a research report may contain only supported
    claims mapped to source cards, labeled inference, labeled speculation, or explicitly unresolved claims.'
  locator: 'Section 2. Design principles, #3 ''Every material claim is auditable.'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The spec treats agent runs as rerunnable and disposable while the durable asset is the evidence
    bundle: source cards, extracted claims, claim ledger, report, reviews, and telemetry.'
  locator: 'Section 2. Design principles, #5 ''The swarm is disposable; the evidence bundle is durable.'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The spec splits model usage by cost: extraction, source-card creation, dedup, tagging, and formatting
    run on cheap/free models while synthesis, contradiction analysis, and final report construction use
    higher-reasoning models.'
  locator: 'Section 2. Design principles, #4 ''Cheap/free models extract; expensive models synthesize.'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The spec requires governance to be enforced as a runtime gate: work-provided keys, sensitive
    source material, model routing, and writeback targets are checked before execution.'
  locator: 'Section 2. Design principles, #6 ''Governance is a runtime gate, not a memo.'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'The spec maps external tools to MVP roles: GPT Researcher for web/local/hybrid cited reports,
    PaperQA2 for agentic RAG over papers with in-text citations, LiteLLM for cost-based routing with provider/model/tag
    budgets, and an Agent Council pattern for an Approve/Concern/Block voting review stage.'
  locator: Section 3. External tool fit (tool mapping table)
  confidence: medium
  quote_available: true
  notes: ''
