extracted_facts:
- evidence_id: ev_001
  text: GPT Researcher's core architecture uses planner agents that generate research questions, execution
    agents that gather information, and a publisher that aggregates findings into a comprehensive report.
  locator: Architecture
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The pipeline runs as discrete steps: create a task-specific agent, generate objective questions,
    crawl for information per question, summarize and source-track each resource, then filter and aggregate
    into a final report.'
  locator: Architecture (Steps list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The multi-agent assistant is built with LangGraph and AG2 and is explicitly inspired by the STORM
    paper, coordinating a team of agents from planning to publication.
  locator: Multi-Agent Assistant (👪)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: GPT Researcher aggregates over 20 sources and generates detailed reports exceeding 2,000 words,
    with an average multi-agent run producing a 5-6 page report in PDF, Docx, and Markdown.
  locator: Features / Multi-Agent Assistant
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Deep Research mode uses recursive tree-like exploration with configurable depth and breadth, taking
    ~5 minutes and costing ~$0.4 per run with o3-mini at high reasoning effort; the retriever supports
    hybrid web (Tavily) plus MCP sources.
  locator: Deep Research (✨) and MCP Client (🔧)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: GPT Researcher is distributed under the Apache 2 license, is LLM-agnostic via custom OpenAI-compatible
    APIs (OPENAI_BASE_URL), and integrates LangSmith for tracing and observability.
  locator: Disclaimer (🛡) / Getting Started / Observability
  confidence: medium
  quote_available: true
  notes: ''
