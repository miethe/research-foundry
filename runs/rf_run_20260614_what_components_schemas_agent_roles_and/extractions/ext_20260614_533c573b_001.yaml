extracted_facts:
- evidence_id: ev_001
  text: FActScore breaks a generation into a series of atomic facts and computes the percentage of those
    atomic facts that are supported by a reliable knowledge source.
  locator: Abstract / Section 2 (Definition)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: An atomic fact is defined as a short sentence conveying a single piece of information, which is
    the unit of per-claim labeling.
  locator: Section 2 (Definition of atomic fact)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Binary factuality judgments are inadequate for long-form text because generations mix supported
    and unsupported information, motivating per-claim rather than per-document scoring.
  locator: Abstract (motivation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Support is judged relative to a given knowledge source rather than against global truth, mirroring
    RF's source-card-relative verification model.
  locator: Section 2 (Definition / knowledge source)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: An automated estimator using retrieval plus a strong language model approximates the human FActScore
    with an error rate below 2%.
  locator: Abstract / Section 4 (Automated estimator)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: On biography generation, ChatGPT achieved only 58% FActScore, and GPT-4/ChatGPT were found more
    factual than public models such as Vicuna and Alpaca.
  locator: Abstract / Table 1 (results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The automated metric evaluated 6,500 generations from 13 recent LMs, a study that would have cost
    about $26K under human evaluation.
  locator: Abstract (scale of evaluation)
  confidence: medium
  quote_available: true
  notes: ''
