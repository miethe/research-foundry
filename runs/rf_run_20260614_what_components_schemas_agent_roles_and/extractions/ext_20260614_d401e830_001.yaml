extracted_facts:
- evidence_id: ev_001
  text: Anthropic's Research system uses an orchestrator-worker multi-agent architecture where a lead
    agent coordinates and delegates to specialized subagents that run in parallel.
  locator: 'Section: How we built our multi-agent research system (architecture overview)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A multi-agent system using Claude Opus 4 as the lead and Claude Sonnet 4 subagents beat single-agent
    Claude Opus 4 by 90.2% on Anthropic's internal research eval.
  locator: 'Section: Benefits and challenges of multi-agent systems'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Token usage alone explained 80% of the performance variance on the BrowseComp evaluation, with
    tool-call count and model choice as the other factors (three factors explaining 95% total).
  locator: 'Section: Benefits and challenges of multi-agent systems (BrowseComp analysis)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Agents typically consume about 4x more tokens than chat interactions, and multi-agent systems
    use about 15x more tokens than chats.
  locator: 'Section: Benefits and challenges of multi-agent systems (token economics)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The LeadResearcher saves its plan to Memory to persist context because exceeding the 200,000-token
    context window causes truncation and loss of the plan.
  locator: Process diagram explanation (workflow walkthrough)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: After research completes, the system passes all findings to a dedicated CitationAgent that processes
    the documents and report to identify specific citation locations.
  locator: Process diagram explanation (citation step)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Anthropic introduced two-level parallelism: the lead agent spins up 3-5 subagents in parallel
    and each subagent uses 3+ tools in parallel, cutting research time by up to 90% on complex queries.'
  locator: 'Section: Prompt engineering and evaluations, point 8 (Parallel tool calling)'
  confidence: medium
  quote_available: true
  notes: ''
