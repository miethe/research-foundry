extracted_facts:
- evidence_id: ev_001
  text: STORM (Synthesis of Topic Outlines through Retrieval and Multi-perspective Question Asking) is
    a writing system that targets generating grounded, organized long-form articles from scratch with
    breadth and depth comparable to Wikipedia pages.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'STORM models the pre-writing stage as three components: discovering diverse perspectives, simulating
    perspective-driven conversations with a topic expert grounded on trusted Internet sources, and curating
    the collected information into an outline.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: For evaluation the authors curate FreshWiki, a dataset of recent high-quality Wikipedia articles,
    and formulate outline assessments to evaluate the pre-writing stage.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Compared with an outline-driven retrieval-augmented baseline, more of STORM's articles are deemed
    organized (a 25% absolute increase) and broad in coverage (by 10%).
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Expert feedback from experienced Wikipedia editors surfaced new challenges for generating grounded
    long articles, including source bias transfer and over-association of unrelated facts.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper was accepted to the NAACL 2024 Main Conference and first submitted to arXiv on 22 February
    2024 (v1), with a v2 revision on 8 April 2024.
  locator: arXiv metadata (Comments / Submission history)
  confidence: medium
  quote_available: true
