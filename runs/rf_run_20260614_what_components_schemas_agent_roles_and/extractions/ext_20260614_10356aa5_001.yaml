extracted_facts:
- evidence_id: ev_001
  text: PaperQA2 matches or exceeds subject-matter-expert performance on three realistic literature research
    tasks even when humans have unrestricted access to the internet, search tools, and time.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: PaperQA2 produces cited, Wikipedia-style topic summaries that are significantly more accurate
    than existing human-written Wikipedia articles.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The paper introduces LitQA2, a hard scientific-literature-research benchmark that guided PaperQA2's
    design and drove it to exceed human performance.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Applied to contradiction detection, PaperQA2 identifies an average of 2.34 +/- 1.99 contradictions
    per paper in a random subset of biology papers, ~70% of which are validated by human experts.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors used a rigorous human-AI comparison methodology spanning information retrieval, summarization,
    and contradiction detection to evaluate the agent on real-world literature search tasks.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
