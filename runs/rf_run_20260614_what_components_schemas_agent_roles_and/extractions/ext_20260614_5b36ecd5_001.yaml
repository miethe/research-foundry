extracted_facts:
- evidence_id: ev_001
  text: PaperQA2's agentic workflow is organized as three tools — Paper Search, Gather Evidence, and Generate
    Answer — that a language agent can invoke in any order.
  locator: 'Section: PaperQA2 Algorithm'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: PaperQA2's core retrieval mechanism is reranking and contextual summarization (RCS), combining
    document metadata-aware embeddings with LLM-based re-ranking and contextual summarization.
  locator: 'Section: What is PaperQA2'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In the Gather Evidence phase, PaperQA2 creates a scored summary of each retrieved chunk in the
    context of the query, then uses an LLM to re-score and select the most relevant summaries.
  locator: 'Section: PaperQA2 Algorithm (Gather Evidence phase)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: PaperQA2 in-text citations reference contexts using a key pattern of the form (pqac-abcd1234).
  locator: 'Section: Customizing Prompts'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The PaperQA2 answer object exposes the attributes formatted_answer, answer, question, and context
    (the summaries of passages found for the answer).
  locator: 'Section: Agentic Adding/Querying Documents'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: PaperQA2 defaults to OpenAI's gpt-4o-2024-11-20 model across the summary_llm, llm, and agent_llm
    roles.
  locator: 'Section: Choosing Model'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: PaperQA2's LLM interface is built on the lmi package, which uses litellm to support many LLM providers.
  locator: 'Section: Choosing Model'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: PaperQA2 integrates external metadata providers Semantic Scholar, Crossref, and Unpaywall, combining
    data from these sources (e.g., Unpaywall open-access links, Crossref bibtex, Semantic Scholar citations).
  locator: 'Section: What is PaperQA2 / Using Clients Directly'
  confidence: medium
  quote_available: true
  notes: ''
