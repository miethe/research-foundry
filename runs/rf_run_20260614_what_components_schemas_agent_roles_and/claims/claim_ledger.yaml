- claim_id: clm_inf01
  text: Across all five comparable systems (GPT Researcher, PaperQA2, STORM/Co-STORM, Anthropic Research,
    OpenAI Deep Research), a planner/decomposer role, one or more retrieval-execution roles, and a synthesis/aggregation
    role are universal, so RF's researcher and synthesizer roles are MUST-have while a standalone red-team
    role appears in none of them and is therefore CAN-defer for MVP.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_045
    - clm_046
    - clm_014
    - clm_039
    - clm_051
    - clm_071
    reasoning_summary: GPT Researcher (planner/execution/publisher), PaperQA2 (Paper Search/Gather Evidence/Generate
      Answer), STORM (Knowledge Curation/Outline/Article Generation/Polishing), and Anthropic (lead/subagents)
      all instantiate plan-retrieve-synthesize; none of the five carries a dedicated adversarial red-team
      role, so that role is not load-bearing for a minimal functional swarm.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: A dedicated post-research citation/attribution step is a MUST-have rather than a nice-to-have,
    because Anthropic runs a separate CitationAgent after the research loop and PaperQA2 embeds citation
    keys (pqac-abcd1234) into every answer, converging on the same pattern RF encodes as its claim ledger
    plus [claim:clm_NNN] markers.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_056
    - clm_017
    - clm_034
    - clm_036
    reasoning_summary: Two independent production systems (Anthropic, PaperQA2) externalize attribution
      as an explicit mechanism rather than trusting inline LLM citation, and RF's claim-id-terminated
      sentences plus source-card-linked ledger are the same idea; therefore traceability machinery, not
      just prose citations, is essential for a claim-traceable swarm.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'RF''s cheap-extract/expensive-synthesize split is validated by prior art rather than novel: it
    generalizes Anthropic''s Opus-4-lead / Sonnet-4-subagent tiering and PaperQA2''s single-tier gpt-4o-2024-11-20
    default, and the Anthropic finding that an Opus+Sonnet split beat single-agent Opus by 90.2% is direct
    evidence that role-based model tiering improves quality per dollar.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_052
    - clm_019
    - clm_051
    reasoning_summary: Anthropic explicitly tiers a strong lead over cheaper parallel subagents and reports
      a 90.2% gain; PaperQA2 keeps one mid-tier model across roles. RF's principle of routing extraction
      to cheap models and synthesis to strong models is the same lever the 90.2% result attributes performance
      to, so the divergence from PaperQA2's single-tier default is a justified design choice.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The single largest cost driver for any RF deep run is token volume, not model selection or orchestration
    overhead, because Anthropic found token usage alone explained 80% of BrowseComp performance variance
    and that multi-agent systems consume ~15x the tokens of a chat, implying RF's per-run budget gates
    (LiteLLM provider/model/tag budgets) are the correct primary cost-control lever.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_053
    - clm_054
    - clm_026
    - clm_024
    reasoning_summary: If token usage explains 80% of variance and multi-agent runs use ~15x chat tokens,
      then cost and quality both scale primarily with tokens; RF already maps LiteLLM to cost-based routing
      with budgets, so capping token spend per provider/model/tag is the dominant control, more than picking
      a cheaper model.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'RF''s choice to make the claim ledger the authority (every material claim maps to a source card
    or is labeled inference/speculation) is the strongest traceability discipline among the surveyed systems:
    GPT Researcher only source-tracks summaries, STORM cites at the article level, and even Anthropic
    and PaperQA2 attach citations to passages but do not enforce a four-way support/inference/speculation/unresolved
    partition.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_022
    - clm_046
    - clm_038
    - clm_056
    - clm_017
    reasoning_summary: GPT Researcher summarizes and source-tracks resources (clm_046), STORM produces
      article-level citations (clm_038), and Anthropic/PaperQA2 attach citations to passages (clm_056,
      clm_017), but none of the cards describes an explicit inference/speculation labeling partition;
      RF's four-way labeling (clm_022) is therefore a justified divergence that exceeds prior-art traceability.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: An evidence/source-card schema, a claim-ledger schema, and a report schema are the three MUST-have
    RF schemas, because every surveyed system materializes evidence units (chunks/contexts/sources), an
    attribution mapping (citation keys or a citation pass), and a final report, whereas RF's writeback
    targets (MeatyWiki/SkillMeat/CCDash) have no analog in any comparable system and are therefore safely
    CAN-defer post-MVP.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_023
    - clm_046
    - clm_018
    - clm_056
    - clm_026
    - clm_027
    reasoning_summary: RF's durable bundle is source cards + claims + ledger + report (clm_023); prior
      art universally has evidence units (clm_046, clm_018) and attribution + report (clm_056). Writeback
      to MeatyWiki/SkillMeat/CCDash (clm_026) is RF-specific with no prior-art analog, so it is deferrable
      while the three core schemas are not.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'RF''s biggest unjustified gap relative to prior art is the absence of an explicit context-persistence/memory
    mechanism in the MVP: Anthropic''s LeadResearcher must save its plan to Memory because exceeding the
    200,000-token window truncates and loses it, so a deep RF swarm that decomposes a query across many
    source cards will hit the same truncation failure mode unless a plan/state persistence step is treated
    as MUST-have.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_055
    - clm_023
    - clm_026
    reasoning_summary: Anthropic documents a concrete context-window failure (clm_055) that any long-horizon
      swarm shares. RF's durable bundle (clm_023) persists artifacts but the MVP CLI surface and tool
      map (clm_026) do not name a plan/state memory; this is a foreseeable gap RF should close by persisting
