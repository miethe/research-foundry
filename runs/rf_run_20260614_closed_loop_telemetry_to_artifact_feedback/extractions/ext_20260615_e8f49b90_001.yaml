extracted_facts:
- evidence_id: ev_001
  text: The survey states that it remains challenging for LLM-based AI agents to efficiently learn from
    feedback and iteratively optimize their strategies, which motivates the design of diverse feedback
    mechanisms.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The paper presents a structured taxonomy organizing feedback-mechanism research into four core
    categories: internal feedback, external feedback, multi-agent feedback, and human feedback.'
  locator: Section 3, Taxonomy of Feedback Mechanisms
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The authors claim to provide the first comprehensive survey of recent advancements in feedback
    mechanisms for LLM-based AI agents, covering methodologies, evaluation protocols, and benchmarks.
  locator: Section 1, Introduction (Contributions list)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The survey proposes a unified framework in which an LLM-based AI agent is composed of five modules:
    perception, planning, feedback, memory, and action.'
  locator: 'Section 2, Preliminary: A Unified Framework for LLM-based AI agents'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The survey categorizes evaluation of feedback mechanisms into outcome-based and process-based
    evaluation, noting most current evaluations are outcome-based and rely on task success rates.
  locator: Section 4.1, Evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'The taxonomy identifies three primary forms of human feedback: instructional feedback, corrective
    feedback, and preference-based feedback.'
  locator: Section 3.4, Human Feedback
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Comparative experiments are run on three benchmarks (HotpotQA, ALFWorld, and WebShop), with iterative-learning
    methods like Reflexion, ExpeL, and AutoGuide showing greater stability on long-term dynamic tasks
    than non-learning methods such as CoT, Act, and ReAct.
  locator: Section 5, Experimental Comparison
  confidence: medium
  quote_available: true
  notes: ''
