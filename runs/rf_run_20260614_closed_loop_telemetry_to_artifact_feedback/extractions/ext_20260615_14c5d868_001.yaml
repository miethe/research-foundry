extracted_facts:
- evidence_id: ev_001
  text: Standard frequentist p-values and confidence intervals are unreliable when experimenters choose
    sample sizes by continuously monitoring (peeking at) an A/B test.
  locator: Abstract (sentence 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper defines 'always valid' p-values and confidence intervals that let users act on data
    as it arrives while preserving valid statistical inference at any decision point.
  locator: Abstract (sentence 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Always-valid inference serves as an interface to a sequential hypothesis test, letting each user
    implement a test tailored to their own stopping preferences.
  locator: Abstract (sentence 3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Always-valid p-values are used to obtain multiple-hypothesis-testing control in the sequential
    context, addressing error compounding from repeated peeking.
  locator: Abstract (sentence 5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
