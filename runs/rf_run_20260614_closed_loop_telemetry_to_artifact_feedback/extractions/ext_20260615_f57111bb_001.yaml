contradictions_or_cautions:
- text: Uses a synthetic 'gold-standard' reward model as a stand-in for humans; functional forms are empirical
    fits within that setup.
  locator: card/trust
- text: Results come from a synthetic setup using a fixed "gold-standard" reward model as a proxy for
    humans, not from human preference data; functional forms are empirical fits within that regime and
    may not transfer unchanged to all real RLHF pipelines.
  locator: card/limitations
