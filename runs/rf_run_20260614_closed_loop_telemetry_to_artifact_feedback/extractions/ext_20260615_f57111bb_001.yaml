extracted_facts:
- evidence_id: ev_001
  text: Optimizing a proxy reward model too hard hinders true (gold) performance, operationalizing Goodhart's
    law in RLHF feedback loops.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper uses a synthetic setup where a fixed gold-standard reward model plays the role of humans
    and labels data used to train a proxy reward model.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Best-of-n sampling overoptimization follows a quadratic-in-distance form, R_bon(d) = d(alpha_bon
    - beta_bon * d), where d is the KL-based distance measure.
  locator: Section 1 (Introduction); functional forms
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: RL overoptimization follows a different, logarithmic form, R_RL(d) = d(alpha_RL - beta_RL * log
    d), so the functional form depends on the optimization method.
  locator: Section 1 (Introduction); functional forms
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The coefficients of the overoptimization relationship scale smoothly (predictably) with the number
    of reward-model parameters in both optimization methods.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: For RL, alpha_RL can be held constant across all reward-model sizes, leaving a clean scaling curve
    in beta_RL, while best-of-n's coefficients change smoothly with RM size.
  locator: Section 3.2 (Scaling with RM Parameter Count)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The study also measures how the relationship varies with reward-model dataset size, reward/policy
    parameter counts, and the KL-penalty coefficient in the RL setup.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
