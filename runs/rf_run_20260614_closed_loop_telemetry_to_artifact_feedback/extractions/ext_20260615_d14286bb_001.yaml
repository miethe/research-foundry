extracted_facts:
- evidence_id: ev_001
  text: Self-preference bias (SPB) is defined as a directional evaluative deviation in which an LLM judge
    systematically favors or disfavors its own outputs, quantified as beta_i = rho_i - rho_i^null.
  locator: Abstract / Section 3.4 (SPB quantification)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Across 20 models on 100 AlpacaEval tasks, SPB ranged from the strongest positive bias of +0.307
    (LongCat-Flash-Chat) to the strongest negative bias of -0.229 (Claude-Sonnet-4.5).
  locator: Section 4.2 (SPB of models), Table 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Empirical analysis across 20 mainstream LLMs found that advanced model capability is uncorrelated,
    or even negatively correlated, with low self-preference bias.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The proposed mitigation replaces holistic pointwise scoring with a pairwise forced-choice protocol
    over five independent dimensions: Relevance, Accuracy, Depth, Logic, and Clarity.'
  locator: Section 3.6 (SPB mitigation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The structured multi-dimensional strategy produced a statistically significant bias reduction
    across all subjects, lowering average SPB by 31.5%, with up to a 69.9% reduction for the worst-biased
    model (LongCat-Flash-Chat).
  locator: Section 4.4 (SPB mitigation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Human validation reached a 79.8% agreement rate on deliberately selected hard cases near the equal-quality
    (epsilon) boundary, supporting the construct validity of the equal-quality pairs.
  locator: Section 3.2 (Equal-quality pairs)
  confidence: medium
  quote_available: true
  notes: ''
