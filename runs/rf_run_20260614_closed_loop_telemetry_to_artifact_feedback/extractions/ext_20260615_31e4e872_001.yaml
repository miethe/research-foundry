extracted_facts:
- evidence_id: ev_001
  text: 'The document defines five retraining triggers for production ML pipelines: on demand, on a schedule,
    on availability of new training data, on model performance degradation, and on significant changes
    in data distributions.'
  locator: 'Section: ML pipeline triggers (intro sentence + bullets)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The 'on demand' trigger is ad hoc manual execution, while the 'on a schedule' trigger applies
    when new labeled data is systematically available on a daily, weekly, or monthly basis.
  locator: 'Section: ML pipeline triggers (On demand / On a schedule bullets)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The 'on model performance degradation' trigger retrains the model when there is noticeable performance
    degradation, with no universal numeric threshold specified.
  locator: 'Section: ML pipeline triggers (On model performance degradation bullet)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The 'on significant changes in data distributions' trigger (concept/data drift) fires when full
    online performance is hard to assess but significant changes in feature distributions are observed.
  locator: 'Section: ML pipeline triggers (On significant changes in data distributions bullet)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Continuous Training (CT) is defined as the model being automatically trained in production using
    fresh data based on live pipeline triggers.
  locator: 'Section: MLOps level 1 — Characteristics (Continuous Training)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Under MLOps Level 0 (manual process), a new model version is deployed only a couple of times per
    year.
  locator: 'Section: MLOps level 0 — Characteristics (Infrequent release iterations)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: MLOps Level 0 is characterized by a disconnection between ML and operations, with data scientists
    handing a trained model artifact to a separate engineering team for serving.
  locator: 'Section: MLOps level 0 — Characteristics (Disconnection between ML and operations)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: MLOps Level 1 adds automated data validation (before training, to decide whether to retrain or
    stop) and model validation (after training, before promotion to production) as pipeline steps beyond
    Level 0.
  locator: 'Section: MLOps level 1 — Data and model validation'
  confidence: medium
  quote_available: true
  notes: ''
