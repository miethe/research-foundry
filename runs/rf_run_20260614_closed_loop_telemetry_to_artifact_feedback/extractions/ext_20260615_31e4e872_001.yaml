contradictions_or_cautions:
- text: Vendor-authored (Google Cloud) architecture guidance; framing favors automated, pipeline-based
    MLOps and Google Cloud tooling, so its maturity ladder reflects a particular ideal rather than an
    industry standard.
  locator: card/limitations
- text: The document deliberately specifies no universal time interval or numeric performance threshold
