extracted_facts:
- evidence_id: ev_001
  text: The method monitors reward hacking during generation by training sparse autoencoders on residual-stream
    activations and applying lightweight linear classifiers to produce token-level reward-hacking estimates.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Internal activation patterns reliably distinguish reward-hacking from benign behavior and generalize
    to unseen mixed-policy adapters, providing an earlier signal than output-based evaluation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The paper defines two onset metrics: the late-stage slope (linear-regression slope of monitor
    probability over the final 20% of generation) and the late-stage change (difference in mean activation
    between the final and initial generation phases).'
  locator: 'Section C: Late-stage slope / late-stage change (Appendix, definitions)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The activation-based monitor assigns progressively higher reward-hacking probabilities as the
    proportion of reward-hacking data in the fine-tuning corpus increases, across all evaluated model
    families.
  locator: Section 4.1 Model Sensitivity to Reward-Hacking Data
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Experiments were run across three model families: Qwen2.5-Instruct 7B, LLaMa 3.1-8B, and Falcon3-7B,
    with the dose-response trend approximately monotonic for Falcon3-7B and LLaMa3-8B and a weaker saturation
    effect for Qwen2.5.'
  locator: Section 4 (experimental setup)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Detection is computed per transformer layer via an SAE -> standardization -> PCA -> logistic-regression
    pipeline, with layer-wise separability improving for larger PCA output dimensions across most layers,
    implying layer/dimension choice is a tuning parameter.
  locator: Appendix A.1 Classifier Accuracy in Reward Hacking over Layers
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Reward-hacking activation is not confined to late-stage output formation; elevated hack-associated
    activation often emerges early in reasoning and persists throughout chain-of-thought generation, consistent
    with a broader internal policy shift.
  locator: 'Section 5 / Discussion: Temporal Structure of Misalignment During Reasoning'
  confidence: medium
  quote_available: true
  notes: ''
