extracted_facts:
- evidence_id: ev_001
  text: Repeatedly applying a standard z-test during data collection inflates an intended 5% false-positive
    rate to roughly 10% after only two analyses.
  locator: 'Section: Peeking is a common source of unintended risk inflation'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Framework choice is driven by two parameters: whether data arrives in batch or streaming, and
    whether the maximum sample size can be reasonably estimated in advance.'
  locator: 'Section: TL;DR'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Group Sequential Tests are generally the highest-power method, outperforming the alternatives
    even when the expected sample size is overestimated.
  locator: 'Section: Results (Power)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Severely underestimating the sample size (50x) costs an Always Valid Inference test about 15%
    power versus a correctly tuned GAVI and about 30% versus a correctly specified GST.
  locator: 'Section: When you can''t estimate the expected sample size (Table 3)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: When the number of interim analyses is kept low, a simple Bonferroni correction on standard z-tests
    is competitive with Always Valid Inference approaches.
  locator: 'Section: Results (Power)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Always Valid Inference requires no advance sample-size estimate and supports streaming, but is
    by construction less powerful on batch data than on streaming data.
  locator: 'Section: Always valid inference (Pros/Cons)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: GST requires knowing or estimating the maximum sample size in advance and is not feasible to run
    in a streaming fashion because its critical values must be solved numerically.
  locator: 'Section: Group sequential tests (Cons)'
  confidence: medium
  quote_available: true
  notes: ''
