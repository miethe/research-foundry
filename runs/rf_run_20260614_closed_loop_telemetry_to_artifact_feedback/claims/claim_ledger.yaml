- claim_id: clm_inf01
  text: For an agentic SDLC artifact-improvement loop, telemetry signals split cleanly into leading signals
    that predict quality before a revision lands (per-trace token/cost/latency attribution, tool-call
    provenance, activation- or chain-length-based reward-hacking onset) and lagging signals that only
    confirm a revision worked (quality-gate pass rates, human-edit/rework counts, regression-test outcomes),
    and the loop should gate promotion on lagging signals while using leading signals only to prioritize
    which artifacts to revise.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_006
    - clm_007
    - clm_047
    - clm_063
    - clm_012
    - clm_030
    - clm_038
    reasoning_summary: clm_006-007 give per-trace cost/latency/tool provenance as cheap pre-outcome signals;
      clm_047 and clm_063 show activation and chain-length signals precede the bad output (earlier than
      output-based eval); clm_012/clm_030 (regression tests) and clm_038 (output evals confirming alignment)
      are post-hoc confirmations. The leading/lagging split follows directly.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Human-edit and rework counts are the most reliably quality-improving lagging telemetry signal
    for artifact versioning because, unlike automated scores, each human-reviewed failure converts losslessly
    into a permanent regression-test row (Braintrust trace-to-dataset) and simultaneously serves as ground
    truth to calibrate the cheaper LLM-as-a-judge scorers, so the same human edit improves both the artifact
    and the future-measurement instrument.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_030
    - clm_031
    - clm_032
    - clm_034
    reasoning_summary: clm_030 turns each human-reviewed failure into a permanent regression row; clm_031
      uses human scores as ground truth to calibrate judges; clm_032 runs those calibrated scorers across
      CI and prod; clm_034 shows the failure mode of NOT closing this loop. Together they make human edits
      dual-purpose (artifact fix + instrument calibration).
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Quality-gate pass rate is a hazardous primary feedback signal: because LLM-as-a-judge gates carry
    self-preference bias as large as +0.307 to -0.229 and capability does not protect against it, optimizing
    artifact versions to raise an automated pass rate risks Goodhart-style overoptimization where measured
    ''gold'' quality first rises then falls, so pass-rate gates must be debiased (pairwise multi-dimensional
    scoring) and pinned to human-calibrated ground truth before they drive revision.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_053
    - clm_054
    - clm_055
    - clm_073
    - clm_031
    - clm_057
    reasoning_summary: clm_053-055 establish SPB magnitude and that capability is no safeguard; clm_073
      establishes Goodhart overoptimization of a proxy; clm_031 gives human calibration as the fix and
      clm_057 gives pairwise multi-dim scoring as a 31.5% bias reduction. The risk-and-remedy conclusion
      follows.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: Continuous monitoring of any per-version quality metric (the closed-loop analog of A/B peeking)
    inflates false-positive 'this revision helped' decisions from a nominal 5% toward ~10% after just
    two looks, so a telemetry-to-artifact loop that promotes on the first favorable reading without sequential
    correction will systematically promote noise-driven non-improvements.
