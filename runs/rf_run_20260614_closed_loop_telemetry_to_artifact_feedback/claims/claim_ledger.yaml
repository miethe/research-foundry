  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'The recommended signal-to-revision lag should be set by statistical confidence rather than the
    calendar: use Always Valid Inference (no advance sample-size estimate, streaming-friendly) to permit
    early promotion only once an always-valid p-value crosses threshold, accepting roughly 15-30% lower
    power than a correctly tuned GST/GAVI as the price of acting before the sample size is known.'
