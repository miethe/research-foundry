- evidence_id: ev_001
  text: At the single-step level, the best model (Claude Sonnet 4) compiles only about half its translations
    at 52.1% CSR, ahead of Qwen2-VL (35.3%) and DeepSeek-VL (32.8%).
  locator: Key Findings — step-level CSR
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On full-pattern, project-level generation, closed-source models (GPT-4o, Gemini, Claude) collapse
    to only 4-5% compilation success.
  locator: Key Findings — project-level CSR (closed-source)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: At the project level, the open-source Qwen2-VL surprisingly outperforms closed-source models,
    reaching 21.0% CSR.
  locator: Key Findings — project-level CSR (open-source)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'CrochetBench groups compilation errors into four families: syntax structure, stitch definition,
    labeling and reference, and structural/formatting issues.'
  locator: Key Findings — error taxonomy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Failure modes differ by model family: closed-source models fail mostly on label/reference inconsistencies,
    while open-source models fail more on undefined stitches and syntax errors.'
  locator: Key Findings — failure-profile differences
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The benchmark identifies a sharp performance decline when shifting from textual similarity to
    executable correctness, exposing limits in long-range symbolic reasoning and 3D-aware procedural synthesis.
  locator: Key Findings — limiting bottleneck
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: CrochetBench frames the core gap as the distance between describing visual content and generating
    functionally correct, executable procedures with valid symbolic grammar, numerical accuracy, and topological
    coherence.
  locator: Introductory framing
  confidence: medium
  quote_available: true
  notes: ''
