- evidence_id: ev_001
  text: CrochetPARADE defines a custom DSL grammar for stitches and patterns expressly to ensure precision
    and avoid the ambiguity of plain-English crochet instructions.
  locator: README / OVERVIEW section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The engine parses and validates any user-supplied pattern for correctness, builds a virtual model,
    and renders it in 3D - the compile/validate/render gate.
  locator: README / OVERVIEW section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Beyond rendering, the debugger flags overly loose or tight stitches so users can correct them
    before crocheting, reducing the need for blocking - structural feasibility checking.
  locator: README / OVERVIEW section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Exports include an auto-generated standard-symbol crochet chart plus an SVG that identifies each
