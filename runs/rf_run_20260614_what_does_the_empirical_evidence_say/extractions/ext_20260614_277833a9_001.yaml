extracted_facts:
- evidence_id: ev_001
  text: CrochetBench reframes the evaluation of vision-language models from describing visual content
    to generating executable crochet procedures, requiring stitch recognition, structurally appropriate
    instruction selection, and compilable procedure generation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The benchmark dataset comprises 6,085 real crochet patterns scraped from Yarnspirations, spanning
    55 project categories with over 98% image coverage and ranging from beginner to expert difficulty.
  locator: Dataset / Section 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Correctness is measured by functional executability using the CrochetPARADE DSL validator, which
    checks whether predicted DSL programs are syntactically valid, structurally consistent, and fully
    executable, rather than by textual similarity.
  locator: Methodology / Evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Task D (NL-to-DSL translation) tests stateful procedural reasoning with step-level and project-level
    variants, the latter providing the full natural-language instruction alongside the product image rather
    than as an isolated image-to-DSL task.
  locator: Tasks / Section 4 (Task D)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Across all tasks, model performance declines sharply as evaluation shifts from surface-level textual
    similarity to executable correctness, exposing limits in long-range symbolic reasoning and 3D-aware
    procedural synthesis.
  locator: Abstract / Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Larger models hallucinate undefined or non-existent stitches at substantially higher rates than
    smaller siblings, showing model scale does not fix structural validity (Qwen2-VL-72B 72.0% vs Qwen2-VL-7B
    13.6%; Gemma-3-27B 42.6% vs Gemma-3-4B 27.4%).
  locator: Results / Error Analysis
  confidence: medium
  quote_available: true
  notes: ''
