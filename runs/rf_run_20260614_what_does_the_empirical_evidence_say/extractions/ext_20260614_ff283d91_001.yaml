  notes: ''
- evidence_id: ev_002
  text: 'The system uses a two-parser pipeline: the first parser builds a uniform structured representation
    defined as a formal language, and the second parser translates that formal language into a crochet
    diagram.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The authors report the approach succeeds for a wide range of different crochet patterns, evidence
