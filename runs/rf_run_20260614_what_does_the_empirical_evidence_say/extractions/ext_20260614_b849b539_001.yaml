extracted_facts:
- evidence_id: ev_001
  text: CrochetBench defines four progressive tasks (stitch recognition, instruction selection, instruction
    generation, and image/NL-to-DSL translation into executable CrochetPARADE code), with the DSL-translation
    task split into a 119-item step-level set and a 100-item project-level set.
  locator: Tasks / Section 3 (task definitions, CrochetBench-Dstep and CrochetBench-Dproj)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On project-level DSL translation, even the strongest models (Claude, Gemini, and Qwen2-VL-7B)
    produced only about 5-8% executable programs, indicating valid generations are rare.
  locator: Section 4 / Project-level DSL translation results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Stitch recognition F1 stayed in the high-50s to low-60s across leading models: Claude Sonnet
    4 at 60.94%, GPT-4o at 58.01%, and Gemini 2.5 Flash-Lite at 56.83%.'
  locator: Table 2 / Stitch recognition (multi-label classification) F1 results
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: Across all tasks, model performance dropped sharply as evaluation shifted from surface-level similarity
    to executable correctness, exposing limits in long-range symbolic reasoning and 3D-aware procedural
    synthesis.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Even when a model emits a compilable DSL program, the rendered result rarely resembles the intended
    pattern, so syntactic validity does not imply correct procedural structure.
  locator: Section 4 / DINO image-similarity analysis of rendered DSL outputs
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Models can produce fluent, crochet-like text while failing to preserve the algorithmic structure
    needed for faithful pattern synthesis, evidencing a gap between perception and procedural synthesis.
  locator: Section 4 / qualitative analysis (surface-level fluency vs. procedural correctness)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The paper frames its core takeaway as a gap between surface-level understanding and executable
    precision in real-world creative domains, which for KnitWit implies any image/PDF-to-IR importer must
    gate on an executable IR validator to catch the large fraction of invalid generations.
  locator: Conclusion / Abstract (executable-precision framing)
  confidence: medium
  quote_available: true
  notes: ''
