    on conventional prose reaches ~74% (DeepSeek-R1-Distill-Llama8b), single-step VLM translation tops
    out near 52% CSR (Claude Sonnet 4), and full-pattern project-level generation collapses to 4-5% for
    closed-source models, so length and must-execute structural carryover are the dominant failure axis,
    not stitch perception.'
