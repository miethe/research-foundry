extracted_facts:
- evidence_id: ev_001
  text: The framework is a parametric model that generates crochet patterns for NURBS surfaces using a
    10-stitches-by-10-rows tension swatch to calibrate the digital-to-physical mapping.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The generated crochet patterns are text-based, step-by-step representations explicitly analogized
    to g-code in additive manufacturing, serving documentation and communication of the crocheting process.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The method extends to branching geometries by decomposing a parametric form into multiple components
    that can be crocheted by multiple crafters.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: As proof of concept, a branching structure of 14 unique components was designed and crocheted
    by two architecture students at Pennsylvania State University, each completing 7 components.
  locator: Abstract / Proof-of-concept
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Per-crafter tension swatches capture individual gauge variables, so different users can crochet
    different components while preserving the digitally designed geometry and dimensional accuracy.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors frame the approach as enabling a collective, distributed crocheting platform and an
    alternative path for transitioning from the digital to the physical.
  locator: Abstract / Conclusions
  confidence: medium
  quote_available: true
  notes: ''
