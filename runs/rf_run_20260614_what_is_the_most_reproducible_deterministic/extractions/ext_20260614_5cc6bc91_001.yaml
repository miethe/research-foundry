extracted_facts:
- evidence_id: ev_001
  text: AmiGo takes a closed triangle mesh M=(V,E), a seed vertex s, and a stitch width w as input, and
    only handles closed surfaces because amigurumi are stuffed.
  locator: Sec. Overview / Input (problem setup)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The row function is the geodesic distance f(v)=d(v,s) computed via the Heat Method with diffusion
    time t set to the average edge length squared.
  locator: Sec. Row function (geodesic field)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The column function g is found by minimizing the integral of |<J grad f, grad g> - 1|^2 subject
    to g=0 on the longest boundary path B along which f is strictly monotone.
  locator: Sec. Column function (Eq. minimizing the integral)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Consecutive rows of the crochet graph G=(S, R union C) must be coupled, and a minimal coupling
    is computed by Dynamic Time Warping minimizing the summed inter-vertex distance.
  locator: Sec. Crochet graph / Coupling (DTW, Eq. 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A transducer over two coupled rows emits single crochet, decrease dec(x), or increase inc(x) based
    on how many vertices connect to a head; the paper states no explicit numeric cap on inc/dec rate.
  locator: Sec. Transducer (instruction emission over coupled rows)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Regions of negative mean curvature with positive Gaussian curvature cannot be realized by crocheting
    and stuffing alone, and are preprocessed with Conformal Mean Curvature Flow until mean curvature is
    positive everywhere.
  locator: Sec. Curvature handling / preprocessing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: AmiGo is implemented in Matlab and C++ using Heat Geodesics, geodesic paths, and ShapeUp; the
    Teddy example yields 60 rows, 6 segments, and 3670 stitches in 2.5 minutes, with no code or data release
    stated.
  locator: Sec. Implementation & Results (Table 2)
  confidence: medium
  quote_available: true
  notes: ''
