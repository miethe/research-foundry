extracted_facts:
- evidence_id: ev_001
  text: The method takes a written crochet pattern as input, translates it into a graph, and computes
    a force-directed graph layout to produce a 3D representation matching the hand-crocheted object in
    shape and size.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The digital preview lets a designer adjust a pattern from the model without physically crocheting
    it, removing the manual crochet/modify/redo iteration loop.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Conventional crochet pattern design is iterative and wasteful: a pattern is crocheted, evaluated,
    then stitches are undone and remade across multiple guesswork-heavy iterations involving manual labor.'
  locator: Abstract / Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The tool targets both professional designers and beginners, helping designers visualize a pattern
    before investing time and effort to physically make it.
  locator: Abstract (intended audience)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The modeling tool consumes patterns written in row-by-stitch notation, the most common notation
    for amigurumi, and represents each graph node as a sphere so the user can see individual stitches.
  locator: Introduction (input notation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper is a 2025 Eurographics primary source (Expressive Symposium / WICED 2025, DOI 10.2312/exw.20251057,
    ISBN 978-3-03868-271-4), published open-access by The Eurographics Association.
  locator: Publication metadata (BibTeX / venue)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Prior crochet-from-shape tools are constrained: Nakjan et al. let users trace 2D shapes converted
    to 3D and then to a pattern but are limited to relatively symmetrical shapes such as spheres and cylinders.'
  locator: Section 2, Previous Work
  confidence: medium
  quote_available: true
  notes: ''
