extracted_facts:
- evidence_id: ev_001
  text: The report's recommended inverse baseline, 'Amigurumi Graph Lite' (Geodesic Row Planner), generates
    rows around a chosen seed axis and sets each row's stitch count from the mesh circumference at that
    height versus gauge, deliberately de-scoping AmiGo by handling only single-part convex meshes first.
  locator: Recommended Baseline Candidates -> Inverse Pipeline Baseline ('Amigurumi Graph Lite')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The report states a concrete crochetability heuristic: keep each row''s stitch count within +/-1
    of the smooth ratio, insert increases evenly, and never grow more than about 2x stitches from one
    round to the next (ideally less), flagging regions that would need a sudden large increase for segmentation.'
  locator: Recommended Baseline Candidates -> Inverse Pipeline Baseline (complexity / increase rules)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The report documents a deterministic geometry-mapping family (AmiGo-style: trace a continuous
    geodesic/iso-curve path that spirals around the shape, inserting increases on positive curvature and
    decreases on negative curvature) as distinct from the other inverse families it catalogs.'
  locator: Taxonomy & Approach Families -> 3D Object -> Pattern Generation Approaches (Deterministic Geometry
    Mapping)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The report''s inverse-mapping taxonomy enumerates four families with capability matrices: deterministic
    geometry mapping (AmiGo / Capunaman NURBS-UV), shape templates and segmentation / primitives (Nakjan
    sketch-to-primitive, Crochet Lathe), optimization and constraint-solving, and ML-assisted pipelines.'
  locator: Taxonomy & Approach Families -> 3D Object -> Pattern Generation Approaches (the four families)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The report flags that for surfaces of revolution the inverse mapping is essentially a solved problem
    analytically, supporting symmetric shapes as the lowest-risk first milestone.
  locator: Annotated Bibliography -> Alexander Avtanski, 'Crochet Lathe' (relevance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'The report notes AmiGo-style general-mesh inverse mapping is higher risk: no public code, implemented
    in Matlab/C++, and reported running times of seconds to minutes (not real-time).'
  locator: Annotated Bibliography -> AmiGo (Edelstein et al.) (code/maturity)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'The report identifies a top de-risk experiment defining a max-curvature / rate-of-increase threshold:
    a shape feature forcing roughly a >50% single-round increase is treated as not reliably crochetable
    and must be segmented.'
  locator: 'Gaps + De-risk Experiments -> #5 Max Curvature & Rate of Increase'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The report names seed/seam placement effect on pattern symmetry, and round-trippability of a generated
    pattern back through the forward visualizer/validator, as key open de-risk experiments for the inverse
    pipeline.
  locator: 'Gaps + De-risk Experiments -> #4 Seed Point & Seam Placement; #2 / #7 round-trip validation'
  confidence: medium
  quote_available: true
  notes: ''
