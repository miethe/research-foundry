extracted_facts:
- evidence_id: ev_001
  text: AmiGo takes a closed triangle mesh plus a single user-specified point as input and outputs crochet
    instructions that, when crocheted and stuffed, approximate the input geometry.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The method's core representation is a 'Crochet Graph' whose geometry and connectivity are constructed
    and then translated into a human-crochetable pattern.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The shape is segmented automatically into crochetable components that are joined with the 'join-as-you-go'
    method, eliminating any additional sewing.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Segmentation iterates over saddle points: for each saddle, the isoline of the geodesic field
    is computed and a new segment is sliced for each resulting connected component.'
  locator: Section 7.2.1 Mesh to Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The order in which the segments are crocheted is fixed by a topological sort of the directed segment
    adjacency graph.
  locator: Section 7.2.1 Mesh to Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors demonstrate the pipeline across a large variety of shapes and report that it yields
    easily crochetable patterns.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
