- evidence_id: ev_003
  text: 'Inputs are an OBJ mesh plus user-defined constraints: the interface loads an .obj model and saves
    user-marked boundary/direction constraints to a .cons file.'
  locator: 'Usage > Step 1: Constraints'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Constraints must cover all boundaries and can additionally be placed to control knitting direction,
    with a region-cut option for meshes without boundaries.
  locator: 'Usage > Step 1: Constraints (final paragraph)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Stitch geometry is parameterized by obj-scale, stitch-width, and stitch-height, giving stitch
    size relative to the scaled object.
  locator: 'Usage > Step 2: Peeling/Linking (Manual method)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'The pipeline runs Constraints -> Peeling/Linking -> Scheduling -> Knitout with a distinct intermediate
    file format per stage: .cons constraints, .st traced stitches, .js scheduling/javascript, and .k knitout.'
  locator: Usage > Steps 1-4 (pipeline + file formats)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Peeling/Linking converts the mesh into a row-column graph, and the implementation is described
