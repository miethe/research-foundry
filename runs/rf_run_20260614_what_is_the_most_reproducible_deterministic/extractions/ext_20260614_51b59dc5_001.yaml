extracted_facts:
- evidence_id: ev_001
  text: The algorithm requires a UV-parameterized surface as input, deriving stitch direction and connectivity
    from the surface's parameter directions rather than from a single seed point.
  locator: Discussion / Limitations (full text)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Because the platform (Grasshopper for Rhino) evaluates NURBS, the method relies on NURBS UV division
    to transfer a 3D geometry into a crochet pattern.
  locator: Sec. 'Computing Stitches for Crocheting Non-symmetrical' (full text)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The crafter's hand effect (grip on the yarn) is captured empirically through six different physical
    10-by-10-stitch tension swatches crocheted before running the algorithm.
  locator: Fig. 4 caption (full text)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Gauge variables are split into determinate inputs (yarn weight, hook size) and an indeterminate
    input — the crafter's grip on the yarn — which the swatch is used to measure.
  locator: Sec. 2 / variables (full text)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The work formalizes crochet of non-symmetrical 3D objects as a computer algorithm whose output
    is a conventional, human-readable text crochet pattern, going beyond axially symmetric revolved surfaces
    (sphere, cylinder, cone, ellipsoid).
  locator: Abstract / Sec. 3 (full text)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The study has two stages — an analytical systematic approach to crocheting 3D objects to discover
    the underlying computational aspects, then a formal representation of that logic as a computer algorithm.
  locator: Abstract (Springer landing page)
  confidence: medium
  quote_available: true
  notes: ''
