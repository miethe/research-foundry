extracted_facts:
- evidence_id: ev_001
  text: HALO is a low-cost outdated-fact filtering framework that quantifies the temporal validity of
    historical facts via half-life theory, rather than retraining the underlying model.
  locator: Abstract / Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: HALO models a fact's temporal validity with exponential decay V(ti,tHF)=V0*e^(-lambda*(tc-ti)),
    where lambda is the decay rate derived from the fact's half-life.
  locator: Methodology (Eq. 10), validity decay
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The half-life of a fact is defined as the time at which its validity has decreased to half of
    its initial value.
  locator: Methodology, half-life definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: HALO classifies facts as active or inactive and computes per-category half-lives, using the average
    update time interval; active facts that update more frequently have shorter half-lives (non-uniform
    decay).
  locator: Methodology (Eq. 8), active vs inactive facts
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The half-life of active facts is derived from the average update time interval across the fact
    set.
  locator: Methodology, half-life computation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A fact is treated as outdated and filtered once its temporal influence falls below a predefined
    threshold theta (or it exceeds its expiration date).
  locator: Methodology, outdated fact definition
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Applying HALO filtering raises RE-GCN on ICEWS14 from 37.67 to 41.38 MRR (+3.71) and 27.68 to
    30.52 Hits@1 (+2.84).
  locator: Experiments (Table 1), ICEWS14
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_008
  text: Applying HALO filtering raises CyGNet on ICEWS14 from 45.45 to 47.88 MRR (+2.43) and 37.46 to
    41.24 Hits@1 (+3.78); HALO is evaluated over 5 baselines on ICEWS14, ICEWS18, and ICEWS05-15.
  locator: Experiments (Table 1), ICEWS14
  confidence: medium
  quote_available: true
  notes: ''
