contradictions_or_cautions:
- text: The claim/covariate extraction (ev_002) carries the structured description/type/temporal-validity
    detail per the paper's element-instance design, but the verbatim quote captured here covers the factual-statement
    definition rather than the full schema. Win-rate figures (ev_006) are LLM-as-judge head-to-head preferences,
    not ground-truth accuracy. Results are from the authors' own evaluation on two ~1M-token datasets
    (Podcast transcripts, News articles); generalization beyond these conditions is not established. Quotes
    drawn from the arXiv HTML v2 (revised Feb 2025).
  locator: card/limitations
