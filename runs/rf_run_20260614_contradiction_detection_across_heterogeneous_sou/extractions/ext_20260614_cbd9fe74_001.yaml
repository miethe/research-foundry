- evidence_id: ev_001
  text: 'The study builds a synthetic dataset of 1,867 samples spanning four conflict classes: 37.49%
    no contradiction, 26.30% self, 19.07% pair, and 17.14% conditional.'
  locator: Section 4 (Dataset), Table 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On a 140-example human validation study, two expert annotators reached only 74% inter-annotator
    agreement, indicating contradiction detection is hard even for people.
  locator: Section 4, human evaluation paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On conflict detection, Claude-3 Sonnet+CoT scored highest at 0.710 accuracy, Llama3.3-70B basic
    next at 0.679, and Llama3.1-8B basic lowest at 0.380.
  locator: Table 3 (Conflict Detection, Accuracy column)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: 'Chain-of-thought prompting is architecture-dependent: it raised Claude-3 Sonnet by 31% (and Haiku
    46%) but degraded Llama-70B by 26%.'
  locator: Section 6 (Results), conflict detection paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Difficulty follows a consistent hierarchy: pair contradictions easiest (Llama-70B basic 0.893),
    conditional moderate, and self-contradictions hardest, with accuracies from 0.006 to 0.456.'
  locator: Section 7 (Ablation Studies), RQ1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Model size has mixed effects: in type detection the smaller Llama-8B outperformed the larger
    Llama-70B by about 6%, suggesting type detection rests on fundamental understanding rather than raw
    scale.'
  locator: Section 6 (Results), type detection paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Across all models, contradiction detection showed high precision but low recall, meaning models
    rarely false-flag but miss many real contradictions.
  locator: Section 6 (Results), conflict detection paragraph
  confidence: medium
  quote_available: true
  notes: ''
