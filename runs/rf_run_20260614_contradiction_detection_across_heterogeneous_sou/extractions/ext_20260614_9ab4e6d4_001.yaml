extracted_facts:
- evidence_id: ev_001
  text: 'The survey organizes knowledge conflicts in LLMs into three categories: context-memory, inter-context,
    and intra-memory conflict.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Context-memory conflict is defined as contextual (input) knowledge conflicting with the parametric
    knowledge stored in the LLM's parameters.
  locator: Section 2 (Context-Memory Conflict, intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Inter-context conflict is defined as conflict among different pieces of contextual knowledge,
    i.e., contradictions among retrieved or source documents.
  locator: Section 3 (Inter-Context Conflict, intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Intra-memory conflict is defined as conflicting knowledge within the LLM's own parameters, arising
    from inconsistencies in pre-training data.
  locator: Section 4 (Intra-Memory Conflict, intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The survey reports that LLMs tend to be highly receptive to external evidence even when it conflicts
    with their parametric memory.
  locator: Section 2.2 (Model behaviors, General subsection; attributing Xie et al. 2023)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Under inter-context conflict, the survey notes LLMs can favor evidence that aligns with their
    parametric memory, qualifying the simple over-trust narrative.
  locator: Section 3.2 (Inter-context conflict, model behaviors)
  confidence: medium
  quote_available: true
  notes: ''
