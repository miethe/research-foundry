extracted_facts:
- evidence_id: ev_001
  text: MiniCheck builds small fact-checking models that the authors report reach GPT-4-level performance
    at 400x lower cost, trained on GPT-4-synthesized factual-error data.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The best system, MiniCheck-FT5, has 770M parameters and is reported to outperform all systems
    of comparable size while reaching GPT-4 accuracy.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: For evaluation the authors introduce LLM-AggreFact, a unified benchmark that aggregates 10 existing
    datasets spanning both closed-book and grounded generation settings, with sentence-level factual errors
    labeled by human annotators.
  locator: Section 1 (Introduction); Figure 1 caption
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The task is framed as binary classification: each (document, claim) pair is scored, and a threshold
    (default t=0.5) maps the score to label 1 (supported) if above threshold and 0 (not supported) otherwise.'
  locator: Section 3 (Producing classification decisions / binary classifier)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Training data is produced by two synthetic generation methods: C2D (generate documents from human-written
    claims) and D2C (generate diverse, more realistic documents then derive claims to reduce train/test
    distribution shift).'
  locator: Section 3.1-3.2 (Claim to Doc (C2D) and Doc to Claim (D2C) Generation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: With automatic prefix caching (APC) enabled, inference over the 29K-example LLM-AggreFact test
    set takes about 30 minutes on a single NVIDIA A6000 (48 GB), versus about 55 minutes without caching.
  locator: Project GitHub README (Liyan06/MiniCheck)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'The released package ships multiple checkpoints selectable at scorer init: roberta-large, deberta-v3-large,
    flan-t5-large, and the state-of-the-art Bespoke-MiniCheck-7B.'
  locator: Project GitHub README (model selection)
  confidence: medium
  quote_available: true
  notes: ''
