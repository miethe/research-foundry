extracted_facts:
- evidence_id: ev_001
  text: Context validation over retrieved documents remains challenging even for state-of-the-art LLMs,
    with performance varying significantly across contradiction types.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Unlike prior contradiction-detection work that examines only 1-2 documents, this study evaluates
    LLMs detecting conflicts across many retrieved documents.
  locator: Sec. 2 Related Work (Contradiction Detection)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The paper defines three contradiction types - self-contradictory documents, contradicting document
    pairs, and conditional contradictions across a triplet - and a novel synthetic data generation framework
    simulating them in retrieved sets.
  locator: Sec. 2 / Contributions; Sec. 3 LLMs as Context Validators
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Chain-of-thought prompting is architecture-dependent: it improved Claude (31% Sonnet, 46% Haiku)
    but degraded Llama-70B by 26% on conflict detection.'
  locator: Sec. 6 Results (Conflict detection)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: On contradiction-type detection, CoT prompting unexpectedly decreased performance across most
    models, and the smaller Llama-8B beat the larger 70B by about 6%, suggesting type detection depends
    on fundamental understanding more than raw scale or reasoning prompts.
  locator: Sec. 6 Results (Type detection)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: All models showed high precision but low recall, meaning they are reliable when they flag a contradiction
    but miss many actual contradictions - a conservative bias relevant to a pre-generation validation
    gate.
  locator: Sec. 6 Results (precision/recall)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The work targets context-context conflicts (contradictions among retrieved documents), as opposed
    to context-memory conflicts between retrieval and parametric knowledge.
  locator: Sec. 1 Introduction
  confidence: medium
  quote_available: true
  notes: ''
