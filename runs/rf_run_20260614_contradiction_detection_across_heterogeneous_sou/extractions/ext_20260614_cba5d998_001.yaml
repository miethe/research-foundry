extracted_facts:
- evidence_id: ev_001
  text: GraphJudge uses the closed-source GPT-4o-mini in the denoising/extraction (ECTD) module and a
    fine-tuned open-source LLaMA-2-7B as the graph judge in the KASFT module.
  locator: Sec 5.1.3 Implementation Details / Large Language Model
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The graph-judgement step is defined as a triple-classification task that predicts a binary correct/incorrect
    label for each generated triple.
  locator: Sec 3 / Definition 2 (Graph Judgement Task)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On REBEL-Sub, GraphJudge reaches G-BERTScore-F1 0.5796 versus 0.4289 for GPT-4o-mini; on the domain-specific
    SCIERC it reaches 0.7283 versus 0.6882 for GPT-4o-mini.
  locator: Sec 5.2 Overall Performance Comparison / Table 1 (G-BS-F1 column)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Ablating the graph-judgement module ('w/o GJ') drops REBEL-Sub G-BERTScore-F1 from 0.5796 to 0.4203,
    confirming the judge is the precision driver.
  locator: Sec 5.3 Module Ablation Study / Table 2 (REBEL-Sub)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Trained on GenWiki and tested on REBEL-Sub, GraphJudge scores G-BERTScore-F1 0.5814 versus 0.4163
    for GPT-4o, evidence the judge generalizes across datasets.
  locator: Sec 5.4 Generalization Capabilities / Table 3 (GenWiki @ REBEL-Sub)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'GraphJudge is cost-effective: it reaches state-of-the-art performance by fine-tuning only a 7B
    LLM, versus the 70B LLM used by the PiVe verification baseline.'
  locator: Sec 5.2 / cost-effectiveness paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: In a SCIERC case study the naive GPT-4o-mini KG contained meaningless triples such as <We, suggest,
    goal>, which the fine-tuned graph judge filtered out so they did not appear in the GraphJudge KG.
  locator: Appendix J / Case Study
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The fine-tuned graph judge reaches over 90% judgement accuracy on REBEL-Sub and GenWiki, whereas
    un-tuned BERT and GPT-4o perform poorly on the same task.
  locator: Sec 5.3 / Effect of Knowledge Aware Supervised Fine-Tuning
  confidence: medium
  quote_available: true
  notes: ''
