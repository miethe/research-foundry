    a soft semantic match, not exact-match F1.
  locator: card/trust
- text: Evaluated on 2000-point samples per dataset; SCIERC is the only domain-specific general benchmark
    in the headline three.
  locator: card/trust
- text: The generator is GPT-4o-mini (the upstream brief's "gpt-3.5-turbo" is incorrect and was not used),
    and the headline metric is G-BERTScore-F1 (a soft semantic match), not exact-match F1 — so reported
    deltas are larger and not directly comparable to strict-match scores. Baseline values cited here are
    GPT-4o-mini / GPT-4o, not gpt-3.5-turbo. Evaluation used 2000-point samples per dataset.
  locator: card/limitations
