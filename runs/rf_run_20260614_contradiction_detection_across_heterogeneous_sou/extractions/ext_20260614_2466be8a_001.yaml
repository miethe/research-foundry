extracted_facts:
- evidence_id: ev_001
  text: 'Claimify is a four-stage LLM claim-extraction pipeline: Sentence Splitting and Context Creation,
    Selection, Disambiguation, and Decomposition.'
  locator: Section 3 (Claimify); subsections 3.1-3.4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A defining feature of Claimify is that it only extracts claims when there is high confidence in
    the correct interpretation of the source text, otherwise handling the ambiguity rather than forcing
    extraction.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Claimify identifies referential and structural ambiguity and, if any ambiguity is unresolvable,
    discards the entire sentence rather than emitting a possibly-wrong claim.
  locator: Section 3.3 (Disambiguation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The Selection stage uses an LLM to drop sentences with no verifiable content (e.g., opinion/speculation),
    retaining only verifiable components before later stages.
  locator: Section 3.2 (Selection)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The paper introduces a fact-checking-oriented evaluation framework whose two key innovations are
    a granular assessment of claim coverage and an outcome-based approach to evaluating decontextualization.
  locator: Section 1 (Introduction), Contributions list
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The companion human-annotation study labeled 6,490 sentences for verifiable-claim content; the
    underlying BingCheck dataset is 396 Microsoft Copilot answers.
  locator: Section 4.1.2 (Human Annotation Study); 4.1.1 (BingCheck)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Discarding is rare in practice: across experiments the largest share labeled "Cannot be disambiguated"
    was 5.4%, and only 0.8% of disambiguated sentences yielded no claims at Decomposition.'
  locator: Section 3.4 (Decomposition); Section 3.3
  confidence: medium
  quote_available: true
  notes: ''
