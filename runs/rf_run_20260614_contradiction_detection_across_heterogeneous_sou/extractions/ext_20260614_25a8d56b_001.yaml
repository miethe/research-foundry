extracted_facts:
- evidence_id: ev_001
  text: ClaimPKG uses a lightweight, specialized LLM to represent a claim as pseudo-subgraphs that guide
    a dedicated retrieval module, while a general-purpose LLM then produces the final verdict and justification.
  locator: Abstract (method description)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On the FactKG dataset, ClaimPKG achieves state-of-the-art performance, outperforming strong baselines
    by 9-12 accuracy points across multiple categories.
  locator: Abstract (results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: ClaimPKG demonstrates zero-shot generalizability to unstructured claim-verification datasets such
    as HoVer and FEVEROUS, combining KG structured knowledge with LLM reasoning across multiple LLM backbones.
  locator: Abstract (generalizability)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The paper motivates ClaimPKG by noting that modern LLMs, despite strong reasoning, struggle with
    multi-step modular pipelines and reasoning over knowledge graphs without adaptation.
  locator: Abstract (motivation / problem framing)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: ClaimPKG was accepted to ACL 2025 Findings and submitted to arXiv on 28 May 2025 (arXiv:2505.22552).
  locator: Comments field and submission line
