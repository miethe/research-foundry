extracted_facts:
- evidence_id: ev_001
  text: AlignScore reframes factual-consistency evaluation as a general information-alignment function
    between two arbitrary text pieces, applicable across diverse inconsistency scenarios (contradictions,
    hallucinations) and input/output granularities.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The alignment function is trained on 4.7M examples drawn from 7 well-established task types:
    NLI, QA, paraphrasing, fact verification, information retrieval, semantic similarity, and summarization.'
  locator: Abstract / Section 4.1 Implementation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: AlignScore is evaluated on 22 datasets, 19 of which were never seen during alignment training,
    demonstrating zero-shot generalization.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The 355M-parameter AlignScore matches or outperforms factual-consistency metrics built on ChatGPT
    and GPT-4 despite those models being orders of magnitude larger.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: AlignScore is implemented by finetuning RoBERTa models at two sizes (125M and 355M), denoted AlignScore-base
    (RoBERTa-base) and AlignScore-large (RoBERTa-large).
  locator: Section 1 Introduction; Section 4.1 Implementation Details
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The alignment model has three heads (3-way classification, binary classification, and regression),
    and for inference the production metric uses the probability of the ALIGNED label from the 3-way classification
    head, which ablations show outperforms the binary and regression heads.
  locator: Section 3 (model architecture)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Evaluation uses the TRUE benchmark (11 datasets across diverse domains) and the SummaC benchmark
    (6 large summarization datasets), plus additional latest factual-consistency testbeds.
  locator: Section 4.2 Benchmarks
  confidence: medium
  quote_available: true
  notes: ''
