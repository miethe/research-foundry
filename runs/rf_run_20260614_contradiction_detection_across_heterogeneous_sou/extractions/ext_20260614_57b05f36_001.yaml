contradictions_or_cautions:
- text: 'Caution on a common misstatement: although the alignment model includes a regression head, the
    production AlignScore metric computes consistency from the 3-way classification head''s ALIGNED probability
    (per ablation), not from a continuous regression output — so it is not accurately described as "a
    continuous score instead of 3-way NLI labels."'
  locator: card/limitations
- text: Results are 2023-era; comparisons to "ChatGPT and GPT-4" reflect mid-2023 model versions and prompting,
    which have since changed.
  locator: card/limitations
- text: Due to resource constraints only the first 500k samples per dataset were used (4.7M total), so
    training is capped rather than exhaustive.
  locator: card/limitations
