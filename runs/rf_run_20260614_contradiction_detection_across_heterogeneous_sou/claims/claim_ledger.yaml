- claim_id: clm_inf01
  text: For RF's contradiction_log over heterogeneous source cards, the three viable detection families
    rank inter-context LLM claim-pair judging (Gokul et al.) first for genuine cross-document contradictions,
    fine-tuned alignment/entailment scorers (AlignScore-large 355M, MiniCheck-FT5 770M) second as a cheap
    support/refute gate, and KG-consistency checks (ClaimPKG, GraphJudge) third because they require an
    entity-linked graph that RF source cards do not yet provide.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_042
    - clm_044
    - clm_071
    - clm_028
    - clm_031
    - clm_032
    - clm_079
    - clm_008
    - clm_057
    reasoning_summary: RF's contradiction_log is an inter-context problem (clm_044, clm_071); LLM claim-pair
      judging directly addresses contradictions among source documents, NLI/alignment scorers (clm_028,031,032,079)
      give a cheap support/refute signal, and KG methods (clm_008,057) need a constructed entity graph
      as a prerequisite, making them a later-stage option.
- claim_id: clm_inf02
  text: 'No single source reports both high precision and high recall for genuine factual contradiction
    detection: the only RF-relevant measured detection accuracy (Claude-3 Sonnet+CoT 0.710, Llama3.3-70B
    0.679 on Gokul et al.) is paired with the explicit finding that all models are high-precision/low-recall,
    so RF should treat any LLM contradiction flag as a high-confidence positive but never treat a no-flag
    result as evidence of consistency.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_066
    - clm_070
    - clm_076
    - clm_065
    reasoning_summary: clm_066 gives the only measured detection accuracies, clm_070/clm_076 establish
      the high-precision/low-recall profile, and clm_065 shows even humans only reach 74% agreement, so
      a negative LLM result is uninformative about true consistency.
- claim_id: clm_inf03
  text: The cheap-extract / expensive-arbitrate split should place a fine-tuned 355M-770M alignment scorer
    (AlignScore-large or MiniCheck-FT5) as the cheap first-pass candidate-gate and reserve a frontier
    general-purpose LLM (GPT-4o or Claude-3 Sonnet) only for arbitrating candidate pairs the cheap scorer
    flags as non-aligned, mirroring ClaimPKG's lightweight-specialized-then-general split and GraphJudge's
    cheap-judge-after-strong-generator architecture.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    - clm_078
    - clm_079
    - clm_008
    - clm_056
    - clm_061
    reasoning_summary: AlignScore-355M and MiniCheck-FT5-770M reach GPT-4-level consistency scoring at
      400x lower cost (clm_031,078,079); ClaimPKG (clm_008) and GraphJudge (clm_056,061) both validate
      the architectural pattern of a cheap specialized model feeding an expensive general model, so the
      same split applies to contradiction arbitration.
- claim_id: clm_inf04
  text: 'A concrete RF break-even rule is: run the 355M/770M cheap scorer on every candidate source-card
    pair (a 29K-pair sweep is ~30 min on one A6000 with prefix caching per MiniCheck), then escalate to
    an expensive LLM arbiter only for pairs scoring below the alignment threshold (default t=0.5), which
    keeps frontier-LLM spend proportional to the suspected-contradiction rate rather than to the full
    O(n^2) pair count.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_081
    - clm_083
    - clm_031
    - clm_079
    reasoning_summary: MiniCheck frames scoring as a thresholded binary classifier at t=0.5 (clm_081)
      and reports ~30 min for 29K pairs on one A6000 (clm_083); combined with the GPT-4-parity-at-low-cost
      result (clm_031,079) this yields a cheap-gate-then-escalate break-even where only sub-threshold
      pairs reach the expensive arbiter.
- claim_id: clm_inf05
  text: Naive all-pairs contradiction checking is O(n^2) in source cards and becomes the dominant cost
    as the card set grows; RF should gate candidate pairs with embedding-similarity blocking and entity-resolution
    before any LLM call, reusing the same candidate-retrieval idea that ClaimPKG uses to retrieve only
    relevant KG subgraphs rather than scanning the whole graph.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_008
    - clm_072
    - clm_044
    reasoning_summary: ClaimPKG (clm_008) retrieves only relevant subgraphs rather than the whole KG,
      and the inter-context task (clm_044,072) inherently scales with document/card count; applying similarity-based
      blocking before pairing is the standard sub-quadratic reduction implied by that retrieval-gating
      pattern.
- claim_id: clm_inf06
  text: Source heterogeneity (web vs PDF vs papers vs personal notes) must be normalized into atomic,
    decontextualized, verifiable claims before any pairwise comparison, because contradiction and alignment
    scorers operate on claim/sentence pairs, not raw documents; Claimify's four-stage Selection-Disambiguation-Decomposition
    pipeline is the recommended normalizer and its conservative ambiguity-discarding lowers false contradictions
    at the cost of some coverage.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    - clm_003
    - clm_004
    - clm_081
    - clm_028
    reasoning_summary: Claimify (clm_001-004) produces decontextualized verifiable claims and discards
      ambiguous sentences; alignment/MiniCheck scoring (clm_081) and AlignScore (clm_028) consume text-pair
      inputs, so heterogeneous sources must first be normalized into comparable atomic claims, with Claimify's
      conservative discarding trading coverage for precision.
- claim_id: clm_inf07
  text: Claimify's reported discard rates (<=5.4% 'Cannot be disambiguated', 0.8% yielding no claims)
    indicate the normalization step is cheap in lost coverage, so RF can adopt high-confidence-only claim
    extraction as the default front end without materially shrinking the contradiction-comparison corpus.
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_007
    - clm_002
    - clm_003
    reasoning_summary: clm_007 shows discarding is rare (<=5.4% and 0.8%), and clm_002/clm_003 establish
      the conservative interpretation policy, so adopting Claimify-style extraction loses little corpus
      while gaining interpretation reliability.
- claim_id: clm_inf08
  text: 'A genuine factual contradiction must be distinguished from differing temporal context: the same
    subject-predicate-object asserted at two different valid-times is not a contradiction but a temporal
    succession, exactly the corruption-of-temporal-context-only design used by the When-Facts-Expire benchmark,
    so RF''s comparison must condition on a valid_time/as_of field before declaring conflict.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_017
    - clm_013
    - clm_014
    reasoning_summary: When-Facts-Expire corrupts only temporal context while keeping S/P/O fixed (clm_017)
      precisely because static KGs that ignore time produce false contradictions (clm_013); this proves
      temporal context is a distinct axis that must be checked before flagging a contradiction (clm_014).
- claim_id: clm_inf09
  text: 'Stale-claim flagging in RF''s source-card KG is best handled by HALO-style half-life decay rather
    than LLM re-judging: a per-claim validity V=V0*e^(-lambda*(tc-ti)) with category-specific half-lives
    lets RF down-weight or expire a claim once V falls below a threshold theta at near-zero marginal cost,
    and HALO''s measured +2.4-3.7 MRR gains show staleness filtering improves downstream reasoning.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_020
    - clm_021
    - clm_023
    - clm_025
    - clm_026
    - clm_027
    reasoning_summary: HALO (clm_020-025) is a low-cost, no-retraining half-life filter with per-category
      decay and a theta threshold, and clm_026/clm_027 show measurable accuracy gains from filtering,
      making it the cheap mechanism for RF's stale-claim flag.
- claim_id: clm_inf10
  text: 'Conflicting-claim flagging and stale-claim flagging are separable subsystems in RF: contradiction
    detection (NLI/LLM-judge) answers ''do two current claims disagree'' while temporal validity (HALO
    half-life, When-Facts-Expire validation) answers ''is this claim still in force'', and conflating
    them causes the false-contradiction failure mode that motivated the temporal-KG benchmarks.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_013
    - clm_017
    - clm_044
    - clm_071
    reasoning_summary: Temporal-KG work (clm_013,017) and inter-context contradiction work (clm_044,071)
      target different questions; the static-KG false-inference problem (clm_013) is exactly what arises
      when temporal validity is folded into contradiction detection, so RF should keep them as separate
      flags.
- claim_id: clm_inf11
  text: 'Orphaned-claim flagging maps onto GraphJudge''s triple-classification: a claim node with no supporting
    source card or no resolvable entity edge is the analogue of GraphJudge''s ''incorrect'' triple (e.g.,
    the filtered <We, suggest, goal>), so RF can flag orphans with a binary correct/incorrect judge, and
    GraphJudge''s evidence that a fine-tuned 7B judge reaches >90% accuracy while un-tuned GPT-4o fails
    suggests RF needs a tuned judge, not a zero-shot frontier model, for this step.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: low
  sources: []
  inference_basis:
    from_claims:
    - clm_057
    - clm_062
    - clm_063
    - clm_059
    reasoning_summary: GraphJudge defines triple classification (clm_057), filters meaningless/unsupported
      triples (clm_062), and shows a fine-tuned 7B judge reaches >90% while un-tuned BERT/GPT-4o fail
      (clm_063,059), so orphan/unsupported-claim flagging benefits from a tuned judge rather than zero-shot
      prompting.
- claim_id: clm_inf12
  text: 'The reliable-enough-to-auto-resolve versus surface-for-human boundary should be drawn at the
    precision/recall asymmetry: an LLM-judge contradiction flag (high precision) plus an agreeing cheap
    alignment scorer can auto-populate the contradiction_log entry, but self-contradiction and conditional-contradiction
    classes (Llama-70B 0.006-0.456 accuracy) and any single-signal flag must be routed to human adjudication.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_070
    - clm_068
    - clm_066
    - clm_065
