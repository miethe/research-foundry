- claim_id: clm_inf01
  text: 'Empirical 2023-2026 measurements converge on the conclusion that no current LLM eliminates unsupported
    claims in grounded synthesis: even best-case grounded summarization hallucinates at 1.8% (Vectara,
    Antgroup Finix S1 32B), best-case document-QA fabricates at 1.19% (GLM 4.5 at 32K), and the best citation
    systems leave ~50% of ELI5 answers not fully supported, so a residual unsupported-claim rate must
    be assumed and managed rather than designed away.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_018
    - clm_058
    - clm_055
    reasoning_summary: Three independent best-case measurements across grounded summarization, document
      QA, and cited long-form QA all report non-zero residual unsupported/fabricated rates, so eliminating
      unsupported claims is empirically unattained across the literature.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'Reported unsupported-claim rates are not comparable across studies because each defines a different
    unit and metric: Vectara measures the share of whole summaries containing any hallucination (HHEM-2.3,
    1.8-24.2%), Roig measures the share of probe questions answered about deliberately-absent content
    (RIKER, 1.19-25%+), ALCE measures statement-level NLI-entailment failure against cited passages (~50%
    on ELI5), and DRBench measures fabricated-URL existence (3-13%), so headline percentages must be read
    against their measurement unit before any cross-framework ranking.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_016
    - clm_062
    - clm_054
    - clm_044
    reasoning_summary: Each source defines its rate over a different unit (whole-summary, probe-question,
      statement-NLI, URL-existence), so the numeric scales are not directly comparable and require normalization
      to the unit before ranking.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'The existing frameworks split cleanly into two attribution timings: pre-hoc / generation-time
    systems that constrain output to retrieved context (PaperQA2 passage-level keys, Anthropic Citations
    sentence-level chunks) and post-hoc / retrofit systems that decompose then verify after generation
    (RARR claim-level edits, FacTool and SAFE atomic-fact verification, ALCE NLI scoring), with AIS sitting
    orthogonally as the human gold standard both timings are validated against.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_007
    - clm_071
    - clm_006
    - clm_064
    - clm_021
    reasoning_summary: PaperQA2 and Anthropic Citations attach provenance at or before generation; RARR/FacTool/SAFE/ALCE
      operate after generation by decomposing and verifying; AIS is the human standard used to validate
      attribution judgments regardless of timing.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: A claim-ledger + verifier architecture is functionally the decompose-then-verify pattern that
    SAFE and FacTool already validate (break a long-form response into atomic facts, then check each against
    retrieved evidence), so RF's design inherits SAFE's demonstrated 72% agreement with human annotators
    and >20x cost advantage over human evaluation as its expected-performance prior rather than being
    an unproven novelty.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_064
    - clm_027
    - clm_066
    - clm_067
    reasoning_summary: RF's claim-ledger is the same atomic-fact-decompose-then-verify loop SAFE and FacTool
      implement; SAFE's measured 72% human agreement and 20x cost advantage therefore transfer as the
      architecture's empirical prior.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'On material-unsupported-claim reduction, an explicit claim-ledger + verifier dominates RAG-alone
    because RAG supplies grounding but does not enforce per-claim support: PaperQA2''s RAG pipeline still
    emits citation keys without a per-statement entailment gate, and ALCE shows RAG-style cited generations
    leave ~50% of ELI5 statements unsupported, a gap that the claim-ledger''s mandatory verify step is
    specifically designed to close.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_055
    - clm_010
    - clm_054
    - clm_064
    reasoning_summary: RAG (PaperQA2) produces citations but no per-statement entailment gate, and ALCE
      measures ~50% unsupported statements under cited RAG; a verifier that NLI-checks each ledger claim
      targets exactly that residual, so claim-ledger+verifier reduces material unsupported claims below
      RAG-alone.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Constitutional AI / Constitutional Classifiers address a different failure axis than a claim-ledger
    and should be treated as complementary, not competing: they gate policy-violating content (universal
    jailbreaks, harmful categories) with a 23.7% inference overhead, but provide no claim-to-source traceability
    and no unsupported-claim metric, so they cannot reduce material unsupported claims in synthesis on
    their own.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_032
    - clm_035
    - clm_034
    - clm_021
    reasoning_summary: Constitutional Classifiers target permitted/restricted-content policy enforcement,
      not source attribution; they expose no per-claim support metric, so they operate on an orthogonal
      axis from the claim-ledger's unsupported-claim reduction.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: Self-consistency / self-verification methods such as Chain-of-Verification reduce hallucination
    using only the model's own deliberation and no external evidence, which structurally caps their unsupported-claim
    reduction at what the model already knows; a claim-ledger + verifier that retrieves external evidence
    (the RARR/SAFE/FacTool pattern) can catch confidently-wrong claims that CoVe's independent self-answering
    cannot, making external-evidence verification strictly stronger for material-claim grounding.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_038
    - clm_039
    - clm_042
    - clm_064
    - clm_005
    reasoning_summary: CoVe verifies against the model's own knowledge (independent self-answering), so
      a uniformly-held false belief survives; external-evidence verifiers (SAFE/RARR) check against retrieved
      sources and can flag it, giving them a structural advantage on grounded factuality.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: On traceability granularity the four approaches rank claim-ledger+verifier (atomic-claim, SAFE/FacTool-style)
    >= Anthropic Citations (sentence) >= PaperQA2 RAG (passage) >> constitutional AI and self-consistency
    (no traceability at all), so finer-grained provenance is achieved precisely by the decompose-then-verify
    family and is absent from policy-gating and self-deliberation methods.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_064
    - clm_070
    - clm_007
    - clm_032
    - clm_038
    reasoning_summary: SAFE-style atomic-fact verification gives claim-level provenance, Citations sentence-level,
      PaperQA2 passage-level; Constitutional Classifiers and CoVe attach no source references, ordering
      the four on granularity.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: 'The measured cost/latency overhead of a verifier pass is moderate and dominated by retrieval,
    not synthesis: Constitutional Classifiers'' content gate costs 23.7% inference overhead, and SAFE''s
    full decompose-search-verify loop is still >20x cheaper than human annotation, so a per-claim verifier
    adds a bounded single-digit-to-~25% compute premium rather than a multiplicative blowup, making it
    economically viable as a standing gate.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_034
    - clm_067
    - clm_064
    reasoning_summary: The only directly measured verifier-class overheads (Constitutional Classifiers
      23.7%; SAFE >20x cheaper than humans) bound the cost of an automated verify pass to a moderate premium
      rather than an order-of-magnitude increase.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: 'RF''s cheap-extract / expensive-synthesize split maps directly onto the empirical verifier economics:
    claim decomposition and per-claim entailment/NLI checks are the cheap-model tasks (ALCE uses a T5-11B
    NLI model, SAFE uses search-query reasoning, urlhealth uses an HTTP HEAD probe), while only the synthesis/edit
    step needs an expensive model, so the verification pass should be routed to small models with the
    costly model reserved for synthesis and disagreement-triggered edits.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
