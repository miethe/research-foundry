extracted_facts:
- evidence_id: ev_001
  text: RARR (Retrofit Attribution using Research and Revision) automatically finds attribution for the
    output of any text generation model and post-edits that output to fix unsupported content while preserving
    the original as much as possible.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Applied to several state-of-the-art LMs across diverse generation tasks, RARR significantly improves
    attribution while preserving the original output far more than prior edit models.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The Research stage begins with comprehensive question generation (CQGen), producing a sequence
    of questions covering all aspects of the passage to be verified.
  locator: Section 3.1 Research stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: For each generated query, RARR uses standard web search (Google Search) to retrieve K=5 web pages
    ranked by relevance as candidate evidence.
  locator: Section 3.1 Research stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: An agreement model decides whether the (partially edited) passage and the retrieved evidence imply
    the same answer to a query; the edit model is invoked only on disagreement and minimally alters the
    passage to agree with the evidence.
  locator: Section 3.2 Revision stage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'RARR is model-agnostic and post-hoc: it retrofits attribution after generation without modifying
    the underlying LM, requiring only a handful of training examples, a large language model, and standard
    web search.'
  locator: Abstract / Introduction
  confidence: medium
  quote_available: true
  notes: ''
