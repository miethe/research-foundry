extracted_facts:
- evidence_id: ev_001
  text: Constitutional Classifiers are safeguards trained on synthetic data generated by prompting LLMs
    with a natural-language constitution that specifies permitted and restricted content categories.
  locator: Abstract (mechanism description)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Across over 3,000 estimated hours of red teaming, no red teamer found a universal jailbreak that
    extracted detailed harmful information from a classifier-guarded LLM comparable to an unguarded model
    across most target queries.
  locator: Abstract (red-teaming result)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The classifiers caused only an absolute 0.38% increase in production-traffic refusals while imposing
    a 23.7% inference overhead.
  locator: Abstract (deployment viability)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The defense targets universal jailbreaks — prompting strategies that systematically bypass safeguards
    to enable harmful multi-interaction processes such as manufacturing illegal substances at scale.
  locator: Abstract (threat model)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: On automated evaluations, enhanced classifiers demonstrated robust defense against held-out, domain-specific
    jailbreaks.
  locator: Abstract (automated evaluation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper was submitted January 31, 2025 by Mrinank Sharma, Meg Tong, Jesse Mu and colleagues
    at Anthropic (including Jan Leike, Jared Kaplan, and Ethan Perez).
  locator: Title page / authorship metadata
  confidence: medium
  quote_available: false
  notes: ''
