- evidence_id: ev_003
  text: Phase 1 (Paper Search) retrieves candidate papers via an LLM-generated keyword query, then chunks,
    embeds, and adds them to state.
  locator: README - 'PaperQA2 Algorithm' table, Phase 1 Paper Search
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Phase 2 (Gather Evidence) embedding-ranks chunks, builds scored contextual summaries, then uses
    an LLM to re-score and select the most relevant summaries.
  locator: README - 'PaperQA2 Algorithm' table, Phase 2 Gather Evidence
  confidence: medium
  quote_available: true
  notes: ''
