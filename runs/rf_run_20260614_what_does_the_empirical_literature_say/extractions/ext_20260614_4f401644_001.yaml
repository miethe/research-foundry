extracted_facts:
- evidence_id: ev_001
  text: The leaderboard is scored using HHEM-2.3, Vectara's commercial hallucination evaluation model,
    with an open-source variant HHEM-2.1-Open available on Hugging Face and Kaggle.
  locator: Model section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The leaderboard is computed over a dataset of more than 7,700 articles and was last updated on
    May 11, 2026.
  locator: Dataset section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The leaderboard measures intrinsic hallucination in document summarization: each LLM is given
    documents and asked to summarize them, reflecting RAG-style grounded synthesis rather than single-turn
    QA.'
  locator: Methodology section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The primary metric is the factual consistency rate (the rate of summaries with no hallucinations),
    the inverse of the hallucination rate.
  locator: Methodology section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Answer Rate is reported as a separate column capturing how often a model refuses to respond to
    the summarization prompt versus producing a summary.
  locator: Methodology section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: As of the May 2026 snapshot, the lowest hallucination rates were Antgroup Finix S1 32B at 1.8%,
    OpenAI GPT-5.4-nano (2026-03-17) at 3.1%, and Google Gemini 2.5 Flash Lite at 3.3%.
  locator: Leaderboard table (lowest rates)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_007
  text: As of the May 2026 snapshot, among the highest hallucination rates were Mistral Ministral 3-3B
    (2512) at 24.2%, Microsoft Phi-4-Mini-Instruct at 23.5%, and OpenAI o3-Pro at 23.3%.
  locator: Leaderboard table (highest rates)
  confidence: medium
  quote_available: false
  notes: ''
