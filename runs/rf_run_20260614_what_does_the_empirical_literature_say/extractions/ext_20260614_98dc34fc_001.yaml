extracted_facts:
- evidence_id: ev_001
  text: 'Chain-of-Verification (CoVe) is a four-step method: draft an initial response, plan verification
    questions to fact-check the draft, answer them independently, and generate a final verified response.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Answering verification questions independently is the mechanism intended to prevent the model
    from being biased by, and thus repeating, its own initial responses.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CoVe decreases hallucinations across a variety of tasks, including Wikidata list-based questions,
    closed-book MultiSpanQA, and longform text generation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The paper frames hallucination as the generation of plausible yet incorrect factual information,
    characterizing it as an unsolved problem in large language models.
  locator: Abstract (problem framing)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: CoVe's premise is that language models can deliberate on their own responses to correct their
    mistakes.
  locator: Abstract (motivation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper is authored by Shehzaad Dhuliawala and colleagues (Meta AI / ETH Zurich) and was submitted
