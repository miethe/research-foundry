extracted_facts:
- evidence_id: ev_001
  text: SAFE (Search-Augmented Factuality Evaluator) uses an LLM to break a long-form response into individual
    atomic facts and verify each via a multi-step reasoning process that issues Google Search queries,
    the same decompose-then-verify pattern as a claim ledger.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper extends F1 as an aggregated long-form-factuality metric by balancing precision (percentage
    of supported facts) against recall, where recall is measured relative to a hyperparameter representing
    the user's preferred response length.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On ~16,000 individual facts SAFE agrees with crowdsourced human annotators 72% of the time, and
    on a random subset of 100 disagreement cases SAFE wins 76% of the time.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: SAFE is more than 20 times cheaper than human annotators for evaluating long-form factuality.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: LongFact is a benchmark of thousands of fact-seeking questions spanning 38 topics, generated using
    GPT-4.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Thirteen language models across four families (Gemini, GPT, Claude, and PaLM-2) were benchmarked
    on LongFact, and larger models generally achieved better long-form factuality.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
