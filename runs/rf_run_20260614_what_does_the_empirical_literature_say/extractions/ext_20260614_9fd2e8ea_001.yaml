extracted_facts:
- evidence_id: ev_001
  text: ALCE is the first benchmark for automatic evaluation of LLM-generated citations, requiring end-to-end
    systems that retrieve supporting evidence and generate answers with inline citations.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: ALCE evaluates generations along three automatic dimensions—fluency, correctness, and citation
    quality—shown to correlate strongly with human judgements.
  locator: Section 3 / Abstract — evaluation dimensions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'ALCE compiles three datasets covering different question types and corpora: ASQA (Stelmakh et
    al., 2022), QAMPARI (Rubin et al., 2022), and ELI5 (Fan et al., 2019).'
  locator: Section 2, paragraph on datasets / Table 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Citation quality is measured with two metrics: citation recall (whether output is entirely supported
    by cited passages) and citation precision (whether any cited passages are irrelevant).'
  locator: Section 3.3 Citation Quality
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: An NLI model (TRUE, a T5-11B fine-tuned on NLI datasets) checks whether the concatenated cited
    passages entail each generated statement, scoring each statement 0 or 1.
  locator: Section 3.3 Citation Quality — NLI model
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Even the best models leave generations not fully supported by cited passages roughly 50% of the
    time on ELI5; abstract states the best models lack complete citation support 50% of the time.
  locator: Section 1 / Abstract — key finding (ELI5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Citation recall for a statement is 1 only if at least one citation exists and the NLI model judges
    that the concatenation of all cited passages entails (fully supports) the statement.
  locator: Section 3.3 — citation recall formalization
  confidence: medium
  quote_available: true
  notes: ''
