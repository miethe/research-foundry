contradictions_or_cautions:
- text: AIS is a human-annotation standard, not an automatic detector; throughput and cost scale with
    human effort.
  locator: card/trust
- text: AIS is a gold human-evaluation standard, not an automatic detector; throughput and cost scale
    with human annotation effort. The arXiv preprint dates to Dec 2021 (v2 Aug 2022); the peer-reviewed
    version appeared in Computational Linguistics Vol. 49 No. 4 (Dec 2023).
  locator: card/limitations
