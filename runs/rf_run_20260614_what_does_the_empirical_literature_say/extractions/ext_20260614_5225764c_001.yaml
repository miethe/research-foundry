extracted_facts:
- evidence_id: ev_001
  text: AIS formally defines a pair (s,t) as attributable to sources P iff a generic hearer would, with
    a chosen confidence, affirm 'According to P, s', interpreting s relative to time t.
  locator: 'Sec. 3.1 An Initial Definition of AIS: Attribution of Standalone Propositions'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper introduces AIS (Attributable to Identified Sources) as an evaluation framework for assessing
    whether NLG output about the external world is supported by underlying sources, paired with a two-stage
    annotation pipeline.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'AIS uses a two-stage human-annotation task: first annotators judge interpretability of the output
    without seeing the source, then judge whether the source P supports the output''s information.'
  locator: Sec. 4.1 Task Design (two-stage annotation pipeline)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: In the second stage, after a positive interpretability judgment, annotators are shown the source
    P and asked whether all information in the output can be supported by P.
  locator: Sec. 4.1 Task Design (AIS rating stage)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'AIS was empirically validated via human evaluation across three task types: two conversational
    QA datasets, a summarization dataset, and a table-to-text dataset.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: AIS handles context-dependence by treating each sentence interpretation as an explicature - a
    paraphrase of the output that is interpretable in a linguistically empty context - before attribution
    is judged.
  locator: Sec. 3.3 Interpretation (explicatures / decontextualization)
  confidence: medium
  quote_available: true
  notes: ''
