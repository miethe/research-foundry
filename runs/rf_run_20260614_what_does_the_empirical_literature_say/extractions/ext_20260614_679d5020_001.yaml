  text: FacTool is a task- and domain-agnostic framework for detecting factual errors in texts generated
    by large language models such as ChatGPT.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A core motivation is that LLM-generated texts are lengthy and lack a clearly defined granularity
    for individual facts, which necessitates claim decomposition before verification.
  locator: Abstract (challenge 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'FacTool is evaluated across four distinct tasks: knowledge-based QA, code generation, mathematical
