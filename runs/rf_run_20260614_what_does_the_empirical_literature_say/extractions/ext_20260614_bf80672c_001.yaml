extracted_facts:
- evidence_id: ev_001
  text: Even the best-performing model fabricates answers 1.19% of the time at 32K context, with top-tier
    models in the 5-7% range, and fabrication rises steeply with context length.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The single best model on this benchmark, GLM 4.5, still fabricates answers 1.19% of the time at
    32K context.
  locator: Section 5.4 (32K results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The median model fabricates answers at roughly 25%, far above the best-case rate, indicating model
    selection dominates fabrication risk.
  locator: Results discussion (median model fabrication)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: At 128K context, only 5 of 26 tested models keep their fabrication rate under 10%.
  locator: Section 5.3.1 (128K results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: At 200K context no model stays below 10% fabrication; even the best performer, Qwen3 Next 80B-A3B,
    fabricates answers to 10.25% of questions.
  locator: Results discussion (200K results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Fabrication is measured with probe questions that ask about content deliberately absent from the
    documents, so any specific answer is definitively a fabrication.
  locator: Section 3.1 (probe methodology, L11-L12)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'Temperature effects are nuanced: T=0.0 gives best overall accuracy in ~60% of cases, but higher
    temperatures reduce fabrication for most models and sharply cut coherence loss (infinite loops), which
    can reach 48x higher rates at T=0.0 than T=1.0.'
  locator: Abstract / Section 5.6 (temperature effects)
  confidence: medium
  quote_available: true
  notes: ''
