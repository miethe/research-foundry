contradictions_or_cautions:
- text: Describes inotify-specific behavior on Linux only; macOS (FSEvents/kqueue) and Windows (ReadDirectoryChangesW)
    have different semantics. Reflects Linux man-pages 6.18 (2026-02-14); some numeric defaults (e.g.,
    max_queued_events default) are kernel/version dependent and not captured verbatim here.
