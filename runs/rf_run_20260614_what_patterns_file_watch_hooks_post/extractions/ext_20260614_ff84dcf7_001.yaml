extracted_facts:
- evidence_id: ev_001
  text: inotify coalesces identical successive unread events (same wd, mask, cookie, name) into one, so
    it cannot be used to reliably count file events.
  locator: NOTES
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Events that exceed the per-instance queue limit are dropped, but an IN_Q_OVERFLOW event is always
    generated to signal the overflow.
  locator: /proc interfaces (max_queued_events)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The overflow notification arrives as an IN_Q_OVERFLOW event whose watch descriptor is set to -1.
  locator: inotify events (IN_Q_OVERFLOW)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Three per-real-user-ID /proc tunables govern inotify resource limits: max_user_instances (instances),
    max_user_watches (watches), and max_queued_events (queued events per instance).'
  locator: /proc interfaces
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: inotify directory monitoring is not recursive; each subdirectory requires its own additional watch.
  locator: Limitations and caveats
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Pairing IN_MOVED_FROM with IN_MOVED_TO for renames is inherently racy: the pair is usually but
    not always consecutive, may be interleaved by other events, is not inserted atomically, and IN_MOVED_TO
    may be absent if the rename leaves the monitored directory.'
  locator: Dealing with rename() events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Before Linux 2.6.25, a coalescing bug compared the most recent event against the oldest unread
    event instead of the two most recent events.
  locator: BUGS
  confidence: medium
  quote_available: true
  notes: ''
