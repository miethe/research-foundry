extracted_facts:
- evidence_id: ev_001
  text: The Last-Event-ID HTTP request header reports an EventSource object's last event ID string to
    the server when the user agent reestablishes the connection.
  locator: Section 9.2.4 — The Last-Event-ID header
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: An 'id' field whose value contains no NULL sets the last event ID buffer, and on dispatch the
    event source's last event ID string is set to that value and persists until the server next sets it,
    enabling resume of missed events.
  locator: Section 9.2.6 — Interpreting an event stream / Dispatch the event
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The reconnection time is in milliseconds, and the initial reconnection time is an implementation-defined
    value, probably in the region of a few seconds.
  locator: Section 9.2.2 — The EventSource interface (reconnection time)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The event stream format's MIME type is text/event-stream.
  locator: Section 9.2.5 — Parsing an event stream
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Clients reconnect automatically if the connection is closed, and a server can tell a client to
    stop reconnecting by responding with HTTP 204 No Content.
  locator: Section 9.2.1 — Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: If the 'retry' field value consists only of ASCII digits, it is interpreted as a base-ten integer
    and set as the event stream's reconnection time.
  locator: Section 9.2.6 — Interpreting an event stream (process the 'retry' field)
  confidence: medium
  quote_available: true
  notes: ''
