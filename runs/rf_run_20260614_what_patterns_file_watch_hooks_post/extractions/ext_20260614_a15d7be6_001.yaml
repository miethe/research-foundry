extracted_facts:
- evidence_id: ev_001
  text: FSEvents notifies at directory granularity — it tells you that something in a given directory
    changed, and the app must scan the directory to learn precisely which files changed.
  locator: Building a Directory Hierarchy Snapshot
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Normally an FSEvents consumer scans only the exact directory named in the event path; three exceptions
    (MustScanSubDirs, dropped events, root changed) require deviating from this.
  locator: Handling Events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Near-simultaneous events in a directory and its subdirectory may be coalesced into a single event
    carrying kFSEventStreamEventFlagMustScanSubDirs, which obligates a recursive rescan of the listed
    path.
  locator: Handling Events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: On a kernel/daemon communication error, kFSEventStreamEventFlagKernelDropped or kFSEventStreamEventFlagUserDropped
    is set and you must do a full scan of monitored directories because there is no way to determine what
    changed.
  locator: Handling Events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: When an event is dropped, MustScanSubDirs is also set, so checking the dropped-event flags is
    unnecessary to decide on a full rescan; the dropped flags are purely informational.
  locator: Handling Events (Note)
  confidence: medium
  quote_available: true
  notes: ''
