extracted_facts:
- evidence_id: ev_001
  text: 'pre-commit supports ten git hook stages: commit-msg, post-checkout, post-commit, post-merge,
    post-rewrite, pre-commit, pre-merge-commit, pre-push, pre-rebase, and prepare-commit-msg.'
  locator: Supported git hooks
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Hooks that do not operate on files (post-checkout, post-commit, post-merge, post-rewrite, pre-rebase)
    must be set as always_run: true or they will always be skipped.'
  locator: Supported git hooks > post-checkout (and post-commit, post-merge, post-rewrite, pre-rebase)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Hooks can be installed for particular git hook types by passing --hook-type to pre-commit install,
    which may be specified multiple times.
  locator: Confining hooks to run at certain stages
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The stages property restricts which git hook stages a hook runs on, set in .pre-commit-hooks.yaml
    or overridden in .pre-commit-config.yaml, falling back to the top-level default_stages option which
    defaults to all stages.
  locator: Confining hooks to run at certain stages
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: default_install_hook_types is a list of --hook-types used by default when running pre-commit install,
    and it defaults to [pre-commit], so only the pre-commit hook is installed unless other types are specified.
  locator: .pre-commit-config.yaml - top level > default_install_hook_types
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: default_stages is a configuration-wide default for the stages property of hooks, defaults to all
    stages, and only overrides individual hooks that do not set stages themselves.
  locator: .pre-commit-config.yaml - top level > default_stages
  confidence: medium
  quote_available: true
  notes: ''
