contradictions_or_cautions:
- text: Reflects Linux man-pages 6.18 (dated 2026-02-14); fanotify behavior is kernel-version dependent
    and some features (e.g., FAN_REPORT_FID, FAN_MARK_FILESYSTEM) were introduced in specific kernel versions
    noted elsewhere in the page (not all captured here).
