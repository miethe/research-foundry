extracted_facts:
- evidence_id: ev_001
  text: Fanotify directory monitoring is not recursive; monitoring subdirectories requires additional
    marks per subdirectory.
  locator: NOTES → Limitations and caveats
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Detecting a new subdirectory via FAN_CREATE and then adding a mark is racy: events inside the
    new subdirectory before the mark is added can be lost.'
  locator: NOTES → Limitations and caveats
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Monitoring mounts (FAN_MARK_MOUNT) and filesystems (FAN_MARK_FILESYSTEM) enables whole-directory-tree
    monitoring in a race-free manner.
  locator: NOTES → Limitations and caveats
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Groups initialized with FAN_REPORT_FID or FAN_REPORT_DIR_FID deliver a fanotify_event_info_fid
    record using file handles to identify filesystem objects rather than file descriptors.
  locator: DESCRIPTION → Reading fanotify events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Generating events with file descriptors performs no read/write authorization check for the receiving
    process, posing a security risk for unprivileged users granted CAP_SYS_ADMIN.
  locator: BUGS
  confidence: medium
  quote_available: true
  notes: ''
