extracted_facts:
- evidence_id: ev_001
  text: The post-commit hook takes no parameters, runs after a commit is made, is meant primarily for
    notification, and cannot affect the outcome of git commit.
  locator: post-commit hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The post-merge hook is invoked by git-merge (e.g. on git pull), takes a single status-flag parameter
    (squash or not), cannot affect the merge outcome, and is not executed if the merge failed due to conflicts.
  locator: post-merge hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The post-receive hook executes on the remote once after all proposed ref updates are processed
    and only if at least one ref was updated, receiving one stdin line per successfully updated ref.
  locator: post-receive hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The post-receive hook does not affect the outcome of git receive-pack because it is called after
    the real work is done.
  locator: post-receive hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The post-checkout hook is given three parameters (previous HEAD ref, new HEAD ref, and a branch-vs-file
    checkout flag of 1 or 0) and is run by git checkout/git switch after updating the worktree.
  locator: post-checkout hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Uniquely among the post-* hooks, the post-checkout hook's exit status becomes the exit status
    of git switch / git checkout, so it can affect the command outcome.
  locator: post-checkout hook
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The post-checkout hook also runs after git clone (unless --no-checkout/-n) with the first param
    being the null-ref, the second the new HEAD ref, and the flag always 1; likewise for git worktree
    add.
  locator: post-clone / worktree behavior (post-checkout hook)
  confidence: medium
  quote_available: true
  notes: ''
