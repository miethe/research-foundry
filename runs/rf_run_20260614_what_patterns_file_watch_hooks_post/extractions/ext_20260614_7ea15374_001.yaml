extracted_facts:
- evidence_id: ev_001
  text: watchdog selects a platform-native backend per OS — inotify on Linux, FSEvents/kqueue on macOS,
    kqueue on BSD, ReadDirectoryChangesW on Windows — with an OS-independent disk-polling fallback.
  locator: README — Supported Platforms
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Because kqueue uses one file descriptor per watched file, watchdog warns it does not scale to
    deeply nested directories with many files.
  locator: README — Supported Platforms
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because Vim edits via backup files that are swapped in to replace the originals, watchdog's on-modified
    events do not fire for Vim-edited files.
  locator: README — About using watchdog with editors like Vim
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: For CIFS network mounts, watchdog must be told explicitly to use PollingObserver rather than relying
    on automatic backend selection.
  locator: README — About using watchdog with CIFS
  confidence: medium
  quote_available: true
  notes: ''
