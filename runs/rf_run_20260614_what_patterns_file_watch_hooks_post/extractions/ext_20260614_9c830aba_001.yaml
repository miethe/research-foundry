extracted_facts:
- evidence_id: ev_001
  text: 'Watchexec''s default debounce window is 50 milliseconds: it waits up to that long after an event
    before handling it (e.g., running the command), and setting it to 0 is discouraged.'
  locator: OPTIONS — --debounce
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Rename handling is fundamentally unreliable: it is impossible to portably know which path is
    old vs new, ''half'' and ''unknown'' renames can appear, and a rename can split across two debouncing
    boundaries.'
  locator: EVENTS — --emit-events-to (rename discussion)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The --poll flag forces filesystem polling instead of native OS watching, with a default polling
    interval of 30 seconds when none is specified.
  locator: OPTIONS — --poll
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The --delay-run option makes Watchexec sleep for a specified duration before running the command
    after an event is detected.
  locator: OPTIONS — --delay-run
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The graceful stop timeout defaults to 10 seconds; setting it to 0 immediately force-kills the
    command.
  locator: OPTIONS — --stop-timeout
  confidence: medium
  quote_available: true
  notes: ''
