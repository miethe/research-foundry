extracted_facts:
- evidence_id: ev_001
  text: SSE is a one-way (server-to-client) channel, so a client cannot push events to the server over
    the same connection.
  locator: Intro / Using server-sent events
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: By default an SSE connection auto-reconnects if it closes, and is terminated explicitly via the
    .close() method.
  locator: Closing event streams
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The server-side script emitting SSE events must respond with the MIME type text/event-stream.
  locator: Sending events from the server
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The 'retry' field sets the reconnection wait time in milliseconds (must be an integer, else ignored),
    and the 'id' field sets the EventSource object's last event ID used on reconnect.
  locator: Fields
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Without HTTP/2, SSE is limited to a very low number of open connections (6) per browser per domain;
    over HTTP/2 the simultaneous HTTP-stream limit is negotiated (defaulting to 100).
  locator: Listening for custom events
  confidence: medium
  quote_available: true
  notes: ''
