extracted_facts:
- evidence_id: ev_001
  text: The atomic option (default true when useFsEvents and usePolling are both false) coalesces a delete+re-add
    within 100 ms into a single 'change' event rather than emitting unlink then add.
  locator: Errors section — `atomic` option
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: awaitWriteFinish polls file size to debounce chunked/large writes; stabilityThreshold defaults
    to 2000 ms and pollInterval defaults to 100 ms.
  locator: Performance section — awaitWriteFinish timing params
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Polling is disabled by default (usePolling default false); when enabled, the file-system polling
    interval defaults to 100 ms and binaryInterval (for binary files) defaults to 300 ms.
  locator: Performance section — usePolling / interval / binaryInterval
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Running out of file handles produces EMFILE/ENOSPC errors; the inotify watch-limit (ENOSPC) case
    can be mitigated by raising fs.inotify.max_user_watches via sysctl.
  locator: Troubleshooting section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: As of Nov 2025, chokidar v5 is ESM-only and requires Node.js v20+; the prior v4 (Sep 2024) removed
    glob support and cut the dependency count from 13 to 1.
  locator: Top of README — update notes
  confidence: medium
  quote_available: true
  notes: ''
