- claim_id: clm_inf01
  text: Git post-* triggers (post-commit, post-merge) are the best fit for RF's research->vault seam because
    they fire exactly once per atomic commit/merge with no event coalescing or queue-overflow loss, unlike
    file-watch primitives which coalesce identical events and silently drop on queue overflow.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_013
    - clm_014
    - clm_065
    - clm_066
    - clm_067
    reasoning_summary: post-commit/post-merge run once per discrete VCS operation (clm_013, clm_014),
      whereas inotify coalesces identical unread events and drops on overflow (clm_065, clm_066, clm_067);
      since RF research output lands as committed source cards/reports, the commit boundary is the natural
      exactly-once trigger.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: For RF's vault->graph seam, a file-watch hook (watchdog on Linux/macOS, chokidar on Node) is the
    most responsive pattern, but it MUST be paired with a directory-rescan reconciliation pass because
    every native backend (inotify, FSEvents) signals lossy overflow conditions (IN_Q_OVERFLOW, MustScanSubDirs/Dropped)
    that force a full rescan rather than per-file delivery.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_039
    - clm_049
    - clm_051
    - clm_052
    - clm_066
    - clm_067
    reasoning_summary: watchdog/chokidar give low-latency local notification (clm_039), but FSEvents reports
      at directory granularity and forces rescans on coalescing/drops (clm_049, clm_051, clm_052) and
      inotify drops on overflow (clm_066, clm_067); the vault->graph seam therefore needs a reconciliation
      scan as the authoritative recovery path.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: SSE is unsuitable as the primary trigger for any RF write-path seam (research->vault, vault->graph)
    because it is a one-way server-to-client channel that cannot carry a tool-to-tool handoff push; SSE's
    correct role in RF is the telemetry->governance fan-out, broadcasting governance events to dashboards/observers.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    - clm_037
    reasoning_summary: SSE is explicitly one-way server-to-client (clm_001), so a downstream tool cannot
      use it to push a handoff to an upstream producer; its auto-reconnect and 204-stop semantics (clm_002,
      clm_037) suit a read-only observer fan-out such as telemetry->governance dashboards.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: SSE's last-event-ID resume protocol (Last-Event-ID header plus persistent id field) gives the
    telemetry->governance seam at-least-once delivery across reconnects and tool restarts, making it the
    only candidate pattern in this evidence set with a built-in, standardized offline-gap recovery mechanism.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_033
    - clm_034
    - clm_037
    reasoning_summary: the Last-Event-ID header and the persisting last-event-ID buffer (clm_033, clm_034)
      let a reconnecting client tell the server its last seen id so the server can replay missed events;
      combined with auto-reconnect (clm_037) this is a spec-level at-least-once resume that file-watch
      and git hooks lack.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'No candidate pattern in the evidence base provides exactly-once delivery: file-watch coalesces
    and drops events, git post-* hooks can re-fire (e.g. amended commits, re-merges) and are skipped on
    failure, and SSE explicitly guarantees only at-least-once via id-resume; therefore every RF seam MUST
    make its consumer idempotent rather than rely on transport-level exactly-once.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_014
    - clm_034
    - clm_065
    - clm_066
    reasoning_summary: inotify coalescing/overflow loses or merges events (clm_065, clm_066), post-merge
      is skipped on conflict and can recur on later merges (clm_014), and SSE id-resume is at-least-once
      replay (clm_034); none deliver exactly-once, so idempotent consumers are mandatory.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'File-watch is fundamentally unreliable for tracking renames/moves in any RF seam: inotify''s
    IN_MOVED_FROM/IN_MOVED_TO pairing is racy and may be incomplete, watchexec cannot portably distinguish
    old-vs-new paths, and these races make rename a leading cause of missed or duplicated handoffs; git
    triggers avoid this because a rename is just content in the next commit''s tree.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_045
    - clm_070
    - clm_013
    reasoning_summary: inotify rename pairing is inherently racy and may drop IN_MOVED_TO (clm_070) and
      watchexec warns renames are not portably trackable and can split across debounce boundaries (clm_045);
      a git post-commit hook sees the post-rename tree state atomically (clm_013), sidestepping the race
      entirely.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'The recommended pattern-vs-seam mapping for RF is: research->vault = git post-commit/post-merge
    trigger; vault->graph = file-watch (watchdog/chokidar) plus reconciliation rescan; telemetry->governance
    = SSE fan-out with Last-Event-ID resume; with lightweight event sourcing (an append-only event log
    file) as the cross-cutting reconciliation substrate for all three.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_013
    - clm_039
    - clm_001
    - clm_034
    - clm_066
    reasoning_summary: 'synthesizes clm_inf01-inf05: commit-boundary determinism favors git triggers for
      research->vault (clm_013), low-latency local detection favors file-watch for vault->graph (clm_039),
      one-way broadcast favors SSE for telemetry->governance (clm_001, clm_034), and lossy primitives
      (clm_066) motivate an append-only log for replay/reconciliation.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: Lightweight event sourcing implemented as an append-only newline-delimited log on the local filesystem
    is the highest-durability broker-less pattern because, unlike file-watch (bounded kernel queues that
    drop) and unlike in-memory SSE streams, an on-disk log survives tool restarts and offline periods
    and supports deterministic replay from a stored cursor.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_066
    - clm_067
    - clm_002
    - clm_034
    reasoning_summary: kernel event queues drop on overflow (clm_066, clm_067) and SSE reconnect loses
      in-flight events not yet flushed (clm_002), so durability requires persistence; the SSE id-resume
      model (clm_034) demonstrates that a stored last-position cursor enables replay, which an append-only
      file log generalizes to survive restarts.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: Because git post-merge does not fire on conflicted merges and is skipped, RF's research->vault
    seam can silently miss a handoff whenever a merge aborts on conflict; the compensating mechanism is
    a startup/periodic reconciliation pass that diffs the committed tree against the vault's last-processed
    commit SHA.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_014
    - clm_034
    reasoning_summary: post-merge is explicitly not executed when the merge fails due to conflicts (clm_014),
      creating a missed-event hole; storing a last-processed commit SHA and reconciling against HEAD mirrors
      the SSE last-event-ID cursor pattern (clm_034) to recover the gap.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: RF should select watchdog (Python) or chokidar (Node) over raw inotify/FSEvents and over watchexec
    for the vault->graph watcher, because both libraries already abstract per-OS backend selection and
    provide write-coalescing debounce (chokidar atomic 100ms / awaitWriteFinish 2000ms) that prevents
    partial-file ingestion into the graph.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_039
    - clm_028
    - clm_029
    - clm_044
    reasoning_summary: watchdog selects the native backend per OS (clm_039) and chokidar's atomic (100ms,
      clm_028) and awaitWriteFinish (2000ms, clm_029) options debounce in-progress writes so the graph
      ingests only stable files; watchexec's 50ms debounce (clm_044) is tuned for command re-runs, not
      write-stability, making the library watchers a better fit for ingestion.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf11
  text: The duplicate-trigger failure mode is most acute for file-watch (atomic-write editors emit delete+add
    or modify sequences) and for git hooks on commit amend/rebase; the uniform broker-less mitigation
    is content-addressed deduplication keying handoffs on a file hash or commit SHA so reprocessing the
    same content is a no-op.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_028
    - clm_041
    - clm_013
    - clm_059
    reasoning_summary: editor save patterns produce delete+re-add that chokidar only partly coalesces
      within 100ms (clm_028) and Vim's backup-swap suppresses on-modified entirely (clm_041), while amend/rebase
      re-fire post-commit (clm_013) and lefthook skip can only suppress by branch/state not by content
      (clm_059); hashing content/SHA makes duplicate handoffs idempotent.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf12
  text: Ordering races are inherent to broker-less file-watch (FSEvents coalesces directory+subdirectory
    events and inotify does not atomically order rename pairs), so any RF seam requiring causal order
    (e.g. vault note created before its graph edge) MUST derive order from a monotonic source such as
    git commit topology or an append-only log sequence number rather than from filesystem event arrival
    order.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_051
    - clm_070
