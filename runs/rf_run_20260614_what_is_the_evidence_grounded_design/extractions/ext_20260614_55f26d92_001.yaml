extracted_facts:
- evidence_id: ev_001
  text: The language models a crochet pattern as a directed graph in which each stitch is a node carrying
    its stitch type as a property, and edges of three kinds (previous, insertion, slip-stitch) encode
    where the yarn came from and which fabric points the stitch is worked into.
  locator: Sec 3.1 Insertion Points and Transitions; Representing Stitches
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Rows and rounds are unified into a single concept the authors call 'layers,' requiring no structural
    change in the graph because whether a pattern is worked row-wise or round-wise depends only on where
    the next stitch is inserted; each node stores its layer number as a property.
  locator: Sec 3.2 Rows, Rounds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: An increase is represented as multiple stitches sharing one insertion point (multiple incoming
    insertion edges), and a decrease as a stitch with multiple outgoing insertion edges, directly mirroring
    the manual increase/decrease methods that widen or narrow a layer.
  locator: Sec 3.1, Figure 5 caption (d)(e)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Because a crochet pattern is worked along a single yarn, the graph encodes a crochetability (reproducibility)
    constraint: edge orderings must be such that no loop ever uses an insertion point that has not yet
    been created, guaranteeing exactly one unambiguous yarn path through the pattern.'
  locator: Sec 3.1 Track of the Yarn
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A projectional editor prototype lets designers build patterns step-wise 'as if crocheting,' which
    by construction only permits reproducible (crochetable) patterns, and renders the same graph as a
    2D crochet chart and a force-based 3D view.
  locator: Sec 3.4 Domain-Specific Tool Support; Sec 3.3 Surface Syntax in 2D and 3D
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The language and editor were evaluated in a think-aloud study with six professional crochet designers,
    recruited from 25 respondents of a formative survey originally sent to 200 myboshi designers, who
    confirmed the language could express 2D and 3D patterns and remove ambiguities present in standard
    crochet charts.
  locator: Sec 4 / 4.1 User Experience of Designers Creating Digital Patterns
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The language explicitly represents holes (openings under a stitch or chain) as dedicated nodes
    connected via surroundingNode edges, making them valid insertion points and capturing a technique
    that standard crochet charts cannot represent.
  locator: Sec 3.1 Insertions into Holes; Figure 7
  confidence: medium
  quote_available: true
  notes: ''
