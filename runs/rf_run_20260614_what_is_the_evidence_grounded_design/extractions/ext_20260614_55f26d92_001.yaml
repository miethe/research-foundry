contradictions_or_cautions:
- text: Editor is a research prototype, not a production tool
  locator: card/trust
- text: Qualitative evaluation with only six designers
  locator: card/trust
- text: Findings rest on a single research prototype editor and a small qualitative study (six designers);
    some features (color/yarn changes, non-linear editing, copy-and-paste, custom repeatable stitches)
    are noted as not yet supported, so claims about tool maturity or generality should be scoped to the
    2022 prototype.
  locator: card/limitations
