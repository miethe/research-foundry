contradictions_or_cautions:
- text: 'Tile set explicitly incomplete: only ch, ss, sc, sc2tog, sc3tog modeled; double/treble crochet
    and post stitches not implemented.'
  locator: card/trust
- text: Single fixed stitch aspect ratio in the automatic pipeline causes shaping/gap artifacts.
  locator: card/trust
- text: 'The modeled tile set is explicitly incomplete: only chain, slip stitch, single crochet, sc2tog,
    and sc3tog are implemented; double/treble crochet and post stitches (e.g., front-post double crochet)
    are not representable. The automatic pipeline uses a single fixed stitch aspect ratio, producing shaping
    artifacts and gaps for varied stitch types and tensioning styles.'
  locator: card/limitations
