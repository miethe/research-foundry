extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE is the acronym for 'Crochet PAttern Renderer, Analyzer, and DEbugger', positioning
    it as a crochet pattern domain-specific language with rendering and validation tooling.
  locator: Header / title
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Increases and decreases are encoded as suffixes on stitch tokens (Ninc / Ntog), where for example
    sc2inc means two single-crochet stitches worked into the same stitch.
  locator: 'Section: Basics — increases/decreases'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Repeats use bracketed blocks with an integer multiplier; for example [10sc,turn]*3 expands to
    three rows of 10 single crochets each ending with a turn.
  locator: 'Section: Basics — repeats and row control'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The language is extensible to new stitch types via a DEF directive carrying a raw node/connection
    grammar of the form top_nodes:bottom_nodes~attachments:other_nodes:connections.
  locator: 'Section: Raw stitch definitions and grammar — DEF syntax'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The CrochetPARADE grammar/language itself is explicitly stated to be in the public domain and
    not copyrightable, separating the language from the GPLv3-licensed implementation.
  locator: 'Section: LICENSE AND COPYRIGHT — grammar'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The website and all of CrochetPARADE's computational components are open source and released under
    the GPLv3 license, while the manual is released under Creative Commons BY-NC-SA.
  locator: 'Section: LICENSE AND COPYRIGHT — code'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The force-directed engine does not produce exact stitch lengths; the author reports it converges
    to within 10% of requested stitch lengths under default settings.
  locator: 'Section: DOT Command — convergence'
  confidence: medium
  quote_available: true
  notes: ''
