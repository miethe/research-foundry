- evidence_id: ev_002
  text: The user manual, which includes a description of the CrochetPARADE grammar, is released under
    the Creative Commons BY-NC-SA license.
  locator: LICENSE AND COPYRIGHT section, bullet 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The grammar itself cannot be copyrighted and is in the public domain, so the DSL grammar is adoptable
    even though the reference engine is GPLv3 copyleft.
  locator: LICENSE AND COPYRIGHT section, bullet 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: CrochetPARADE uses a custom DSL grammar to remove the ambiguities of plain-English crochet instructions,
    parsing and checking patterns for correctness before building a 3D virtual model.
  locator: OVERVIEW section, paragraph 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The CrochetPARADE grammar follows rules similar to those of real programming languages, making
    it usable to teach both crocheting and programming.
  locator: GOALS AND POSSIBLE APPLICATIONS section, bullet 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The platform supports interactive 3D rendering (rotate/zoom/pan), detection of overly loose or
    tight stitches for adjustment, export of standard-symbol crochet charts and SVG diagrams, and export
    to 3D files importable in Blender.
  locator: OVERVIEW section, paragraphs 2-4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: CrochetPARADE performs all calculations locally on-device with no data collected or transmitted,
    at the cost of being sluggish on old hardware for very large (tens of thousands of stitches) patterns.
  locator: OVERVIEW section, final paragraph (local computation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The repository is hosted on Codeberg (canonical) and mirrored on GitHub, with showcase asset filenames
    timestamped 2025-02-22, indicating active maintenance in early 2025.
  locator: Header banner / examples section asset timestamps
  confidence: medium
