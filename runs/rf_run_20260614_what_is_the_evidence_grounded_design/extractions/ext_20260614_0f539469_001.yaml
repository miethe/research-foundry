contradictions_or_cautions:
- text: Qualitative user study with only six designers; not a quantitative accuracy/performance benchmark.
  locator: card/trust
- text: Editor is an explicitly described prototype with an admittedly unstable force-based layout.
  locator: card/trust
- text: Evaluation is a qualitative think-aloud study with only six designers (recruited from a 25-person
    formative-survey pool); it is not a quantitative accuracy or productivity benchmark.
  locator: card/limitations
- text: The editor and its force-based 3D layout are described as a prototype/approximation; the authors
    note the force-based layout is only an approximation of the actual 3D form and that the moving layout
    disoriented some users.
  locator: card/limitations
