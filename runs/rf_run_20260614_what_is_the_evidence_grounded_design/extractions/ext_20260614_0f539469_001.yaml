extracted_facts:
- evidence_id: ev_001
  text: The paper proposes the first visual, domain-specific, graph-based language for unambiguous crochet
    pattern representation, contributed alongside a 2D-editing/3D-viewing editor prototype and a qualitative
    user evaluation.
  locator: Abstract / Sec. 1 Introduction (Contributions)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: In the language a stitch is represented as a graph node (an 'insertion point'), and the basic
    idea is to directly encode the structure and dependency relations of a pattern rather than a linear
    sequence of stitches.
  locator: Sec. 3.1 Core Principles of the Language — Insertion Points and Transitions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Edges encode the worked-into/insertion relationship between stitches: ''previous'' edges trace
    the yarn origin and each node has exactly one outgoing previous edge, while ''insertion'' edges point
    to the insertion points that the current stitch is worked into.'
  locator: Sec. 3.1 Core Principles of the Language (edges, 'Representing Stitches')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Increases are represented as multiple incoming insertion edges into one insertion point, and decreases
    as multiple outgoing insertion edges from a single stitch node.
  locator: Sec. 3.2 Support for Particular Techniques — Increasing and Decreasing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rows and rounds are unified into a single 'layers' abstraction so that flat and circular work
    share one graph structure, with the layer number stored as a per-node property; no structural change
    distinguishes a row from a round.
  locator: Sec. 3.2 Support for Particular Techniques — Rows, Rounds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The core validity invariant for crochetability is that no node may be worked into before it is
    created (no use of a future insertion point), and the editor renders the graph in 2D/3D via a force-based
    / 3D force-directed layout heuristic.
  locator: Sec. 3.1 — Crochetability (validity invariant) and Sec. 3.4 — Domain-Specific Tool Support
    (force-based 3D layout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: In a think-aloud study with six professional crochet designers, all but one participant successfully
    reproduced the pattern in 2D; four cited the shape preview as beneficial, and several expressed enthusiasm
    about the 3D perspective for understanding shape (e.g., amigurumi proportions).
  locator: Sec. 4 (Procedure §4.1) and Sec. 4.3 / 4.4 — Tasks 2 and 3 of the user study (six professional
    crochet designers)
  confidence: medium
  quote_available: true
  notes: ''
