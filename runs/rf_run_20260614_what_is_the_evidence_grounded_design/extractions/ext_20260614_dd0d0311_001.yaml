- evidence_id: ev_001
  text: CrochetBench is a dataset of 6,085 crochet patterns across 55 project categories scraped from
    Yarnspirations, with roughly 98% image coverage.
  locator: Section 2 (Dataset) / Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: To respect copyright the authors do not redistribute raw pattern PDFs or full text, releasing
    only GPT-generated structured JSON annotations, reference URLs, and their scripts.
  locator: Ethical Considerations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The CrochetPARADE DSL serves as an intermediate representation that parses input and checks for
    syntactic and consistency errors such as mismatched stitch counts and impossible attachments before
    execution.
  locator: Appendix D (CrochetPARADE validation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Functional evaluation compares the target product image against a rendering produced from each
    model's executable program using DINO similarity.
  locator: Section 4 / Figure 5 (DINO similarity)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Even the strongest tested models produce only 5-8% executable programs at the project level, showing
    current VLMs largely fail at executable generation.
  locator: Section 4 (Results)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: DINO similarity scores of valid model renderings remain uniformly low (0.10-0.17), far below the
    threshold indicating faithful reproduction.
  locator: Section 4 / Figure 5 (DINO similarity)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Step-level validity is also low, with most models achieving under 15% validity even in the first
    two steps of generation.
  locator: Section 4 / Figure 3 caption (step-level validity)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Across all tasks, performance sharply decreases as evaluation shifts from surface-level similarity
    to executable correctness, revealing limits in long-range symbolic reasoning and 3D-aware procedural
    synthesis.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
