extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE is an acronym for 'Crochet PAttern Renderer, Analyzer, and DEbugger,' authored by
    Svetlin Tassev, and is a platform for creating, visualizing, and analyzing both 2D and 3D crochet
    patterns.
  locator: Header / intro (lines 17-19)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: CrochetPARADE uses a custom grammar to define stitches and patterns, parses and checks any user-provided
    pattern for correctness, then builds a virtual model that it renders in 3D.
  locator: OVERVIEW section, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The custom grammar is intended to ensure accuracy and precision in instructions, avoiding the
    ambiguities of plain-English crochet directions.
  locator: OVERVIEW section, para 1 (grammar rationale)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: After rendering, users can 'debug' the project's shape; the platform flags overly loose or tight
    stitches so users can replace them before crocheting, reducing the need for blocking.
  locator: OVERVIEW section, para 2 (debug feature)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: CrochetPARADE can export an auto-generated crochet chart with standard symbols, an SVG that shows
    stitch connections and labels each stitch by type, row number, and position, and 3D files importable
    into Blender.
  locator: OVERVIEW section, para 3 (export)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: All calculations run locally on the user's device with no data sent to a central server, with
    the trade-off that large patterns (tens of thousands of stitches) can take minutes or more to compute
    on old hardware.
  locator: OVERVIEW section, para 5 (local compute / performance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The website and all computational components are free and open source under the GPLv3 license;
    the canonical repository is hosted on Codeberg (mirrored on GitHub).
  locator: LICENSE AND COPYRIGHT section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: CrochetPARADE is built on the SVG.js and three.js JavaScript libraries (three.js handles the 3D
    rendering).
  locator: ACKNOWLEDGEMENTS section
  confidence: medium
  quote_available: true
  notes: ''
