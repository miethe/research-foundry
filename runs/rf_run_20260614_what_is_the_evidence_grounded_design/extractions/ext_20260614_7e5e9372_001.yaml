contradictions_or_cautions:
- text: Method targets single-crochet (sc) amigurumi using only sc/inc(x)/dec(x); the cited curvature
    table notes that some curvature combinations require preprocessing or segmentation rather than direct
    crocheting, so it is not a universal stitch-pattern solver.
  locator: card/limitations
