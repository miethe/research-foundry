extracted_facts:
- evidence_id: ev_001
  text: The Crochet Graph G = (S, R union C) models a pattern as vertices S that are stitch tops/bases
    indexed (i,j) for the j-th stitch in row i, column edges C representing stitch stems between rows,
    and row edges R representing within-row connectivity.
  locator: Section 2.2 The Crochet Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Curved geometry is achieved in crochet through stitches that locally increase (inc(x)) or decrease
    (dec(x)) the stitch count by x, so curvature is encoded directly as stitch-level operations.
  locator: Section 2.1 Background and Notations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Increases and decreases are emitted by a transducer that reads vertex connectivity: x>1 vertices
    in row S_i feeding one head vertex in S_{i+1} produce dec(x), and x>1 vertices in S_{i+1} feeding
    one vertex in S_i produce inc(x).'
  locator: Section 5.1 Graph to Program (transducer)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Two consecutive rows are 'coupled' when a coupling C between their vertex sets matches exactly
    the column edges C; if all consecutive row pairs are coupled then valid crochet instructions P(G)
    exist using only sc, inc(x), and dec(x), guaranteeing yarn continuity.
  locator: Definition 2.2 and Observation 2.3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Multi-part shapes use ''join-as-you-go'': each segment is crocheted directly onto the last row
    of the previous segment so no sewing is needed, segment order follows a topological sort of the segment
    DAG, and any shared edge (s,t) requires the last row of M_s to be coupled to the first row of M_t.'
  locator: Section 7.2 / 7.2.1 Branching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Gauge is controlled by a single stitch width w: the row function f and column function g are
    uniformly sampled on a 2D grid of width w, producing vertices of S indexed (f/w, g/w), so one width
    parameter directly maps mesh area to stitch count.'
  locator: Section 4.1 Geometry
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: For regions of negative Gaussian curvature the column sampling rate is modulated by setting <grad
    g, J grad f> = h(k_j grad f) with h(x)=tanh(-x/alpha)/2+1 and alpha=10, to avoid degenerate sampling
    rates.
  locator: Section 7.1.2 Negative Gaussian Curvature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'A two-by-two table over the sign of mean and Gaussian curvature governs crochetability: most
    combinations are directly crochetable, negative Gaussian with negative mean requires sampling modification,
    and positive Gaussian with negative mean requires preprocessing.'
  locator: Section 2.3 Table 1 (Curvature obstructions to crochetability)
  confidence: medium
  quote_available: true
  notes: ''
