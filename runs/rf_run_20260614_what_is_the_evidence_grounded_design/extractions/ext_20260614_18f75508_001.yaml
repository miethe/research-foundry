extracted_facts:
- evidence_id: ev_001
  text: The graph IR represents each stitch as a node, with horizontal edges encoding sequential connections
    (one stitch made immediately after another) and vertical edges encoding working connections (top stitch
    worked into the bottom stitch).
  locator: Section 4.1 (graph construction), para on stitch/edge representation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Shaping effects done without crochet stitches (e.g. pulling yarn tight to create a dimple) are
    encoded as additional 'constraint edges', as in the apple model where a constraint edge of length
    6 (chosen by trial and error) links the first and last node.
  locator: Section 4.1, sentence on shaping effects without crochet stitches; Section 5.1 apple
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Rows and rounds are treated identically ('rows' is used generically for both), and the first row's
    single-crochet nodes all connect to a shared anchor (ring) node while later rows work into the previous
    row.
  locator: Section 3 (Background), final paragraph; Section 4.1 first-row construction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The layout is a non-linear least-squares optimization (solved with Ceres Solver) blending an edge-length
    energy (targeting unit-length edges) and a curvature energy as (1-lambda)*EL + lambda*C, with a default
    lambda=0.65 (raised to lambda=0.9 for the bunny head and body); inflating the planar graph emulates
    stuffing.
  locator: Section 4.2 (The graph layout), energy-function and Ceres Solver paragraphs
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Stated limitations include the assumption of constant edge length 1 (real stitch dimensions vary
    with tension, hook, and yarn, so a swatch measurement is needed for accuracy), testing only on beginner-level
    patterns and sc-like stitches, and ad hoc piece-joining with no systematic method yet.
  locator: Section 5.1 (Modeling complete patterns), raindrop and scope-limitation paragraphs
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The implementation is released as open-source code at https://github.com/EnbyMonkey/modelingamigurumi.git,
    and the paper is an open-access article under the Creative Commons Attribution License.
  locator: Section 3 (Background), code-availability line; license footnote
  confidence: medium
  quote_available: true
  notes: ''
