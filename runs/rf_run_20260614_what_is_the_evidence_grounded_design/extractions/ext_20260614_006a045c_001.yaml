extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE does not distinguish rows from rounds with a keyword; each new line of the pattern
    text is treated as a new row/round.
  locator: Section 'tttttt' (row/round and repeat semantics)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Bracketed repeat blocks can have their last iteration ended early with `>` and their first iteration
    started at a marked location with `<`, and `...` provides line continuation/wrap.
  locator: Section 'tttttt' (angle markers and line continuation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Stitches on a row are auto-attached one-by-one to consecutive stitches in the previous row, and
    turning the work at the end of a row is accounted for automatically by the renderer.
  locator: Section 'Specifying attachment points' (turn handling)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The grammar has variable/counter machinery: a counter is initialized between two `$` signs (e.g.
    `$k=0$`) and incremented/decremented with `++`, `--`, `prev k`, or `next k`, with algebra (e.g. mod)
    permitted in indexing.'
  locator: 'Section ''Labels with counters: @A[++k] and .A[++k]'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Increase stitches follow a `Ninc` shorthand whose raw definition packs multiple top nodes into
    one insertion point, e.g. `sc2inc` is two single-crochet top nodes chained onto a shared base.
  locator: Section 'Top Nodes' (raw stitch definitions); increase example
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Disjoint pieces are created by using a connection length of `skip`; the internally defined `start_anew`
    stitch uses this so the next stitch has no connection to the previous one, like starting a new part
    of the project.
  locator: Section 'Connections' (raw stitch grammar); start_anew
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The CrochetPARADE manual is CC BY-NC-SA and the computational components are GPLv3, but the grammar
    itself cannot be copyrighted and is in the public domain.
  locator: Section 'LICENSE AND COPYRIGHT'
  confidence: medium
  quote_available: true
  notes: ''
