- claim_id: clm_inf05
  text: 'Amigurumi piece boundaries and assembly joints are the clearest gap the prior art does not cleanly
    cover: CrochetPARADE only offers a low-level start_anew/skip disjoint marker, AmiGo''s join-as-you-go
    has the right semantics but no public code or text DSL, and Greer/Mould explicitly call piece-joining
