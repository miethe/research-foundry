- claim_id: clm_inf01
  text: The KnitWit Crochet IR should be a DSL surface over a graph core (hybrid), because three independent
    peer-reviewed sources (Digital Crochet, AmiGo, and Greer/Mould) all model crochet natively as a node-and-edge
    graph while CrochetPARADE's adoptable public-domain layer is itself a node/connection grammar, so
    a graph core gives a single validation substrate and a CrochetPARADE-style DSL gives the human-authoring
    and corpus-compatibility surface.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
