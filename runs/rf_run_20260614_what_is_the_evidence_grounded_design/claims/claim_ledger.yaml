    reasoning_summary: Seitz (clm_021/clm_053) states no node may be worked into before it is created;
      AmiGo (clm_060) proves valid instructions exist iff consecutive rows are coupled, guaranteeing yarn
      continuity; Guo (clm_037/clm_070) introduces the current-loop edge tracking the single live loop.
      Three independent formalisms of one invariant make it the highest-confidence machine-checkable rule.
  report_locations: []
  reviewer_notes: ''
