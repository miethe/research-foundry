    reasoning_summary: Seitz (clm_017/clm_050), Greer (clm_023), and AmiGo (clm_057) all converge on a
      stitch=node graph; CrochetPARADE's own DEF raw grammar (clm_032) is a top_nodes:bottom_nodes:connections
      graph encoding, so the DSL is already a textual projection of a graph, making a DSL-over-graph hybrid
      the lowest-friction core that satisfies both authoring and validation.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Graph branching for shaping should be canonicalized as inc = one base insertion point with multiple
    feeding stitch nodes and dec = one stitch node consuming multiple base insertion points, because Digital
    Crochet, AmiGo's transducer, and Guo's stitch-mesh faces independently encode exactly this multiplicity,
    making it the cross-source-validated representation for the IR's increase/decrease semantics.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_019
    - clm_040
    - clm_052
    - clm_059
    reasoning_summary: 'Seitz (clm_019/clm_052: inc=multiple incoming insertion edges, dec=multiple outgoing),
      AmiGo''s transducer (clm_059: x>1 vertices feeding one head => dec(x)/inc(x)), and Guo (clm_040:
      sc2tog=two past edges to one future edge; inc face splits one future edge into two) describe the
      same edge-multiplicity pattern, so adopting it is a triangulated convergence rather than a single-source
      choice.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: The single-continuous-yarn / current-loop continuity invariant is the most strongly corroborated
    rule in the corpus, asserted in three forms (Seitz's no-use-before-create, AmiGo's row-coupling existence
    theorem, and Guo's current-loop edge), and therefore must be a hard, non-bypassable gate in the validator
    for both forward and inverse engines.
