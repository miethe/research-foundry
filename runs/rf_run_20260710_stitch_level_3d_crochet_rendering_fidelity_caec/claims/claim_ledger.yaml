- claim_id: clm_inf05
  text: 'A round-by-round inc/dec schedule is functionally a discrete Gaussian-curvature specification:
    constant stitch count yields zero curvature (tube/cylinder), net increases yield positive curvature
    (sphere/cap growth), and net decreases yield closure/negative regions - so shaping global form reduces
    to placing curvature via stitch-count deltas.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_003
    - clm_059
    - clm_007
    - clm_071
    reasoning_summary: AmiGo states square-stitch cover is only possible on developable (zero-Gaussian-curvature)
      surfaces and that inc/dec locally add/remove curvature; combined with the constant-row-height geometry,
      this establishes stitch-count delta as the discrete curvature control knob.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Recommended forward shaping pipeline for the KnitWit engine: (1) expand IR repeats to explicit
    per-stitch ops, (2) build a stitch graph with intra-round row edges and inter-round column edges,
    (3) solve a constrained embedding that fixes the seed, constrains row/column edge lengths to the stitch
    width, and enforces smoothness - i.e. AmiGo''s ShapeUp preview recipe applied directly to an IR-derived
    graph.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_076
    - clm_073
    - clm_062
    - clm_040
    - clm_067
    reasoning_summary: AmiGo builds column edges via a length-minimizing optimization and embeds via constrained
      ShapeUp; Greer-Mould shows the pattern->graph->layout flow; the IR already encodes rounds/ops, so
      these steps compose into a concrete forward pipeline.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: AmiGo's constrained-optimization embedding (fixed seed + edge-length constraints + smoothness)
    should be preferred over a pure force-directed layout for the model-at-round-N preview, because force-directed
    layouts are prone to local-minima instability - exactly the 'graph layout is unstable' condition the
    spec names as a G3 failure.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_076
    - clm_073
    - clm_040
    - clm_062
    reasoning_summary: Force-directed layouts (Greer-Mould) optimize a soft energy that can settle in
      unstable local minima, whereas AmiGo's hard geometric constraints with a fixed seed produce a more
      deterministic embedding; for a repeatable round-by-round reveal, determinism matters, so the constrained
      formulation is safer against the G3 instability fail signal.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: The dominant shape-fidelity failure mode is 'craters' (positive Gaussian + negative mean curvature),
    which are physically unrealizable under maximal stuffing; a forward preview that renders such regions
    as clean geometry will actively mislead users, so the engine must detect and flag (or pre-inflate)
