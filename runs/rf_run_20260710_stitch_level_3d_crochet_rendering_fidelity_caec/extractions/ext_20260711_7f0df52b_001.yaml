extracted_facts:
- evidence_id: ev_001
  text: Crochet pattern design is an iterative guess-and-check loop of crocheting, evaluating the physical
    result, then undoing and remaking stitches across multiple passes.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The method takes a written crochet pattern as input, translates it into a graph, and computes
    a force-directed graph layout to produce a 3D representation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The output 3D model reproduces the hand-crocheted pattern's shape and size, letting designers
    adjust from the digital model without physically crocheting it.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The tool targets both professional designers and beginners, aimed at pre-visualizing a pattern
    before investing the time and effort to physically make it.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The application is oriented toward amigurumi but the authors state it could be extended to clothing
    or similar crochet styles.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The work is classified under Human-centered computing, Graph drawings, published at the ACM/EG
    Expressive Symposium (WICED 2025) by The Eurographics Association (DOI 10.2312/exw.20251057).
  locator: Description / CCS Concepts
  confidence: medium
  quote_available: true
