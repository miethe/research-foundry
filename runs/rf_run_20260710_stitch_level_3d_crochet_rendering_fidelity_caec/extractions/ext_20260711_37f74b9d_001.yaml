extracted_facts:
- evidence_id: ev_001
  text: The Remesher crochets in rounds only with no turning chains, growing the fabric outward on the
    surface, seeded by either a Magic Ring (ring point + axis + stitch direction) or a Starting Chain
    (chain midpoint + axis + chain count).
  locator: Original post (CrochetPARADE, 02-14-2026) — seeds/rounds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The backend is a surface remesher that grows a stitched patch while maintaining a 'frontier' (the
    current boundary of the crocheted surface).
  locator: Original post — backend algorithm
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: At each step it tries stitch/decrease/increase-style moves across stitch heights (ss, sc, hdc,
    dc, etc.) and checks geometric/topological guards such as overlap and surface proximity.
  locator: Original post — stitch moves and guards
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: On dead-ends the remesher backtracks to a prior snapshot and applies an 'adaptive relaxation ladder'
    that selectively loosens epsilons/guards to escape local minima, emitting 'zip' sewing edges when
    independently-grown regions meet and supporting multiple yarns for complicated shapes.
  locator: Original post — backtracking, relaxation, zips, yarns
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A very fine stitch size (small L) explodes stitch count and can hit WebAssembly memory limits
    in the browser, requiring a larger L or the desktop app build.
  locator: Original post — compute ceiling
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Outputs are a 3D preview of the crocheted surface plus copy/paste-able CrochetPARADE instructions,
    and users can pause at specific points to inject their own moves, yarn starts/ends, or forced zips.
  locator: Original post — outputs and manual injection
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: An admin follow-up reports the Remesher can generate round-based crochet instructions for non-watertight
    STLs with holes/openings, demonstrated with the baby-bootie STL exported from the new Export STL tool.
  locator: Admin reply (_admin_, 02-16-2026) — non-watertight STLs
  confidence: medium
  quote_available: true
  notes: ''
