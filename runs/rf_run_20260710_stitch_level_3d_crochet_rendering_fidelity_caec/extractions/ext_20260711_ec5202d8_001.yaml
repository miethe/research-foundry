contradictions_or_cautions:
- text: Handles only closed surfaces (stuffed Amigurumi)
  locator: card/trust
- text: No symmetry awareness; low-res patterns may be non-symmetric
  locator: card/trust
- text: Handles only closed surfaces (stuffed Amigurumi); does not account for model symmetry, so low-resolution
    patterns may crochet non-symmetrically; limited design freedom (single seed, no per-region knitting-direction
    control). Craters (positive Gaussian + negative mean curvature) cannot be realized and are smoothed
    away in preprocessing.
  locator: card/limitations
