extracted_facts:
- evidence_id: ev_001
  text: AmiGo's inputs are a closed manifold triangle mesh M, a single user seed vertex s, and a stitch
    width w, from which it generates human-readable crochet instructions P(M, s, w).
  locator: 2.1 Background and Notations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Single crochet (sc) is treated as an approximately square stitch, so covering the mesh with sc
    stitches is equivalent to a constant-edge-length unit-square quad remesh.
  locator: 2.1 Background and Notations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A square-stitch cover is impossible on non-developable (nonzero Gaussian curvature) surfaces,
    so curvature is accommodated by local increase (inc(x)) and decrease (dec(x)) stitches.
  locator: 2.1 Background and Notations
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Rows are defined as isolines of the geodesic distance function f(v)=d(v,s) from the seed, so two
    points lie on the same row iff their geodesic distance to the seed is equal.
  locator: 4.1 Geometry (Row order f)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Curvature-adapted sampling of the parameterization reconstructs negative curvature and yields
    object-similar shapes, whereas uniform sampling does not.
  locator: 7.1.2 Negative Gaussian curvature (Fig. 6)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A 3D preview embedding is computed with ShapeUp using purely geometric conditions, and the result
    closely matches the physical crocheted-and-stuffed object.
  locator: 6 Crochet graph to 3D embedding
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Branching shapes are auto-segmented and joined via 'join-as-you-go', where each segment is crocheted
    onto the previous segment's last row, requiring no additional sewing.
  locator: 7.2 Branching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: AmiGo's simpler approach and crochet's low resolution give pattern-generation times of a few minutes,
    versus tens of minutes for AutoKnit.
  locator: 1.1 Related Work (Knitting)
  confidence: medium
  quote_available: true
  notes: ''
