extracted_facts:
- evidence_id: ev_001
  text: 'The spec defines a 4-level 3D ambition ladder: L0 2D+counters+highlighting, L1 structural 3D
    preview (stitch graph/mesh approximation), L2 editable 3D with consistent stitch semantics, L3 3D
    object to pattern synthesis.'
  locator: §3 Approach / Rationale — 'Decompose the 3D ambition into achievable levels'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The spec recommends 'structural geometry' 3D (stitches as a connected graph/surface with thickness,
    textured to suggest yarn) rather than yarn-level physics, to deliver preview/assembly utility 'without
    melting phones'.
  locator: '§4B — The 3D visualizer: feasible, but choose the right kind of 3D'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The spec specifies a Crochet IR with units (US/UK, gauge, hook, yarn weight), pieces[], rows[]
    as stitch ops with counts (sc x6, inc, dec, repeat), constraints (expected end-of-row count, checkpoints),
    and assembly/placement markers.
  locator: '§5 Supporting Details — Data model: Crochet IR (sketch)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The spec names market incumbents Ribblr (interactive ePatterns) and My Row Counter (imports PDFs/webpages/videos,
    multi-counter, Ravelry integration), and notes there is historically no official native Ravelry app.
  locator: §4A — What already exists
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'The spec flags pattern IP/copyright as the #1 business landmine and parsing ambiguity (inconsistent
    abbreviations/formatting/charts) as a core technical risk.'
  locator: §6 Risks / Limits
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The spec positions reverse 3D-to-pattern as a Phase 3 capability that is computationally grounded
    (citing peer-reviewed amigurumi generation) but warns 'looks like the model' does not equal pleasant/stable
    to crochet.
  locator: §4D — 3D object to crochet pattern generator; §4D recommendation
  confidence: medium
  quote_available: true
  notes: ''
