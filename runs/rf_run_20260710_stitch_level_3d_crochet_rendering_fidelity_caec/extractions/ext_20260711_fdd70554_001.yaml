extracted_facts:
- evidence_id: ev_001
  text: Amigurumi are crocheted in the round in single crochet with near-constant row height (~= SC width),
    so each stitch in a row is equidistant to the seed and rows follow geodesic equidistant curves.
  locator: Why Geodesic Distances for Crochet?
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Stitch locations are found by cutting and flattening the model (vertical = geodesic distance/row
    number, horizontal = arc length along the equidistant curve/stitch number), then evenly sampling.
  locator: How? — Rows, stitches and connecting the dots
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Vertical (column) edges of the crochet graph are chosen by solving an optimization that minimizes
    the total length of the vertical edges.
  locator: How? — Rows, stitches and connecting the dots
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: '''Crater'' regions (negative mean + positive Gaussian curvature) are unrealizable under maximal-stuffing
    and are removed by pre-inflating the model; saddle regions (both curvatures negative) use fewer stitches
    via adapted sampling.'
  locator: Curvature based inflating, sampling and creasing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Creases are reproduced by automatically switching to Back-Loop-Only (BLO) / Front-Loop-Only (FLO)
    stitches where maximal absolute curvature is high and its direction is orthogonal to the crocheting
    direction.
  locator: Curvature based inflating, sampling and creasing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: A 3D preview is produced by embedding the crochet graph via optimization (fix seed, constrain
    SC/row edge lengths to fixed width, require smoothness); the result is very similar to the crocheted
    output without any physical simulation.
  locator: Segmentation and visualization
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The method joins-and-turns at each round rather than spiraling to avoid stitch slanting (incompatible
    with their shortest-vertical-edge optimization); spiral compatibility is planned future work.
  locator: Caveats and What's Next?
  confidence: medium
  quote_available: true
  notes: ''
