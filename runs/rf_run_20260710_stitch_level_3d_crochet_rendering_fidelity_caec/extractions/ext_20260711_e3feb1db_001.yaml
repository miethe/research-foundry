extracted_facts:
- evidence_id: ev_001
  text: Crochet remains a purely manual craft with little digital tool support, in contrast to knitting
    and weaving which have received technical support.
  locator: Abstract, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Existing crochet tools are constrained by underlying pattern languages that are either ambiguous
    or limited in expressiveness, making instruction creation effortful and error-prone.
  locator: Abstract, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The paper proposes the first visual, domain-specific, graph-based language for crochet pattern
    representation.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A prototype editor implements the language, allowing patterns to be created in 2D and viewed in
    3D.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A user study demonstrated the language lets designers express both 2D and 3D patterns and removes
    ambiguities present in current standard notations.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper appeared in Onward! 2022 (ACM SIGPLAN SPLASH), pages 48-62, published 01 December 2022,
    as an open-access research article.
  locator: Publication History / masthead
  confidence: medium
  quote_available: true
