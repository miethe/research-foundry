extracted_facts:
- evidence_id: ev_001
  text: 'Mesh-level (stitch-mesh) knit models serve two purposes: interactive pattern editing and initialization
    of offline yarn-level simulations (a hybrid pipeline).'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Prior mesh-level methods abstract knitting as a homogeneous material, which prevents capturing
    more complicated mixed structures.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The core observation is that a stitch's physical behavior depends not only on its own structure
    but on the surrounding stitch types; the paper extends the stitch mesh model with neighbor-aware per-stitch
    material properties.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Structural analysis of stitch connections yields a finite set of four-way kernels that combine
    to create general knit-purl patterns for relaxation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The 4 neighbors of each stitch account for much of the neighborhood-dependent deformation while
    staying simple enough to fit directly to measured data using 11 basis swatches.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Kernel rest-lengths are inferred from measured reference patterns via a linear model, enabling
    efficient rest-shape estimation for mixed knit-purl patterns that supports fast fabric preview and
    more accurate yarn-level simulation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
