extracted_facts:
- evidence_id: ev_001
  text: Crochet is a fabrication technique that builds a 3D surface from yarn by interlacing loops formed
    with a special hook.
  locator: Abstract, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Standard crochet pictorial symbol notation does not directly show the yarn layout of stitches,
    making patterns hard for novices and computer programs to parse, visualize, and design.
  locator: Abstract, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The paper represents crochet patterns in the 'stitch mesh' paradigm as a library of tiles, where
    each tile contains yarn geometry and tiles connect along their edges.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: To adapt stitch meshes to crochet, the authors introduce a special edge type capturing the 'current
    loop' — the loop of yarn held on the crochet hook during fabrication.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors create a library of mesh face types that model commonly-used crochet stitches, and
    demonstrate patterns generated from 3D models.
  locator: Abstract, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
