extracted_facts:
- evidence_id: ev_001
  text: ChartMuseum is a chart-QA benchmark of 1,162 expert-annotated image-question-answer tuples drawn
    from 928 unique real-world charts across 184 websites.
  locator: Abstract / Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On ChartMuseum, humans reach 93% accuracy while the best proprietary model Gemini-2.5-Pro attains
    only 63.0% and the leading open-source LVLM Qwen2.5-VL-72B-Instruct reaches only 38.5%.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: There is a 24.5-point accuracy gap between the best open-source model (Qwen2.5-VL-72B-Instruct,
    38.5%) and the best proprietary model (Gemini-2.5-Pro, 63.0%).
  locator: Results / Section 5
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: On questions requiring primarily visual reasoning, all evaluated models drop 35%-55% relative
    to their performance on text-reasoning-heavy questions.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Humans remain near-perfect on the sampled visual-reasoning set, scoring 56/57 correct (98.2%),
    unlike models.
  locator: Results / visual reasoning analysis
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Unlike prior chart benchmarks where frontier models cluster near saturation, ChartMuseum exposes
    a substantial model-vs-human gap while differentiating model capabilities.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The hardest visual skill category is visual comparison, defined as comparing multiple objects
    or groups by size, height, or spatial placement.
  locator: Section 5.1 Visual Task Taxonomy
  confidence: medium
  quote_available: true
  notes: ''
