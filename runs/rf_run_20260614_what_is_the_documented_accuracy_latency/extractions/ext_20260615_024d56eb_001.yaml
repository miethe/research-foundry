extracted_facts:
- evidence_id: ev_001
  text: PaddleOCR-VL is a 0.9B-parameter vision-language model combining a NaViT-style dynamic-resolution
    visual encoder with the ERNIE-4.5-0.3B language model.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The model supports 109 languages and is designed to recognize complex document elements including
    text, tables, formulas, and charts.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On OmniDocBench v1.5 it reports an overall score of 92.56, text edit distance 0.035, Table TEDS
    89.76 / TEDS-S 93.52, formula CDM 91.43, and reading-order edit distance 0.043.
  locator: Section 4.1 / Table 2 (OmniDocBench v1.5)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: The authors claim state-of-the-art performance on both page-level document parsing and element-level
    recognition, reportedly surpassing much larger general VLMs.
  locator: Abstract (final paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Reported throughput is server-side: 1.2241 pages/s and 1881.2 tokens/s via the vLLM backend on
    a single NVIDIA A100, using about 43.7 GB of GPU memory.'
  locator: Section 4.3 / Table 13 (Inference Performance)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_006
  text: The paper claims PaddleOCR-VL has consistent advantages in both processing speed and memory efficiency
    relative to compared systems.
  locator: Section 4.3 (Inference Performance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'It emits structured outputs per element type: tables in a structured (OTSL/HTML-style) representation,
    formulas as LaTeX, and charts as Markdown tables, with reading-order prediction.'
  locator: Section 2.2.2 (element-level recognition)
  confidence: medium
  quote_available: true
  notes: ''
