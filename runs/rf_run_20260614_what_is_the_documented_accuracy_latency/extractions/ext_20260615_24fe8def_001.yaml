extracted_facts:
- evidence_id: ev_001
  text: On project-level crochet-to-CrochetPARADE program synthesis, even the strongest VLMs produce only
    5-8% executable programs and most models fall below 3%.
  locator: Experiments / Task D (Project-Level Translation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Natural-language instruction generation is weak, with the best system (Gemini 2.5 Flash-Lite)
    reaching only 4.93% BLEU and 30.50% ChrF.
  locator: Experiments / Task C (Instruction Generation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Stitch recognition from images is the strongest task for the models, with Claude Sonnet 4 achieving
    the highest F1 score of 60.94%.
  locator: Experiments / Task A (Stitch Recognition)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Instruction-selection accuracy is modest, with most large and closed-source models clustering
    around 55-60% accuracy.
  locator: Experiments / Task B (Instruction Selection)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Errors made in early steps propagate irreversibly, with later correctness occurring mainly when
    the initial state happens to be valid, indicating reliance on continuation heuristics rather than
    genuine procedural reasoning.
  locator: Experiments / Early-step instability
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Image grounding particularly aids interpretation of repeated motifs, symmetry, shaping, and termination
    conditions that are under-specified in text alone.
  locator: Experiments / Project-Level Translation (image grounding)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Larger models exhibit substantially higher rates of undefined-stitch errors, suggesting a tendency
    toward uncontrolled symbolic invention rather than disciplined DSL use.
  locator: Experiments / DSL error analysis
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The benchmark evaluates nine VLMs spanning ~3B-72B parameters - open models BLIP-2 Flan-T5 XL
    (3B), Gemma 3 (4B/27B), DeepSeek-VL (7B), Qwen2-VL (7B/72B) plus closed GPT-4o, Gemini 2.5 Flash-Lite,
    and Claude Sonnet 4 - from Li et al., University of Notre Dame (arXiv 2511.09483v2).
  locator: Models evaluated (setup) + author/affiliation metadata
  confidence: medium
  quote_available: false
  notes: ''
