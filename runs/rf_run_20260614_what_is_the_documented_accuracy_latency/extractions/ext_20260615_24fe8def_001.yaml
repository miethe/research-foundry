contradictions_or_cautions:
- text: Preprint (arXiv v2), not yet formally peer-reviewed; results are for the specific CrochetPARADE
    DSL and the 2025 model lineup, so absolute scores will shift as models evolve. One key_point claim
    about "long-range stitch-count drift" and "unbalanced bracket syntax" as named failure modes could
    not be confirmed verbatim against the fetched HTML text (the source describes undefined-stitch/bracket
    DSL-control errors and early-step instability), so those specifics are recorded conservatively.
  locator: card/limitations
