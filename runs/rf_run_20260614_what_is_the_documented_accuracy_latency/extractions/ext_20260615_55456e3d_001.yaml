extracted_facts:
- evidence_id: ev_001
  text: The CYC list is the canonical published abbreviation reference used by yarn-industry designers
    and publishers, and its definitions reflect U.S. crochet terminology.
  locator: Page intro paragraph ('Crochet Abbreviations Master List')
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Core stitch tokens are defined as ch=chain stitch, sc=single crochet, hdc=half double crochet,
    dc=double crochet, tr=treble crochet, dtr=double treble crochet, and sl st=slip stitch.
  locator: Main abbreviation table (Abbreviation | Description)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'The ''2tog'' decrease tokens are defined explicitly: sc2tog, hdc2tog, dc2tog, and tr2tog each
    mean working two stitches together of the named stitch type.'
  locator: Main abbreviation table — decrease entries
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Repeat and grouping notation is standardized: a single asterisk marks instructions to repeat,
    paired asterisks repeat the span between them, and brackets, braces, and parentheses enclose instructions
    worked a given number of times — with parentheses additionally signaling stitches worked all in the
    same stitch or space.'
  locator: Terms & Common Measurements table — repeat/grouping notation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'The same stitch token denotes different stitches across locales: U.S. single crochet = U.K. double
    crochet, U.S. double crochet = U.K. treble, and U.S. treble = U.K. double treble — a one-step naming
    offset that makes US/UK tokens collide.'
  locator: Abbreviation & Term Differences between the U.S., United Kingdom (U.K.) and Canada — stitch
    table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Terminology divergence extends beyond stitches: U.S. ''gauge'' corresponds to U.K./Canada ''tension'',
    and U.S. ''yarn over (yo)'' corresponds to ''yarn over hook (yoh)''.'
  locator: Abbreviation & Term Differences — U.S. vs U.K./Canada terminology table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Measurement abbreviations a parser must normalize are standardized as in/" (inch), cm (centimeter),
    m (meter), mm (millimeter), g (gram), oz (ounce), and yd (yard).
  locator: Terms & Common Measurements table — Measurement | Description
  confidence: medium
  quote_available: true
  notes: ''
