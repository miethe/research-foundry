extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE is explicitly designed as an unambiguous DSL whose grammar aims for accuracy and
    precision, avoiding the ambiguities of plain-English crochet instructions.
  locator: 'Section: OVERVIEW'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The grammar supports compact repeat syntax where a stitch is multiplied by an integer, e.g. 10*sc,
    10 sc, or 10sc all mean ten single crochet stitches.
  locator: 'Section: Basics (repetition syntax)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Stitch modifications are expressed as token suffixes, including front-loop/back-loop variants
    formed by appending 'fl' or 'bl' to a stitch name (e.g. scbl, dcfl).
  locator: 'Section: Basics (loop-selection modifications)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The DSL supports explicit attachment points, including direct attachment to a stitch coordinate
    given as an integer pair such as @[2,10].
  locator: 'Section: Specifying attachment points'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Turns are handled automatically by reversing attachment direction: an even count of preceding
    turn directives attaches to the next stitch, an odd count attaches to the previous stitch (reverse
    order).'
  locator: 'Section: Direction of sequential stitch attachment (turns)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Exporting to SVG produces multiple files, including a chart using standard crochet symbols (optionally
    with yarn colors) and a stitch-connection/view diagram.
  locator: 'Section: Save/Export options (SVG)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: All computation runs locally on the user's device, with no data collected to a server or transmitted
    over the internet.
  locator: 'Section: OVERVIEW (local computation)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The tool analyzes stitch tension, identifying overly loose or tight stitches so users can swap
    them before crocheting and reduce the need for blocking.
  locator: 'Section: The 3D visualization canvas (stitch tension)'
  confidence: medium
  quote_available: true
  notes: ''
