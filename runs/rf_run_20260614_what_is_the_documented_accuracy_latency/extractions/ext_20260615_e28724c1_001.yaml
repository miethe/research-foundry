- evidence_id: ev_001
  text: PaddleOCR-VL's core component is a compact 0.9B vision-language model that pairs a NaViT-style
    dynamic-resolution visual encoder with the ERNIE-4.5-0.3B language model and supports 109 languages.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The model targets document parsing and recognizes complex elements such as text, tables, formulas,
    and charts while minimizing resource consumption.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: On OmniDocBench v1.5, PaddleOCR-VL achieves a top overall score of 92.86, surpassing the next-best
    model MinerU2.5-1.2B at 90.67.
  locator: Results, text following Table 2 (OmniDocBench v1.5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: PaddleOCR-VL reports leading per-task metrics including Text-Edit distance 0.035, Formula-CDM
    91.22, Table-TEDS 90.89 / Table-TEDS-S 94.76, and reading-order edit distance 0.043.
  locator: Results, text following Table 2 (OmniDocBench v1.5)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The architecture combines a NaViT-style dynamic high-resolution visual encoder with the lightweight
