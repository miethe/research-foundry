extracted_facts:
- evidence_id: ev_001
  text: The method takes a written crochet pattern as input, translates it into a graph, and computes
    a force-directed graph layout to produce a 3D representation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The resulting 3D model matches the hand-crocheted piece in shape and size, letting designers adjust
    the digital model instead of physically crocheting.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The intended audience is both professional designers and beginners, and the application is oriented
    toward amigurumi but could extend to clothing or similar crochet styles.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Each crochet stitch is a node in the graph and physical connections between stitches are edges,
    with sequential, working, and constraint edge types.
  locator: Section 4 (graph construction)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The layout reimplements the force-directed graph layout of Isenburg et al. [IGG01] as a non-linear
    least-squares optimization minimizing two energy functions (edge length and local curvature), solved
    with the Ceres Solver and a static blend parameter lambda = 0.65 for most pieces.
  locator: Section 4.2 The graph layout
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Performance scales poorly with pattern size: small patterns converge in a few seconds while large/high-curvature
    pieces are slow; the bunny head (798 stitches) and body (708 stitches) did not converge even after
    over two minutes.'
  locator: Section 5.3 Performance
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Models were accurate in shape and size to their real-world counterparts but not identical; some
    discrepancies (e.g. raindrop height) trace to the uniform edge-length assumption of 1, not yarn-specific
    stitch dimensions.
  locator: Section 5.1 / 6 Conclusion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: A formulation limitation is that least-squares minimization is incompatible with the goal of maximizing
    volume, so the method minimizes curvature instead and yields sub-maximal volume; testing was limited
    to simple beginner-level patterns and single-crochet-like stitches.
  locator: Section 5.4 Limitations
  confidence: medium
  quote_available: true
  notes: ''
