contradictions_or_cautions:
- text: Method tested only on beginner-level amigurumi patterns and single-crochet-like stitches; no yarn
    texture/physics.
  locator: card/trust
- text: Tested only on simple beginner-level amigurumi patterns and single-crochet-like stitches; flattened
    (2D) pieces excluded. Models structural geometry only, not yarn physics, texture, or fuzziness. Force-directed
    layout is slow and may not converge on large patterns. Piece-to-piece attachment was specified ad
    hoc. The similar web app "Crochet Parade" is undocumented, limiting comparison.
  locator: card/limitations
