extracted_facts:
- evidence_id: ev_001
  text: MagicVL-2B uses a SigLIP2-base ViT visual encoder with 93M parameters at 384x384 input resolution,
    paired with Qwen2.5-1.5B or Qwen3-1.7B as the LLM backbone.
  locator: Model Architecture > Overall Architecture
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: On Snapdragon 8 Elite, MagicVL-2B reports 0.09s ViT latency, 1.7s LLM latency and 23.9 token/s
    throughput, versus InternVL2.5-2B's 0.90s ViT latency and 14.3 token/s.
  locator: Experiments > Deployment Efficiency Evaluation, Table 2 (Snapdragon 8 Elite)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Among <=2B-class models, MagicVL-2B (Qwen3-1.7B) scores DocVQA 89.0, OCRBench 828, AI2D 77.4,
    MMBench-V1.1_en 73.7, and MMStar 57.9.
  locator: Experiments > Comparison with State-of-the-art, Table 1 (MagicVL-2B Qwen3-1.7B row)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The dynamic high-resolution token resizing scheme reduces total visual tokens by ~37.8% (0.52M
    vs 0.81M) while slightly improving accuracy (74.5% vs 74.3%).
  locator: Ablation Study > Effectiveness of Dynamic High Resolution, Table 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: MagicVL-2B matches state-of-the-art accuracy while reducing on-device power consumption by 41.1%,
    positioning it as a practical mobile VLM.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: MagicVL-2B is a sub-100M-parameter-encoder VLM optimized for flagship smartphones, using a redesigned
    dynamic resolution scheme plus a multimodal curriculum learning strategy that incrementally increases
    task difficulty and data density during training.
  locator: Abstract / Method
  confidence: medium
  quote_available: true
  notes: ''
