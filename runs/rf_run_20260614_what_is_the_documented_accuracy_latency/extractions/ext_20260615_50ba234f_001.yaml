extracted_facts:
- evidence_id: ev_001
  text: SmolVLM (2B) reports the best memory usage among vision language models in transformers, requiring
    a minimum of 5.02 GB GPU RAM.
  locator: Performance > Memory
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: SmolVLM uses SmolLM2 1.7B as its language backbone, replacing the larger Llama 3.1 8B.
  locator: Architecture / Performance > Memory
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: SmolVLM encodes each 384x384 image patch to 81 visual tokens.
  locator: Performance > Memory
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Encoding a test prompt plus a single image takes ~1.2k tokens with SmolVLM versus ~16k tokens
    with Qwen2-VL.
  locator: Performance > Memory
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Compared with Qwen2-VL, SmolVLM achieves 3.3-4.5x faster prefill throughput and 7.5-16x faster
    generation throughput.
  locator: Performance > Throughput
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'SmolVLM benchmark accuracy: DocVQA 81.6, TextVQA 72.7, MMMU (val) 38.8, MathVista 44.6, MMStar
    42.1.'
  locator: Performance > Benchmarks (table)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_007
  text: All SmolVLM model checkpoints, datasets, training recipes, and tools are released under the Apache
    2.0 license.
  locator: TLDR
  confidence: medium
  quote_available: true
  notes: ''
