- claim_id: clm_inf01
  text: Real-world crochet pattern text is structurally ambiguous in ways that defeat naive tokenization,
    because the same surface token denotes different stitches across US/UK locales (sc/dc/tr offset) and
    parentheses are overloaded to mean both 'repeat N times' and 'all worked in one stitch', so a parser
    that does not first resolve a declared terminology context will systematically mis-decode the most
    common stitch ops.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_033
    - clm_032
    - clm_030
    - clm_034
    reasoning_summary: clm_033/034 establish the US/UK one-step naming collision (US sc = UK dc), clm_032
      the overloaded parenthesis semantics, and clm_030 the core token set; together these mean token
      identity is context-dependent, so locale must be resolved before op decoding.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: The CYC abbreviation list and CrochetPARADE's compact syntax map almost one-to-one onto the Crochet
    IR v0.1 op enum (mr/ch/slst/sc/hdc/dc/tr/inc/dec/repeat), so the deterministic core of pattern parsing
    is a finite token-to-op normalization plus a count/repeat expander, not an open-ended NLP problem.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_030
    - clm_031
    - clm_032
    - clm_077
    reasoning_summary: clm_030 core stitch tokens and clm_031 the 2tog decreases align to sc/hdc/dc/tr/dec;
      clm_032 standardized repeat/grouping maps to the repeat op; clm_077 shows CrochetPARADE's integer-multiplied
      stitch syntax (10*sc) is exactly count-based op expansion. The IR enum covers these directly.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: For clean machine-readable pattern text (typed body copy, not scanned), a rule-based tokenizer
    plus a deterministic stitch-count validator is the highest-accuracy and lowest-cost extractor available
    and should own the parse path, because the IR's expected_stitch_count field provides a closed-form
    correctness check that no current LLM/VLM can match on procedural fidelity.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    - clm_032
    - clm_008
    - clm_012
    - clm_076
    reasoning_summary: Tokens/repeats are standardized (clm_031/032) so rules suffice for clean text;
      CrochetBench shows LLMs collapse on executable synthesis (clm_008) and propagate early errors irreversibly
      (clm_012); CrochetPARADE (clm_076) confirms a deterministic grammar is the precision path. The IR
      expected_stitch_count gives a deterministic validator.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'The on-device-vs-cloud boundary for document/layout parsing falls between text-layout extraction
    (cloud-grade today) and on-device deployment: the strongest open document parsers (PaddleOCR-VL 0.9B
    at OmniDocBench 92.86; dots.mocr 3B at olmOCR-Bench 83.9) publish only server-side cost (PaddleOCR-VL
    needs ~43.7 GB A100 memory at 1.22 pages/s), and dots.mocr publishes no latency at all, so neither
    is documented to run within a mid-range phone''s memory budget.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_059
    - clm_005
    - clm_065
    - clm_069
    - clm_064
    reasoning_summary: PaddleOCR-VL tops OmniDocBench (clm_059) but its only reported throughput is A100/43.7GB
      server-side (clm_005); dots.mocr scores well (clm_065) but is a 3B model (clm_064) with no latency
      reported (clm_069). Mobile RAM is far below 43.7GB, so these are cloud-side by evidence.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'Among documented candidates, MagicVL-2B is the only model with measured mid-to-high-end phone
    parsing performance (Snapdragon 8 Elite: 0.09 s ViT + 1.7 s LLM, 23.9 tok/s, DocVQA 89.0, OCRBench
    828), making it the strongest evidence that on-device text-document extraction is feasible at near-cloud
    DocVQA accuracy, while SmolVLM (5.02 GB, DocVQA 81.6) demonstrates the memory floor but reports no
    on-phone latency.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
