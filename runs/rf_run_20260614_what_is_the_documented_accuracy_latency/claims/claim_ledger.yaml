      (clm_014), chart visual-reasoning gap (clm_037). These are the three places automated extraction
      is documented to be unreliable.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf14
  text: 'There is an apparent contradiction between document-parsing optimism (PaddleOCR-VL/dots.mocr
    reporting 83-93 on OmniDocBench/olmOCR) and crochet-task pessimism (CrochetBench 5-8% executable),
    and the resolution is that the benchmarks measure different things - generic text/table/formula transcription
    versus domain procedural synthesis - so strong OCR scores justify trusting text-layout transcription
    but not trusting any model to produce a correct executable pattern; decision impact: high.'
  materiality: material
