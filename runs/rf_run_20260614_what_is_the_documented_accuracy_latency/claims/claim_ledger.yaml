- claim_id: clm_inf07
  text: Stitch-chart and symbol-diagram parsing is the hardest sub-problem and the clearest cloud-only
    boundary, because chart understanding requires visual-comparison reasoning where ChartMuseum shows
    the best open model reaches only 38.5% and even the best proprietary model 63.0% (vs 93% human), and
    all models drop 35-55% on visually-grounded questions.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_037
    - clm_038
    - clm_039
    - clm_042
    reasoning_summary: ChartMuseum (clm_037/038) shows a 24.5-pt open-vs-proprietary gap and a large human
      gap; clm_039 the 35-55% visual-reasoning drop; clm_042 names visual comparison (spatial size/placement)
      as hardest - exactly the skill a crochet stitch chart demands.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: 'The viable KnitWit import architecture is a three-tier cascade: (1) on-device deterministic tokenizer
    + stitch-count validator for clean text patterns of known templates, (2) on-device small VLM (MagicVL-2B-class)
    or cloud OCR for typed/scanned text-layout, and (3) cloud VLM only for stitch charts and ambiguous
    diagrams - because deterministic rules dominate where notation is standardized, small VLMs handle
    layout, and only charts demand the highest-capability proprietary models.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    - clm_044
    - clm_059
    - clm_037
    - clm_008
    reasoning_summary: Standardized tokens (clm_031) justify tier 1; MagicVL-2B on-device (clm_044) and
      PaddleOCR-VL doc parsing (clm_059) justify tier 2; ChartMuseum's chart gap (clm_037) and CrochetBench's
      synthesis collapse (clm_008) justify reserving tier 3 cloud VLMs for charts only.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: Because LLM/VLM crochet errors propagate irreversibly from early steps (CrochetBench) and the
    IR carries a per-round expected_stitch_count, the architecture should run the deterministic stitch-count
    validator as a hard gate on every model-produced round and force human confirmation wherever the count
    check fails, converting an open-ended generation-error risk into a bounded, locatable confirmation
    task.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_012
    - clm_031
    - clm_008
    reasoning_summary: clm_012 shows early errors propagate irreversibly with later correctness accidental;
      clm_031 standardized decreases make stitch arithmetic deterministic; clm_008 the low executable
      rate. A per-round count validator (IR expected_stitch_count) catches drift early and routes low-confidence
      rows to human review.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: 'The design-spec ''PDF importer trap'' is empirically justified: a single end-to-end VLM PDF-to-pattern
    importer would inherit CrochetBench''s 5-8% executable-program ceiling and ChartMuseum''s chart-reasoning
    gap simultaneously, so attempting full free-form PDF/chart ingestion in v1 is the highest-risk path
    and should be explicitly de-scoped in favor of templated/clean-text import plus assisted chart entry.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_008
    - clm_037
    - clm_039
    reasoning_summary: An end-to-end PDF importer must do both program synthesis (CrochetBench 5-8%, clm_008)
      and chart visual reasoning (ChartMuseum, clm_037/039). Compounding two low-accuracy steps yields
      an unacceptable product success rate, validating the spec's PDF-trap warning.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf11
  text: Mapping to the Crochet IR v0.1, the reliably-extractable-today fields are op (sc/hdc/dc/tr/slst/ch/mr),
    count, repeat, and expected_stitch_count for clean text; the ambiguous-today fields are visual_hint.shape_role,
    assembly[] attachment_points, and any field that requires chart geometry or free-text 'do what feels
    right' notes - because the former map to standardized tokens while the latter require visual or pragmatic
    inference current models do poorly.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_030
    - clm_031
    - clm_032
    - clm_013
    - clm_037
    reasoning_summary: Tokens/repeats/counts (clm_030/031/032) map deterministically to IR op/count/repeat/expected_stitch_count.
      shape_role and assembly need shaping/termination cues that clm_013 says are under-specified in text
      and clm_037 shows charts read poorly, so those IR fields stay ambiguous.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf12
  text: Constraining model output to the closed IR op enum (rather than free text) is a documented error-reduction
    lever, because CrochetBench shows larger models invent undefined stitches when unconstrained while
    AmiGo achieves reliable structured patterns precisely by restricting output to a fixed small instruction
    set - so KnitWit should require any model extractor to emit IR ops and reject out-of-enum tokens.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_014
    - clm_020
    - clm_076
    reasoning_summary: clm_014 shows undefined-stitch invention rises with model size when unconstrained;
      clm_020 AmiGo's fixed small instruction set yields deterministic structured output; clm_076 CrochetPARADE's
      unambiguous grammar. Constraining decoding to the IR enum directly suppresses the invention failure
      mode.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf13
  text: Human-in-the-loop confirmation should be triggered by three documented low-confidence signals
    - (a) a failed per-round stitch-count check, (b) any out-of-enum/undefined token emitted by a model,
    and (c) any content originating from a stitch chart or symbol diagram - because each corresponds to
    an evidenced failure mode (count drift, symbolic invention, and the chart visual-reasoning gap respectively).
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
