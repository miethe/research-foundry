    reasoning_summary: clm_044/045 give MagicVL-2B's on-device latency and DocVQA 89.0/OCRBench 828; clm_022/027
      give SmolVLM's 5.02GB floor and DocVQA 81.6 but no phone latency. MagicVL-2B is the only candidate
      with both on-device latency and high doc accuracy.
  report_locations: []
