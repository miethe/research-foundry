- claim_id: clm_inf06
  text: MagicVL-2B's published latency is for a flagship Snapdragon 8 Elite, not the spec's mid-range-phone
    constraint, so its 1.7 s/inference figure is an optimistic upper bound; on a mid-range SoC with less
    NPU throughput and thermal headroom, on-device VLM document parsing should be treated as plausible
    but unproven for the target device class.
  materiality: material
