- evidence_id: ev_001
  text: v3.5.0, released May 28, 2026, is the latest stable GPT Researcher release, framed as a stack-wide
    update with critical bug fixes, performance improvements, and new models and retrievers.
  locator: Release v3.5.0 (published 2026-05-28), intro line
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: v3.4.4 (April 2026) added MiniMax as a native LLM and embedding provider, added an X/Twitter (Xquik)
    search retriever, and fixed the PubMed Central retriever returning no results.
  locator: Release v3.4.4 (published 2026-04-16), What's Changed list
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: v3.4.3 (March 2026) added per-step cost tracking in the research process plus a scrape-count option
    and other enhancements to the FastAPI frontend.
  locator: Release v3.4.3 (published 2026-03-13), What's Changed list
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: v3.4.0 (January 2026) introduced inline AI image generation that embeds Gemini-generated illustrations
    directly into reports, and added native LangSmith tracing/observability.
  locator: Release v3.4.0 (published 2026-01-29), 'Inline Image Generation' and 'LangSmith Integration'
    sections
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: v3.4.0 also shipped a comprehensive .claude/skills/ directory so Claude Code can understand, use,
    and extend GPT Researcher.
  locator: Release v3.4.0 (published 2026-01-29), 'Claude Code Skills Integration' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'v3.3.7 (Nov 2025) was a breaking release: the LangChain v1 migration dropped Python 3.9 (now
    requiring Python 3.10+) and cut requirements.txt from 134 to 63 lines.'
  locator: Release v.3.3.7 (published 2025-11-07), 'Breaking Changes' and 'Simplified Dependencies' sections
  confidence: medium
  quote_available: true
  notes: ''
