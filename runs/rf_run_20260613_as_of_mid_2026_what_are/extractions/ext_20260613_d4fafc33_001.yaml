  locator: Usage Tiers — tier threshold table
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Tier placement is determined by cumulative purchases over the account lifetime rather than current
    account balance.
  locator: Usage Tiers — tier basis note
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The sonar-deep-research model's per-minute request limit scales by tier from 5 RPM at Tier 0 up
    through 10, 20, 40, 60, and 100 RPM at Tier 5.
  locator: Rate Limits — sonar-deep-research row across tier tables
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_004
  text: 'The sonar, sonar-pro, and sonar-reasoning-pro models share an RPM ceiling that rises by tier:
    50, 150, 500, 1,000, then 4,000 RPM at both Tier 4 and Tier 5.'
  locator: Rate Limits — sonar / sonar-pro / sonar-reasoning-pro rows across tier tables
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_005
  text: Async polling retrieval endpoints carry high, tier-independent limits, with GET /v1/async/sonar
    at 3,000 RPM and GET /v1/async/sonar/{request_id} at 6,000 RPM across all tiers.
  locator: Rate Limits — async endpoint rows
