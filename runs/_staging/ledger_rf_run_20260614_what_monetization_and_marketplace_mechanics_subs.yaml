- claim_id: clm_inf01
  text: "Across the four benchmarked craft/maker platforms the documented designer take-rate spans roughly 0-4% (Ribblr, reducible to 0% via SelFee), a sub-$20/month volume cap on Ravelry pattern sales, 10% standard on Patreon (5-12% range), and 15-30% on Apple's App Store, implying a craft-pattern-marketplace cut should land in a 0-15% band with the craft-native floor (Ribblr/Ravelry) far below the generic-platform ceiling (Patreon/Apple)."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_013, clm_026, clm_029, clm_039, clm_042, clm_046], reasoning_summary: "Directly aggregates the documented rates: Ribblr 0-4% (clm_026, clm_029), Ravelry capped at $20/mo (clm_013), Patreon 10% standard within a 5-12% band (clm_039, clm_042), Apple SBP 15% (clm_046); the spread defines the band and shows craft-native incumbents anchor the low end."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf02
  text: "A KnitWit designer-storefront cut materially above Ribblr's 0-4% effective rate would face acute price-sensitivity risk, because the dominant direct competitor already lets designers reach a 0% sale fee via SelFee, making any double-digit cut uncompetitive for the pattern-sales surface specifically."
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_026, clm_029, clm_036, clm_013], reasoning_summary: "Ribblr (named by the spec as the dominant competitor, clm_036) charges 0-4% and reaches 0% via SelFee (clm_026, clm_029), and Ravelry's cap (clm_013) is similarly low; a new entrant pricing pattern sales much higher than this established craft-native floor would be undercut, so the competitive ceiling on the marketplace cut is low single digits."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf03
  text: "The 5-15x conversion gap between forced-commitment and freemium models (12.11% hard-paywall vs 2.18% freemium download-to-paid; higher-priced apps converting at 2.7% vs 1.5% on Day 35) implies KnitWit's '3D/import/gen' pro tier should monetize via a paid trial or hard-gated subscription rather than an open freemium funnel, since the pro features are exactly the high-intent, high-value capabilities that justify a higher price point."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_020, clm_023, clm_025, clm_033], reasoning_summary: "RevenueCat data shows hard paywalls (clm_020) and higher prices (clm_023, clm_025) convert far better; the spec's pro features (clm_033) are differentiated/high-intent, so gating them behind a committed paywall aligns with the measured conversion advantage rather than diluting them in freemium."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf04
  text: "Mapping the spec's three mechanics to precedent: the pro-subscription tier is the most validated (mirrors Ravelry Extras, Patreon memberships, and RevenueCat's subscription benchmarks), the marketplace cut is validated in principle but pricing-constrained (Ribblr/Ravelry/Patreon/Apple all take a cut, but craft-native rates are low), and the add-on packs are the least precedented and therefore unproven for craft-app monetization in this evidence set."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_032, clm_033, clm_018, clm_044, clm_024, clm_026, clm_013, clm_039], reasoning_summary: "Subscription has direct precedent (Ravelry Extra clm_018, Patreon memberships clm_044, RevenueCat corpus clm_024); marketplace cut has precedent but low craft rates (clm_026, clm_013) vs higher generic (clm_039); no source documents a working a-la-carte 'add-on pack' outcome, so it is unproven relative to the spec's proposal (clm_032)."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf05
  text: "The recommended monetization mix is a low (0-5%) marketplace cut on the designer storefront to stay competitive with Ribblr, combined with a hard-gated 'KnitWit Pro' subscription carrying the 3D-preview, advanced-import, and pattern-gen value, because the high-margin pro subscription cross-subsidizes the necessarily-thin marketplace take while the differentiated 3D wedge is precisely what commands subscription pricing."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_026, clm_029, clm_020, clm_033, clm_038, clm_032], reasoning_summary: "Combines the low competitive take-rate ceiling (clm_026, clm_029), the conversion advantage of gated subscriptions (clm_020), and the spec's identification of 3D/reverse-pattern as the defensible wedge (clm_038) gated to pro (clm_033); the mix lets subscription revenue carry margin the marketplace cut cannot."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf06
  text: "The 3D-preview and pattern-generation 'pro' capabilities align better with subscription than with the marketplace cut because their value accrues to the maker/consumer running and visualizing a pattern, not to the designer's per-sale transaction, so attaching their cost to a per-sale marketplace commission would mis-price the value and depress designer participation."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_033, clm_038, clm_034, clm_028], reasoning_summary: "Pro features (clm_033) and the 3D wedge (clm_038) serve the pattern-runner/CAD-lite consumer experience (clm_034), distinct from the designer-royalty/sale transaction (clm_028); value-based pricing logic says recover that cost from the consumer subscription, not the designer's marketplace cut."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf07
  text: "There is an apparent contradiction between the spec's freemium-flavored 'pro tier' framing and the RevenueCat evidence that freemium converts downloads to paid at only 2.18% versus 12.11% for hard paywalls; the likely resolution is a hybrid (free pattern-running and library, hard-gated 3D/gen behind a long 17-32 day trial), and the decision impact is high because it directly determines the product's paid-conversion ceiling."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_020, clm_021, clm_032, clm_033], reasoning_summary: "The spec implies a pro upsell off a free base (clm_032, clm_033) which reads freemium, but clm_020 shows freemium underperforms; clm_021 shows 17-32 day trials maximize trial-to-paid (45.7%), so a trial-gated hybrid resolves the tension. High impact because it sets the conversion ceiling."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf08
  text: "Ravelry's lean four-person, advertising-and-low-commission model and Ribblr's 0-4%/SelFee model jointly demonstrate that pattern-marketplace commissions alone are insufficient to fund a capital-intensive 3D/CAD product, implying KnitWit must lead with subscription (and possibly advertising at scale) rather than expect the marketplace cut to be the primary revenue engine."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_012, clm_013, clm_015, clm_016, clm_026], reasoning_summary: "Ravelry stays lean and leans on advertising/diversified income with a low capped commission (clm_012, clm_013, clm_015, clm_016); Ribblr's cut is also low (clm_026); a 3D/CAD product has far higher compute/dev cost, so a thin marketplace cut cannot be the primary engine and subscription must lead."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf09
  text: "Pricing-sensitivity note: because Ribblr enforces fixed-cent minimum sale fees (25c patterns / 50c makes) plus a 50c designer royalty, low-priced pattern sales already carry a high effective percentage take, so KnitWit can safely adopt a small flat-percentage cut with no per-sale minimum to undercut Ribblr on cheap patterns while still profiting on higher-priced storefront items."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_027, clm_028, clm_026, clm_029], reasoning_summary: "Ribblr's minimums (clm_027) and royalty (clm_028) make the effective take on a low-priced pattern much higher than the headline 0-4% (clm_026); dropping the per-sale minimum is a concrete competitive lever on cheap patterns while preserving margin on expensive ones."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_spec01
  text: "The add-on packs mechanic (stitch-animation library, premium tools) is unlikely to be a meaningful standalone revenue line and will more plausibly succeed folded into the Pro subscription as bundled value, since no benchmarked craft/maker platform documents a working a-la-carte content-pack business and one-time micro-purchases convert worse than the gated subscriptions the data favors."
