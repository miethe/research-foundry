  text: "Pattern IP/copyright exposure is a high-severity, medium-likelihood monetization risk: a designer-storefront revenue model directly incentivizes import volume, colliding with the spec's own #1 landmine, so KnitWit should make the marketplace cut conditional on designer-opt-in/licensed inventory (mirroring Ribblr's first-party-creator model) as a concrete mitigation before scaling paid storefronts."
  materiality: material
