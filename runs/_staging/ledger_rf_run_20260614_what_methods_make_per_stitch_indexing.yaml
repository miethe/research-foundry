- claim_id: clm_inf01
  text: "Across the surveyed tools, three distinct stitch-identity schemes exist - positional (row,stitch|global) labels (CrochetPARADE), graph-node/insertion-point identity with layer+start+prev/next addressing (Seitz/HPI Digital Crochet), and current-loop/edge-typed stitch-mesh identity (Guo et al., Narayanan et al.) - and for an edit-tolerant interactive preview the graph-node insertion-point scheme is the most stable because identity is carried by structural connectivity rather than by a recomputed positional counter."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_016, clm_027, clm_051, clm_057, clm_036, clm_044], reasoning_summary: "clm_016 defines CrochetPARADE's positional (row,stitch|global) index that is recomputed on any edit; clm_027/clm_051 show HPI/Digital Crochet identity is the node (insertion point), decoupled from positional sequence, and clm_057 gives each node persistent layer+start+prev/next addressing; clm_036/clm_044 show stitch-mesh identity is carried by typed current-loop/yarn-and-loop edges. Identity bound to structure survives renumbering better than a positional counter."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf02
  text: "Positional (row,stitch|global) indices such as CrochetPARADE's (4,23|410) are provably unstable under inc/dec or insertion edits because the global counter renumbers every downstream stitch, so KnitWit must NOT use a recomputed positional integer as the persistent stitch key and should instead mint a stable per-op GUID at op-creation time, retaining the positional label only as a derived, display-time projection."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_016, clm_017, clm_022, clm_057, clm_028], reasoning_summary: "clm_016/clm_017 define a single monotonically increasing global counter that includes non-stitches; clm_022 shows inc/dec change the stitch population of a round, so any earlier insertion shifts all later global numbers. clm_057 (persistent node properties) and clm_028 (creation order == work order) show identity can instead be bound at creation. Therefore the positional label is a function of edit state, not a stable key."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf03
  text: "The Crochet IR v0.1 starter schema (pattern/pieces/rounds/ops with op enum and expected_stitch_count) currently lacks any persistent per-op identifier field, which is the single highest-leverage schema gap for highlight stability; KnitWit should add a required immutable op-level stitch_id (UUID minted on op creation) plus a derived round_index/pos_in_round projection so that highlighting and round-trip key off the GUID while the human-readable label is recomputed on demand."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_057, clm_054, clm_016, clm_028], reasoning_summary: "clm_057 shows the HPI model already attaches stable per-node identity plus a layer property and start flag; clm_054 unifies rows/rounds into a per-node layer integer, mirroring IR rounds. clm_016 shows positional labels alone are edit-fragile, and clm_028 shows creation order is canonical. Adding a GUID + derived projection ports the proven HPI addressing onto the IR's op list, which today carries only op/count/expected_stitch_count."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf04
  text: "IR traversal order can be mapped to rendered geometry without drift by treating the linear op-creation order as the canonical Hamiltonian traversal and emitting exactly one mesh instance (or vertex group) per op in that order, because every surveyed system that guarantees correct stitch-to-geometry correspondence (CrochetPARADE sequential attachment, HPI linear construction, Gray et al. Hamiltonian/Eulerian recovery) relies on a single deterministic 1:1 traversal rather than re-deriving positions independently."
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_018, clm_028, clm_045, clm_002], reasoning_summary: "clm_018 (CrochetPARADE auto-attaches stitches one-by-one to consecutive previous-round stitches), clm_028 (HPI editor forces linear as-if-crocheting construction so node order == traversal order), clm_045 (Gray et al. encode creation order as a Hamiltonian path), and clm_002 (one node per stitch with horizontal=sequential edges) all converge on a single deterministic traversal generating both index and geometry, which is what prevents independent-recompute drift."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf05
  text: "The dominant off-by-one / drift failure modes for the highlight map are: (a) the global counter including non-stitches like sk while excluding internal bobble/popcorn sub-stitches, (b) spiral-vs-joined-round numbering ambiguity at the round seam, and (c) inc/dec changing per-round population mid-traversal; each is mitigated cheaply at IR level by storing an explicit per-op boolean for counts_in_index, an explicit round-closure/seam op, and deriving pos_in_round from a running count keyed to GUIDs rather than to raw line position."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_017, clm_018, clm_022, clm_054, clm_041], reasoning_summary: "clm_017 names the exact counting inconsistency (counts sk, skips internal stitches) that produces off-by-one between display index and geometry index; clm_018 plus clm_054 (rounds unified as layers, auto turn handling) is where spiral/joined seam ambiguity lives; clm_022/clm_041 show inc/dec alter round population. Each failure maps to an explicit IR field that removes the ambiguity."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf06
  text: "A reproducible highlight-mapping correctness metric for KnitWit is a Highlight Index Agreement (HIA) rate - the fraction of (round,stitch) pattern steps whose highlighted geometry instance equals the ground-truth index-map entry - computed over a labeled reference pattern set, and the Desired Edge Length (DEL = RMS relative edge-length error) metric from Gray et al. is the right complementary geometry-fidelity gate; KnitWit should adopt HIA as the primary acceptance gate (recommended pass threshold 100% exact match on the reference set, since highlight mapping is discrete and any mismatch is a visible bug) and DEL as a secondary spatial-plausibility check."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_046, clm_011, clm_016, clm_023, clm_050], reasoning_summary: "clm_046 gives DEL (RMS relative edge-length error, 0=perfect) as an existing per-stitch geometry metric; clm_011/clm_016/clm_023 establish that each stitch already has an unambiguous (type,row,position) ground-truth label and that highlight is invoked by exact (row,stitch) lookup, so an exact discrete agreement rate is computable; clm_050 frames the purpose as catching too-many/too-few stitches. Highlight correctness is discrete (right instance or wrong instance), warranting a 100% exact-match gate distinct from DEL's continuous geometry score."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf07
  text: "The labeled reference pattern set for the HIA acceptance gate should be assembled from the public-domain CrochetPARADE showcase patterns plus the cube/sphere/Stanford-bunny stitch-mesh exemplars, because these are the only sources here with both a published deterministic stitch index (CrochetPARADE (row,stitch|global)) and reproducible generated geometry (stitch-mesh tiles), giving a ready ground-truth index map without KnitWit having to hand-author one from scratch."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_010, clm_016, clm_043, clm_009], reasoning_summary: "clm_010 states CrochetPARADE showcase patterns are public domain (reusable) and clm_009 that the platform is GPLv3/open; clm_016 gives those patterns a deterministic published index to serve as ground truth; clm_043 gives concrete reproducible geometry exemplars (cube, sphere, Stanford bunny) from the stitch-mesh face set. Together they form a ready labeled reference set."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf08
  text: "The 'ghost next row' overlay can be derived incrementally and cheaply from the index map - by projecting only the next round's ops onto the existing positions of their previous-round insertion targets - rather than re-running the full force-directed layout, because layout convergence is the documented bottleneck (CrochetPARADE multi-minute on tens-of-thousands of stitches; Greer/Mould 700-800-stitch pieces failing to converge after 2+ minutes; Gray et al. up to 40,906s), whereas the next-row attachment relation is already O(1) per stitch in the IR."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_018, clm_019, clm_008, clm_013, clm_049, clm_057], reasoning_summary: "clm_018/clm_019 show the next round attaches one-by-one to known previous-round stitches via a deterministic even/odd rule, and clm_057 gives each node explicit insert-target references - so the next-row positions are derivable directly from the index map. clm_008/clm_013/clm_049 document that full force-directed re-layout is multi-minute-to-hours and non-convergent at scale, so re-deriving the whole model for a ghost row is infeasible; an incremental projection is the only viable path."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf09
  text: "Left-handed mirroring and US/UK term differences should be handled as presentation-layer transforms over a single canonical right-handed, US-term IR rather than by reindexing, because CrochetPARADE already shows handedness is a downstream rendering choice (a random start seed flips inside/outside and left/right without changing the pattern) and the stitch-mesh leading-loop yarn-path order is direction-defined but term-agnostic; reindexing for handedness would break the persistent stitch IDs and the round-trip key."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_021, clm_037, clm_016, clm_028], reasoning_summary: "clm_021 shows CrochetPARADE treats inside-out/left-handed as a render-time start-seed flip, not a structural change; clm_037 shows every stitch has a single leading-loop yarn-path order that is directional but independent of US/UK naming; clm_016/clm_028 show the index/creation order is canonical. Therefore handedness and terminology are best applied as a display transform, preserving stable IDs."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf10
  text: "For persistent stitch identity that survives round-trip with the inverse (mesh-to-pattern) engine, KnitWit should adopt the stitch-mesh current-loop / typed-edge identity (Next/Previous short-term, Future/Past long-term) as the interchange key between the forward IR and the inverse engine, because that representation is the only surveyed scheme proven to support both pattern->geometry generation and geometry->pattern derivation and to be edit-preserving (Narayanan et al. knittability-preserving edits; Wooly Graphs' explicit bidirectional analyze/generate framework)."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_036, clm_039, clm_031, clm_032, clm_061], reasoning_summary: "clm_036/clm_039 define the crochet current-loop and four-label (Next/Previous/Future/Past) typed-edge identity; clm_031/clm_032 show the parent stitch-mesh structure supports knittability-preserving edits and scheduling (forward generation), and clm_061 (Wooly Graphs) establishes an explicit bidirectional analyze-from-graph / generate-from-graph mapping. This is the only scheme here demonstrated to work in both directions and under edits, making it the natural round-trip interchange key."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf11
  text: "There is a real contradiction between academic feasibility and product readiness for the indexing-and-highlight capability: the discrete stitch-index/highlight mapping is product-ready (CrochetPARADE ships exact (row,stitch) highlight and deterministic indexing today), but the underlying 3D layout it would highlight onto is NOT product-ready for an amigurumi-first mobile app (force-directed convergence is multi-minute to non-convergent at 700+ stitches), so KnitWit should de-risk by decoupling the highlight map from the layout solver - shipping correct highlighting on a fast approximate/precomputed geometry rather than gating it on an exact physics layout - decision impact high."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_023, clm_012, clm_008, clm_005, clm_049, clm_013], reasoning_summary: "clm_023/clm_012 show CrochetPARADE already ships working exact highlight and per-stitch interaction (capability shown in a product), while clm_008/clm_049/clm_013 show the force-directed layout is multi-minute-to-hours and non-convergent at moderate stitch counts and clm_005 that even converged results are only approximate. The two sit on opposite sides of the feasibility/readiness line, so coupling them is the risk; decoupling resolves it."}
  report_locations: []
  reviewer_notes: ""
