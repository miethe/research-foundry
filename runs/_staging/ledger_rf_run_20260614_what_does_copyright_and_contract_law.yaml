- claim_id: clm_inf01
  text: "A written crochet pattern is legally bifurcated: the functional stitch sequence, technique, gauge, and resulting amigurumi item are unprotectable ideas/methods/useful articles, while the designer's original prose explanation, illustrations, photos, and creative selection-coordination-arrangement of the text are protectable expression."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_032, clm_033, clm_034, clm_035, clm_036, clm_037, clm_060, clm_061, clm_062], reasoning_summary: "17 USC idea/method exclusion (clm_032/033) plus the recipe analogy (clm_034-036) and Star Athletica useful-article separability (clm_060-062) jointly mean only original expression is protected; the stitch procedure and the finished useful article are not."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf02
  text: "Because copyright does not reach the functional stitch procedure, extracting a normalized Crochet IR (ops mr/ch/sc/inc/dec, expected_stitch_count, rounds) that discards the designer's prose and illustrations re-encodes only the unprotectable method, materially lowering copyright-infringement exposure relative to storing or redisplaying the verbatim pattern text."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_032, clm_033, clm_034, clm_037, clm_041], reasoning_summary: "If the stitch sequence is an unprotectable method (clm_032-034) and protection is limited to the specific expression/arrangement (clm_037), then a structured IR (clm_041) capturing only ops and counts captures the idea, not the protected expression - though the creative selection/arrangement of rounds could still be partly mirrored, hence medium confidence."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf03
  text: "Even a copyright-clean IR extraction is not consent-clean: Etsy's and Ravelry's contractual terms (anti-scraping, limited-license, six-hour freshness, no-derivative-works, data-minimization) create an independent breach-of-contract and ToS-violation exposure that survives whether or not the pattern text is copyrightable."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_026, clm_027, clm_028, clm_029, clm_045, clm_046, clm_047, clm_022], reasoning_summary: "Etsy ToU bars scraping and grants only a limited revocable license (clm_026/029); API ToU adds freshness/anti-redistribution limits (clm_045/047); Ravelry bars derivatives without license (clm_022). These are contract obligations decoupled from copyrightability, so feasibility-of-extraction does not equal permission."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf04
  text: "The Etsy API is a dead end for a pattern-import-and-redisplay product: clm_050 (Members own content, API conveys no redistribution license), clm_047 (must not facilitate unauthorized copying of designs), and clm_045 (no display older than six hours, no caching beyond necessity) together forbid the durable storage and re-display of a parsed pattern that KnitWit's IR requires."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_045, clm_046, clm_047, clm_048, clm_050], reasoning_summary: "Durable IR storage/redisplay conflicts directly with the six-hour freshness and no-persistent-cache rule (clm_045), the no-redistribution-license fact (clm_050), and the anti-facilitation clause (clm_047); data minimization (clm_048) further narrows permitted use."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf05
  text: "Ranking the three consent models by residual legal risk: (1) designer opt-in licensing is lowest risk because it secures the express separate license that both Ravelry (clm_022) and copyright law require for derivative/redistribution use; (2) user-private personal-copy import is medium risk, leaning on the buyer's personal-use license (clm_023) but exposed to derivative-work and ToS limits; (3) licensed marketplace redistribution is highest residual risk and is out of scope per the spec governance rule against unlicensed/marketplace ingestion."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_022, clm_023, clm_030, clm_047, clm_050], reasoning_summary: "Opt-in obtains the explicit owner license clm_022 demands; personal-copy rides clm_023's perpetual personal-use license but a 3D/IR transform may be a derivative barred by clm_022; marketplace redistribution requires rights the platforms do not convey (clm_047/050) and depends on aggregating many designer licenses."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf06
  text: "Designer opt-in licensing is the only model whose legal basis is affirmative consent rather than an exception or implied permission, making it the defensible default; the IR pattern.license and pattern.designer fields should be mandatory provenance metadata so every stored pattern carries a machine-readable consent record."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis: {from_claims: [clm_018, clm_020, clm_022, clm_023], reasoning_summary: "Sui generis and copyright rights can be licensed by the owner (clm_018); Ravelry warrants designer ownership (clm_020) and bars unlicensed derivatives (clm_022); the IR v0.1 already has pattern.license/designer fields, so capturing explicit consent as metadata operationalizes the only affirmative-consent path."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf07
  text: "The user-private personal-copy model's defensibility hinges on a transform-vs-derivative question the evidence leaves unresolved: converting a lawfully purchased pattern into a Crochet IR and a 3D visualization for the buyer's own use may be a permitted personal use (clm_023) or a prohibited derivative work (clm_022), and that ambiguity is the model's central legal risk."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_022, clm_023, clm_037], reasoning_summary: "clm_023 grants buyers a personal-use license while clm_022 forbids derivative works without a separate license; an IR/3D rendering arguably creates a new arrangement (clm_037 territory), so the two clauses point in opposite directions for the same act - an explicit contradiction with the personal-use scope undefined."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf08
  text: "US and EU law converge on the import-product's core safe harbor (the functional stitch method/useful article is free to use under both the US idea-method exclusion and the limits of EU protection) but diverge on a distinct EU-only hazard: the Database Directive sui generis right can independently bar systematic extraction/reuse of a designer's pattern collection even where no individual pattern's text is copied."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_013, clm_014, clm_015, clm_016, clm_032, clm_060], reasoning_summary: "Both regimes leave the method/useful article unprotected (clm_032/060), but the EU sui generis right (clm_013-015) lets a database maker bar extraction of substantial parts and bars lawful-user acts that harm legitimate interests (clm_016) - a layer with no clean US analogue, creating jurisdictional divergence on bulk import."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf09
  text: "The EU DSM Article 4 text-and-data-mining exception is not a reliable basis for KnitWit ingestion: it requires lawful access (clm_012), permits retention only as long as necessary for TDM (clm_008) rather than the durable IR storage the product needs, and is defeated by a rightholder's machine-readable opt-out which platform terms-and-conditions themselves can constitute (clm_010)."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
