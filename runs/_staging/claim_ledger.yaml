- claim_id: clm_inf01
  text: 'A four-layer machine-checkable pattern acceptance suite is assemblable from the literature: (1)
    per-round stitch-count invariants where expected_stitch_count equals the previous round count plus
    inc minus dec; (2) inc/dec legality restricting shaping ops to the sc|inc(x)|dec(x) alphabet AmiGo
    proves sufficient; (3) attachment resolvability requiring every stitch to attach unambiguously to
    a consecutive previous-round stitch; and (4) closure validation that the final round resolves to a
    closed piece.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_010
    - clm_016
    - clm_024
    - clm_026
    - clm_036
    reasoning_summary: CrochetPARADE one-by-one attachment to consecutive previous stitches (clm_010)
      and its mismatched-count/impossible-attachment checks (clm_036), AmiGo's sc/inc/dec alphabet and
      transducer degree rule (clm_024, clm_026), and the KnitWit plan's mandated IR rules (clm_016) collectively
      specify the same four invariant families, which compose into one suite.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'AmiGo''s coupling theorem (Observation 2.3) is the single strongest literature-grounded crochetability
    acceptance criterion available: it gives a decidable, per-row-pair predicate (consecutive rows coupled
    => valid sc/inc/dec instructions exist) that is constructively checkable via the finite-state transducer,
    making it the recommended formal backbone of the inverse-engine acceptance gate rather than heuristic
    shaping-rate caps alone.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_024
    - clm_026
    - clm_019
    reasoning_summary: The coupling theorem (clm_024) is a proven sufficiency condition decidable by the
      transducer's degree test (clm_026); it strictly subsumes the KnitWit plan's looser 'no impossible
      transitions / bounded inc-dec rate' guarantee (clm_019), so it should anchor the acceptance gate.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Acceptance scoring should be tiered: deterministic execution-grounded checks (Compilation Success
    Rate via a CrochetPARADE-style validator, stitch-count/attachment consistency, coupling) must be the
    hard pass/fail gate, while any LLM/VLM judge is advisory only, because CrochetBench shows model performance
    collapses moving from surface metrics (BLEU/ROUGE) to structural compilation - i.e., string-similarity
    scoring systematically overstates correctness for spatial-instruction tasks.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_034
    - clm_036
    - clm_038
    reasoning_summary: CSR via the CrochetPARADE validator is execution-grounded (clm_034, clm_036), and
      the documented sharp decay from BLEU/ROUGE to compilation (clm_038) is direct evidence that surface/model-judge
      scoring is unreliable, so deterministic checks must backstop it.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'The mesh shape-match metric set should pair a global surface-distance metric (Hausdorff distance
    or volumetric/approximate-volume difference, as the KnitWit plan specifies) with a topology-fidelity
    metric (stitch-graph correctness: correct stitch count per round and no broken loops); the force-directed-layout
    finding that simple amigurumi models were ''accurate in shape and size'' establishes that unit-edge
    geometry plus topological correctness is sufficient signal for plausible-match on beginner forms.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_017
    - clm_056
    - clm_041
    reasoning_summary: The KnitWit plan names Hausdorff/volumetric distance plus topological correctness
      (clm_017); Greer-Mould report shape/size accuracy on simple forms with a per-stitch node/edge graph
      (clm_056, clm_041), justifying the combined distance+topology metric set.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: No source provides empirically validated numeric tolerance bands (no published Hausdorff or volumetric
