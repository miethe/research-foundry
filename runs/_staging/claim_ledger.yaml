      names gauge/tension as a top risk (clm_022), so uncalibrated geometry threatens shape-distance validity.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf11
  text: 'Academic feasibility vs product readiness verdict for the acceptance harness: the crochetability/IR-validity
