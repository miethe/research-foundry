  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'A reproducible mesh->pattern->preview round-trip benchmark is constructible by composing existing
    pieces: use AmiGo''s mesh->Crochet-Graph->pattern generator as the forward leg and a force-directed-graph-layout
    reconstruction as the preview leg, scoring the loop on (a) crochetability via the coupling/CSR gate,
