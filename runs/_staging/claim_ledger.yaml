- claim_id: clm_inf08
  text: 'The acceptance signals map cleanly onto a tiered user-facing confidence meter: GREEN = coupling/CSR
    pass AND all per-round stitch counts validate AND shape distance within band; YELLOW = pattern compiles
    and closes but shape distance is marginal OR the validator flags over/under-stretched (tension) stitches;
    RED = any unresolvable attachment, impossible stitch-count transition, or compilation failure; each
    tier is backed by a deterministic machine check, so the meter never depends on a model judge alone.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_012
    - clm_017
    - clm_018
    - clm_036
    reasoning_summary: Tension flagging (clm_012, clm_036), topological/stitch-count correctness and shape-match-within-tolerance
