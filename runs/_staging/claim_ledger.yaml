- claim_id: clm_inf07
  text: 'CrochetBench 2025 is directly reusable as a KnitWit acceptance harness for the DSL/IR layer -
    its Compilation Success Rate metric, four-category error taxonomy (syntax, stitch-definition, labeling/reference,
    structural), and CrochetPARADE validator transfer with minimal adaptation - but it has a hard scope
    gap: CrochetBench evaluates text/image->instruction tasks and contains no mesh inputs or geometric
    shape-fidelity metrics, so KnitWit must build the entire mesh->pattern shape-match half of the harness
    itself.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_033
    - clm_034
    - clm_035
    - clm_036
