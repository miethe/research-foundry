  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: 'There is a real terminology/representation contradiction to resolve before building the harness:
    AmiGo and the force-directed-layout paper both call their structure a ''crochet/stitch graph'' but
    encode it differently - AmiGo''s graph rows are geodesic isolines with column/row edges for a generator,
    while Greer-Mould add horizontal/vertical/constraint edges and model only increases as multiple nodes
    for a renderer; KnitWit should adopt the IR v0.1 rounds/ops schema as the neutral interchange layer
    and treat both graphs as derived views, a low-to-medium decision-impact choice that prevents a forward/preview
    representation mismatch.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_041
    - clm_048
    - clm_053
    - clm_016
    reasoning_summary: AmiGo's column/row-edge generator graph (clm_041) and Greer-Mould's horizontal/vertical/constraint-edge
      renderer graph with increase-only multi-node encoding (clm_048, clm_053) are different graph dialects;
      the IR's rounds/ops schema (clm_016) is the neutral layer that reconciles them.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: 'Gauge/tension variability is the highest-severity validity risk for the shape-fidelity half of
    the harness (severity high, likelihood high): both the force-directed layout''s constant unit-edge-length
    assumption and AmiGo''s fixed stitch width mean geometric distances are computed on uncalibrated geometry,
    so a mesh can pass topology checks yet diverge in real stuffed size; the concrete mitigation is to
    require a user gauge swatch (e.g., a 10x10 stitch/row rectangle) feeding per-edge lengths before any
    shape-distance band is asserted.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
