- claim_id: clm_inf01
  text: "CrochetBench's headline empirical result is a monotonic capability collapse along its four-task ladder: best stitch recognition F1 ~60.94% (Claude Sonnet 4) and instruction selection ~55-60% degrade to near-zero usable output at project-level DSL synthesis, where even the strongest models (Claude, Gemini, Qwen2-VL-7B) emit only 5-8% executable programs."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims: [clm_008, clm_012, clm_013, clm_014, clm_037, clm_038, clm_040, clm_070, clm_071, clm_072]
    reasoning_summary: "Aligning the per-task scores (recognition F1 60.94%, selection 55-60%, step-level compile 52.1% Claude, project-level 5-8% best / 21% Qwen2-VL) across the recognition->selection->generation->synthesis ladder shows performance falling sharply precisely as the task requires multi-step procedural state, which is the documented benchmark finding."
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf02
  text: "CrochetBench's most decision-relevant finding for KnitWit is that linguistic fluency is decoupled from structural validity: models produce crochet-like prose while violating the very stitch-count, transition, and closure invariants the app must guarantee, so generation quality cannot be judged by reading the output and must be judged by execution against a validator."
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims: [clm_010, clm_015, clm_039, clm_041, clm_073, clm_075]
    reasoning_summary: "The fluency/validity decoupling (clm_015) plus uniformly low generation BLEU/ROUGE (clm_075) plus the divergent failure modes where closed models emit syntactically valid but semantically inconsistent programs (clm_073) directly imply that text-similarity inspection is insufficient and only execution-based DSL evaluation (clm_010, clm_041) discriminates valid from invalid patterns."
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf03
  text: "The enumerated generative failure-mode taxonomy for amigurumi maps to two empirically distinct families documented by CrochetBench: open-model syntactic failures (undefined/illegal stitches, malformed brackets/repeats) and closed-model semantic failures (compilable but state-inconsistent programs that break stitch-count continuity, unbounded inc/dec, broken loop topology, and non-closing pieces), and the KnitWit IR validation rule classes target the second, harder family."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims: [clm_024, clm_026, clm_028, clm_073]
    reasoning_summary: "CrochetBench's two-family failure split (clm_073) is matched against the three IR rule classes (clm_024) and the inverse-engine hard constraints (clm_026, clm_028); syntactic errors are caught by a grammar/parser, but semantic state violations (the closed-model failure mode) require exactly the stitch-count/inc-dec/closure invariants the spec names."
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf04
  text: "The single most de-risking finding is that the recognition-to-synthesis gap is an architecture/training problem, not a scaling problem: closed-source scale does not win project-level synthesis (open-source Qwen2-VL leads at ~21% vs 5-8% for the strongest closed models), so an amigurumi-first app cannot expect a near-term larger general model to deliver end-to-end pattern generation that satisfies structural rules."
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims: [clm_014, clm_015, clm_072, clm_074]
    reasoning_summary: "Qwen2-VL (open, smaller) leading project-level compilation over closed frontier models (clm_072), combined with the authors' explicit conclusion that gains come from long-range/stateful modeling rather than scale (clm_074) and that finetuning does not close the gap (clm_015), implies waiting for a bigger general model is not a viable product strategy."
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf05
  text: "Viable near-term role recommendation: ML/VLM generation should be positioned as assist-then-deterministic-validator (drafting plus author-in-the-loop), never as autonomous end-to-end synthesis, because a 5-8% executable rate at project level means roughly 92-95% of unvalidated raw generations would be structurally broken if shipped directly to a crocheter."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
