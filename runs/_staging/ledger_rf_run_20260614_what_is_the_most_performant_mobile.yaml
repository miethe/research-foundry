- claim_id: clm_inf01
  text: "For per-stitch highlight mapping at amigurumi scale (hundreds-to-low-thousands of stitches), three.js BatchedMesh ranks first on the combined draw-call/update/fidelity axis because setColorAt rewrites only the advancing round's per-instance colors while the whole piece stays a single batched draw, beating per-vertex vertex-color groups (which re-upload geometry-buffer ranges), naive per-object draws (one draw per stitch), and a separate overlay pass (extra blended draws)."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_001, clm_011, clm_012, clm_048], reasoning_summary: "clm_001/clm_048 establish that fewer larger draw calls win; clm_011 makes BatchedMesh a single multi-draw batch sharing one material; clm_012 gives per-instance setColorAt/getColorAt (Vector4 alpha). Combining these, per-round recolor touches only the per-instance color buffer in one batch, which dominates the alternatives on draw-call count and update cost."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf02
  text: "The recommended highlight technique is per-stitch instanced color (BatchedMesh.setColorAt over an opaque single-material batch), with the ghost-next-row drawn as a SEPARATE small transparent pass limited to only the next round's instances, so the opaque highlight body preserves early-ZS/FPK overdraw removal while transparency cost is bounded to one thin blended layer."
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_009, clm_012, clm_006, clm_008, clm_045, clm_007], reasoning_summary: "clm_009 says keep opaque objects non-blended; clm_006 shows blending kills early-ZS/FPK; clm_008/clm_045 recommend splitting opaque vs transparent portions; clm_007 says minimize blended layers. So the highlight body should be opaque (clm_012 instanced color) and only the ghost row should blend, isolated as a separate pass over a single round's instances."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf03
  text: "The dominant mid-range-phone bottleneck for this workload is per-pixel blended-layer overdraw, not draw-call count: at amigurumi stitch counts a single batched opaque draw keeps draw calls near 1, so the 30-60 FPS budget breaks first when stacked transparent ghost/overlay layers raise per-pixel blended-layer count rather than when stitch count rises."
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_001, clm_006, clm_007, clm_047, clm_021], reasoning_summary: "clm_001/clm_011 collapse the piece to ~1 draw so CPU draw-call cost is negligible; clm_006/clm_007/clm_047 establish that each blended layer per pixel burns cycles and disables overdraw removal regardless of shader simplicity; clm_021 notes blending itself is on-chip-cheap, so the binding constraint is layer COUNT/overdraw, not stitch count or batch draws."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf04
  text: "Per-vertex vertex-color groups are the weakest mapping technique for incremental playback because advancing one round forces a partial vertex-buffer (VAO) re-upload, which clm_002 says makes the browser revalidate and recalculate fetch limits, whereas instanced per-instance color updates a separate instance buffer and leaves the geometry VAO static."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_002, clm_012, clm_011], reasoning_summary: "clm_002 penalizes mutating VAOs each draw vs static VAOs; vertex-color groups recolor by writing the geometry's color attribute (mutating the VAO/its buffers) whereas clm_012's setColorAt writes a per-instance color buffer leaving the shared geometry static (clm_011), so instancing avoids the revalidation cost per row-advance."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf05
  text: "Index-range sub-draws (one drawElements per advancing round over a contiguous index range) are a viable middle option for highlight-only playback but lose to instanced color because each highlighted round becomes its own draw call, so draw-call count grows linearly with the number of distinct highlight states rather than staying at one batched draw."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: low
  sources: []
  inference_basis: {from_claims: [clm_001, clm_005, clm_012], reasoning_summary: "clm_001 favors collapsing into fewer draws and clm_005 shows degenerate-triangle batching keeps discontinuous geometry in one draw; an index-range sub-draw per round contradicts that by adding draws per highlight band, whereas clm_012 keeps everything in one batch and only flips per-instance colors."}
  report_locations: []
  reviewer_notes: ""
- claim_id: clm_inf06
  text: "On Arm Mali/Immortalis the cost difference between an opaque instanced highlight and a blended overlay is structural, not marginal: clm_006 shows blending disables early-ZS and FPK, and the Fragment Prepass only recovers single-digit-percent GPU-cycle savings (4.6-6.5% on real game scenes, clm_031/clm_032) and only on 2024-2025 GPUs (clm_035), so older mid-range Mali phones get no prepass relief and pay full overdraw for every stacked transparent layer."
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis: {from_claims: [clm_006, clm_031, clm_032, clm_034, clm_035, clm_044], reasoning_summary: "clm_006 establishes the blending penalty; clm_031/clm_032 quantify Fragment Prepass recovery at only 4.6-6.5% cycles; clm_035/clm_044 limit reliable prepass to Mali-G725/Immortalis-G925-class parts, so on the broad mid-range install base only FPK fallback (clm_034) applies and overdraw from transparent layers is essentially unmitigated."}
  report_locations: []
