- claim_id: clm_inf09
  text: 'The recommended IR-to-GPU runtime data flow is: Crochet IR pieces[].rounds[].ops (op enum mr|sc|inc|dec|...)
    expand to a per-stitch node/edge stitch-graph carrying round_index and stitch_index, which is laid
    out into a single interleaved vertex buffer plus an index buffer where each round occupies a contiguous
    index range; row-advance and ghost-overlay then call only a sub-range buffer update (Filament setBufferAt
    at the round''s byteOffset, or three.js addUpdateRange over that round''s component span), keeping
    per-frame CPU work proportional to one round rather than the whole mesh.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_063
    - clm_068
    - clm_069
    - clm_028
    - clm_034
    - clm_052
    reasoning_summary: FilamentAsset is already textures+vertex+index buffers (clm_063); setBufferAt updates
      a single slot at a 4-byte-aligned byteOffset (clm_068) with up to 8 slots (clm_069); three.js addUpdateRange
      targets a start/count span (clm_028); LowLevelMesh updates in place (clm_052). Mapping each round
      to a contiguous index range makes per-round partial updates feasible. Round/stitch indices align
      to the IR v0.1 rounds[].index and expected_stitch_count fields.
  report_locations: []
  reviewer_notes: ''
