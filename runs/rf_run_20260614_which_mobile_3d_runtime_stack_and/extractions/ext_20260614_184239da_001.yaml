- evidence_id: ev_001
  text: SceneView is an Android view that integrates both ARCore and Google Filament for 3D and AR rendering.
  locator: Page header / introductory heading
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The project explicitly positions itself as the forthcoming replacement for Sceneform.
  locator: SceneView description section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'AR is opt-in: SceneView provides a 3D-only mode while ArSceneView adds ARCore on top of 3D, so
    a Filament-only 3D viewport can run without ARCore.'
  locator: Features section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The library is built around Kotlin, which the maintainers cite as the reason newer ARCore features
    integrate faster than in the older API surface.
  locator: Features section (ARCore features note)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The canonical SceneView SDK is described as a Jetpack Compose + Filament 3D/AR SDK for Android
    (with iOS and Web variants).
  locator: GitHub repo (SceneView/sceneview-android) — tagline / header
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Google archived Sceneform in 2021 and ships no first-party declarative AR renderer; SceneView
    descends from the maintained community fork and is the actively-developed, Jetpack-Compose-native
    way to build 3D/AR on Android.
  locator: GitHub repo — 'Compose-native successor to Sceneform' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: SceneView is a Composable rendering a Filament-only 3D viewport, while ARSceneView is SceneView
    plus ARCore with the camera following real-world tracking.
  locator: GitHub repo — '3D scene' vs 'AR scene' sections
  confidence: medium
  quote_available: true
