extracted_facts:
- evidence_id: ev_001
  text: AssetLoader ingests a single blob of glTF 2.0 content in either JSON or GLB form and produces
    a FilamentAsset, providing a direct glTF-to-Filament import path.
  locator: AssetLoader class doc comment (header)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A FilamentAsset is defined as a bundle of Filament textures, vertex buffers, and index buffers,
    establishing a direct glTF-to-GPU-buffer mapping rather than an intermediate scene format.
  locator: AssetLoader class doc comment (header) — FilamentAsset description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Both binary GLB and JSON-based glTF 2.0 files are accepted by createAsset, which returns a single-instance
    asset or null on failure, matching the OBJ/GLTF contract's glTF path.
  locator: createAsset() method comment
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: AssetLoader deliberately does not fetch external buffer data or create textures itself; that upload
    boundary is delegated to ResourceLoader, which obtains the URI list from the asset.
  locator: ResourceLoader-related comment
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: createInstancedAsset consumes a glTF 2.0 file and produces a primary asset with one or more instances,
    enabling multiple instances to share geometry for per-piece assembly use cases.
  locator: createInstancedAsset() method comment
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The AssetLoader.h header carries a 2019 Android Open Source Project / Google copyright, indicating
    it is the official upstream Filament importer interface.
  locator: File license header
  confidence: medium
  quote_available: true
  notes: ''
