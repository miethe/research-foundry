extracted_facts:
- evidence_id: ev_001
  text: LowLevelMesh is a container for vertex data that lets developers create and update RealityKit
    meshes using their own custom vertex format.
  locator: Class abstract (page heading subtitle)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: LowLevelMesh requires iOS 18 / iPadOS 18 / macOS 15 (Sequoia) / visionOS 2 (with tvOS 26), setting
    the minimum deployment-target floor for any KnitWit feature that depends on it.
  locator: Availability line (under class heading)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Mesh contents in a LowLevelMesh can be updated either on the CPU with Swift or on the GPU via
    Metal compute shaders, enabling low-cost dynamic per-frame updates.
  locator: Overview, first paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A MeshResource created from a LowLevelMesh retains a reference to it, so RealityKit reflects any
    mesh changes at render time without rebuilding the entity, supporting interactive playback.
  locator: Overview, closing paragraph (after triangle example)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The LowLevelMesh.Part sub-type maps a range of primitives to a material index, enabling per-region
    (per-part) material assignment such as highlight or recolor of mesh regions.
  locator: Structures > struct Part
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: LowLevelMesh defines Attribute and Layout sub-types that map custom vertex attributes into memory
    and into RealityKit shader attributes, giving full control over the vertex buffer format.
  locator: Structures > struct Attribute and struct Layout
  confidence: medium
  quote_available: true
  notes: ''
