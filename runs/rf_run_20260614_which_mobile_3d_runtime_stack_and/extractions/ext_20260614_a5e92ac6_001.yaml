extracted_facts:
- evidence_id: ev_001
  text: Per-frame vertex position updates in Filament are pushed by calling VertexBuffer::setBufferAt
    with a BufferDescriptor over a fixed-location, fixed-size buffer whose contents change between frames.
  locator: Issue body (kpeeters, original question)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The setBufferAt approach lets a developer maintain a dynamically changing mesh without re-creating
    the entire VertexBuffer each frame.
  locator: Issue body (kpeeters, original question)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A Filament maintainer confirms that calling setBufferAt to mutate an existing vertex buffer in
    place is a fully supported, correct usage pattern.
  locator: First comment (prideout, Filament maintainer, 2019-07-26)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Mutating a vertex buffer''s contents via setBufferAt is distinct from the separately-debated
    capability of swapping a renderable from one vertex buffer to a different one (the subject of issue
    #1279).'
  locator: First comment (prideout, Filament maintainer, 2019-07-26)
  confidence: medium
  quote_available: true
  notes: ''
