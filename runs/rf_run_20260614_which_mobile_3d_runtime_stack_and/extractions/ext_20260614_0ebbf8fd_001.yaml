- evidence_id: ev_001
  text: Apple officially deprecated SceneKit across all platforms at WWDC25.
  locator: Start (0:00)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The deprecation is a soft deprecation — existing SceneKit apps keep working and no rewrite is
    required, but SceneKit is not recommended for new apps or significant updates.
  locator: Start (0:00)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'SceneKit is entering maintenance mode: Apple will only fix critical bugs, with no new features
    or optimizations expected going forward.'
  locator: Start (0:00)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: RealityKit is supported on visionOS, iOS, macOS, and iPadOS, and as of WWDC25 it is newly supported
    on tvOS.
  locator: Start (0:00)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: RealityKit is designed around the open USD standard introduced by Pixar in 2012, whereas SceneKit
    serializes assets into proprietary SCN files that are not a unified industry standard.
  locator: Core differences (5:03)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: SceneKit uses a node-based scene graph with predefined node properties, while RealityKit uses
    an Entity Component System where behavior is added by attaching components to entities.
  locator: Core differences (5:03)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: SceneKit/SCN and other DCC-tool assets must be converted to USD/USDZ for RealityKit, via Xcode
    export to a Universal Scene Description Package or via the xcrun scntool CLI.
  locator: Asset conversion (8:59)
  confidence: medium
  quote_available: true
  notes: ''
