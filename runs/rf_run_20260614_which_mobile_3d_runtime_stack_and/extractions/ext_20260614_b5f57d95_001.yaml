- evidence_id: ev_001
  text: Thermion is a framework for building cross-platform 3D applications with Dart and/or Flutter.
  locator: thermion.dev — Overview
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The ThermionViewer class exposes an API for creating and interacting with 3D scenes that are rendered
    by Google's Filament engine.
  locator: thermion.dev — ThermionViewer (thermion_dart)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The viewer can load and manipulate entities, lights, skyboxes, and background elements, and play/pause/manipulate
    skeletal and morph-target animations.
  locator: thermion.dev — ThermionViewer (thermion_dart) — Key functionalities
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Thermion targets iOS, macOS, Android, and Windows plus a Web/WASM build, giving broad mobile,
    desktop, and web reach from a single codebase.
  locator: GitHub nmfisher/thermion — Features
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Thermion ingests glTF models and KTX/PNG/JPEG textures and supports skinning and morph-target
    animations for playback.
  locator: GitHub nmfisher/thermion — Features
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Web support is still experimental and currently requires manually compiling Thermion to WebAssembly
    (via Emscripten) before deployment.
  locator: thermion.dev — Web
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Thermion splits into thermion_flutter (the Flutter rendering-surface plugin) and thermion_dart
    (the viewer logic), separating the Flutter embedding layer from the platform-agnostic rendering API.
  locator: thermion.dev — Package structure
  confidence: medium
  quote_available: true
  notes: ''
