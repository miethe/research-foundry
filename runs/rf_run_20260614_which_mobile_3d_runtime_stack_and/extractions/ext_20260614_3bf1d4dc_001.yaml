extracted_facts:
- evidence_id: ev_001
  text: The IL2CPP scripting backend always performs byte-code stripping regardless of the editor's Stripping
    Level setting, so Unity recommends setting Stripping Level to Disabled because other levels add little
    size benefit and can cause native-code registration problems.
  locator: Resolution > Stripping
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: IL2CPP converts C# to C++ ahead-of-time and compiles it into the app binary, which can produce
    larger universal binaries or per-architecture slices than the Mono backend.
  locator: Resolution (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A Unity universal (fat) build bundles a 32-bit and a 64-bit slice containing the same executable
    for two architectures, roughly doubling the binary size versus a single-architecture build.
  locator: Why is the binary size of IL2CPP bigger than with mono?
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Apple enforces binary size limits that vary by MinimumOSVersion: 80 MB total __TEXT for <7.0,
    60 MB per architecture slice for 7.x-8.x, and 500 MB for the Mach-O file for 9.0+.'
  locator: Which sizes limit does Apple check?
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Unity ships a MapFileParser utility that parses the Xcode-generated map file to attribute executable
    size contributions to individual scripts, plugins, and engine code.
  locator: Analysing scripts with MapFileParser
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The article is scoped to a dated Unity/XCode/iOS era, applying to Unity versions 5.2.0p1 and higher,
    XCode 7 and higher, and iOS 9.0 and higher.
  locator: Footer / applicability note
  confidence: medium
  quote_available: true
  notes: ''
