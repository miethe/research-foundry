extracted_facts:
- evidence_id: ev_001
  text: PaperQA2 is a package for high-accuracy retrieval-augmented generation (RAG) over PDFs, text files,
    Microsoft Office documents, and source code files, with a focus on scientific literature.
  locator: README — project description (intro)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A PaperQA2 answer object exposes formatted_answer, answer (the answer alone), question, and context
    (summaries of the passages found for the answer).
  locator: README — Library Usage / answer object
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: PaperQA2 emits in-text citations that reference specific source passages using keys formatted
    like (pqac-abcd1234).
  locator: README — Customizing Prompts (citations)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: PaperQA2 provides a customization interface with default support for all LiteLLM-compatible models.
  locator: README — model customization
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: By default PaperQA2 uses OpenAI's gpt-4o-2024-11-20 model for the summary_llm, llm, and agent_llm
    roles.
  locator: README — default models
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: PaperQA2 relies on external paper search and metadata services including Semantic Scholar, Crossref,
    and Unpaywall.
  locator: README — dependencies/acknowledgements
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The Python API entry point imports Settings and ask from paperqa, and an async agent_query() function
    is also provided for agentic querying.
  locator: README — Library Usage (Python API)
  confidence: medium
  quote_available: true
  notes: ''
