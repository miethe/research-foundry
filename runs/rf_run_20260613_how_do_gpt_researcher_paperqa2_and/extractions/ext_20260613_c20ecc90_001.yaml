- evidence_id: ev_001
  text: PaperQA2 is presented as the first AI agent to achieve superhuman performance on a variety of
    scientific literature search tasks, optimized for retrieving and summarizing information over the
    scientific literature.
  locator: Opening paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: PaperQA2 achieves higher accuracy than PhD- and postdoc-level biology researchers at retrieving
    information from the scientific literature, as measured using LitQA2, part of the LAB-Bench eval set.
  locator: Opening paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: WikiCrow, an agent built on top of PaperQA2, produces scientific summaries judged more accurate
    on average than human-written Wikipedia articles by blinded PhD- and postdoc-level researchers.
  locator: Opening paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: An older version (PaperQA) was used to generate Wikipedia-style articles for all 20,000 human
    genome genes by combining information from 1 million distinct scientific papers, though those earlier
    articles were on average less accurate than existing Wikipedia articles.
  locator: Second paragraph (scale of literature analysis)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: ContraCrow, an agent built on PaperQA2, evaluates every claim in a paper to find contradicting
    papers and detected an average of 2.34 contradicted statements per paper in a random subset of biology
    papers.
  locator: Third paragraph (contradiction detection / ContraCrow)
  confidence: medium
  quote_available: true
  notes: ''
