extracted_facts:
- evidence_id: ev_001
  text: Research can be constrained to a caller-supplied list of URLs via the source_urls parameter of
    the GPTResearcher class.
  locator: 'Section: Research on Specific Sources'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The complement_source_urls flag controls whether GPT Researcher researches beyond the provided
    URLs; its default value of False restricts research to only the given source_urls.
  locator: 'Section: Research on Specific Sources'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: An agent prompt instruction can steer both the research direction and report layout by passing
    the prompt as the query argument together with the custom_report report_type.
  locator: 'Section: Specify Agent Prompt'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: GPT Researcher can research local documents (set DOC_PATH and report_source="local"); supported
    input formats are PDF, plain text, CSV, Excel, Markdown, PowerPoint, and Word.
  locator: 'Section: Research on Local Documents'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Web sources and local documents can be researched together by setting the report_source argument
    to "hybrid", with appropriate retrievers and doc path configured.
  locator: 'Section: Hybrid Research'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: GPT Researcher accepts a list of LangChain Document instances (report_source="langchain_documents"),
    enabling research over documents pulled from a vector store / retriever.
  locator: 'Section: Research on LangChain Documents'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'The same async Python API drives all source modes: instantiate GPTResearcher, then await conduct_research()
    followed by await write_report().'
  locator: 'Code example: Research on Specific Sources / Implementation pattern'
  confidence: medium
  quote_available: true
  notes: ''
