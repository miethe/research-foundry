- evidence_id: ev_001
  text: PaperQA2 is a frontier language model agent optimized for improved factuality that matches or
    exceeds subject-matter-expert performance on three realistic literature research tasks.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The human-AI comparison placed no restrictions on the human experts, who retained full access
    to internet, search tools, and time.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: PaperQA2 writes cited, Wikipedia-style summaries of scientific topics that are significantly more
    accurate than existing human-written Wikipedia articles.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The authors introduce LitQA2, a hard scientific-literature-research benchmark that guided PaperQA2's
    design and led it to exceed human performance.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Applied to contradiction detection, PaperQA2 identifies 2.34 +/- 1.99 contradictions per paper
    in a random subset of biology papers, of which 70% are validated by human experts.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors conclude that language model agents are now capable of exceeding domain experts across
    meaningful scientific-literature tasks.
  locator: Abstract
