- claim_id: clm_inf01
  text: On the published unit-cost figures, GPT Researcher (about $0.40 per full multi-source run with
    o3-mini) is the only one of the three with a vendor-stated end-to-end run cost, whereas PaperQA2 and
    the Claude Agent SDK expose only component costs (per-question tool calls/searches and per-search/per-token
    rates respectively), so a like-for-like cost-per-source-card comparison must be modeled, not read
    off, for the latter two.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_046
    - clm_047
    - clm_037
    - clm_038
    - clm_013
    - clm_017
    - clm_069
    reasoning_summary: clm_046/clm_047 give GPT Researcher a concrete ~$0.40/>20-source run cost; PaperQA2
      sources (clm_037/clm_038) report only per-question tool/search counts and clm_069 notes GPT Researcher's
      get_costs() returns tokens not dollars; Claude pricing (clm_013/clm_017) is per-search and per-token,
      so SDK and PaperQA2 costs are derived from components, not stated as a run total.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Dividing GPT Researcher's roughly $0.40 run cost by its 20+ aggregated sources yields an order-of-magnitude
    cost-per-source-card of about $0.02, the lowest modeled per-source extraction cost of the three adapters.
  materiality: material
  claim_type: quantitative
  status: inference
  confidence: low
  sources: []
  inference_basis:
    from_claims:
    - clm_047
    - clm_046
    reasoning_summary: $0.40 per run (clm_047) divided across 20+ sources (clm_046) gives ~$0.02/source;
      treated as a coarse upper-bound estimate because the run cost is model-specific (o3-mini, high effort)
      and the 20-source figure is a floor.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Because PaperQA2's design philosophy explicitly discards cost and latency to maximize accuracy
    and its agent loop averages more than 4 tool calls and 1.26 searches per question on a default gpt-4o
    model, its cost-per-claim is structurally higher than GPT Researcher's and the highest of the three
    adapters.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_033
    - clm_037
    - clm_038
    - clm_024
    reasoning_summary: clm_033 states PaperQA2 deliberately ignores cost; clm_037/clm_038 quantify >4
      tool calls and 1.26 searches per question; clm_024 fixes a frontier default model (gpt-4o-2024-11-20);
      each adds token and search billing, so per-claim cost is structurally elevated relative to a single
      ~$0.40 GPT Researcher run.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The Claude Agent SDK's cost-per-source-card is dominated by the $10-per-1,000-searches web-search
    fee (about $0.01 per search) plus token costs, so its per-source cost lands between GPT Researcher
    and PaperQA2 and is highly sensitive to the search-to-source ratio and whether Haiku 4.5 ($1/$5 per
    MTok) or Opus 4.8 ($5/$25 per MTok) does the extraction.
  materiality: material
  claim_type: quantitative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_013
    - clm_015
    - clm_017
    reasoning_summary: clm_013 gives $10/1,000 (=$0.01) per web search and clm_015 makes web fetch free;
      clm_017 gives the 5x input / 5x output spread between Haiku and Opus, so the SDK per-source cost
      is search-fee + model-dependent token cost, placing it between the cheap GPT Researcher run and
      the accuracy-maximized PaperQA2.
  report_locations: []
  reviewer_notes: ''
