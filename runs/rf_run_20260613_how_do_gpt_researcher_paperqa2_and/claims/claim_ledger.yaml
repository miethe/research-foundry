  text: 'On citation accuracy and source-card provenance fidelity, PaperQA2 is the strongest adapter:
    it emits passage-level in-text citation keys (pqac-xxxx) tied to specific passages and is benchmarked
    to match or exceed PhD/postdoc experts on LitQA2, versus GPT Researcher and the bare Claude SDK which
