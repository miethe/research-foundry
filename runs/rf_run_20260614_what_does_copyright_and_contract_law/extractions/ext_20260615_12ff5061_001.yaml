extracted_facts:
- evidence_id: ev_001
  text: The general TDM exception requires Member States to permit reproductions and extractions of lawfully
    accessible works and subject matter for the purposes of text and data mining.
  locator: Article 4(1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Copies made under the general TDM exception may be retained only for as long as necessary for
    text and data mining purposes.
  locator: Article 4(2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The general TDM exception applies only where the rightholder has not expressly reserved the use
    in an appropriate manner, such as machine-readable means for content made publicly available online.
  locator: Article 4(3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: For content made publicly available online, rights reservation is appropriate only via machine-readable
    means including metadata and a website's or service's terms and conditions.
  locator: Recital 18
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A separate mandatory TDM exception exists for research organisations and cultural heritage institutions
    with lawful access, and the general Article 4 exception does not affect it (it cannot be overridden
    by rights reservation).
  locator: Article 3(1) and Article 4(4)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Member States were required to transpose the directive into national law by 7 June 2021, and both
    TDM exceptions require lawful access as a precondition.
  locator: Article 29(1) (Transposition)
  confidence: medium
  quote_available: true
  notes: ''
