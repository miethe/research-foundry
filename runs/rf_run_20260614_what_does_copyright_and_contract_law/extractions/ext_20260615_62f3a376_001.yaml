extracted_facts:
- evidence_id: ev_001
  text: Copyright law expressly excludes protection for ideas, procedures, processes, systems, methods
    of operation, and concepts, so the functional stitch sequence or technique of a crochet pattern is
    unprotectable.
  locator: Ideas, Methods, and Systems (p.1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Even when the Office registers a literary, graphic, or artistic description of a system or method
    of operation, protection extends only to the original expression, not the underlying method or system.
  locator: Ideas, Methods, and Systems (p.1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: A mere listing of ingredients or contents, or a simple set of directions, is uncopyrightable,
    establishing the recipe analogy for unprotectable functional instructions.
  locator: Recipes (p.2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A recipe registration can cover the written description, explanation, photographs, and illustrations,
    but never the underlying process, the resulting dish, or the procedures/methods of operation.
  locator: Recipes (p.2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A recipe that creatively explains or depicts how or why to perform a particular activity may be
    copyrightable, indicating that creative instructional expression can qualify for protection.
  locator: Recipes (p.2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Copyright protection may be available for a sufficiently creative selection, coordination, or
    arrangement of specific content, but is limited to that specific content and not to arranging any
    content that way.
  locator: Layout and Design (p.3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Blank forms designed for recording information and that do not themselves convey information are
    uncopyrightable, as are the ideas, systems, or functional layout behind a form.
  locator: Blank Forms (p.3)
  confidence: medium
  quote_available: true
  notes: ''
