extracted_facts:
- evidence_id: ev_001
  text: The Compendium of U.S. Copyright Office Practices, Third Edition is the U.S. Copyright Office's
    administrative manual explaining its practices and statutory duties under title 17, serving both as
    a staff manual and a public guidebook.
  locator: SUPPLEMENTARY INFORMATION (printed page 3205)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The Third Edition is the current authoritative version of USCO practices: first released December
    2014, revised in 2017, and updated again with the version made available January 28, 2021 (announced
    in this 2021 Federal Register notice).'
  locator: DATES / ACTION; SUPPLEMENTARY INFORMATION (printed pages 3205-3206)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Chapter 900 of the Compendium was updated to implement the Supreme Court's separability standard
    from Star Athletica v. Varsity Brands, 137 S. Ct. 1002 (2017), as the guidance for claims involving
    useful articles.
  locator: Section 8, Useful Articles and Works of Artistic Craftsmanship (printed page 3209)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Copyright registration does not protect the overall shape or utilitarian aspects of a useful article;
    protection extends only to design features that can be conceptually separated from the useful article.
  locator: Section 8, Useful Articles and Works of Artistic Craftsmanship (printed page 3209)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Copyright law defines a useful article as one having an intrinsic utilitarian function that is
    not merely to portray the article's appearance or convey information, and the Office assesses this
    from inherent, observable characteristics rather than subjective intent.
  locator: Section 8, Useful Articles (printed page 3209)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Under the Star Athletica two-step test, the extracted artistic feature must qualify as a nonuseful
    pictorial, graphic, or sculptural work on its own, and the Office applies only that separability test,
    not the alternate lower-court tests the Supreme Court declined to adopt.
  locator: Section 8, Useful Articles, first-prong discussion (printed page 3209)
  confidence: medium
  quote_available: true
  notes: ''
