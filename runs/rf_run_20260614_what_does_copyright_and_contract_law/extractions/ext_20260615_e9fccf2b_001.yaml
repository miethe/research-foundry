extracted_facts:
- evidence_id: ev_001
  text: The Etsy Open API v3 enforces application-based rate limits composed of Queries Per Day (QPD)
    and Queries Per Second (QPS), applied at the API key level for both public and private auth.
  locator: 'Section: Rate Limits and Authentication Types'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The QPD limit does not reset on a fixed midnight-to-midnight cycle; Etsy uses a progressive Sliding
    Window Rate Limiting Algorithm that calculates usage over the last rolling 24-hour period.
  locator: 'Section: Daily Limit Mechanism (Sliding Window Structure)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Under the sliding window, as the oldest bucket exits the 24-hour window the quota consumed by
    its requests is immediately freed and becomes available for reuse.
  locator: 'Section: Daily Limit Mechanism > How the Sliding Window Works (item 3, Sliding)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Every successful response exposes usage headers including x-limit-per-second and x-limit-per-day,
    with the documented example values of 150 QPS and 100000 QPD.
  locator: 'Section: Rate Limit Headers > Successful Response (header table)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rate limits are checked QPS-first then QPD, and exceeding either returns HTTP 429 with a retry-after
    header indicating seconds to wait before retrying.
  locator: 'Section: Rate Limit Headers > Response to Exceeded Limits and Warnings'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Applications needing higher limits must request an upgrade by emailing developer@etsy.com with
    a detailed app description and an estimate of required QPD/QPS usage.
  locator: 'Section: Requesting Higher Limits and Recommendations > Request for Increased Quota'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Etsy advises maximizing existing quota by implementing caching to reduce redundant API calls and
    by using exponential backoff retry strategy on 429 responses rather than immediate retries.
  locator: 'Section: Requesting Higher Limits and Recommendations > Optimization Recommendations'
  confidence: medium
  quote_available: true
  notes: ''
