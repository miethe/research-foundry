extracted_facts:
- evidence_id: ev_001
  text: The sui generis right is a property right, similar to but distinct from copyright, that exists
    to recognize the substantial investment in obtaining, verifying, or presenting a database's contents.
  locator: KEY TERMS, item 2 (Sui generis right)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The directive's sui generis arrangements let the database creator prohibit unauthorized extraction
    and/or reuse of the database's contents.
  locator: KEY POINTS > Sui generis rights
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The right to prevent unauthorized extraction and/or reuse of a database's contents lasts 15 years
    from the date the creation of the database was completed.
  locator: KEY POINTS > Sui generis rights
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Lawful users may extract and reuse non-substantial parts of a database without authorization,
    but may not carry out acts that unreasonably harm the legitimate interests of the database creator
    or content provider.
  locator: KEY POINTS > Sui generis rights
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The directive applies to databases regardless of form (electronic/online or non-electronic/offline)
    and does not apply to the software used to make or operate the database or to the works and materials
    it contains.
  locator: KEY POINTS > Scope
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Sui generis rights are economic rights and can be transferred, assigned, or granted under contractual
    licence.
  locator: KEY POINTS > Sui generis rights
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'The directive provides two distinct protections for databases: copyright for the intellectual
    creation in selecting and arranging materials, and sui generis protection for substantial investment
    in obtaining, verifying, or presenting contents.'
  locator: WHAT IS THE AIM OF THE DIRECTIVE?
  confidence: medium
  quote_available: true
  notes: ''
