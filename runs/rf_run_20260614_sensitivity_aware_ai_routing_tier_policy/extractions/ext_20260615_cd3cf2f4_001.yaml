contradictions_or_cautions:
- text: Scoped to U.S. federal non-national-security systems; impact-level semantics are domain-specific
    to that regime.
  locator: card/trust
- text: Scope is U.S. federal non-national-security systems; the LOW/MODERATE/HIGH semantics are normative
    within that regime and are not a general-purpose classification scheme. NOT APPLICABLE applies only
    to confidentiality for information types and cannot be assigned at the system level (low-water-mark
    floor of LOW).
  locator: card/limitations
