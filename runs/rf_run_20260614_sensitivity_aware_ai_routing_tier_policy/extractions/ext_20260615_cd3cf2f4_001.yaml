extracted_facts:
- evidence_id: ev_001
  text: Potential impact is LOW when loss of confidentiality, integrity, or availability could be expected
    to have a limited adverse effect on organizational operations, assets, or individuals.
  locator: Sec. 3, 'Potential Impact on Organizations and Individuals' (p.2) — LOW
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Potential impact is MODERATE when the loss could be expected to have a serious adverse effect,
    defining the middle of the three ordinal levels.
  locator: Sec. 3, 'Potential Impact on Organizations and Individuals' (p.2) — MODERATE
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Potential impact is HIGH when the loss could be expected to have a severe or catastrophic adverse
    effect, the top of the LOW < MODERATE < HIGH ordinal scale.
  locator: Sec. 3, 'Potential Impact on Organizations and Individuals' (p.3) — HIGH
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The security category SC is expressed as a triple over confidentiality, integrity, and availability,
    each taking an impact value of LOW, MODERATE, HIGH, or NOT APPLICABLE.
  locator: Sec. 3, 'Security Categorization Applied to Information Types' (p.2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: For an information system, each security objective's impact value is set to the highest (high-water-mark)
    value among the information types resident on the system.
  locator: Sec. 3, 'Security Categorization Applied to Information Systems' (p.3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: FIPS 199 is a mandatory standard applying to all federal information and information systems except
    classified information and designated national security systems.
  locator: Sec. 2, 'Applicability' (p.1)
  confidence: medium
  quote_available: true
  notes: ''
