extracted_facts:
- evidence_id: ev_001
  text: Excessive Agency is the vulnerability whereby damaging actions are performed in response to unexpected,
    ambiguous, or manipulated LLM outputs, regardless of the cause of the malfunction.
  locator: Description (opening definition)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Excessive functionality occurs when an LLM agent has access to extension functions not needed
    for the system's intended operation.
  locator: Root causes — Excessive Functionality
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Excessive permissions arise when an extension holds downstream access rights beyond its needs,
    and excessive autonomy arises when an application fails to independently verify and approve high-impact
    actions.
  locator: Root causes — Excessive Permissions / Excessive Autonomy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: OWASP recommends limiting both the extensions an LLM agent may call and the permissions those
    extensions hold on other systems to the minimum necessary.
  locator: Prevention and Mitigation Strategies (minimize extensions / permissions)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: OWASP recommends avoiding open-ended extensions such as running shell commands or fetching arbitrary
    URLs in favor of more granular functionality.
  locator: Prevention and Mitigation Strategies (avoid open-ended extensions)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: OWASP recommends a human-in-the-loop gate requiring approval of high-impact actions before they
    are taken, and enforcing authorization in downstream systems rather than relying on the LLM.
  locator: Prevention and Mitigation Strategies (human-in-the-loop / downstream authorization)
  confidence: medium
  quote_available: true
  notes: ''
