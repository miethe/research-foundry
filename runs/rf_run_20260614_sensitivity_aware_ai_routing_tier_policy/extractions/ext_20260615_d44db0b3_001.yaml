extracted_facts:
- evidence_id: ev_001
  text: AI RMF 1.0 was released on January 26, 2023, and the Generative AI Profile (NIST.AI.600-1) was
    published on July 26, 2024.
  locator: Overview of the AI RMF (landing page)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The Generative AI Profile defines 12 risks unique to or exacerbated by generative AI, including
    Data Privacy, Information Integrity, Information Security, Intellectual Property, Confabulation, and
    Value Chain and Component Integration.
  locator: NIST.AI.600-1, Sec. 2 Overview of Risks Unique to or Exacerbated by GAI (items 1-12)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The Data Privacy risk category is explicitly framed around data leakage and unauthorized disclosure
    of sensitive or personally identifiable information.
  locator: NIST.AI.600-1, Sec. 2 item 4 (Data Privacy)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The profile organizes suggested actions around the four AI RMF Core functions: govern, map, measure,
    and manage.'
  locator: NIST.AI.600-1, Sec. 1.1 (cross-sectoral profile description, p.1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Organizations are directed to document intended purposes, users, impacts, and data sources, establishing
    data-source governance as a first-class control.
  locator: NIST.AI.600-1, MAP 1.1 / Action MP-1.1-001
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Among suggested MANAGE actions, the profile directs documenting training data sources to trace
    provenance of AI-generated content, supporting the threat-model rationale for restricting sensitive
    data flows to external AI.
  locator: NIST.AI.600-1, MANAGE 2.2 / Action MG-2.2-002 (Information Integrity)
  confidence: medium
  quote_available: true
  notes: ''
