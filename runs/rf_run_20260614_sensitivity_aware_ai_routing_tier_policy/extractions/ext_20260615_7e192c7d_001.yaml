contradictions_or_cautions:
- text: Documentation reflects the April 2026 product state and Microsoft's recommended/example taxonomy;
    specific category names (General/Confidential/Highly Confidential definitions) are organization-customizable
    and not mandated. Justification-on-downgrade applies to files, emails, and meetings but not to sublabels
    sharing a parent's priority, data assets, or container-protecting labels.
  locator: card/limitations
