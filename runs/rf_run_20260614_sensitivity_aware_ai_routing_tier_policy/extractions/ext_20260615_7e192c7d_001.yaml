extracted_facts:
- evidence_id: ev_001
  text: Microsoft's recommended example label taxonomy is the customizable five-tier set Personal, Public,
    General, Confidential, and Highly Confidential.
  locator: What a sensitivity label is (Customizable bullet)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Label ordinality is set by list order: the most restrictive label (e.g., Highly Confidential)
    goes at the bottom and the least restrictive (Personal/Public) at the top, and only one label may
    be applied per item.'
  locator: Label priority (order matters)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Labels support a two-tier hierarchy via sublabels/label groups (e.g., Confidential \ All Employees)
    where the second tier carries distinct settings and the parent text label cannot be applied by itself.
  locator: Sublabels that use parent labels or label groups
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Labeling can be discretionary or enforced: mandatory labeling requires a label before users can
    save files, send emails/meeting invites, or create new groups or sites; policies can also set a default
    label.'
  locator: What label policies can do (Require users to apply a label / mandatory labeling)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: When labels apply encryption, Copilot and agents check usage rights and return data from an item
    only if the user holds the EXTRACT (copy) usage right, an enforcement gate analogous to writeback
    authorization.
  locator: Sensitivity labels for Microsoft 365 Copilot and Microsoft 365 Copilot Chat
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Labels are persistent clear-text metadata that travel with content wherever it is stored, forming
    the basis for enforcing configured policies; Copilot Chat surfaces the highest-priority (most restrictive)
    label.
  locator: What a sensitivity label is (Clear text / Persistent bullets)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Downgrading a label or replacing it with a lower-priority label triggers a required justification
    prompt by default for files, emails, and meetings.
  locator: What label policies can do (Require a justification for changing a label)
  confidence: medium
  quote_available: true
  notes: ''
