extracted_facts:
- evidence_id: ev_001
  text: 'InfoTypes are the unit of detection: Google Cloud Sensitive Data Protection uses information
    types (infoTypes) to define what it scans for.'
  locator: InfoType detector reference — opening / InfoType descriptions section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Built-in detectors are organized into named categories spanning Finance, Health, Communications,
    PII, SPII, Demographic, Credential, Government ID, Document, and Contextual information.
  locator: InfoType categories section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Each infoType carries a default sensitivity score, presented in a per-infoType table that drives
    downstream treatment.
  locator: Sensitivity scores section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Default sensitivity scores are configurable per infoType, so the content-derived tier is an editable
    default rather than a fixed value.
  locator: Sensitivity scores section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The HIGH sensitivity level is defined by the presence of highly sensitive data such as credit-card
    numbers and certain national identifiers.
  locator: 'Companion page: Sensitivity and data risk levels — High definition'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The MODERATE level is defined by sensitive-but-not-highly-sensitive PII such as email addresses
    and phone numbers.
  locator: 'Companion page: Sensitivity and data risk levels — Moderate definition'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The LOW level corresponds to data where no sensitive information was detected and no freeform/unstructured
    text is present.
  locator: 'Companion page: Sensitivity and data risk levels — Low definition'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The aggregate sensitivity score combines each infoType's default sensitivity (plus user overrides)
    with the likelihood that highly sensitive infoTypes are present, weighting HIGH-tier detectors most
    heavily.
  locator: 'Companion page: Sensitivity and data risk levels — sensitivity calculation'
  confidence: medium
  quote_available: true
  notes: ''
