contradictions_or_cautions:
- text: The infoTypes reference page enumerates detectors and sensitivity values but does not itself define
    what HIGH/MODERATE/LOW mean; that definition lives on the companion sensitivity/data-risk page.
  locator: card/trust
- text: The infoTypes reference page itself enumerates detectors and sensitivity values but does not define
    HIGH/MODERATE/LOW; those definitions are drawn from the companion "Sensitivity and data risk levels"
    documentation page (ev_005–ev_008), which is cited in the locators.
  locator: card/limitations
- text: The page references that new infoType detectors and groups are added periodically; the exact total
    detector count is not stated as a single verbatim number on the page, so the "400+/500+" figure is
    not quoted here.
  locator: card/limitations
- text: Sensitivity scores are an editable default; an organization's effective tiering may differ from
    the documented defaults after user overrides.
  locator: card/limitations
