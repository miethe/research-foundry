- evidence_id: ev_001
  text: Cloudflare announced the AI Gateway refresh on August 27, 2025, adding unified billing, secure
    key storage, dynamic routing, and DLP security controls.
  locator: Header / byline (2025-08-27)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Dynamic Routes let users define request-attribute-based actions (rate limits, A/B splits, model
    chaining), and a defined route is invoked by using it as the 'model' name in the form dynamic/<route-name>.
  locator: 'Section: Dynamic Routes (code example)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: AI Gateway's Firewall adds DLP scanning where admins select which DLP profiles to block or flag,
    and Cloudflare scans requests for matching content.
  locator: 'Section: Built-in security with Firewall in AI Gateway (DLP)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Standard DLP profiles such as 'Financial Information' and 'Social Security, Insurance, Tax and
    Identifier Numbers' are free with a Zero Trust account, while custom DLP profiles require an upgraded
    Zero Trust plan.
  locator: 'Section: Built-in security with Firewall in AI Gateway (DLP profiles)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Secure key storage integrates Cloudflare Secrets Store using a two-level AES-encrypted key hierarchy,
    with keys scoped to AI Gateway so no other service can access them.
  locator: 'Section: BYO Provider Keys, now with Cloudflare Secrets Store'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Unified billing (Closed Beta) connects to major providers (Anthropic, Google, Groq, OpenAI, xAI),
    giving access to over 350+ models across 6 providers via one Cloudflare account.
  locator: 'Section: Connect to all your favorite AI providers'
  confidence: medium
  quote_available: true
