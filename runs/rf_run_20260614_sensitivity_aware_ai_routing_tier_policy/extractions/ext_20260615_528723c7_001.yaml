extracted_facts:
- evidence_id: ev_001
  text: On May 14, 2024, NIST released the final SP 800-171 Revision 3 governing protection of Controlled
    Unclassified Information (CUI) in nonfederal systems and organizations, alongside the SP 800-171A
    Revision 3 assessment companion.
  locator: Headline / publication notice
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Rev 3 restructured its security requirements so they align directly with the SP 800-53 Revision
    5 control catalog.
  locator: Major Updates to SP 800-171r3 — bullet 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Rev 3 introduced organization-defined parameters (ODPs), allowing organizations to tailor handling
    thresholds within the requirements.
  locator: Major Updates to SP 800-171r3 — bullet 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Rev 3 added new tailoring criteria and recategorized controls accordingly to reduce redundancy
    and improve clarity.
  locator: Major Updates to SP 800-171r3 — bullet 3 / bullet 4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rev 3 provides additional outcome-oriented guidance intended to reduce ambiguity and better support
    implementation by organizations handling CUI.
  locator: Implementation guidance statement
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The companion SP 800-171A Revision 3 incorporates ODPs into its assessment procedures to support
    traceability and usability when verifying CUI protections.
  locator: Assessment Updates — SP 800-171Ar3
  confidence: medium
  quote_available: true
  notes: ''
