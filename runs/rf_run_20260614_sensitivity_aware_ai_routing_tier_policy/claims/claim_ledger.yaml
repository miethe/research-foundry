- claim_id: clm_inf01
  text: Every cited enterprise classification scheme is fundamentally ordinal and monotonic (FIPS 199
    LOW<MODERATE<HIGH; Purview Personal<Public<General<Confidential<Highly Confidential; Google DLP LOW<MODERATE<HIGH),
    so RF's three-tier model personal<work_approved<client_approved is a well-formed ordinal sensitivity
    lattice and a writeback target can be expressed as a single max-permitted-tier ceiling per edge.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_049
    - clm_050
    - clm_060
    - clm_061
    - clm_062
    - clm_064
    - clm_065
    - clm_066
    reasoning_summary: Purview (clm_049/050), Google DLP (clm_060-062), and FIPS 199 (clm_064-066) all
      define totally-ordered sensitivity scales; mapping RF's three labels onto the same ordinal structure
      lets each target be policed by a single ceiling value rather than an arbitrary allow-set.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: FIPS 199's high-water-mark rule implies RF must classify a run's sensitivity as the maximum sensitivity
    of any input source card or evidence item it touches, not the topic label, so a personal-topic run
    that ingests a client_approved source card is itself client_approved for routing purposes.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_068
    - clm_067
    reasoning_summary: FIPS 199 sets a system's per-objective impact to the highest value among resident
      information types (clm_068) over the SC triple (clm_067); applying that aggregation rule to an RF
      run means the run inherits the highest source-card sensitivity, preventing a low label from masking
      high-sensitivity inputs.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'The cleanest external taxonomy mapping is Microsoft Purview onto RF: Personal->personal, General/internal->work_approved,
    and Confidential/Highly Confidential->client_approved, because Purview labels are persistent clear-text
    metadata that travel with content and form the enforcement basis -- exactly the role RF''s per-run
    sensitivity field plays at the writeback boundary.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_049
    - clm_054
    - clm_053
    reasoning_summary: Purview's five-tier example taxonomy (clm_049) collapses naturally to three RF
      tiers, and Purview labels as travelling clear-text metadata that gate data release via EXTRACT rights
      (clm_053, clm_054) are the structural analog of an RF run carrying a sensitivity label that gates
      writeback.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'Recommended writeback matrix -- ARC: personal ALLOW, work_approved ALLOW, client_approved DENY-by-default
    (allow only with explicit override) when ARC runs as a networked service; if ARC runs purely locally,
    client_approved may be ALLOWED, because residual exfiltration risk is what flips the edge.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_027
    - clm_072
    reasoning_summary: OWASP least-privilege (clm_026) and the directive to limit which external sinks
      a task can reach (clm_027), plus NIST's Data-Privacy-as-leakage framing (clm_072), justify denying
      client_approved data to a networked ARC by default while permitting it to a local-only ARC where
      no network egress occurs.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'Recommended writeback matrix -- IntentTree: personal ALLOW, work_approved ALLOW with audit, client_approved
    DENY by default, because IntentTree is an idea/planning backlog whose entries are long-lived, broadly
    readable, and not access-scoped per source, making it a low-control sink unsuitable for client_approved
    content.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_027
    - clm_010
    reasoning_summary: OWASP least-privilege data access (clm_026), limiting reachable sinks (clm_027),
      and minimizing downstream permissions (clm_010) argue that a low-access-control planning sink should
      default-deny the highest tier; work_approved is permitted but logged.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf06
  text: 'Recommended writeback matrix -- MeatyWiki: personal ALLOW, work_approved ALLOW, client_approved
    ALLOW only when the MeatyWiki vault is local/personal-scoped (the source cards here are marked sensitivity:personal
    with allowed_for_personal_meatywiki:true), so a shared or published MeatyWiki must drop to work_approved
    as its ceiling.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_026
    reasoning_summary: OWASP's scope of sensitive information (clm_025) and least-privilege access (clm_026)
      make the vault's audience the deciding factor; the source-card usage flags (allowed_for_personal_meatywiki
      true, allowed_for_public_output false) imply a personal vault tolerates client_approved but a shared
      vault should not.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf07
  text: 'Recommended writeback matrix -- SkillMeat and CCDash: personal ALLOW and work_approved ALLOW,
    but client_approved DENY by default, because these are operational/skill-artifact and dashboard sinks
    where client-confidential research content has no business purpose and would only widen the leakage
    surface (OWASP least-purpose / least-privilege).'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_026
    - clm_027
    - clm_008
    reasoning_summary: Least-privilege data access (clm_026), limiting reachable sinks (clm_027), and
      OWASP's excessive-functionality root cause (clm_008 -- granting access not needed for intended operation)
      imply skill/dashboard sinks should not receive the highest-sensitivity tier they were never designed
      to hold.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: 'The decisive variable across every client_approved edge is deployment topology, not the target''s
    identity: a target running as a local-only process carries no network egress and can hold the top
    tier, whereas the same target as a networked service inherits an exfiltration channel that warrants
    default-deny -- so RF''s matrix must be parameterized by a per-target local-vs-networked flag.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_027
    - clm_072
    - clm_007
    reasoning_summary: OWASP's runtime-data-orchestration / reachable-sink control (clm_027) and NIST
      Data-Privacy leakage framing (clm_072) make egress the threat; Excessive Agency (clm_007) shows
      that the harm is a function of what downstream action is reachable, which a network sink enlarges
      relative to a local one.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: RF should enforce sensitivity at the writeback boundary as a default-deny gate that reads only
    a small decision header (run sensitivity tier, target id, target topology flag, override token) --
    mirroring Purview's model where Copilot releases data only if the EXTRACT usage right is present --
    so a misclassified or unlabeled run is denied rather than silently escalated.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_053
    - clm_012
    - clm_027
    reasoning_summary: Purview gates data release on a positive usage right (clm_053) and OWASP says authorization
      must be enforced in the downstream system not the LLM (clm_012); combined with reachable-sink limiting
      (clm_027), the safe construction is a positive-permission, default-deny check at the boundary keyed
      on a minimal header.
