- evidence_id: ev_001
  text: AmiGo generates crochet instructions from a closed triangle mesh plus a single user-specified
    point such that the knitted, stuffed result resembles the input geometry.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The pipeline builds the geometry and connectivity of a Crochet Graph, which is then translated
    into a crochet pattern.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In the Crochet Graph, vertices are stitch bases/tops while column edges are stitch stems and row
    edges encode within-row connectivity.
  locator: Section 2.2, The Crochet Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The shape is automatically segmented into crochetable components joined with the join-as-you-go
    method, requiring no additional sewing.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Join-as-you-go means each segment is crocheted directly onto the last row of the previous segment,
    so no separate sewing step is needed.
  locator: Section 7.2, Branching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The method is demonstrated across a large variety of shapes and yields patterns the authors describe
    as easily crochetable, establishing crochetability and shape-similarity as the acceptance axes.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
