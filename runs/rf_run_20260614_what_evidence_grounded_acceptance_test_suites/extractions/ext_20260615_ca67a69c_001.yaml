extracted_facts:
- evidence_id: ev_001
  text: 'Each stitch is a node and physical connections are edges: horizontal edges mark sequential (made-immediately-after)
    connections, vertical edges mark working (top worked into bottom) connections, and non-stitch shaping
    (e.g., pull-tight dimpling) is represented with additional constraint edges.'
  locator: Section 4 (graph construction), para. beginning 'Each stitch is represented as a node'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Only increase stitches are represented as multiple graph nodes; other tested stitch types map
    to a single node.
  locator: Section 4 / Figure 5 caption
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The method implements Isenburg et al. [IGG01]'s force-directed layout, which inflates a planar
    graph by assigning each edge a length and minimizing overall curvature, balancing the two to maximize
    volume (the analog of stuffing the crocheted shell).
  locator: Section 4.2 The graph layout, para. beginning 'We implemented the force-directed graph layout'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The layout is a non-linear least-squares problem minimizing two energy functions (edge length
    and per-node local curvature), starting from the assumption that each edge has length one and each
    node has minimal curvature.
  locator: Section 4.2, para. beginning 'The force-directed graph layout is a non-linear least-squares'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors report their digital models were accurate in shape and size to the real-world crochet
    counterparts for the tested simple patterns.
  locator: Section 5.1 Modeling complete patterns / Section 6 Conclusion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Constant edge length of 1 is an explicit accuracy limitation because real stitch size varies with
    yarn tension, hook size, yarn weight, and stitch type; the authors propose user-supplied gauge swatch
    measurements (e.g., a 10-row by 10-stitch rectangle) to set per-edge lengths.
  locator: Section 5.1 (raindrop result), para. beginning 'We assumed constant edge length of 1'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: A pull-in/closing effect was recreated by adding a single constraint edge linking the first and
    last graph nodes with an edge length of 6 chosen by trial and error, with curvature computation omitted
    for those constrained nodes to produce sharp points.
  locator: Section 5.1 (apple / pull-in effect), para. beginning 'We recreated this pulling-in effect'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Scope was deliberately restricted to stitches that behave like the single crochet (the prototypical
    amigurumi stitch) and to patterns worked in continuous rounds, with 'rows' used generically to also
    mean rounds.
  locator: Section 5.1, para. beginning 'We also limited the types of stitches tested' / Section 3 Background
  confidence: medium
  quote_available: true
  notes: ''
