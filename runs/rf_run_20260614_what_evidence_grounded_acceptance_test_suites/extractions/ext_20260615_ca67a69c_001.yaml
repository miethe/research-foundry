contradictions_or_cautions:
- text: Method tested only on simple, beginner-level amigurumi patterns and single-crochet-like stitches
    in continuous rounds.
  locator: card/trust
- text: Constant edge length = 1 assumption is acknowledged as inaccurate in general.
  locator: card/trust
- text: Several tuning values (lambda, pull-in edge length) set by trial-and-error rather than derived.
  locator: card/trust
- text: Validated only on simple, beginner-level amigurumi patterns and single-crochet-like stitches in
    continuous rounds; not yet shown for intermediate/advanced patterns, flattened pieces, or diverse
    stitch types.
  locator: card/limitations
- text: Multiple key knobs (lambda = 0.65/0.9, pull-in edge length = 6) were chosen by trial-and-error
    or static assumption rather than derived; constant unit edge length is acknowledged as inaccurate
    in general. Force-directed layout did not reach convergence within minutes for the largest tested
    pieces.
  locator: card/limitations
