extracted_facts:
- evidence_id: ev_001
  text: The method takes a written crochet pattern as input, translates it into a graph, and obtains a
    3D representation via a force-directed graph layout.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The tool accepts patterns written in row-by-stitch notation, the most common notation for amigurumi,
    and converts them to a graph before computing a layout.
  locator: Section 4 (Method) — input notation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Each stitch becomes a graph node and physical connections between stitches become edges, giving
    an explicit per-stitch node/edge structure.
  locator: Section 4.1 (graph construction)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Edges carry distinct topological semantics — horizontal edges encode sequential stitch order,
    vertical edges encode worked-into connections, and constraint edges encode shaping effects.
  locator: Section 4.1 (edge semantics)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Geometric rendering is produced separately from topology by solving a force-directed layout as
    a non-linear least-squares optimization that minimizes an edge-length energy and a local-curvature
    energy.
  locator: Section 4.2 (The graph layout)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Each graph node is rendered as a sphere so users can see individual stitches, supporting per-stitch
    instance rendering and highlighting.
  locator: Section 4 (model representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The system targets amigurumi and is meant to let designers visualize a pattern before physically
    crocheting it, reducing crochet/unravel iterations.
  locator: Section 5 / Abstract (intended use)
  confidence: medium
  quote_available: true
  notes: ''
