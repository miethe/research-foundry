contradictions_or_cautions:
- text: Project-level DSL sample size small (100 items) with low absolute validity rates; authors caution
    against fine-grained statistical comparisons.
  locator: card/trust
- text: Compilation metric does not assess visual fidelity unless paired with image-render verification.
  locator: card/trust
- text: 'Provided source brief contained inaccuracies corrected here: the paper does NOT name "four validation
    check families," "dimensional accuracy," or a "CrochetParade" pattern repository - CrochetPARADE is
    a DSL renderer/analyzer/debugger (crochetparade.org), and the pattern source is Yarnspirations (not
    "YarnInspirations.com").'
  locator: card/limitations
- text: Project-level DSL evaluation uses a small sample (100 items) with low absolute validity rates;
    authors caution against fine-grained statistical comparisons.
  locator: card/limitations
- text: Compilation-based acceptance cannot assess visual fidelity unless paired with image-render verification;
    Task C metrics rely on string overlap and may underestimate semantically correct outputs.
  locator: card/limitations
