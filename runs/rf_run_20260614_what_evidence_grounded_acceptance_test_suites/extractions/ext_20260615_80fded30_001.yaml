extracted_facts:
- evidence_id: ev_001
  text: CrochetBench reframes crochet evaluation from describing to doing, requiring models to recognize
    stitches, select structurally appropriate instructions, and generate compilable procedures rather
    than mere descriptions.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The benchmark centers evaluation on instructional fidelity, asking whether models can output step-wise,
    compilable instructions that respect symbolic, numerical, and topological structure.
  locator: Section 1 Introduction (para 4)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CrochetBench defines a four-task ladder (Tasks A-D) progressing from stitch recognition to comprehension,
    generation, and executable instruction-to-DSL synthesis, forming an acceptance-style evaluation hierarchy.
  locator: Section 3 Benchmark Tasks (Table 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Acceptance for DSL outputs is measured by Compilation Success Rate (CSR) via the CrochetPARADE
    validator, directly testing whether generated programs are executable rather than surface-similar.
  locator: Section 3.4.1 Evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Beyond pass/fail compilation, CrochetBench runs a fine-grained error analysis over four failure
    categories: syntax structure, stitch definition, labeling/reference, and structural/formatting errors.'
  locator: Section 3.4.1 Evaluation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The CrochetPARADE validator checks for syntactic and consistency errors such as mismatched stitch
    counts and impossible attachments, and flags over- or under-stretched stitches - directly reusable
    as acceptance checks.
  locator: Appendix D CrochetPARADE - Validation and debugging
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Reference patterns are sourced from the Yarnspirations repository (6,085 patterns across 55 project
    categories, 98.77% with product images), normalized into machine-readable JSON via a GPT-4o-mini pipeline.
  locator: Section 2 Dataset Description (Table 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Empirically, performance decays sharply when evaluation moves from surface-level fidelity (BLEU,
    ROUGE) to structural validity (compilation), motivating execution-grounded acceptance metrics over
    string-overlap scoring.
  locator: Section 4 Discussion (para 6)
  confidence: medium
  quote_available: true
  notes: ''
