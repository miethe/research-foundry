extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE uses a custom formal grammar that parses and checks any user-provided pattern for
    correctness before building a virtual 3D model, explicitly to avoid the ambiguities of plain-English
    instructions.
  locator: Introduction > OVERVIEW
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Stitches are validated against the previous row/round by attaching one-by-one to consecutive previous
    stitches, with turn accounting handled automatically.
  locator: Specifying attachment points
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The @ attachment operator supports explicit coordinates (@[2,10]), stitch-type counting (@[sc:-1,3]),
    relative positions referencing the last attachment (@[@+1]), and named stitch labels.
  locator: Specifying attachment points > Direct Attachment / stitch-type counting / Relative Position
    / Labels
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: After rendering, the platform identifies overly loose or tight stitches so users can swap them
    before crocheting, reducing the need for blocking — a gauge/tension acceptance signal.
  locator: Introduction > OVERVIEW (debug paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Export produces a 2D SVG that shows stitch connections and identifies each stitch by type, row
    number, and position within a row, plus 3D files importable into Blender.
  locator: Introduction > OVERVIEW (export paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'All computation runs locally with no central server, but performance scales poorly: patterns
    of tens of thousands of stitches can take minutes or more to calculate.'
  locator: Introduction > OVERVIEW (performance paragraph)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The platform and its computational components are free/open-source under GPLv3 with a Graphviz
    exception; the manual (including the grammar description) is licensed CC BY-NC-SA 4.0.
  locator: License and Copyright
  confidence: medium
  quote_available: true
  notes: ''
