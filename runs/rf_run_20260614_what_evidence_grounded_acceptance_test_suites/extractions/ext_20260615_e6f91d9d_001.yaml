extracted_facts:
- evidence_id: ev_001
  text: The paper 'Amigurumi Crochet Patterns from Geodesic Distances' is authored by Mirela Ben Chen
    and Michal Edelstein of the Technion Computer Science Department, in the Bridges 2024 Conference Proceedings
    (pp. 369-372).
  locator: Header / author block, p.369
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The core method computes geodesic distance on the input surface from a given seed point, then
    non-uniformly samples the equidistant curves guided by surface curvature to generate an amigurumi
    crochet pattern.
  locator: Abstract, p.369
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because amigurumi are crocheted in the round with constant-height single-crochet rows, each stitch
    in a row is equidistant to the starting point, making geodesic distance the natural model for crochet
    rows.
  locator: Section 'Why Geodesic Distances for Crochet?', p.370
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Given a seed point and stitch height, the algorithm computes geodesic distances of all model points
    from the seed and creates curves equidistant to the seed, spaced by the stitch height; these equidistant
    curves represent the pattern's rows.
  locator: Section 'Rows, stitches and connecting the dots', p.370
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: When the topology of the equidistant curves requires more than one cut (e.g., a model with two
    legs), the method partitions the model into separately crochetable parts and adds assembly instructions
    for connecting them with no sewing required.
  locator: Section 'Segmentation and visualization', p.371
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Not every closed 3D model is realizable as a stuffed crocheted object: regions with ''craters''
    (negative mean and positive Gaussian curvature) are not realizable and are removed by a pre-processing
    ''inflation'' step, while ''saddle-like'' regions are handled by adapting the row sampling to use
    fewer stitches.'
  locator: Section 'Curvature based inflating, sampling and creasing', p.371
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: 'This Bridges paper is an accessible overview of the authors'' prior publication ''AmiGo: Computational
    Design of Amigurumi Crochet Patterns'' (Edelstein, Peleg, Itzhaki, Ben-Chen) presented at the Symposium
    on Computational Fabrication.'
  locator: References, p.372
  confidence: medium
  quote_available: true
  notes: ''
