contradictions_or_cautions:
- text: Evaluation is a small (n=6) qualitative think-aloud user study with professional designers, not
    a quantitative benchmark; findings are about expressiveness and disambiguation, not measured accuracy
    or speed. The language and editor are described as a prototype/foundation ("Toward"), with some generation
    features (e.g., repetitions across layers, absolute insertion-point references) not yet supported.
  locator: card/limitations
