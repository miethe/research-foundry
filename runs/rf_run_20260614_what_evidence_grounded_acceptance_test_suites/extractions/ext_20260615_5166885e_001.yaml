extracted_facts:
- evidence_id: ev_001
  text: AmiGo's inputs are exactly a closed manifold triangle mesh M, a single user seed vertex s, and
    a stitch width w, and it generates instructions using only single crochet (sc), inc(x), and dec(x).
  locator: 'Section: Algorithm / Crochet Graph (mesh inputs and stitch alphabet)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'The formal crochetability acceptance criterion is the coupling theorem: if all pairs of consecutive
    rows of the crochet graph G are coupled, then valid instructions P(G) exist using only sc, inc(x),
    dec(x).'
  locator: 'Section: Observations (Observation 2.3 — coupling theorem)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Rows are isolines of the geodesic distance function f(v)=d(v,s) from the seed, so two points lie
    on the same row iff f(p)=f(q).
  locator: 'Section 4.1: Row order f (geodesic isolines)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A finite-state transducer emits dec(x) when x>1 vertices on the current row connect to one head
    vertex on the next row, inc(x) for the reverse, and sc for a 1:1 coupling.
  locator: 'Section 5.1: Graph to instructions (finite-state transducer rule)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A single-piece graph requires f to have no saddles; when isolines are multiply-connected the model
    is auto-decomposed into segments sliced along saddle isolines (ordered by increasing geodesic distance),
    with crocheting order set by a topological sort of a segment DAG Gsigma.
  locator: 'Section: Branching + Section 7.2.1 (saddles, segment decomposition, segment DAG)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Adjacent segments are connected by the join-as-you-go method (no sewing), and the crocheting order
    of segments is determined by a topological sort of the directed segment graph Gsigma ordered by increasing
    f.
  locator: 'Section 7.2: Branching (join-as-you-go) + Section 7.2.1 (segment DAG ordering)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Short rows are deliberately avoided because they are uncommon in crochet, keeping patterns appealing
    to beginner crocheters.
  locator: 'Section: Related work (beginner-friendliness; short rows avoided)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Reported example patterns range from ~586 stitches (Pretzel, 30 rows) to 3670 stitches (Teddy,
    60 rows), with row counts spanning roughly 30 to 60.
  locator: 'Table 2: Statistics for the crocheted models'
  confidence: medium
  quote_available: true
  notes: ''
