extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE deterministically parses and correctness-checks any user-provided pattern, then
    builds and 3D-renders a virtual model that reproduces the pattern exactly as the author intended.
  locator: README — overview / pattern sharing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Shared CrochetPARADE pattern text renders into a model of the pattern exactly as intended by the
    pattern author, free from ambiguities or typographic mistakes.
  locator: README — pattern sharing
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: All calculation runs locally on-device with no server transmission; as a side effect the platform
    can be sluggish on old hardware, and models of patterns with (tens of) thousands of stitches can take
    minutes or more to calculate.
  locator: README — privacy / performance
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Interactive features include rotate/zoom/pan of the 3D view, animating the pattern-creation process,
    highlighting and hiding selected stitches, changing yarn thickness and color, and hover-to-read stitch
    information.
  locator: README — interactive features
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Exports include an auto-generated standard-symbol crochet chart, an SVG that shows stitch connections
    and identifies stitches by type/row number/position-in-row, and 3D files importable into Blender.
  locator: README — export feature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The website and all of its computational components are free and open source under the GPLv3 license,
    a copyleft constraint for reuse in a closed-source product.
  locator: README — license
  confidence: medium
  quote_available: true
  notes: ''
