extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE defines stitches and stitch patterns via a custom language grammar designed to remove
    the ambiguity of plain-English crochet instructions.
  locator: About > OVERVIEW (para 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The tool parses and validates any user-provided pattern for correctness before building and rendering
    a 3D virtual model.
  locator: About > OVERVIEW (para 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CrochetPARADE flags overly loose or tight stitches so users can replace them before crocheting,
    reducing the need for blocking.
  locator: About > OVERVIEW (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Interactive 3D features include rotate/zoom/pan, animating the pattern-creation process, highlighting/hiding
    selected stitches, and changing yarn thickness and color.
  locator: About > OVERVIEW (para 4, interactive features)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Projects can be exported to 3D files importable into Blender for further manipulation and visualization.
  locator: About > OVERVIEW (para 3, export)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: CrochetPARADE was authored by Svetlin Tassev (2023) and its website and computational components
    are free and open source under the GPLv3 license.
  locator: License and Copyright (bullet 1) and Author
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: All calculations run locally on the user's device with no data sent to a central server, at the
    cost of slow performance on old hardware and large patterns.
  locator: About > OVERVIEW (para 5, local compute)
  confidence: medium
  quote_available: true
  notes: ''
