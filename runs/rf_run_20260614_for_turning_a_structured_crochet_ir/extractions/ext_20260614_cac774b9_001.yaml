- text: Yarn-relaxation/simulation step is ad-hoc and produces fidelity artifacts.
  locator: card/trust
- text: 'Scope: only a subset of crochet stitches (chain, slip, single crochet, sc2tog, sc3tog) plus utility
    faces (inc, turn, cap, ch_edge) were modeled; double/treble crochet, post stitches, and many variations
    are unmodeled. The yarn-relaxation/simulation step is explicitly described as ad-hoc and produces
    shape-instability and fidelity artifacts; automatic pattern generation relies on a single stitch aspect
    ratio. 2020 work; no quantitative accuracy metrics reported.'
