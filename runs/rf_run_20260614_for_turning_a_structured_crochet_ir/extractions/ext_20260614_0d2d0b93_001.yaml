extracted_facts:
- evidence_id: ev_001
  text: Curvy reconstructs a shape point cloud from planar sparse cross-sections using generative modeling
    and a Graph Neural Network, designed to reduce dependence on the number of cross-sections supplied.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each cross-section piece is encoded as a tensor in R^6x3 holding the coefficients of a degree-5
    parametric polynomial f_j(t) in R^3.
  locator: Section 3.2 (cross-section representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Cross-sections are split adaptively via iterated Douglas-Peucker, retaining the k points with
    maximum absolute angle so high-curvature regions get denser sampling.
  locator: Section 3.1 (adaptive splitting)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The representation is permutation-invariant: any reordering of cross-sections, and any circular
    permutation of a cross-section''s pieces, denotes the same input.'
  locator: Section 3.2.1 (permutation invariance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Models are trained on ShapeNet manifold meshes, from which surface point clouds are sampled to
    serve as the network's ground truth.
  locator: Section 3.2 (data / training)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'The method is a three-step pipeline: generate cross-sections from 3D models, train a point-cloud
    autoencoder, then train a GNN in a GAN setting to match the autoencoder''s encoded vector and decode
    to points.'
  locator: Section 3 (overview) / pipeline
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The authors position learned contour reconstruction against classical methods, which they say
    lack object-class generalization and rely on complex mathematical machinery.
  locator: Abstract / Introduction (motivation vs classical methods)
  confidence: medium
  quote_available: true
  notes: ''
