extracted_facts:
- evidence_id: ev_001
  text: The 'Procedural Geometry via Pattern IR' family parses a formal pattern (DSL/IR) into a stitch
    graph and then deterministically computes 3D coordinates for each stitch based on stitch types and
    connections, building the object row by row.
  locator: Taxonomy & Approach Families > Pattern -> 3D Visualization Approaches > Procedural Geometry
    via Pattern IR
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Because the model retains pattern structure, procedural-IR rendering guarantees fidelity to every
    increase/decrease and makes it easy to highlight specific rows or stitches.
  locator: Taxonomy & Approach Families > Procedural Geometry via Pattern IR (Enables / Failure modes)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Without physics, geometry can distort under extreme curvature, but CrochetPARADE mitigates this
    by flagging overly loose or tight stitches.
  locator: Taxonomy & Approach Families > Procedural Geometry via Pattern IR (Failure modes)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: CrochetPARADE is open-source (GPL v3) with all computation client-side, its grammar is public
    domain, and it exports standard crochet charts (SVG) and 3D models (GLTF).
  locator: Annotated Bibliography > Svetlin Tassev - CrochetPARADE
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: CrochetPARADE is not optimized for mobile and heavy patterns of thousands of stitches can take
    minutes to compute, a key mobile-feasibility caveat.
  locator: Annotated Bibliography > Svetlin Tassev - CrochetPARADE (Limitations)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: AmiGo's pipeline segments the input mesh into crochetable components, orders them and chooses
    a seed start point, then constructs a Crochet Graph that is translated into human-readable instructions,
    placing increases at positive curvature and decreases at negative curvature.
  locator: Annotated Bibliography > Michal Edelstein et al. - AmiGo
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Greer & Mould convert pattern instructions into a stitch graph and use a force-directed spring
    layout to position stitches in 3D, treating yarn like connecting springs to approximate the shape
    without full yarn physics (a simulation-lite alternative).
  locator: Annotated Bibliography > Emile Greer & David Mould - Force-directed Graph Layout
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: AmiGo assumes a smooth, genus-0 closed mesh and notes 'curvature obstructions to crochetability'
    where extremely sharp features cannot be captured with continuous stitching.
  locator: Annotated Bibliography > Michal Edelstein et al. - AmiGo (Limitations)
  confidence: medium
  quote_available: true
  notes: ''
