contradictions_or_cautions:
- text: The 3D force-directed layout is a heuristic approximation, not a physically accurate yarn/stitch
    simulation; the authors note a more exact model would require modeling physical yarn and stitch properties.
  locator: card/limitations
- text: Evaluation is a small qualitative study (six professional designers, think-aloud), not a quantitative
    accuracy benchmark.
  locator: card/limitations
- text: The ACM DL landing page is gated (HTTP 403); verbatim facts here were extracted from the authors'
    open preprint PDF of the identical paper and corroborate the project B1 seed report.
  locator: card/limitations
