extracted_facts:
- evidence_id: ev_001
  text: 'CrochetPARADE placement is not closed-form: it uses iterative force-directed relaxation whose
    learning_rate (default 0.1) will fail to converge if set too high, and runs a default of 500 iterations.'
  locator: DOT Command (physics-based placement parameters)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Pressing 's' colors stitches blue when too loose and red when too stretched by more than about
    15% relative to their baseline height, providing per-stitch tension/fidelity feedback.
  locator: Keyboard shortcuts (3D view) — 's'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Under default settings the placement engine only converges to within ~10% of the requested stitch
    lengths, so it does not reproduce requested lengths exactly.
  locator: Limitations, pitfalls and workarounds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Attachment direction is governed by even/odd turn counting: an even count attaches the next stitch
    in the direction the prior row was crocheted, while an odd count attaches to the previous stitch (reverse
    order).'
  locator: Direction of sequential stitch attachment (turn directives)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'The grammar encodes increases and decreases compactly: sc2inc means two single-crochet stitches
    into the same stitch, while sc2tog is a decrease combining two single-crochet stitches.'
  locator: Stitch grammar — increases/decreases
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Row and stitch indices are zero-based, which matters for any external tool consuming or generating
    CrochetPARADE coordinates.
  locator: The 3D visualization canvas (hover info / counting)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: CrochetPARADE runs entirely client-side with no server data collection, and large patterns of
    tens of thousands of stitches can take minutes or more to compute and may be sluggish on old hardware.
  locator: Computation and export (client-side execution)
  confidence: medium
  quote_available: true
  notes: ''
