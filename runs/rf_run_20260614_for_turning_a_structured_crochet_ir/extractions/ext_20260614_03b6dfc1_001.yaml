extracted_facts:
- evidence_id: ev_001
  text: The pattern input grammar is one row per line, the first line must be 'mc' (magic circle), valid
    stitches are 'sc', 'inc', and 'dec', and 'fo' at the end represents sewing the final row closed.
  locator: README, 'Testing patterns' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The grammar supports stitch multipliers (a number before a stitch) and bracket repetition (a number
    before [...]), e.g. '3[2sc,inc]' repeats '2 single crochet stitches followed by an increase' three
    times.
  locator: README, 'Testing patterns' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The project is C++ (about 98% of the codebase), built with CMake >= 3.15, and depends on Eigen3
    and Ceres Solver (with SuiteSparse required for Ceres Solver to work properly).
  locator: README, 'Installation' section + GitHub language stats
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The tool embeds the stitch graph in 3D using the 'Connectivity Shapes' force-directed graph layout.
  locator: Repository description (GitHub repo header)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The author states the graph layout does not work well for small patterns and is quite slow for
    larger patterns — a direct feasibility caveat for real-time or mobile use.
  locator: README, 'Limitations' section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The tool does not support joining patterns (a standard amigurumi technique for attaching limbs),
    bounding which amigurumi it can model.
  locator: README, 'Limitations' section
  confidence: medium
  quote_available: true
  notes: ''
