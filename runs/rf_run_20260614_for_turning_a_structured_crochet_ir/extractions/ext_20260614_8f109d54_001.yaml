extracted_facts:
- evidence_id: ev_001
  text: AmiGo generates crochet patterns from a closed triangle mesh plus a single user-specified seed
    point, producing instructions that when knitted and stuffed yield a toy resembling the input geometry.
  locator: Section 1.1 / Introduction (high-level approach)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The method builds a Crochet Graph G=(S, R u C) whose vertices S are the tops/bases of stitches,
    separating row edges (R) from column edges (C) as the structured intermediate representation.
  locator: Section 2.2. The Crochet Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The stitch vocabulary is limited to single crochet (sc) as an approximately square stitch, with
    increase inc(x) and decrease dec(x) stitches that locally add or remove x stitches to accommodate
    curvature.
  locator: Section 2.2 (single crochet stitch vocabulary)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The generated instructions are crochetable, use only simple crochet stitches, and follow the join-as-you-go
    method so the resulting pattern requires no sewing.
  locator: Section 1.2. Contribution
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rows (rounds) are defined as isolines of a geodesic distance field f(v)=d(v,s) measured from the
    seed vertex s, so stitch placement follows level-sets of geodesic distance.
  locator: Section 4.1. Geometry - Row order f
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Twist/orientation is solved by a column-ordering function g obtained from an optimization whose
    objective minimizes the integral of |<J grad f, grad g> - 1|^2, aligning column progression with the
    isoline tangent field.
  locator: Section 4.1. Geometry - Column order g
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Consecutive rows must satisfy a coupling relation (Definition 2.2) that constrains how stitch
    correspondences change between rows; a minimal coupling between each pair of consecutive rows is computed
    via Dynamic Time Warping (DTW).
  locator: Section 4.2. Connectivity - Column edges C (Definition 2.2 coupling)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'Curvature obstructs direct crochetability: crater regions are preprocessed with localized Conformal
    Mean Curvature Flow until mean curvature is positive, and negative-Gaussian-curvature regions are
    handled by curvature-adaptive sampling that sets the inner product of grad g and J grad f to a function
    of curvature.'
  locator: Section 2.3 / Section 7.1 Curvature (crochetability obstructions)
  confidence: medium
  quote_available: true
  notes: ''
