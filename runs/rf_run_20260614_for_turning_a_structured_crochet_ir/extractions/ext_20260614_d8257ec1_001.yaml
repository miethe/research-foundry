contradictions_or_cautions:
- text: Tested only on beginner-level, stuffed, single-crochet-like amigurumi patterns; no 2D/flat or
    advanced patterns.
  locator: card/trust
- text: Quantitative results limited to a small set of example objects (apple, bunny pieces, raindrop,
    elephant).
  locator: card/trust
- text: 'Scope: validated only on a small set of beginner-level, stuffed, single-crochet-like amigurumi
    objects; flat/2D row pieces and intermediate/advanced patterns were explicitly excluded.'
  locator: card/limitations
- text: Performance figures ("under 5 seconds", "well over two minutes", "30 seconds or more") are reported
    qualitatively for specific example objects, not as systematic benchmarks; exact hardware is not captured
    in this card.
  locator: card/limitations
- text: An upfront global solve on a pre-written pattern carries an "unavoidable" run-time cost; the near-instant
    feedback claim applies to the incremental edit workflow, not the cold global solve.
  locator: card/limitations
