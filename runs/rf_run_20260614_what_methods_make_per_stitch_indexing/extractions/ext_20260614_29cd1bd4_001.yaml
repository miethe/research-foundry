extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE indexes each stitch as (row, per-row stitch | global stitch number), e.g. (4,23|410),
    with both row and stitch counters starting from 0.
  locator: Stitch indexing notation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The global stitch counter counts non-stitches such as 'sk' but excludes internal stitches like
    those inside bobbles or popcorns.
  locator: Stitch indexing notation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Stitches on a row are automatically attached one-by-one to consecutive stitches in the previous
    row/round, and turning at row end is accounted for automatically.
  locator: Traversal-to-geometry / sequential attachment
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: When attaching to a base row A, an even stitch index attaches to the next stitch of A in A's crochet
    direction, while an odd index attaches to the previous stitch on A.
  locator: Even/odd attachment-direction rule
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Stitches over- or under-stretched by more than ~15% relative to baseline height are flagged (blue=too
    loose, red=too stretched), and the engine converges to within ~10% of requested stitch lengths under
    default settings.
  locator: Tension/drift detection and physics convergence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'If the model looks inside-out or follows left-hand directions, the user changes the random start
    seed via ''DOT: start=2'' (or other values) because inside/outside is picked at random.'
  locator: Inside-out / left-handed mirroring
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The DSL uses sc2inc for two single crochets worked into one stitch and sc2tog for a decrease combining
    two; each new line is a new row/round.
  locator: DSL increase/decrease syntax and controls
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: Row/stitch highlighting is done via ctrl+f (entering a row number or row,stitch pair), and stitches
    can be revealed one by one via the 'a' control.
  locator: Navigation controls
  confidence: medium
  quote_available: true
  notes: ''
