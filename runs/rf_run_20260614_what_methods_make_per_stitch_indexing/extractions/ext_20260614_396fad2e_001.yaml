extracted_facts:
- evidence_id: ev_001
  text: The paper proposes a first visual, domain-specific, graph-based language for representing crochet
    patterns.
  locator: Abstract (p.48)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A prototype editor lets designers create patterns in 2D and view them in 3D; a user study showed
    the language expresses both 2D and 3D patterns and removes ambiguities of current notations.
  locator: Abstract (p.48)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Stitch connectivity carries the semantics: the increase method is encoded as multiple incoming
    insert edges and the decrease method as multiple outgoing insert edges.'
  locator: Section 3.1, Figure 5 caption (p.52)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Graph nodes are insertion points rather than stitches directly, decoupling stitch/loop identity
    from a positional stitch sequence.
  locator: Section 3.1, Insertion Points and Transitions (p.52)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The editor requires patterns to be built linearly in the order they would be crocheted, so node
    creation order equals the canonical work/traversal order.
  locator: Section 3.4, Domain-Specific Tool Support (p.55)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: In a think-aloud study with six professional crochet designers, all but one reproduced the test
    pattern in the 2D editor, and four said reproducing it surfaced previously hidden ambiguities.
  locator: Section 4.1 Procedure / 4.3 Task 2 (pp.56-57)
  confidence: medium
  quote_available: true
  notes: ''
