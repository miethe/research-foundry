extracted_facts:
- evidence_id: ev_001
  text: The model represents a crochet pattern as a graph in which stitch insertion points are nodes and
    the connections between stitches are edges, so traversing the graph follows the yarn path through
    every stitch.
  locator: Section 3.3.1.1 Differentiating between Stitch Types (p.33)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: 'Edges are typed: a ''previous'' edge encodes stitch order while an ''insert'' edge encodes the
    worked-into relationship from the current stitch to the insertion point it was crocheted into.'
  locator: Section 3.3.1.1 Differentiating between Stitch Types (p.33)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Increases and decreases are modeled by edge multiplicity: a node with multiple out-going insert
    edges is an increasing stitch, and a node receiving multiple incoming insert edges is the one being
    increased (decrease being the inverse).'
  locator: Section 3.3.2.5 Increasing and Decreasing Stitches (p.38)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Rows and rounds are unified into a single concept called 'layers,' requiring no structural change
    in the graph, and the layer number is stored as a property on each node.
  locator: Section 3.3.2.2 Working in Layers (p.36)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Crochetability is enforced structurally: a slip-stitch / ''previous'' edge can only point at
    a node that already existed when the connection was made, and the prototype UI only permits valid
    stitch connections so every pattern produced is always crochetable.'
  locator: Section 3.3.1.1 (p.33) and Sections 1.6 / 3.4.3 (p.6, p.37)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'The prototype lays out and positions stitch nodes in 3D using a force-directed graph layout:
    the ''3D Force-Directed Graph'' library built on Three.js and WebGL with a D3 variant as physics engine,
    applying Dwyer''s force layout algorithm.'
  locator: Section 4.1 library choice (p.44)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Each node carries explicit addressing/traversal properties — its layer integer, a 'start' boolean
    marking the first node of its layer, plus previous/next references and an array of nodes it inserts
    into — giving a layer-plus-position identity per stitch.
  locator: Section 4.2.1 Properties of Nodes (p.45)
  confidence: medium
  quote_available: true
  notes: ''
