- evidence_id: ev_002
  text: The augmented stitch mesh data structure stores low-level knitting operations per-face and encodes
    the dependencies between faces using directed edge labels.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The system generates knittable augmented stitch meshes from 3D models, supports edits that preserve
    knittability, and schedules the execution order and location of each face for production on a knitting
    machine.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Each face is a fragment of a knitting program that operates on the yarns and loops from its in
    edges to produce the yarns and loops indicated by its out edges.
  locator: Section 'Face Programs' (Augmented Stitch Mesh representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The directed edge labels provide a type signature -- the input and output loop and yarn counts
    -- for each knitting program fragment.
  locator: Section 'Face Programs' (Augmented Stitch Mesh representation)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The directed edge labels induce a directed graph on the faces, which is used to check for dependency
    cycles; an in edge may connect only to an out edge of the same type.
  locator: Section 'Directed Edges' (Augmented Stitch Mesh representation)
  confidence: medium
  quote_available: true
  notes: ''
