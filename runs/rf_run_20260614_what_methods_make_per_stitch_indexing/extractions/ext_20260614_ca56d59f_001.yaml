- evidence_id: ev_001
  text: 'The paper proposes three distinct graph models for any arbitrary knit object: a simple undirected
    graph, a simple directed graph, and a directed multigraph, each carrying a knot-theoretic component.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: From these models the authors derive natural categories tied to the complexity of knitting structures,
    providing a basis for bounding which structural classes are tractable to reason about.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Determining whether a knit object of a given class exists for a given graph is NP-hard in general,
    but specific cases admit linear- and polynomial-time algorithms by exploiting properties of common
    knitting techniques.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The framework is explicitly designed both to analyze existing knitting objects from their graphs
    and to generate knitting objects from graphs, establishing a rigorous bidirectional mapping between
    graph structure and knit structure.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
