extracted_facts:
- evidence_id: ev_001
  text: The method translates a written crochet pattern into a graph and obtains a force-directed graph
    layout, producing a 3D model that matches the hand-crocheted pattern in shape and size without physically
    crocheting.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Each stitch becomes a node and physical connections between stitches become edges, with horizontal
    edges marking stitches made one immediately after the other and vertical edges marking the stitch
    worked into the one below.
  locator: Section 4 (graph construction), para. 'Each stitch is represented as a node'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The layout follows Isenburg et al.'s force-directed algorithm, which inflates a planar graph by
    assigning each edge a length and minimizing overall curvature to maximize volume - analogous to stuffing
    a crocheted shell.
  locator: Section 4.2 The graph layout
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The layout is a non-linear least-squares optimization minimizing two energy functions - one controlling
    edge lengths (each edge assumed length one) and one measuring local curvature at each node (assumed
    minimal).
  locator: Section 4.2 The graph layout, energy functions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: On simple beginner-level patterns the models were accurate in shape and size to their real-world
    counterparts, though similar rather than identical, with some differences attributed to the uniform
    edge-length-of-1 assumption.
  locator: Section 5.1 Modeling complete patterns / Section 6 Conclusion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Shaping effects such as pulling tight to create a dimpling effect are modeled with additional
    constraint edges, recreating a pulling-in effect by linking the first and last node, paralleling how
    a crocheter pulls the yarn until satisfied with the shape.
  locator: Section 5.1, apple / constraint-edge passage
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The application is oriented toward amigurumi - dense uniform stitches worked in continuous rounds
    to make stuffed 3D figures - but the authors state it could be extended to clothing or other crochet
    styles.
  locator: Abstract / Section 3 Background
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'Force-directed layouts are slow: simple pieces (legs 318 stitches, arms 264 stitches) converged
    in under 5 seconds, while larger pieces (bunny head 798 stitches, body 708 stitches) did not converge
    even after running for over two minutes.'
  locator: Section 5.3 Performance
  confidence: medium
  quote_available: true
  notes: ''
