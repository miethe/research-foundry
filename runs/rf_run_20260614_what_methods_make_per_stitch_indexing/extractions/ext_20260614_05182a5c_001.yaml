contradictions_or_cautions:
- text: Tested only on simple beginner-level amigurumi patterns and single-crochet-like stitches
  locator: card/trust
- text: Assumes uniform edge length of 1, not accurate for real stitch dimensions
  locator: card/trust
- text: Tested only on simple, beginner-level amigurumi patterns and single-crochet-like stitches; explicitly
    too narrow for intermediate/advanced patterns.
  locator: card/limitations
- text: Assumes uniform edge length of 1, which does not capture real stitch dimensions (yarn tension,
    hook size, weight, stitch type), causing height/shape discrepancies.
  locator: card/limitations
- text: Force-directed layout is computationally expensive and may not converge on large patterns; flattened
    (non-stuffed) pieces are out of scope since the energy function maximizes volume.
  locator: card/limitations
