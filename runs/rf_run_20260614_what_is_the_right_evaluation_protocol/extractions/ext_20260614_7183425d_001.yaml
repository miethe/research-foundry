extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE provides a custom language grammar for defining stitches and stitch patterns whose
    explicit aim is to remove the ambiguities of plain-English crochet instructions.
  locator: OVERVIEW, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The tool parses a user-provided pattern, checks it for correctness, builds a virtual model, and
    renders it in 3D, so compilation itself acts as the validity gate.
  locator: OVERVIEW, para 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CrochetPARADE's analyzer/debug step identifies overly loose or tight stitches and lets users swap
    them for more suitable ones before crocheting, acting as a stitch-tension quality proxy.
  locator: OVERVIEW, para 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Export outputs include an auto-generated chart using standard crochet symbols, an SVG that labels
    each stitch by type, row number, and in-row position, and 3D files importable into Blender.
  locator: OVERVIEW, para 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The interactive 3D view supports rotate, zoom, and pan plus an animation of the pattern-creation
    process to visualize how stitches attach.
  locator: OVERVIEW, para 4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: CrochetPARADE runs fully client-side, performing all calculations locally with no data sent to
    a central server, which makes it usable as a self-hostable scoring backend.
  locator: OVERVIEW, para 5
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The website and all of its computational components are open source under GPLv3, making the validator/renderer
    freely reusable.
  locator: LICENSE AND COPYRIGHT
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The author anticipates the grammar plus renderer enabling AI to learn to write correct crochet
    instructions for complicated patterns beyond simple amigurumi.
  locator: GOALS AND POSSIBLE APPLICATIONS
  confidence: medium
  quote_available: true
  notes: ''
