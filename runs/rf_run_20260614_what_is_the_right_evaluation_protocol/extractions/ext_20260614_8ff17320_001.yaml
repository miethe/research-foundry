extracted_facts:
- evidence_id: ev_001
  text: A crochet pattern is modeled as a directed graph whose nodes are stitches/insertion points and
    whose edges encode the 'previous', 'insertion', and slip-stitch relations between them, directly representing
    fabric structure rather than a linear stitch sequence.
  locator: 3 Visual Crochet Pattern Language — Insertion Points and Transitions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The language deliberately encodes the structure of the pattern (and its inter-stitch dependencies)
    rather than a producing sequence, giving an unambiguous, machine-readable intermediate representation.
  locator: 3 Visual Crochet Pattern Language — opening of section 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Crochetability is enforced as an edge-ordering invariant: an edge whose loop uses insertion points
    created by a later edge is invalid, because a stitch cannot be worked into a loop before that loop
    exists.'
  locator: 3 Visual Crochet Pattern Language — Track of the Yarn (crochetability ordering rule)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Increases are encoded as multiple incoming insert edges and decreases as multiple outgoing insert
    edges, giving a concrete graph-structural signature for shaping operations.
  locator: Figure 5 caption (increase/decrease encoding)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Rows and rounds are unified into a single concept called 'layers', stored as a per-node layer-number
    property, so a pattern can switch between row- and round-wise crochet without structural change.
  locator: 3 Visual Crochet Pattern Language — Rows, Rounds
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: User feedback surfaced the need for per-layer complexity overviews — specifically a count of stitches
    per layer and clear layer-number marking — supporting layer as the natural unit for complexity metrics.
  locator: 4.4 Task 3 / discussion of user feedback (stitch-count per layer)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: In the user study with experienced designers, the linear editing workflow and shape/3D preview
    made previously hidden chart ambiguities apparent, supporting validator-gated, construction-time edit
    loops over free-form symbol placement.
  locator: 4 User Experience — Task 2 (2D) and Task 3 (3D) findings
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The editor can check crochetability of the resulting pattern before committing an edit (e.g.,
    inserting a sub-pattern), so stitch requirements are guaranteed by construction — a concrete validator-gated
    edit loop.
  locator: 5.2 Partial Patterns — crochetability check on construction
  confidence: medium
  quote_available: true
  notes: ''
