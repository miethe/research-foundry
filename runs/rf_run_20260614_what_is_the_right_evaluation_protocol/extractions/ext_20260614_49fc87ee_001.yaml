extracted_facts:
- evidence_id: ev_001
  text: CrochetBench evaluates the shift from describing to doing via fine-grained procedural reasoning,
    using the CrochetPARADE DSL as an intermediate representation for structural validation and execution-based
    functional evaluation.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The benchmark is built from 6,085 crochet patterns across 55 project categories scraped from Yarnspirations,
    parsed via a GPT-4o-mini conversion pipeline into JSON with over 98% image coverage.
  locator: Dataset / benchmark construction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: 'Four tasks use distinct metrics: Stitch Recognition (precision/recall/F1), Instruction Selection
    (4-way MCQ accuracy), Instruction Generation (BLEU/ROUGE-L/ChrF), and DSL Translation (Valid Pattern
    Rate = proportion of DSL steps that compile, plus DINO similarity).'
  locator: Tasks and metrics (Tasks A-D)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Performance collapses on executable tasks: even the strongest models produce only 5-8% executable
    DSL programs, exposing the gap between surface similarity and executable correctness.'
  locator: Results / executable correctness
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Best Task A stitch-recognition F1 was Claude Sonnet 4 at 60.94%, while best Task C instruction-generation
    BLEU was Gemini 2.5 Flash-Lite at only 4.93%.
  locator: Results (per-task best scores)
  confidence: medium
  quote_available: false
  notes: ''
- evidence_id: ev_006
  text: Across all tasks, performance sharply decreases as evaluation shifts from surface-level similarity
    to executable correctness, revealing limits in long-range symbolic reasoning and 3D-aware procedural
    synthesis (DINO visual similarity uniformly low at 0.10-0.17).
  locator: Abstract / discussion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Instruction length stratifies pattern complexity by skill level, with average character counts
    of Beginner ~1,674, Easy ~2,761, Intermediate ~4,221, and Experienced ~7,689 - a usable proxy for
    complexity bins.
  locator: Dataset complexity stratification
  confidence: medium
  quote_available: false
  notes: ''
