extracted_facts:
- evidence_id: ev_001
  text: 'The benchmark evaluates reconstruction geometry with three geometric metrics: volumetric intersection-over-union
    (IoU), symmetric Chamfer distance (CD), and normal consistency (NC).'
  locator: Sec. 5.5 Evaluation metrics, 'Geometric metrics.' intro
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Volumetric IoU is approximated by sampling 100,000 points in the union of the bounding boxes of
    the ground-truth and reconstructed interior volumes and taking the intersection over union of occupied
    space.
  locator: Sec. 5.5 Evaluation metrics, Volumetric IoU bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The symmetric Chamfer distance is approximated by sampling 100,000 points each on the ground-truth
    and reconstructed meshes, then averaging bidirectional nearest-neighbor (minimum) Euclidean distances
    between the two point sets.
  locator: Sec. 5.5 Evaluation metrics, Chamfer distance bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Normal consistency is estimated as the mean of scalar products between the unit normal at each
    sampled point and the unit normal at its nearest-neighbor point on the other mesh, averaged bidirectionally.
  locator: Sec. 5.5 Evaluation metrics, Normal consistency bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Beyond geometric accuracy the benchmark reports topologic quality indices: number of components,
    number of boundary edges (edges in only one facet), and number of non-manifold edges, since target
    surfaces are single-component, closed, and manifold.'
  locator: Sec. 5.5 Evaluation metrics, 'Topologic metrics.' bullets
  confidence: medium
  quote_available: true
  notes: ''
