contradictions_or_cautions:
- text: Evaluation is qualitative only; no quantitative shape-distance metric reported.
  locator: card/trust
- text: Method handles only closed surfaces (must be stuffable); segmentation can produce hard-to-crochet
    thin segments; single-seed setup gives limited design freedom and does not account for model symmetry,
    so low-resolution patterns may be non-symmetric. Evaluation is qualitative only -- no quantitative
    shape-distance scoring is provided, which is an open gap for an evaluation protocol to add.
  locator: card/limitations
