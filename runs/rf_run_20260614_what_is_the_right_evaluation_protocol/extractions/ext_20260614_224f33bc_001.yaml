extracted_facts:
- evidence_id: ev_001
  text: The input is a closed manifold triangle mesh plus a single user-specified seed vertex and a user-selected
    stitch width; seed placement is an interactive control with no automatic selection provided.
  locator: Sec 2.1 Background and Notations / Sec 1 Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Success is judged only qualitatively, with the paper stating the result will be 'similar' to the
    input mesh and reporting no Hausdorff/Chamfer/volume distance metric.
  locator: Sec 2.2 The Crochet Graph (Observation 2.6)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The shape is auto-segmented at the saddle points of a geodesic distance function from the seed,
    and isolines of that geodesic distance become the crochet rows.
  locator: Sec 4.1 Geometry (Row order f) / Sec 7.2.1 Mesh to Graph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Segments are joined with the 'join-as-you-go' method, where each segment is crocheted onto the
    last row of the previous one, requiring no sewing and leaving seams invisible.
  locator: Sec 7.2 Branching
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The stitch vocabulary is single crochet (sc) plus increase inc(x) and decrease dec(x) stitches
    whose x counts are derived from row-to-row vertex coupling/degree, with no explicit per-round bound
    on increases or decreases stated.
  locator: Sec 2.1 Background and Notations / Sec 5.1 Graph to Program
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 'Reported complexity: the Teddy hi-res model is 60 rows / 6 segments / 3,670 stitches in 2.5 min
    and Moomoo is 60 rows / 8 segments / 2,491 stitches in 6.9 min, with all runtimes between 0.2 and
    6.9 min on an Intel Core i7 desktop.'
  locator: Sec 9.1 Implementation Details, Table 2 (Statistics for the crocheted models)
  confidence: medium
  quote_available: true
  notes: ''
