extracted_facts:
- evidence_id: ev_001
  text: 'The benchmark evaluates reconstructed surfaces against ground truth using three geometric metrics:
    volumetric IoU, symmetric Chamfer distance (CD), and normal consistency (NC).'
  locator: Sec. 5.5 Evaluation metrics - 'Geometric metrics' paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Symmetric Chamfer distance is computed by sampling equal-size point sets on the facets of both
    the ground-truth mesh and the reconstructed mesh, with each set fixed at 100,000 points.
  locator: Sec. 5.5 - Chamfer distance bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The symmetric Chamfer distance averages, in both directions, the squared nearest-neighbor distance
    from each sampled point on one mesh to the closest point on the other mesh.
  locator: Sec. 5.5 - Chamfer distance equation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Volumetric IoU is approximated by sampling 100,000 points in the union of the bounding boxes of
    the ground-truth and reconstructed volumes and computing the inside-intersection over inside-union
    ratio.
  locator: Sec. 5.5 - Volumetric IoU bullet
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The stated evaluation goal is for the reconstructed surface to be as close as possible to the
    ground-truth surface in both geometry and topology, motivating the multi-metric protocol.
  locator: Sec. 5.5 - opening paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: All benchmark surfaces are single-component, closed, and manifold, which lets the benchmark add
    topology indices (number of components, boundary edges, non-manifold edges) on top of the geometric
    metrics.
  locator: Sec. 5.5 - 'Topologic metrics' paragraph
  confidence: medium
  quote_available: true
  notes: ''
