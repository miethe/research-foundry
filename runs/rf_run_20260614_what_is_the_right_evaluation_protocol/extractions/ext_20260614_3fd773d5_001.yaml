extracted_facts:
- evidence_id: ev_001
  text: NCD adds a normal-steered weighting to Chamfer Distance based on the angle between each mesh-sampled
    point's normal and the vector to its corresponding input point.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: NCD uses readily available mesh-sampled point normals to weight coordinate-based Euclidean distances,
    extending Chamfer Distance without requiring input-cloud normals.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Normal estimation on unoriented input point clouds is computationally intensive (matrix decomposition
    or pre-trained models), whereas mesh-sampled normals come cheaply from the cross product of mesh vertices.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: NCD incurs only a negligible increase in computational complexity compared with plain Chamfer
    Distance, keeping it viable for efficiency-sensitive training/evaluation loops.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Used as the training loss across multiple point-to-mesh reconstruction models and initial watertight
    meshes on benchmark datasets, NCD outperforms state-of-the-art Chamfer Distance variants.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Plain Chamfer Distance can add a normal-consistency term to improve reconstruction fidelity, but
    only at the cost of efficiency, which is the trade-off NCD is designed to avoid.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
