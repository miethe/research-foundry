extracted_facts:
- evidence_id: ev_001
  text: The method computes geodesic distance on the surface from a seed point, then samples the equidistant
    curves non-uniformly, guided by surface curvature, framing amigurumi shaping as a geodesic-distance
    problem.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The mean curvature of the surface at crease lines determines which stitch types are used, so the
    pattern better adheres to the input shape.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Because amigurumi are crocheted in the round at constant row height, each stitch in a row is equidistant
    from the start point, making geodesic distance the natural model for crochet rows.
  locator: 'Section: Why Geodesic Distances for Crochet?'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: In saddle-like regions (negative Gaussian and mean curvature) the algorithm adapts row sampling
    to use fewer stitches, directly supporting curvature-bounded stitch-density / inc-dec thresholds.
  locator: 'Section: Curvature based inflating, sampling and creasing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Creases are reproduced via BLO/FLO stitches applied automatically in areas of high maximal absolute
    curvature whose curvature direction is orthogonal to the crocheting direction.
  locator: 'Section: Curvature based inflating, sampling and creasing'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The paper explicitly identifies AmiGo (Edelstein, Peleg, Itzhaki, Ben-Chen; Symposium on Computational
    Fabrication, Seattle, Oct 2022) as the fuller treatment and lineage for inverse amigurumi generation.
  locator: 'Section: How? (ref [2]) and References'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The authors call for standardization of crochet instructions to enable interoperability between
    computational crochet tools, relevant to evaluation-protocol portability.
  locator: 'Section: Caveats and What''s Next?'
  confidence: medium
  quote_available: true
  notes: ''
