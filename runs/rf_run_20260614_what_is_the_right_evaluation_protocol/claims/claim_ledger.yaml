- claim_id: clm_inf01
  text: The recommended shape-fidelity metric set for an inverse amigurumi generator is symmetric Chamfer
    distance plus volumetric IoU plus normal consistency (the Sulzer-benchmark triad), because it jointly
    captures point-wise geometric error, occupied-volume overlap, and surface-orientation agreement, and
    AmiGo currently ships none of these despite explicitly targeting 'similarity' to the input mesh.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_008
    - clm_013
    - clm_048
    - clm_050
    - clm_051
    - clm_049
    reasoning_summary: AmiGo reports no Hausdorff/Chamfer/volume metric (clm_008) so the gap is real;
      the surface-reconstruction benchmark defines a reproducible, point-sampled CD+IoU+NC triad (clm_013/048/049/050/051)
      that is directly transferable to scoring a generated-pattern surface against a target mesh.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Because the deliverable is a stuffed soft object rather than a rigid mesh, shape-fidelity scoring
    should compare against a stuffing-deformed proxy of the target (or apply tolerance bands of at least
    one stitch-width w) rather than the raw input mesh, since AmiGo itself only guarantees the stuffed
    result is 'similar' under the assumption that all edge lengths equal the stitch width w.
  materiality: material
  claim_type: causal
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_002
    - clm_005
    - clm_008
    - clm_007
    reasoning_summary: AmiGo's similarity guarantee is conditioned on uniform edge length w and is asserted
      against the rigid input, not a deformed simulation (clm_002/005/008); fidelity scoring is only fair
      if tolerance is scaled to the discretization unit (the user-selected stitch width w, clm_007), otherwise
      quantization and stuffing deformation are penalized as shape error.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Normal-guided Chamfer Distance (NCD) is the preferred curvature/normal-aware fidelity term over
    a plain CD-plus-normal-consistency combination for an iterative edit loop, because NCD folds orientation
    sensitivity into a single distance at negligible added compute and uses cheap mesh-sampled normals,
    making it viable to re-score after every edit without the efficiency penalty of a separate NC term.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_019
    - clm_022
    - clm_021
    - clm_024
    - clm_023
    reasoning_summary: NCD weights CD by normal angle (clm_019) at negligible extra cost (clm_022) using
      cheap mesh-sampled normals (clm_021) and outperforms CD variants (clm_023), whereas adding a separate
      NC term to CD improves fidelity only at an efficiency cost (clm_024) - so for a per-edit re-scoring
      loop NCD dominates.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: A defensible three-metric crochetability set is (1) max increase/decrease rate per round, (2)
    stitch-count per layer/round (and its round-to-round variance), and (3) piece/segment count, all computable
    directly from the Crochet IR rounds[].ops and assembly[] without external tooling; AmiGo's own outputs
    (60 rounds, 6-8 segments, 2.5k-3.7k stitches) supply a concrete worked-example envelope for these
    metrics.
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_011
    - clm_012
    - clm_045
    - clm_043
    - clm_004
    reasoning_summary: AmiGo derives inc(x)/dec(x) from row coupling (clm_011) and reports per-model row/segment/stitch
      totals (clm_012); designers requested per-layer stitch counts (clm_045); increases/decreases have
      a graph signature (clm_043) and segmentation defines piece/seam count (clm_004) - these are exactly
      the IR fields rounds[].ops, expected_stitch_count, and assembly[].
  report_locations: []
