contradictions_or_cautions:
- text: Method has documented geometric obstructions (negative mean curvature, branching) and is sampling-rate
    dependent; results are 'similar' to the input, not exact.
  locator: card/trust
- text: Output is "similar" to the input, not exact, and the method is sampling-rate dependent (too few
    rows loses geometric detail).
  locator: card/limitations
- text: 'Documented geometric obstructions to crochetability: negative mean curvature ("craters") and
    branching require preprocessing/segmentation; not all shapes are handled directly.'
  locator: card/limitations
- text: The paper conjectures (but does not prove) that the f,g parameterization is bijective, leaving
    the proof to future work.
  locator: card/limitations
