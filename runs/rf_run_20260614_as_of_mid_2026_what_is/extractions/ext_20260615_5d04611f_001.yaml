extracted_facts:
- evidence_id: ev_001
  text: AmiGo takes a closed triangle mesh plus a single user-specified point and generates crochet instructions
    that, when knitted and stuffed, produce an Amigurumi toy resembling the input geometry.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The pipeline works by constructing a 'Crochet Graph' (geometry plus connectivity) that is then
    translated into a human-readable crochet pattern.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The shape is automatically segmented into crochetable components joined via the join-as-you-go
    method, eliminating any need for sewing.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The full input is a closed 3D model, a seed point, and a stitch size; the generated instructions
    use only simple crochet stitches and are join-as-you-go, so no sewing is required.
  locator: Section 1.2 Contribution
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors claim the crocheted-and-stuffed output resembles the input 3D shape more closely than
    any previous approach to crochet instruction generation.
  locator: Section 1.2 Contribution
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Crochet cannot be easily automated and, unlike machine knitting, there exists no crochet machine
    to date, motivating a computational pattern-generation method.
  locator: Section 1 Introduction
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The crochet graph is converted to a program using standard code-synthesis tools, then loop-unrolled
    into a human-readable pattern, confirming a deterministic algorithmic (not ML-based) pipeline.
  locator: Section 3 Overview / Section 5.1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: 'The method has inherent geometric limits: surfaces with negative mean curvature and positive
    Gaussian curvature (''craters'') cannot be realized by crocheting and stuffing alone and must be preprocessed
    away.'
  locator: Section 2.3 Crochetable Models
  confidence: medium
  quote_available: true
  notes: ''
