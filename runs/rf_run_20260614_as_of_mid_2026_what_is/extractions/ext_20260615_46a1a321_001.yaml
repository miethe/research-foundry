extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE uses a custom language grammar that lets users define stitches and stitch patterns,
    then parses and checks a submitted pattern for correctness before building a virtual model rendered
    in 3D.
  locator: Core Functionality / opening description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The custom grammar is intended to ensure accuracy and precision in pattern instructions, avoiding
    the ambiguities of plain-English crochet instructions.
  locator: Project description
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The platform flags overly loose or tight stitches so users can replace them before crocheting,
    reducing the need for blocking.
  locator: Analysis / Debugging feature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The interactive 3D view supports rotate, zoom, and pan, animation of the pattern creation process,
    highlighting and hiding selected stitches, and changing yarn thickness and color.
  locator: Interactive Tools / 3D view features
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Export includes an auto-generated crochet chart using standard crochet symbols and an SVG image
    showing stitch connections that labels stitches by type, row number, and position within a row.
  locator: Export Options
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: CrochetPARADE is built on the JavaScript libraries SVG.js and three.js and can export projects
    to 3D files importable into Blender.
  locator: Technology / Export Options
  confidence: medium
  quote_available: true
  notes: ''
