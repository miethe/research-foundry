extracted_facts:
- evidence_id: ev_001
  text: CrochetPARADE is a platform for creating, visualizing, and analyzing both 2D and 3D crochet patterns
    using a custom language grammar that lets users define stitches and stitch patterns.
  locator: README - intro / OVERVIEW
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The custom grammar is designed to remove the ambiguity of plain-English crochet instructions,
    aiming for accuracy and precision.
  locator: README - grammar / OVERVIEW
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The platform's debug capability flags overly loose or tight stitches so users can replace them
    before crocheting, reducing the need for blocking.
  locator: README - debug feature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The interactive 3D view supports rotate/zoom/pan, animation of the pattern-creation process, highlighting/hiding
    selected stitches, and changing yarn thickness and color.
  locator: README - interactive 3D features
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Exports include an automatically generated crochet chart in standard symbols, an SVG identifying
    stitches by type/row/position, and 3D files importable into Blender.
  locator: README - export feature
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: All calculations are performed locally on the user's device, with no data collected to a central
    server or transmitted over the internet - relevant to mobile-runtime feasibility.
  locator: README - local computation / privacy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: The software is free and open source under GPLv3, while the grammar itself cannot be copyrighted
    and is in the public domain; the project is hosted at crochetparade.org.
  locator: README - LICENSE AND COPYRIGHT
  confidence: medium
  quote_available: true
  notes: ''
