- claim_id: clm_inf01
  text: Across all six surveyed mobile/web incumbents (Ribblr, My Row Counter, Pattern Keeper, knitCompanion,
    Stitch Fiddle, and the Ravelry third-party connector ecosystem) none ships interactive 3D preview
    or guided physical-assembly, confirming the design-spec wedge ('see what I'm making', 'can't get lost',
    'assemble/modify confidently') is unoccupied whitespace in the mobile category.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_051
    - clm_057
    - clm_074
    - clm_003
    - clm_004
    - clm_024
    - clm_027
    - clm_013
    - clm_067
    - clm_068
    reasoning_summary: 'Every incumbent profile is 2D: Ribblr/knitCompanion/Pattern Keeper are pattern-playback
      + counter/highlight, Stitch Fiddle and My Row Counter are 2D grid charting, and the Ravelry ecosystem
      is third-party counters/discovery; clm_057 explicitly records no 3D/assembly in the strongest incumbent''s
      listing.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Every tool in the corpus that offers true interactive 3D crochet preview (CrochetPARADE, crogen)
    or 3D-mesh-to-pattern generation (AmiGo) is non-mobile - browser-desktop, Tkinter/Blender desktop,
    or an academic pipeline - so the 3D capability and the mobile form factor are currently disjoint,
    which is precisely the gap a mobile interactive-3D product would close.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_017
    - clm_034
