extracted_facts:
- evidence_id: ev_001
  text: The survey defines small language models as 1-12B parameters (sometimes up to 20B) and argues
    they are sufficient and often superior for schema- and API-constrained agentic work rather than open-ended
    generation.
  locator: Abstract, sentence 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper claims guided decoding, strict JSON Schema outputs, and validator-first tool execution
    let SLMs match or surpass larger models on tool use, function calling, and RAG at 10x-100x lower token
    cost with better latency and energy.
  locator: Abstract, sentence 4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The survey synthesizes evidence across specific open and proprietary SLMs including Phi-4-Mini,
    Qwen-2.5-7B, Gemma-2-9B, Llama-3.2-1B/3B, Ministral-3B/8B, Apple on-device 3B, and DeepSeek-R1-Distill.
  locator: Abstract, sentence 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'The authors formalize SLM-default, LLM-fallback systems with uncertainty-aware routing and verifier
    cascades, and propose production metrics: cost per successful task, schema validity rate, executable
    call rate, p50/p95 latency, and energy per request.'
  locator: Abstract, sentence 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The survey recommends SLM-first agent design patterns (schema-first prompting, type-safe function
    registries, confidence scoring with verifier rollups, LoRA/QLoRA adaptation) while preserving LLM
    fallback for open-domain reasoning and some long-horizon planning.
  locator: Abstract, final two sentences
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The survey is authored by Raghav Sharma and Manan Mehta and was submitted to arXiv on October
    4, 2025.
  locator: arXiv header (abs/2510.03847)
  confidence: medium
  quote_available: false
  notes: ''
