extracted_facts:
- evidence_id: ev_001
  text: Setting n_probs greater than 0 makes the /completion endpoint also return the probabilities of
    the top N tokens for each generated token under the active sampling settings.
  locator: POST /completion — request options, `n_probs`
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: When temperature < 0 the tokens are sampled greedily but token probabilities are still computed
    via a simple softmax of the logits, ignoring other sampler settings.
  locator: POST /completion — request options, `n_probs` (temperature note)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The completion_probabilities response array has length n_predict; each item carries a nested top_logprobs
    array containing at most n_probs elements, each with id, logprob, token, and bytes fields.
  locator: POST /completion — Response format, `completion_probabilities`
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: When post_sampling_probs is set to true, the logprob field is replaced with prob (a value between
    0.0 and 1.0) and top_logprobs is replaced with top_probs.
  locator: POST /completion — Response format, post_sampling_probs note
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The number of elements returned in top_probs may be fewer than n_probs.
  locator: POST /completion — Response format, top_probs element count
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The OpenAI-compatible /v1/chat/completions section defers to the OpenAI Chat Completions API docs
    and only notes that /completion-specific features such as mirostat are supported; n_probs, completion_probabilities,
    top_logprobs, and post_sampling_probs are documented solely under the /completion endpoint, not for
    /v1/chat/completions.
  locator: POST /v1/chat/completions — Options vs POST /completion section
  confidence: medium
  quote_available: true
  notes: ''
