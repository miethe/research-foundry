- evidence_id: ev_002
  text: The documented supported features for /v1/chat/completions include chat completions, streaming,
    JSON mode, reproducible outputs, vision, tools, and reasoning/thinking control, with only Logprobs
    left unchecked.
  locator: /v1/chat/completions — Supported features list
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The documented supported request fields for /v1/chat/completions are model, messages, frequency_penalty,
    presence_penalty, response_format, seed, stop, stream, stream_options, temperature, top_p, max_tokens,
    tools, reasoning_effort, and reasoning.
  locator: /v1/chat/completions — Supported request fields list
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The reasoning controls reasoning_effort and reasoning are documented as supported request fields,
