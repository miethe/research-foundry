  notes: ''
- evidence_id: ev_002
  text: top_logprobs is an integer between 0 and 5 specifying how many most-likely tokens to return at
    each position, each with an associated log probability, and it requires logprobs to be set to true.
  locator: 'Parameter definition: top_logprobs'
  confidence: medium
  quote_available: true
  notes: ''
