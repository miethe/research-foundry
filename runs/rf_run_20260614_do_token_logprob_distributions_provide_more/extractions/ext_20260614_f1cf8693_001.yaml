extracted_facts:
- evidence_id: ev_001
  text: ECE is computed by partitioning predictions into M equally-spaced confidence bins and taking the
    sample-weighted average of the absolute gap between accuracy and average confidence in each bin.
  locator: Sec. 2 (Definitions) — Expected Calibration Error (ECE), Eq. (3)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The paper's standard ECE estimator uses M = 15 bins for its reported vision and NLP results.
  locator: Table 1 caption (Sec. 5, Results) and Sec. 5.1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Reliability diagrams plot expected sample accuracy as a function of confidence; a perfectly calibrated
    model plots the identity diagonal and any deviation from it represents miscalibration.
  locator: Sec. 2 (Definitions) — Reliability Diagrams
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Temperature scaling is a single-parameter post-hoc method that divides the logits by one scalar
    T>0 before the softmax, with T optimized against NLL on the validation set.
  locator: Sec. 4.2 — Temperature scaling, Eq. (9)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Because T does not change the argmax of the softmax, the class prediction is unchanged and temperature
    scaling therefore leaves classification accuracy unaffected while reducing miscalibration.
  locator: Sec. 4.2 — Temperature scaling
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Modern neural networks are poorly calibrated (systematically overconfident), and depth, width,
    weight decay, and Batch Normalization are identified as important factors influencing calibration.
  locator: Abstract; Sec. 3 (Observing Miscalibration)
  confidence: medium
  quote_available: true
  notes: ''
