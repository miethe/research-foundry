contradictions_or_cautions:
- text: Empirical findings (2017-era ResNets/DenseNets) predate modern LLMs and may not transfer to token-logprob
    calibration in generative models.
  locator: card/trust
- text: Tertiary definitional anchor only. Empirical results are from 2017-era image/document classifiers
