extracted_facts:
- evidence_id: ev_001
  text: 'Models exhibit a critical dissociation: their verbal confidence is neither cost-aware nor strategically
    responsive when deciding to engage or abstain under high-penalty conditions, so calibrated confidence
    scores alone are insufficient for trustworthy AI.'
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Across models and datasets, increasing the error penalty has a negligible effect on model behavior;
    neither self-evaluated confidence nor the answer/abstain decision changes significantly as incorrect-answer
    penalties range over [0.1, 100].
  locator: Our Contributions — Invariance to Risk
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Under extreme penalties where frequent abstention is the mathematically optimal strategy, models
    almost never abstain, causing utility collapse.
  locator: 'Abstract / Section: Low Abstention Rate Causes Utility Collapse'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: 'Confidence and action are decoupled: models often ''know'' their own uncertainty via calibrated
    verbal estimates yet fail to convert that knowledge into a good abstention policy.'
  locator: Our Contributions — Decoupling of Confidence and Policy
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Verbal-confidence calibration is poor and varies widely by dataset and model: on Humanity''s
    Last Exam (HLE), reported ECE spans 0.474-0.841, Brier 0.332-0.791, and AUARC 0.041-0.533, with substantially
    better calibration on easier GSM8K (ECE 0.019-0.149).'
  locator: Tables 1, 3, 5 (HLE / GPQA Diamond / GSM8K calibration results)
  confidence: medium
  quote_available: false
  notes: ''
