contradictions_or_cautions:
- text: Evaluated on ImageNet classifiers only; generalization to LLM logprob/selective-generation settings
    is not directly tested.
  locator: card/trust
- text: Experiments are confined to ImageNet image classifiers with softmax outputs; the paper does not
    directly test transfer of the logit-based fix to LLM token-logprob or selective-generation settings,
    so applicability to language-model vaults is an inference, not a demonstrated result.
  locator: card/limitations
