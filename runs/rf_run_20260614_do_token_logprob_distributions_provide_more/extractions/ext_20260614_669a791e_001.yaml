extracted_facts:
- evidence_id: ev_001
  text: The study performs an extensive experimental evaluation of post-hoc confidence estimators across
    84 pretrained ImageNet classifiers, all computed directly from logits without retraining the underlying
    model.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A simple p-norm normalization of the logits followed by taking the maximum logit as the confidence
    estimator yields considerable selective-classification gains, fixing pathological 'broken' confidence
    behavior in many classifiers.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: After applying the logit-based fix, a classifier's selective-classification performance becomes
    almost entirely determined by its accuracy, decoupling it from the original broken confidence estimator.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The logit-based selective-classification gains are shown to hold under distribution shift, indicating
    robustness to data drift.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The paper uses the Area Under the Risk-Coverage curve (AURC) as the standard selective-classification
    metric.
  locator: Section 3.1 (metric definition)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors introduce a Normalized AURC (NAURC) that maps ideal performance to 0 and random performance
    to 1, enabling fair comparison of selective-classification quality across classifiers with different
    accuracies.
  locator: Section 4.2.1 (NAURC definition)
  confidence: medium
  quote_available: true
  notes: ''
