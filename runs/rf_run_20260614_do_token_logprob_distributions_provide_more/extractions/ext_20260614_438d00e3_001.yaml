extracted_facts:
- evidence_id: ev_001
  text: A selective classifier is formally a pair (f, g) combining a predictor f with a selection function
    g that decides whether to predict or abstain.
  locator: Section 2, Problem Setting
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Coverage is the probability mass of the region of inputs the classifier does not reject (the fraction
    of inputs accepted).
  locator: Section 2, Problem Setting
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Selective risk is the expected loss over accepted (non-rejected) instances, normalized by coverage.
  locator: Section 2, Problem Setting
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The SGR algorithm constructs a selection function so the selective risk exceeds the user-specified
    target r* with probability at most delta (i.e. the desired risk is guaranteed with high probability).
  locator: Section 3, Selection with Guaranteed Risk Control
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The full performance profile of a selective classifier is captured by the risk-coverage curve,
    which plots risk as a function of coverage.
  locator: Section 2, Problem Setting
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Empirically, the method guarantees ~2% top-5 ImageNet error with probability 99.9% at almost 60%
    test coverage, demonstrating the coverage-versus-risk trade-off in practice.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
