extracted_facts:
- evidence_id: ev_001
  text: For LLMs with at least 70 billion parameters, verbalized-confidence expected calibration error
    (ECE) is around 0.1, i.e. confidence deviates roughly 10% from true accuracy.
  locator: Section 5.3 (Insights into models)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The best 'combo' prompt method extracts verbalized confidence scores with an average deviation
    of about 7% from empirical accuracy for large LLMs.
  locator: Section 5.4 (Insights into prompt methods)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The smallest evaluated model (gemma1.1-2b) produces verbalized confidence scores that are poorly
    calibrated and almost independent of its actual accuracy.
  locator: Section 5.3 (Insights into models)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Calibration of verbalized confidence is not intrinsic to the model but depends heavily on how
    the confidence is elicited via prompt formulation.
  locator: Section 5.4 (Insights into prompt methods)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The study benchmarks verbalized confidence reliability across 10 datasets, 11 LLMs, and 17 prompt
    methods.
  locator: Section 4 (Experiments)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Verbalized confidence is positioned as a prompt- and model-agnostic, low-overhead uncertainty
    quantification method whose reliability strongly depends on prompting, but which can yield well-calibrated
    scores with certain prompt methods.
  locator: Abstract
  confidence: medium
  quote_available: true
  notes: ''
