    may not generalize to newer/larger models.
  locator: card/trust
- text: Calibration metrics depend on the specific datasets and base-accuracy regime (0.5-0.9).
  locator: card/trust
- text: Results are bounded to the evaluated model set (Gemma, Llama 3, Qwen, GPT-3.5, GPT-4o) and a base-accuracy
