contradictions_or_cautions:
- text: Single small open model (LLaMA 3.2 3B-Instruct) on four QA datasets; authors note their focus
    is relative behavior of estimators and expect trends to transfer, but absolute numbers may shift across
    model sizes/families. CoCoA's strength comes at high compute cost (M=10 samples via separate decoding).
    Results table figures are rendered inline (digits doubled in scraped HTML, e.g. "0.3350.335"); confirmed
    against the canonical Table 1 values.
  locator: card/limitations
