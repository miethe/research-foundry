      clm_063 defines ECE, clm_073 pairs ECE/Brier/AUARC, clm_011 frames risk-coverage. Therefore both
      calibration (ECE/Brier) and ranking (AUROC/RC) metrics are needed.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'An abstention/escalation threshold should be set on the risk-coverage curve via the SGR guarantee
    rather than a fixed confidence cutoff: pick the target selective risk r* and the coverage it permits
    at confidence 1-delta, which converts any chosen signal (MSP, CoCoA, or self-report) into a tunable
    accept-rate-at-fixed-error operating point.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_007
    - clm_008
    - clm_009
    - clm_010
    - clm_011
