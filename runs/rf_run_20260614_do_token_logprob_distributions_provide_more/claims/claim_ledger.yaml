- claim_id: clm_inf06
  text: 'The selective-classification literature predicts the accept-rate-at-fixed-error tradeoff is governed
    primarily by signal monotonicity and base accuracy, not the confidence scalar''s nominal value: once
    a signal ranks errors correctly (as MSP/CoCoA do via AUROC ~0.78-0.84), selective performance is near-fully
    determined by accuracy, so the practical coverage gain from logprobs comes from better ranking, not
