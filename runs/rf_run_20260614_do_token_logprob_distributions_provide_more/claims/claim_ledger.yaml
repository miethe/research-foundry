- claim_id: clm_inf04
  text: 'Metric selection should be split by purpose: ECE and Brier capture the accept/route calibration
    question (does a 0.8 confidence mean 80% correct), while AUROC / area-under-risk-coverage capture
    the abstain ranking question (does higher confidence rank correct answers above incorrect), and MSP''s
    high AUROC but weaker ECE shows a signal can win one without the other.'
  materiality: material
  claim_type: recommendation
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_025
    - clm_063
    - clm_073
    - clm_011
