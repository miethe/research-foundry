# Research Foundry claim policy
# See spec sections 12.1 (material claim types), 12.2 (allowed_claim_statuses),
# and 12.3 (verifier_checks). The claim ledger is the authority for every
# material claim in a report.

# Claim types considered "material": each must map to a source card or carry an
# explicit inference/speculation label (section 12.1).
material_claim_types:
  - factual
  - quantitative
  - comparative
  - causal
  - attribution
  - recommendation
  - prediction

# Allowed claim statuses and their report-labeling requirements (section 12.2).
allowed_claim_statuses:
  supported:
    meaning: "Directly supported by one or more source cards."
    report_label_required: false

  mixed:
    meaning: "Sources disagree or support only part of the claim."
    report_label_required: true
    label: "Mixed evidence"

  contradicted:
    meaning: "Evidence contradicts the claim."
    report_label_required: true
    label: "Contradicted / do not use as finding"

  inference:
    meaning: "Reasonable synthesis from supported claims, but not directly stated by sources."
    report_label_required: true
    label: "Inference"

  speculation:
    meaning: "Forward-looking or insufficiently evidenced idea."
    report_label_required: true
    label: "Speculation"

  unsupported:
    meaning: "Material claim lacks source or proper label."
    report_label_required: true
    build_status: fail

# Report verifier checks (section 12.3). severity: error | warning.
verifier_checks:
  - id: report_has_frontmatter
    severity: error

  - id: all_claim_ids_exist
    severity: error

  - id: claim_ids_unique
    severity: error

  - id: material_claims_have_claim_ids
    severity: error

  - id: supported_claims_have_source_cards
    severity: error

  - id: source_cards_have_locators
    severity: warning

  # PRD FR-3.1 (AC-RFUP3-1/2): a supported claim citing a source card should
  # have an exact quoted passage (extracted_points[].quote) anchoring it, not
  # merely a locator. Severity here is metadata only — whether this check
  # actually blocks publish is governed by `verify.exact_passage` below
  # (warn: informational only; strict: treated as an unsupported claim).
  - id: exact_passage_present
    severity: warning

  # RFUP-1 P4-001: compares a claim's cited-source extracted quote against
  # that source card's own stored extracted_points[].quote text (extraction-
  # time corruption, e.g. a PMC fetch stripping a superscript). Kept
  # "warning" so this check's wiring cannot regress any existing run on its
  # own -- see quote_fidelity.py's module docstring and the 6d call-site
  # comment in verification.py for the full contract, and the explicit
  # distinction from check_anchor_hash_match (a different, drift-detection
  # check over report-builder-draft text, not source-card text).
  - id: quote_fidelity
    severity: warning

  - id: inferences_have_basis
    severity: error

  # spec §12.2: inference, mixed, contradicted, and speculation all require a
  # report label. A claim of one of these statuses rendered without its label is
  # presented to the reader as an unqualified finding and must be blocked.
  - id: inference_is_labeled
    severity: error

  - id: mixed_is_labeled
    severity: error

  - id: contradicted_is_labeled
    severity: error

  - id: speculation_is_labeled
    severity: error

  - id: unsupported_claims_block_publish
    severity: error

  - id: work_sensitive_claims_block_public_report
    severity: error

# Verification runtime behavior overrides (PRD FR-3.2, decisions-block OQ-1).
# exact_passage: warn|strict
#   warn   — (default) an exact-passage eligibility mismatch is surfaced as a
#            warning; it does not block verification or change the exit code.
#   strict — the same mismatch is treated as an error and blocks verification.
#   A run-level CLI override (`rf verify --exact-passage warn|strict`) always
#   wins over this config value; an invalid override fails closed (RFError)
#   rather than silently falling back to this default.
#
# THIS KEY IS GLOBAL AND STAYS `warn` BY DEFAULT (RFUP-1 AC-P3-5) — do not
# flip it to `strict` to get pediatric/CDS runs covered. A global flip would
# hard-gate every non-clinical warn-mode run in this workspace on every
# missing-anchor claim, which PRD Risk 1 explicitly calls out as the failure
# mode to avoid.
#
# Pediatric/CDS coverage is handled by a separate, narrower mechanism that
# needs NO config change and NO `--exact-passage strict` flag (RFUP-1
# P3-001/P3-002, PRD FR-5/OQ-1, AC-P3-4): `exact_passage_present` in
# `src/research_foundry/services/verification.py` evaluates
# `claim_clinical_eligibility()` for every claim REGARDLESS of this key's
# value. A claim is auto-strict — bucketed as a hard failure and appended to
# `unsupported[]` — the moment it is BOTH an `assertion_kind: threshold`
# clinical assertion AND carries an explicit clinical-sensitivity signal (a
# `pediatric_cds` block on a cited source card, or an elevated/non-public
# sensitivity tag). This is a per-claim override layered on top of the
# `warn` default below, not an alternate value for this key — there is
# nothing to set here to "turn on" pediatric/CDS strictness; it is always on
# for eligible claims, on every run, independent of `verify.exact_passage`.
# Every other claim (the vast majority of claims on non-clinical runs) is
# unaffected and keeps today's warn-only behavior under the `warn` default
# below. See `claim_clinical_eligibility()`'s docstring for the full trigger
# definition and its fail-safe-to-non-eligible resolution when the signal is
# indeterminate (AC-P3-3).
verify:
  exact_passage: warn
