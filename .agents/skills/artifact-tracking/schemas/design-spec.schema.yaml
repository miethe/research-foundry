$schema: "http://json-schema.org/draft-07/schema#"
title: "Design Specification Frontmatter Schema"
type: object
description: "Schema for pre-PRD design specifications and ideation documents."

allOf:
  - $ref: "./envelope.schema.yaml"
  - type: object
    required:
      - schema_version
      - doc_type
      - maturity
    properties:
      schema_version:
        type: integer
        enum: [2]
      doc_type:
        type: string
        enum: [design_spec]

      maturity:
        type: string
        enum: [idea, shaping, ready, promoted, shelved]
        description: "Ideation maturity. idea=raw, shaping=has structure, ready=promote to PRD, promoted=prd_ref set, shelved=not pursuing"

      problem_statement:
        oneOf:
          - type: "null"
          - type: string
            minLength: 10
        default: null

      open_questions:
        type: array
        items:
          type: string
        default: []
        description: "Unresolved questions blocking promotion to PRD"

      explored_alternatives:
        type: array
        items:
          type: string
        default: []

      related_prds:
        type: array
        items:
          type: string
        default: []
        description: "Legacy field; prefer prd_ref + related_documents"
