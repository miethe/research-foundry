schema_version: 0.1
foundry:
  id: rf_nick_research_foundry
  name: "Nick's Research Foundry"
  owner: "Nick Miethe"
  default_profile: personal
  storage_mode: markdown_yaml_first
  timezone: America/New_York

  systems:
    meatywiki_path: meatywiki/
    skillmeat_path: skillmeat/
    ccdash_path: ccdash/
    intenttree_path: intenttree/research_foundry_tree.yaml

  defaults:
    claim_policy: config/claim_policy.yaml
    governance_policy: config/governance.yaml
    model_profiles: config/model_profiles.yaml
    routing_rules: config/routing_rules.yaml

  # Read-only runs viewer (runs-frontend). The export service reads
  # viewer.sensitivity_threshold to decide which source-card quotes/bodies may
  # leave the workspace. Default 'public' redacts personal/work_sensitive/
  # client_sensitive content. Ordering: public < personal < work_sensitive <
  # client_sensitive.
  #
  # Fail-closed default (public-multiuser P0/P1): this shipped/canonical
  # foundry.yaml is copied verbatim by `rf init` and by every test's
  # `tmp_foundry` fixture, so its ambient value IS the default every fresh
  # workspace and CI run gets unless an operator explicitly opts into a wider
  # threshold. It was flipped to `client_sensitive` (max-permissive, i.e. no
  # redaction) in bbf6341 for a personal, single-user, LAN-only viewer; that
  # assumption no longer holds once the export/catalog surface is reachable by
  # multiple users, so the ambient default reverts to `public` here. A single
  # operator who wants the old fully-open personal-LAN view can still set
  # this back to `client_sensitive` in their own deployment's foundry.yaml, or
  # pass `--sensitivity-threshold client_sensitive` per-invocation.
  viewer:
    sensitivity_threshold: public

  # Reusable Assertion Ledger P8 controls. Every capability is deliberately
  # default-off and must be authorized independently.  Enabling a control does
  # not authorize private rollout, public promotion, shared indexes, or an
  # external writeback.
  #
  # Single-operator opt-in: this deployment enables all three local capabilities
  # (durable ledger writes + automated reuse + canonical-claim grouping). Per the
  # user guide this local enablement grants no private-workspace, pilot, shared-
  # index, public-promotion, or external-writeback authority — those remain gated.
  assertion_ledger:
    ledger_write_enabled: true
    automated_reuse_enabled: true
    canonical_claims_enabled: true

  # Authentication provider for ``rf serve`` (P5.1 canonical auth selector).
  # The provider abstracts the auth boundary — swappable adapters connect to
  # different identity systems without call-site branching. This is the **central
  # security knob**: choose wisely based on your deployment topology and threat
  # model. Default ('none') assumes single trusted operator on a private network;
  # opt into air-gapped multi-user via 'local_static' or cloud-hosted via 'clerk'.
  #
  # Provider values (all enforced via foundry.yaml config only):
  #
  #   none — No authentication; all requests pass through unauthenticated.
  #          Default, fail-closed for loopback-only deployments. Use when RF
  #          runs on 127.0.0.1 only and is trusted to be behind a network
  #          perimeter. If you later expose RF on a non-loopback bind (e.g.
  #          0.0.0.0), you MUST set provider: local_static or provider: clerk —
  #          RF will refuse 'none' on public binds at startup.
  #          Requirements: none (zero-dependency).
  #          Security model: trust boundary = network perimeter.
  #
  #   local_static — Multi-token static Bearer mapping, zero-dependency, air-gapped.
  #          Tokens and role-identity mappings live in foundry.yaml; token values
  #          themselves are pulled from env vars at startup, never stored plain-text
  #          on disk. Supports N concurrent users with different roles (owner,
  #          admin, contributor, analyst, viewer) within a single workspace.
  #          Suitable for self-hosted, air-gapped, and small-team LAN deployments.
  #          No outbound internet required. Recommended starting point for multi-
  #          user RF on private infrastructure.
  #          Requirements: env vars configured (e.g. RF_TOKEN_ALICE=<secret>).
  #          Security model: trust boundary = RBAC roles + static token validation.
  #
  #   clerk — Clerk.dev JWT/session-based auth with custom RBAC roles.
  #          Requires: (1) Outbound internet access from RF to Clerk's API
  #          (https://api.clerk.dev), (2) public domain registered + DNS-resolvable
  #          (e.g. rf.example.com), (3) paid Clerk plan for custom RBAC roles
  #          (Free plan does not support role-claim customization — RF will error
  #          at startup if custom roles are unavailable). Once enabled, Clerk
  #          handles user sign-in, multi-factor auth, and role provisioning; RF
  #          validates JWTs and enforces roles. Fail-closed: if Clerk is down or
  #          unreachable, all auth checks fail (no implicit fallback to 'none').
  #          Requirements: Clerk account + app created, frontend_api endpoint,
  #          outbound_internet_enabled: true in foundry.yaml (must be explicit).
  #          Security model: trust boundary = Clerk's OIDC identity + RF's RBAC.
  #
  #   oidc — Generic OIDC/JWT auth (BYO identity provider). Seam-only in P5.1;
  #          concrete adapter (FU-2, deferred) will support any OIDC provider
  #          (Azure AD, Okta, on-prem, etc.). Currently raises "not yet
  #          implemented" error at startup. Do not use until FU-2 ships.
  #          Requirements: OIDC provider with JWT endpoint (future).
  #          Security model: trust boundary = OIDC provider's identity + RF's RBAC.
  #
  # Fail-closed default: 'none' is the canonical fail-closed, single-user default
  # because foundry.yaml is versioned and copied verbatim by 'rf init' and every
  # test fixture. If an operator never explicitly sets provider, they get loopback-
  # only mode (safe default). Multi-user deployments require explicit opt-in via
  # provider: local_static or provider: clerk, ensuring decisions are intentional,
  # not accidental. Public/LAN-exposed instances will refuse to start with provider:
  # none — the startup gate is the enforcement mechanism for this fail-closed policy.
  #
  # auth:
  #   provider: none        # change to local_static to require auth
  #
  # Example: two-user local_static setup (uncomment and populate env vars)
  # auth:
  #   provider: local_static
  #   local_static:
  #     tokens:
  #       - token_env: RF_TOKEN_ALICE        # export RF_TOKEN_ALICE=<secret>
  #         user_id: alice
  #         workspace_id: default
  #         roles: [owner]
  #       - token_env: RF_TOKEN_BOB          # export RF_TOKEN_BOB=<secret>
  #         user_id: bob
  #         workspace_id: default
  #         roles: [researcher]
  #
  # Example: Clerk opt-in (requires outbound internet + public domain)
  # Clerk is DARK BY DEFAULT — both fields below must be explicitly set.
  # auth:
  #   provider: none  # default — no auth
  #   # provider: local_static  # dev-mode static token
  #   # provider: clerk  # opt-in: requires outbound internet + public domain (see docs)
  #   #   clerk_frontend_api: "https://your-app.clerk.accounts.dev"  # required when provider=clerk
  #   #   clerk_outbound_internet_enabled: true  # must be explicitly declared

  # RBAC enforcement toggle (P5.6 T5).
  #
  # Controls whether require_role() dependency enforces role checks globally.
  # This is an explicit security knob — default "auto" preserves the existing
  # behaviour (enforced when auth.provider != none).
  #
  # Values:
  #   auto     — default; RBAC enforced when auth.provider != none.
  #              NOT enforced when provider=none (single-operator-trust mode).
  #   disabled — force RBAC OFF regardless of provider.
  #              FAIL-CLOSED: only honoured on loopback bind hosts (127.0.0.1).
  #              Setting this with a non-loopback bind_host causes startup to
  #              refuse with an error — you CANNOT disable RBAC on a public bind.
  #   enabled  — force RBAC ON even when auth.provider=none.
  #
  # auth:
  #   rbac_enforcement: auto   # default; change to disabled (loopback only) or enabled

  # Per-identity + per-route sliding-window rate limiter (P5.6, FR-9).
  #
  # Keys on (user_id, route) — one user's burst NEVER throttles another.
  # Counter is in-process/local; no network round-trip (NFR §6.2).
  # On exceed: HTTP 429 + Retry-After header (seconds until window resets).
  #
  # Deployments with auth.provider = none are automatically exempt because no
  # identity is available to key on; this keeps single-operator loopback
  # setups unthrottled regardless of this setting.
  #
  # Header contract for frontend resilience (GATE-900):
  #   X-RateLimit-Remaining: <int>  — requests left in current window
  #   X-RateLimit-Reset: <int>      — UNIX timestamp when window resets
  #   Retry-After: <int>            — seconds until reset (429 only)
  #
  # auth:
  #   rate_limit:
  #     enabled: true            # default true; set false to disable entirely
  #                              # STARTUP-ONLY: wired into RateLimitMiddleware at process
  #                              # start.  Cannot be toggled via PATCH /admin/rate-limit-config.
  #     requests_per_window: 60  # default 60 (1 req/sec at 60 s window)
  #     window_seconds: 60       # default 60; sliding window width in seconds

  adapters:
    claude_agent_sdk: enabled
    claude_code: enabled
    opencode: optional
    gpt_researcher: optional
    paperqa2: optional
    litellm: optional

  # Bidirectional integration clients (Phase 0+).
  # Set base_url here to override the compiled defaults.
  # Tokens go in the per-profile .env file (see .env.example).
  integrations:
    arc:
      base_url: http://127.0.0.1:8910   # ARC (Agent Review Council)
    intenttree:
      base_url: http://localhost:8000   # IntentTree task dispatcher
    notebooklm:
      correlation_mode: project         # 'project' | 'run' | 'explicit'
      notebook_title_template: "RF — {project}"
      base_url: null                    # unused; CLI is the transport
