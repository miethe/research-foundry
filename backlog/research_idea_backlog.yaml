review_notes:
  completeness_audit:
    note: The discovery critic flagged 6 gap themes; a manual audit found each was already covered by
      an authored idea (the critic judged from titles only). No supplemental entries were added.
    mapping:
    - critic_gap: Claim segmentation & claim-to-source alignment (producing claim_ids)
      already_covered_by: idea_claim-segmentation-source-alignment
    - critic_gap: Source-card extraction fidelity & citation-locator precision under copyright/excerpt
        constraints
      already_covered_by: idea_source-card-extraction-fidelity
    - critic_gap: 'Verifier self-validation: golden/regression corpus & false-negative measurement'
      already_covered_by: idea_verifier-golden-corpus-regression
    - critic_gap: Content-level secret & PII scanning as a writeback runtime gate
      already_covered_by: idea_secret-pii-writeback-scanning
    - critic_gap: Writeback idempotency, reconciliation & conflict resolution for re-run swarms
      already_covered_by: idea_writeback-idempotency-reconciliation
    - critic_gap: 'Adapter resilience: failure isolation, retry, timeout, partial-result handling'
      already_covered_by: idea_adapter-failure-retry-resilience
  completeness_assessment: 'Strong, well-distributed backlog: 49 ideas, no duplicate ids, every pillar
    populated (Swarm Orchestration 9, Knowledge Compilation 8, Cross-Tool 8, Reuse/Promotion 6, Governance
    6, Evaluation 5, Evidence/Claim 4, Capture 3). Coverage is broadest exactly where the spec is deepest
    (model routing, adapters, retrieval, integration seams). The most material gaps cluster around the
    system''s own differentiator — the claim verifier and the evidence-extraction pipeline that feeds
    it. Per MVP spec sec 18, the claim verifier is the load-bearing component (''implement the claim verifier
    before fancy swarm orchestration''), yet the backlog covers the verification *landscape* and downstream
    publication policy but NOT the upstream mechanics: (a) how to segment a draft into ''material claims''
    and align each to a source card (sec 12.1/12.3 material_claims_have_claim_ids + supported_claims_have_source_cards
    are hard error gates), (b) faithful source-card excerpting / citation-locator precision under copyright
    constraints (sec 6.8, sec 17 ''source cards become too heavy''), and (c) a golden regression corpus
    to prove the verifier itself is correct. Secondary gaps: content-level secret/PII scanning as a writeback
    gate (sec 7.2 non-negotiable, distinct from key-isolation/hook-hardening which are already covered),
    and writeback idempotency/reconciliation for re-run swarms (sec 17 ''writebacks pollute memory'';
    candidate-first idea covers architecture but not dedup semantics). Adapter failure/retry/normalization
    resilience (sec 17 ''tool APIs change quickly'') is partly implied by parallel-vs-sequential fan-in
    but not its own question. I authored 6 additional entries targeting the four highest-value gaps plus
    two adjacent ones, all assigned to existing pillars.'
  dropped:
  - title: What approaches exist for knowledge-system origination layers / SME persona consultant agent
      architecture
    reason: The SME-persona/consultant agent-memory question (MemGPT/Zep/LangMem) is a long-horizon vision
      item for MeatyWiki's far future, weakly tied to RF's evidence-first mission. The origination-layer
      half is captured in idea_origination-layer-routing; the agent-memory half is out of near-term scope.
  - title: How should lens scores (freshness, relevance, novelty, clarity) be designed to be facet-contextual?
    reason: Narrow MeatyWiki storage-model decision (denormalized vs join table vs JSONB) for a specific
      F5 feature. Low leverage to RF's mission, minimal external evidence base, better resolved by internal
      design spike than research.
  - title: What suggested-link UX patterns balance surfacing latent connections with avoiding false-positive
      noise?
    reason: Downstream UX question that depends on idea_embedding-vector-store-strategy resolving first;
      deferred to MeatyWiki v2.2. Low immediate leverage and overlaps with the broader retrieval work.
  - title: What are the best skill versioning and rollback patterns for LLM instruction bundles?
    reason: Self-rated low research_potential; a small, well-understood ops problem (git history / hashed
      registers) with limited external evidence to mine. Better solved by convention than a research bundle.
  - title: What is the optimal status-callback cadence for RF-to-IntentTree progress updates?
    reason: Self-rated low; a minor design trade-off (every-stage vs milestone) decidable by judgment
      in minutes. No research bundle warranted.
  - title: How should ExecutionReport data from Claude Code workflow runs be ingested into CCDash?
    reason: Specific internal plumbing/integration task, not a research question; the integration point
      is already decided (ExecutionReport). Engineering, not evidence-gathering.
  - title: 'Graph/backlinks UI for knowledge portals: when to render relationship graphs'
    reason: Self-rated skim/medium; specs already converge on 'avoid full graph viz early.' Low marginal
      value and out of RF's core scope.
  - title: Notion/Confluence/Drive importers for Markdown-native knowledge systems
    reason: Self-rated low; explicitly deferred post-MVP across specs and listed as a non-goal. Importer
      engineering complexity, not a high-leverage research question.
  - title: Desktop activity telemetry for ambient context capture
    reason: Speculative ambient-capture ideation with privacy overhead and weak tie to RF's evidence-first
      control-plane mission. Premature relative to core capture/ingestion work.
  - title: 'AI writing style personalization: extracting a writer''s voice for blog generation'
    reason: Blog-workflow personalization peripheral to RF's research-control-plane mission; medium potential
      but low strategic leverage.
  - title: Git submodule vs linked worktree for artifacts repos
    reason: Self-rated low; a narrow MeatyIdeas git-ops default already chosen. Decidable by a short spike,
      not a research bundle.
  - title: Universal flat Item model vs hierarchical tree model for an agentic work OS
    reason: IntentTree-specific data-modeling reconciliation (D2). Important to that project but tangential
      to RF's mission; better handled in IntentTree's own planning thread.
  - title: Workflow tiering and governance-based promotion systems in agentic SDLC
    reason: Internal AOS workflow-registry tier-model conflict (OQ-17/18); largely an internal taxonomy
      reconciliation decision rather than an externally-researchable evidence gap. Overlaps conceptually
      with idea_skillbom-promotion-governance.
  - title: Live cross-feature work register that multiple agents can query
    reason: Self-rated skim; a workflow-wiki/CCDash internal tracking-index implementation problem with
      limited external evidence. Engineering pattern choice, not research.
  - title: Multi-dimensional priority scoring models for agentic task scheduling
    reason: IntentTree M2-specific scoring-formula grounding; medium potential but peripheral to RF's
      evidence/claim mission and largely an internal product calibration question.
