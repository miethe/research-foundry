pillars:
- id: pillar_evidence-claim-verification
  title: Evidence & Claim Verification
  intenttree_level: pillar
  idea_count: 6
  theme: Claim-to-source traceability, hallucination mitigation, contradiction detection, and source freshness
    — RF's core differentiator.
  rationale: 'RF positions the claim ledger + verifier as its defining value. Multiple legs surface the
    same unbacked assumption: that ledger-gating beats alternatives. This pillar groups the empirical
    grounding RF needs for its central mechanism.'
- id: pillar_swarm-orchestration-cost
  title: Swarm Orchestration & Cost Routing
  intenttree_level: pillar
  idea_count: 10
  theme: Adapter selection/comparison, parallel-vs-sequential fan-in, cheap-extract/deep-synthesize model
    routing, and the real cost economics of multi-step pipelines.
  rationale: RF's cost model rests on a two-tier routing principle and three opt-in adapters, none benchmarked.
    This is the highest-frequency dedup cluster across all five legs and directly drives every run's cost.
- id: pillar_governance-multi-key-safety
  title: Governance & Multi-Key Safety
  intenttree_level: pillar
  idea_count: 7
  theme: Work/personal key isolation, sensitivity-tier routing, policy-floor lattices, hook hardening,
    and credential plumbing for live adapters.
  rationale: RF enforces governance as a runtime gate with four key profiles and six non-negotiable rules,
    all author-asserted. Boundary leakage is a named top risk shared by ARC and the broader AOS.
- id: pillar_cross-tool-integration-agentic-os
  title: Cross-Tool Integration (Agentic OS)
  intenttree_level: pillar
  idea_count: 9
  theme: Event-driven seams between tools, candidate-first/push-second patterns, MCP-vs-subprocess interfaces,
    writeback contracts, inbound dispatch, and origination/routing layers.
  rationale: The AOS audit's headline finding is that friction lives in the seams, not the tools. RF,
    MeatyWiki, IntentTree, ARC, and CCDash all defer live integration on missing contracts — the densest
    cross-leg integration cluster.
- id: pillar_knowledge-compilation-retrieval
  title: Knowledge Compilation & Retrieval
  intenttree_level: pillar
  idea_count: 8
  theme: Embedding/vector-store selection, hybrid BM25+vector search, entity consolidation/dedup, edge
    vocabulary, context budgeting, and file-first vs DB-as-truth architecture.
  rationale: The MeatyWiki compilation engine and PKM ideation legs converge here. Embedding/vector strategy
    alone appears in four near-duplicate candidates and is the named prerequisite for suggested-links,
    consolidation, and semantic search.
- id: pillar_evaluation-quality
  title: Evaluation & Quality Scoring
  intenttree_level: pillar
  idea_count: 6
  theme: Evidence-bundle/report quality scoring, artifact fidelity frameworks, agentic eval harnesses
    (CI determinism/cost), telemetry-to-quality prediction, and classification confidence calibration.
  rationale: The CCDash quality_score field is 'pending' across specs and the F0-F4 fidelity radar is
    ungrounded. Every leg has a 'how do we know it worked?' gap that needs an evaluation methodology before
    it can be wired.
- id: pillar_reuse-promotion-governance
  title: Reuse & Promotion Governance
  intenttree_level: pillar
  idea_count: 6
  theme: SkillBOM/agent-bundle promotion lifecycles, artifact provenance/supply-chain standards, prompt/skill
    versioning, and closed-loop telemetry-to-artifact-improvement.
  rationale: 'SkillBOM promotion-too-early is a named risk in RF and the closed-loop improvement gap is
    the shared strategic gap for SkillMeat and CCDash. Distinct enough from evaluation to stand alone:
    this is about lifecycle and provenance, not scoring.'
