- ref: RIB-045
  id: idea_logprob-confidence-calibration
  title: Logprob-based vs self-reported confidence for LLM classification
  pillar: pillar_evaluation-quality
  status: completed
  research_question: Do token-logprob distributions provide more calibrated classification confidence
    than self-reported JSON confidence fields for structured document classification, and is the per-call
    overhead and provider-portability cost justified at vault scale?
  research_questions:
    primary:
    - Do aggregated token-logprob distributions (e.g., normalized sequence probability, label-token probability
      mass, entropy) yield better-calibrated confidence for structured artifact/document classification
      than a self-reported numeric confidence field returned in the JSON response?
    - At vault scale (thousands of artifacts, repeated reclassification), what is the marginal cost and
      latency overhead of requesting logprobs, and does the calibration gain justify it against a cheaper
      self-reported baseline?
    secondary:
    - Which providers/models expose token logprobs in a usable form (top-k logprobs, per-token, echo),
      and what is the portability cost of a logprob-dependent design across OpenAI, Anthropic, and local/open
      models?
    - Which calibration metrics (ECE, Brier score, reliability diagrams, AUROC for accept/abstain) best
      capture the practical difference for a classify-then-route pipeline?
    - How should an abstention/escalation threshold be set from each signal so that low-confidence items
      are deferred to a stronger model or human, and what accept-rate vs error-rate tradeoff results?
    - Do hybrid signals (logprob + self-report, or logprob + a small verifier model) beat either signal
      alone, and at what added cost?
