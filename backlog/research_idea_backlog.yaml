- ref: RIB-055
  id: idea_frictionless-capture-patterns
  title: 'Frictionless capture and retrieval: zero-cognitive-lift PKM design patterns'
  pillar: pillar_capture-ingestion
  status: proposed
  research_question: What design patterns and interaction models in PKM systems (Obsidian, Logseq, Roam,
    Notion, Mem) produce the lowest cognitive overhead for capturing, finding, and linking artifacts —
    including mobile share-extension and offline-tolerant intake — and what measurable proxies validate
    'zero cognitive lift'?
  research_questions:
    primary:
    - What design patterns and interaction models in PKM systems (Obsidian, Logseq, Roam, Notion, Mem)
      produce the lowest cognitive overhead for capturing, finding, and linking artifacts?
    - What measurable proxies (taps-to-capture, time-to-first-keystroke, link-suggestion acceptance, retrieval
      latency) credibly validate a 'zero cognitive lift' capture-and-retrieval claim?
    secondary:
    - What mobile share-extension and offline-tolerant intake patterns work across PWA / native-hybrid
      surfaces?
    - How do these systems handle deferred linking and auto-suggested connections to reduce capture-time
      burden?
    - Which patterns transfer to a file-first, Markdown/YAML vault (Obsidian-compatible) versus relying
      on proprietary stores?
    - How is retrieval friction reduced (quick-switcher, semantic search, recents) without forcing upfront
      organization?
    - What anti-patterns measurably increase cognitive lift at capture time?
