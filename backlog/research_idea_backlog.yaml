  rationale: 'The MeatyWiki intent explicitly demands capture and retrieval with ''never a cognitive lift,''
    but that goal is currently aspirational rather than measured. This research turns the slogan into
    a concrete pattern catalog (mined from mature PKM tools) plus a defined set of measurable proxies,
    and extracts mobile share-extension / offline-tolerant intake patterns relevant to the Portal''s PWA/native-hybrid
    surface. A standard-depth market scan is the right shape: the comparison space is broad but well-known,
    keeping cost modest. Medium priority/potential — it sharpens UX direction across the pillar but is
    a design-informing study rather than a build-blocking dependency. Personal sensitivity since it studies
    public tools for the owner''s own vault.'
