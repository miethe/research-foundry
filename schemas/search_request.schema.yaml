$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://research-foundry.dev/schemas/search_request.schema.yaml"
title: Search Request
description: Input schema for a Research Foundry search operation.
type: object
properties:
  request_id:
    type: string
  intent_id:
    type: string
  task_node_id:
    type: string
  user_or_agent_id:
    type: string
  query:
    type: string
  mode:
    enum:
      - cache_first
      - known_url_extract
      - quick_lookup
      - source_discovery
      - semantic_discovery
      - official_source_check
      - github_discovery
      - academic_discovery
      - docs_crawl
      - deep_research
      - monitoring_delta
      - free_discovery
  constraints:
    type: object
    properties:
      allowed_domains:
        type: array
        items:
          type: string
      blocked_domains:
        type: array
        items:
          type: string
      required_source_types:
        type: array
        items:
          type: string
      max_source_age_days:
        type:
          - integer
          - "null"
      language:
        type: string
      region:
        type:
          - string
          - "null"
    additionalProperties: true
  budget:
    type: object
    properties:
      max_external_queries:
        type: integer
      max_urls_to_extract:
        type: integer
      max_crawl_pages:
        type: integer
      max_provider_cost_usd:
        type: number
      max_latency_seconds:
        type: integer
    additionalProperties: true
  output_requirements:
    type: object
    properties:
      source_cards:
        type: boolean
      claim_ledger:
        type: boolean
      extracted_markdown:
        type: boolean
      summary:
        type: boolean
    additionalProperties: true
  approval:
    type: object
    properties:
      requires_human_approval:
        type: boolean
      reason:
        type:
          - string
          - "null"
    additionalProperties: true
  retrieval:
    description: >
      CARP (catalog-assisted-research-planning) retrieval policy and limits.
      Additive and OPTIONAL: a request that omits this block entirely (every
      legacy request) is byte-identical to `policy: disabled` — the v1
      default. See docs/dev/architecture/carp-contract-freeze.md.
    type: object
    properties:
      policy:
        default: disabled
        enum:
          - disabled
          - catalog_only
          - catalog_then_discovery
      limits:
        type: object
        properties:
          max_questions:
            type: integer
            minimum: 1
            maximum: 200
          max_candidates_per_question:
            type: integer
            minimum: 1
            maximum: 50
          max_pages_per_question:
            type: integer
            minimum: 1
            maximum: 5
          page_size:
            type: integer
            minimum: 1
            maximum: 100
        additionalProperties: false
    additionalProperties: false
required:
  - query
  - mode
additionalProperties: true
