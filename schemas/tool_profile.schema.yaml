$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://research-foundry.dev/schemas/tool_profile.schema.yaml"
title: Tool Profile
description: Capability profile for a search/extraction provider tool.
type: object
properties:
  id:
    type: string
  category:
    type: string
  provider:
    type: string
  best_for:
    type: array
    items:
      type: string
  avoid_for:
    type: array
    items:
      type: string
  cost_model:
    type: object
    properties:
      unit:
        type: string
      current_public_price:
        type: string
      source_url:
        type: string
      last_verified:
        type: string
    additionalProperties: true
  default_budget:
    type: object
    properties:
      max_queries:
        type: integer
      max_results_per_query:
        type: integer
    additionalProperties: true
  evaluation_metrics:
    type: array
    items:
      type: string
  known_failure_modes:
    type: array
    items:
      type: string
required:
  - id
  - provider
additionalProperties: true
