$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://research-foundry.dev/schemas/notebooklm_update.schema.yaml"
title: NotebookLM Update Candidate
description: >
  Candidate record for a Research Foundry → NotebookLM outbound writeback. Always
  written to runs/<run>/writebacks/notebooklm_update.yaml; sources are pushed live
  only when NotebookLM is reachable and the key profile permits. node_id provides an
  optional back-link to the originating IntentTree node.
type: object
properties:
  run_id:
    type: string
    description: RF run identifier (e.g. rf_run_20260613_...)
  update_timestamp:
    type: string
    description: ISO-8601 timestamp of this candidate generation
  status:
    type: string
    enum:
      - proposed
      - integrated
      - live_pushed
    description: Lifecycle status of this writeback candidate
  push_status:
    type: string
    enum:
      - proposed
      - pushed
      - skipped_offline
      - skipped_requires_review
      - skipped_no_notebook
    description: Whether the live NotebookLM source push was attempted and its outcome
  notebook_id:
    type:
      - string
      - "null"
    description: NotebookLM notebook id resolved for this run (null if not yet resolved)
  notebook_title:
    type:
      - string
      - "null"
    description: Human-readable notebook title at time of writeback generation
  project:
    type:
      - string
      - "null"
    description: RF project slug used to resolve the notebook via correlation registry
  evidence_bundle_id:
    type:
      - string
      - "null"
    description: Evidence bundle that backs the sources being pushed
  pushed_source_ids:
    type: array
    description: Source cards successfully pushed as NotebookLM sources
    items:
      type: object
      properties:
        nlm_source_id:
          type: string
          description: NotebookLM-assigned source id returned by add_source()
        rf_source_card_id:
          type: string
          description: RF source card id that was pushed
      required:
        - nlm_source_id
        - rf_source_card_id
      additionalProperties: true
  artifact_links:
    type: array
    description: Run artifacts relevant to this writeback (report, evidence bundle, etc.)
    items:
      type: object
      properties:
        type:
          type: string
          description: Artifact type (e.g. report, evidence_bundle, source_card)
        path:
          type: string
          description: Relative path under the run directory
        label:
          type: string
          description: Human-readable label for the artifact
        task_id:
          type: string
          description: Optional task id that produced this artifact
      required:
        - type
        - path
      additionalProperties: true
  node_id:
    type:
      - string
      - "null"
    description: >
      Optional IntentTree node back-link (mirrors intenttree_update.node_id);
      null when this run was not launched from an IntentTree intent.
required:
  - run_id
  - update_timestamp
  - status
  - push_status
additionalProperties: true
