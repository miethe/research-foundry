$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://research-foundry.dev/schemas/canonical_claim.schema.yaml/v1"
title: Canonical Claim
description: >-
  Optional mutable grouping concept. It references immutable source assertions
  by ID and version and never mutates their evidence or lifecycle.
type: object
additionalProperties: false
properties:
  schema_version:
    const: "1.0"
  type:
    const: canonical_claim
  canonical_claim_id:
    type: string
  canonical_claim_version:
    type: integer
    minimum: 1
  state:
    enum: [proposed, reviewed, active, split, superseded, rolled_back]
  statement:
    type: string
    minLength: 1
  source_assertion_refs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [assertion_id, assertion_version, relation]
      properties:
        assertion_id:
          type: string
          pattern: "^ast_[a-f0-9]{64}$"
        assertion_version:
          type: integer
          minimum: 1
        relation:
          enum: [supports, contradicts, context]
  replaces:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [canonical_claim_id, canonical_claim_version]
      properties:
        canonical_claim_id:
          type: string
        canonical_claim_version:
          type: integer
          minimum: 1
  replacement_claims:
    type: array
    minItems: 1
    description: Versioned canonical claims that replace this split or rolled-back claim.
    items:
      type: object
      additionalProperties: false
      required: [canonical_claim_id, canonical_claim_version]
      properties:
        canonical_claim_id:
          type: string
        canonical_claim_version:
          type: integer
          minimum: 1
  reversal:
    type: object
    additionalProperties: false
    required: [event_id, reason, provenance, resulting_claims]
    properties:
      event_id:
        type: string
      reason:
        type: string
      provenance:
        type: object
        additionalProperties: false
        required: [recorded_by, recorded_at]
        properties:
          recorded_by:
            type: string
          recorded_at:
            type: string
            format: date-time
      resulting_claims:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [canonical_claim_id, canonical_claim_version]
          properties:
            canonical_claim_id:
              type: string
            canonical_claim_version:
              type: integer
              minimum: 1
required:
  - schema_version
  - type
  - canonical_claim_id
  - canonical_claim_version
  - state
  - statement
  - source_assertion_refs
allOf:
  - if:
      properties:
        state:
          enum: [split, rolled_back]
      required: [state]
    then:
      required: [reversal, replacement_claims]
