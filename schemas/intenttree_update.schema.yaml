$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://research-foundry.dev/schemas/intenttree_update.schema.yaml"
title: IntentTree Update Candidate
description: >
  Candidate record for a Research Foundry → IntentTree outbound writeback. Always
  written to runs/<run>/writebacks/intenttree_update.yaml; pushed live only when
  IntentTree is reachable and the key profile permits.
type: object
properties:
  node_id:
    type: string
    description: IntentTree node id (from intent.intenttree_node_ref)
  evidence_bundle_id:
    type: string
  run_id:
    type: string
  update_timestamp:
    type: string
    description: ISO-8601 timestamp of this candidate generation
  status:
    type: string
    description: Node status to set (e.g. in_progress, completed, verified)
  claims_total:
    type: integer
    minimum: 0
  claims_supported:
    type: integer
    minimum: 0
  verification_passed:
    type: boolean
  reusable_output_candidates:
    type: array
    items:
      type: string
    description: Artifact types flagged as reusable (e.g. evidence_bundle, meatywiki_writeback)
  artifact_links:
    type: array
    items:
      type: object
      properties:
        type:
          type: string
        path:
          type: string
        label:
          type: string
      required:
        - type
        - path
      additionalProperties: true
  blocked_by:
    type: array
    items:
      type: string
    description: Blocking issues preventing promotion (from verification failures)
  push_status:
    type: string
    enum:
      - proposed
      - pushed
      - skipped_offline
      - skipped_requires_review
      - skipped_no_node
    description: Whether the live HTTP push was attempted and its outcome
required:
  - run_id
  - update_timestamp
  - status
additionalProperties: true
